  <style>
    .loader {
      text-align: center;
      padding: 100px 20px;
      font-family: 'Inter', sans-serif;
      color: #1A2744;
    }

    .lang-switcher {
      position: relative;
      margin-left: 20px;
    }

    .lang-switcher__btn {
      background: none;
      border: none;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--navy);
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 40px;
      transition: background 0.2s;
    }

    .lang-switcher__btn:hover {
      background: rgba(0, 0, 0, 0.04);
    }

    .lang-switcher__dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
      min-width: 180px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: all 0.2s;
      z-index: 100;
    }

    .lang-switcher.open .lang-switcher__dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .lang-switcher__item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text-body);
      transition: background 0.2s;
    }

    .lang-switcher__item:hover {
      background: var(--pearl);
    }

    .lang-switcher__item--active {
      background: var(--pearl);
      color: var(--navy);
      font-weight: 500;
    }

    .lang-switcher__item-flag {
      font-size: 16px;
    }

    .lang-switcher__item-tag {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
    }

    .v3-nav__links {
      display: flex;
      align-items: center;
      gap: 28px;
      margin: 0;
    }

    @media (max-width: 860px) {
      .v3-nav__links {
        display: none;
      }

      .lang-switcher {
        display: none;
      }
    }
  </style>
</head>

  <script>
    function toggleLang() {
      document.getElementById('langSwitcher').classList.toggle('open');
    }
    document.addEventListener('click', (e) => {
      const ls = document.getElementById('langSwitcher');
      if (ls && !ls.contains(e.target)) ls.classList.remove('open');
    });

    async function loadContent() {
      try {
        const response = await fetch('assets/palabras.json');
        const data = await response.json();
        const lang = "es";
        const pageData = data[lang]?.cookies;
        if (!pageData) throw new Error(`No se encontró el idioma "${lang}" o la clave "cookies"`);
        const t = pageData;

        // Meta
        document.title = t.meta.title;
        document.querySelector('meta[name="description"]').setAttribute('content', t.meta.description);
        document.querySelector('meta[property="og:title"]').setAttribute('content', t.meta.ogTitle);
        document.querySelector('meta[property="og:description"]').setAttribute('content', t.meta.ogDescription);

        // Top bar
        document.getElementById('topBar').innerHTML = `🔒 <strong>${t.topBar.text}</strong> &nbsp;·&nbsp; <a href="contacto.html" style="color:#C9A84C;text-decoration:none;font-weight:500">${t.topBar.cta}</a>`;

        // Nav
        const navLinks = document.getElementById('navLinks');
        navLinks.innerHTML = `
      <li><a href="ens.html">${t.nav.links.ens}</a></li>
      <li><a href="ens-express.html" class="nav-express">${t.nav.links.ensExpress}</a></li>
      <li><a href="iso22301.html">${t.nav.links.iso22301}</a></li>
      <li><a href="iso27001.html">${t.nav.links.iso27001}</a></li>
      <li><a href="otras.html">${t.nav.links.otras}</a></li>
    `;
        document.getElementById('navCta').innerHTML = t.nav.cta;
        document.getElementById('navOverlayLinks').innerHTML = `
      <a href="ens.html">${t.nav.links.ens}</a>
      <a href="ens-express.html">${t.nav.links.ensExpress}</a>
      <a href="iso22301.html">${t.nav.links.iso22301}</a>
      <a href="iso27001.html">${t.nav.links.iso27001}</a>
      <a href="otras.html">${t.nav.links.otras}</a>
    `;
        document.getElementById('navOverlayCta').innerHTML = t.nav.cta;

        // Cookie banner
        const cookieBanner = document.getElementById('cookieBanner');
        document.getElementById('cookieText').innerHTML = `${t.cookieBanner.text} <a href="cookies.html" style="color:var(--navy)">${t.cookieBanner.cookiesLink}</a>.`;
        document.getElementById('cookieAccept').innerHTML = t.cookieBanner.accept;
        document.getElementById('cookieDecline').innerHTML = t.cookieBanner.decline;
        if (!localStorage.getItem('cookieAccepted')) {
          setTimeout(() => cookieBanner.style.display = 'flex', 1200);
        }
        document.getElementById('cookieAccept').onclick = () => { localStorage.setItem('cookieAccepted', 'true'); cookieBanner.style.display = 'none'; };
        document.getElementById('cookieDecline').onclick = () => { localStorage.setItem('cookieAccepted', 'false'); cookieBanner.style.display = 'none'; };

        // Floating elements
        document.getElementById('floatingCta').innerHTML = t.floatingCta;
        document.getElementById('whatsappLink').href = t.whatsapp.url;

        // Exit modal
        document.getElementById('exitModalLabel').innerHTML = t.exitModal.label;
        document.getElementById('exitModalTitle').innerHTML = t.exitModal.title;
        document.getElementById('exitModalDesc').innerHTML = t.exitModal.desc;
        document.getElementById('exitModalCta').innerHTML = t.exitModal.cta;
        document.getElementById('exitModalDismiss').innerHTML = t.exitModal.dismiss;

        // Sticky bar
        document.getElementById('stickyBarText').innerHTML = t.stickyBar.text;
        document.getElementById('stickyBarCta').innerHTML = t.stickyBar.cta;
        if (window.innerWidth <= 768) document.getElementById('stickyBar').style.display = 'flex';

        // Build main content
        const sectionsHTML = t.sections.map(section => {
          let sectionHtml = `<div style="margin-bottom:48px">`;
          sectionHtml += `<h2 style="font-family:var(--font-serif);font-size:24px;font-weight:400;color:var(--navy);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)">${section.title}</h2>`;
          if (section.content) sectionHtml += `<div style="font-size:15px;line-height:1.8;color:var(--text);margin-bottom:16px">${section.content}</div>`;

          // Cookie types (section 2)
          if (section.cookieTypes) {
            sectionHtml += `<div style="display:flex;flex-direction:column;gap:20px">`;
            section.cookieTypes.forEach(ct => {
              sectionHtml += `<div style="background:var(--white);border:1px solid var(--border);overflow:hidden">
            <div style="background:var(--navy);padding:16px 24px">
              <span style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;color:var(--white)">${ct.label}</span>
            </div>
            <div style="padding:20px 24px">
              <p style="font-size:14px;line-height:1.7;color:var(--text);margin:0">${ct.text}</p>
            </div>
          </div>`;
            });
            sectionHtml += `</div>`;
          }

          // Cookie table (section 3)
          if (section.cookieTable) {
            sectionHtml += `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;min-width:600px">
          <thead><tr style="background:var(--navy);color:var(--white)">${section.cookieTable.headers.map(h => `<th style="padding:12px 14px;text-align:left;font-weight:500">${h}</th>`).join('')}</tr></thead>
          <tbody>${section.cookieTable.rows.map((row, idx) => `<tr style="border-bottom:1px solid var(--border);${idx % 2 === 1 ? 'background:var(--pearl)' : ''}">
            <td style="padding:12px 14px;color:var(--navy);font-weight:500;font-family:monospace">${row[0]}</td>
            <td style="padding:12px 14px;color:var(--text)">${row[1]}</td>
            <td style="padding:12px 14px;color:var(--text);line-height:1.5">${row[2]}</td>
            <td style="padding:12px 14px;color:var(--text)">${row[3]}</td>
            <td style="padding:12px 14px;color:var(--text)">${row[4]}</td>
          </tr>`).join('')}</tbody>
        </table></div>`;
            if (section.tableFootnote) sectionHtml += `<p style="font-size:12px;color:var(--text-muted);margin-top:12px">${section.tableFootnote}</p>`;
          }

          // Cookie panel + browsers (section 4)
          if (section.cookiePanel) {
            sectionHtml += `<div style="background:var(--white);border:1px solid var(--border);padding:20px 24px;margin-bottom:20px">
          <p style="font-size:14px;font-weight:600;color:var(--navy);margin:0 0 8px">${section.cookiePanel.title}</p>
          <p style="font-size:14px;line-height:1.6;color:var(--text);margin:0">${section.cookiePanel.text}</p>
        </div>`;
          }

          if (section.browserLabel) {
            sectionHtml += `<p style="font-size:14px;font-weight:600;color:var(--navy);margin-bottom:16px">${section.browserLabel}</p>`;
          }

          if (section.browsers) {
            sectionHtml += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">`;
            section.browsers.forEach(b => {
              sectionHtml += `<div style="background:var(--white);border:1px solid var(--border);padding:20px 24px">
            <p style="font-size:13px;font-weight:600;color:var(--navy);margin:0 0 10px">${b.name}</p>
            <p style="font-size:13px;line-height:1.6;color:var(--text);margin:0 0 10px">${b.instructions}</p>
            <a href="${b.linkUrl}" target="_blank" rel="noopener" style="font-size:12px;color:var(--navy)">${b.linkText}</a>
          </div>`;
            });
            sectionHtml += `</div>`;
          }

          if (section.optOut) {
            sectionHtml += `<div style="background:var(--white);border:1px solid var(--border);padding:20px 24px;margin-top:16px">
          <p style="font-size:13px;font-weight:600;color:var(--navy);margin:0 0 8px">${section.optOut.title}</p>
          <p style="font-size:13px;line-height:1.6;color:var(--text);margin:0">${section.optOut.text}</p>
        </div>`;
          }

          if (section.disclaimer) {
            sectionHtml += `<p style="font-size:13px;line-height:1.7;color:var(--text-muted);margin-top:16px">${section.disclaimer}</p>`;
          }

          // Contact box (section 5)
          if (section.contactBox) {
            sectionHtml += `<div style="background:var(--white);border:1px solid var(--border);padding:24px 28px;font-size:14px;line-height:2">`;
            section.contactBox.items.forEach(item => {
              sectionHtml += `<p style="margin:0">${item.label}${item.value}</p>`;
            });
            sectionHtml += `</div>`;
          }

          if (section.moreInfo) {
            sectionHtml += `<p style="font-size:14px;line-height:1.7;color:var(--text);margin-top:16px">${section.moreInfo}</p>`;
          }

          if (section.privacyLink) {
            sectionHtml += `<p style="font-size:14px;line-height:1.7;color:var(--text);margin-top:12px">${section.privacyLink}</p>`;
          }

          sectionHtml += `</div>`;
          return sectionHtml;
        }).join('');

        const mainHTML = `
      <section style="padding:140px 0 80px;background:var(--pearl)">
        <div class="container" style="max-width:800px">
          <span class="label-tag">${t.page.label}</span>
          <div class="gold-line"></div>
          <h1 style="font-family:var(--font-serif);font-size:clamp(36px,4vw,56px);font-weight:300;color:var(--navy);margin-bottom:32px">${t.page.title}</h1>
          <p style="font-size:13px;color:var(--text-muted);margin-bottom:48px">${t.page.lastUpdate}</p>
          <div style="display:flex;flex-direction:column;gap:48px">${sectionsHTML}</div>
        </div>
      </section>
    `;

        // Footer
        const footerHTML = `
      <div class="container">
        <div class="footer__grid">
          <div>
            <span class="footer__logo">${t.footer.logo}</span>
            <p class="footer__tagline">${t.footer.tagline}</p>
            <div class="footer__contact">
              <a href="mailto:${t.footer.contact.email}">${t.footer.contact.email}</a><br>
              <a href="https://www.linkedin.com/avson" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-family:var(--font-sans);font-size:12px;color:var(--gold);letter-spacing:0.04em">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                ${t.footer.contact.linkedin}
              </a>
              <a href="tel:${t.footer.contact.phone.replace(/\s/g, '')}">${t.footer.contact.phone}</a><br>
              ${t.footer.contact.address}
            </div>
          </div>
          <div>
            <div class="footer__col-title">${t.footer.certifications.title}</div>
            <ul class="footer__links">${t.footer.certifications.items.map(i => `<li><a href="${i === 'ENS' ? 'ens.html' : i === '⚡ ENS Express' ? 'ens-express.html' : i === 'ISO 27001' ? 'iso27001.html' : i === 'ISO 22301' ? 'iso22301.html' : i === 'DORA' ? 'dora.html' : i === 'NIS2' ? 'nis2.html' : i === 'TISAX' ? 'tisax.html' : i === 'Otras ISOs' ? 'otras.html' : '#'}">${i}</a></li>`).join('')}</ul>
          </div>
          <div>
            <div class="footer__col-title">${t.footer.company.title}</div>
            <ul class="footer__links">${t.footer.company.items.map(i => `<li><a href="${i === 'Packs GRC' ? 'packs.html' : i === 'Equipo' ? 'equipo.html' : i === 'Webinars' ? 'webinars.html' : i === 'Contacto' ? 'contacto.html' : '#'}">${i}</a></li>`).join('')}</ul>
          </div>
          <div>
            <div class="footer__col-title">${t.footer.newsletter.title}</div>
            <p class="footer__newsletter-text">${t.footer.newsletter.text}</p>
            <div class="footer__newsletter-form">
              <input type="email" class="footer__newsletter-input" placeholder="${t.footer.newsletter.placeholder}">
              <button class="footer__newsletter-btn">→</button>
            </div>
          </div>
        </div>
        <div class="footer__bottom">
          <span class="footer__copy">${t.footer.bottom.copyright}</span>
          <ul class="footer__legal">${t.footer.bottom.links.map(l => `<li><a href="${l.url}">${l.text}</a></li>`).join('')}</ul>
        </div>
      </div>
    `;

        document.getElementById('app').innerHTML = mainHTML;
        document.getElementById('footer').innerHTML = footerHTML;

        initInteractions();
      } catch (error) {
        console.error('Error cargando el JSON:', error);
        document.getElementById('app').innerHTML = '<div class="loader">Error al cargar el contenido. Por favor, recarga la página.</div>';
      }
    }

    function initInteractions() {
      const burger = document.getElementById('navBurger');
      const overlay = document.getElementById('navOverlay');
      const close = document.getElementById('navClose');
      const toggleNav = (open) => {
        overlay.classList.toggle('open', open);
        document.body.classList.toggle('no-scroll', open);
      };
      burger?.addEventListener('click', () => toggleNav(!overlay.classList.contains('open')));
      close?.addEventListener('click', () => toggleNav(false));
      overlay?.addEventListener('click', (e) => { if (e.target === overlay) toggleNav(false); });

      const nav = document.getElementById('mainNav');
      window.addEventListener('scroll', () => {
        nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40);
      });

      let exitShown = false;
      document.addEventListener('mouseleave', (e) => {
        if (e.clientY < 0 && !exitShown && !sessionStorage.getItem('_exitShown')) {
          document.getElementById('exitModal').style.display = 'flex';
          exitShown = true;
          sessionStorage.setItem('_exitShown', '1');
        }
      });
    }

    loadContent();
  </script>
</body>
