<script>
async function loadContent() {
  try {
    const response = await fetch('assets/palabras.json');
    const data = await response.json();
    const t = data["es"]?.index;
    if (!t) throw new Error('No se encontró data["es"].index');

    // ── Meta tags ──

    document.querySelector('meta[property="og:description"]').setAttribute('content', t.meta.ogDescription);

    document.getElementById('navCta').textContent = t.nav.cta;
    document.getElementById('navOverlayLinks').innerHTML = `
      <a href="ens.html">${t.nav.links.ens}</a>
      <a href="ens-express.html">${t.nav.links.ensExpress}</a>
      <a href="iso22301.html">${t.nav.links.iso22301}</a>
      <a href="iso27001.html">${t.nav.links.iso27001}</a>
      <a href="otras.html">${t.nav.links.otras}</a>
    `;
    document.getElementById('navOverlayCta').textContent = t.nav.cta;

    // ── Hero ──
    const heroHTML = `
    <section class="v3-hero">
      <div class="v3-hero__inner">
        <div class="v3-hero__left">
          <div class="v3-hero__sectors v3-hero__sectors--top">
            ${t.hero.sectors.map(s => `<span>${s}</span>`).join('')}
          </div>
          <div class="v3-fomo-chip">${t.hero.fomoChip}</div>
          <h1 class="v3-hero__h1">${t.hero.title}</h1>
          <p class="v3-hero__sub">${t.hero.subtitle}</p>
        </div>
        <div class="v3-hero__right">
          <div class="v3-lead-card">
            <div class="v3-lead-card__header">
              <span class="v3-live-badge">${t.hero.form.liveBadge}</span>
              <p class="v3-lead-card__title">${t.hero.form.title}</p>
              <p class="v3-lead-card__sub">${t.hero.form.subtitle}</p>
            </div>
            <form class="v3-form" id="heroForm" onsubmit="avsonSubmitLead(event,{source:'hero',event:'hero_lead'})">
              <input type="text"  id="fNombre" name="nombre" placeholder="${t.hero.form.namePlaceholder}" autocomplete="given-name" required class="v3-form__input">
              <input type="email" id="fEmail"  name="email"  placeholder="${t.hero.form.emailPlaceholder}" autocomplete="email" required class="v3-form__input">
              <div class="v3-form__rgpd">
                <input type="checkbox" id="fRgpd" required>
                <label for="fRgpd">${t.hero.form.rgpdLabel} <a href="privacidad.html" target="_blank">${t.hero.form.rgpdLink}</a></label>
              </div>
              <button type="submit" class="v3-btn v3-btn--gold v3-btn--full v3-btn--xl v3-btn--pulse">${t.hero.form.submitButton}</button>
              <p class="v3-form__lock">${t.hero.form.lockText}</p>
            </form>
            <div class="v3-lead-card__phone">
              ${t.hero.form.phoneText} <a href="tel:+34648414863">${t.hero.form.phoneNumber}</a>
            </div>

    // ── Stats ──

    <div class="v3-stats">
      ${t.stats.map((s, i) => {
        const sep = i < t.stats.length - 1 ? '<div class="v3-stats__sep"></div>' : '';

    // ── Que es ENS ──
    const ensExplainHTML = `

    // ── ENS Express ──
    const expressHTML = `

        <div class="v3-express-inner">
          <div class="v3-express-text">

          </div>

            <p class="v3-express-card__label">${t.ensExpress.cardLabel}</p>
            <div class="v3-express-urgency">

                <span class="v3-urgency-dot v3-urgency-dot--amber"></span>

          </div>
        </div>
      </div>
    </section>`;

    // ── Packs ──
    const packsHTML = `
    <section class="v3-section v3-section--white" id="packs">
      <div class="v3-container">
        <span class="v3-label">${t.packs.label}</span>
        <h2 class="v3-h2">${t.packs.title}</h2>
        <div class="v3-packs">
          ${t.packs.items.map(pack => `
          <article class="v3-pack-card${pack.featured ? ' v3-pack-card--featured' : ''}">
            <span class="v3-pack-badge${pack.featured ? ' v3-pack-badge--gold' : ''}">${pack.badge}</span>
            <h3>${pack.name}</h3>
            <p>${pack.description}</p>
            <a href="contacto.html" class="v3-btn v3-btn--gold v3-btn--full">${pack.cta}</a>
          </article>`).join('')}
        </div>
        <p class="v3-packs-note">${t.packs.note} <a href="contacto.html">${t.packs.noteCta}</a></p>
      </div>
    </section>`;

    // ── Testimonials ──
    const testimonialsHTML = `
    <section class="v3-section v3-section--pearl">
      <div class="v3-container">
        <span class="v3-label">${t.testimonials.label}</span>
        <h2 class="v3-h2">${t.testimonials.title}</h2>
        <div class="v3-testimonials">
          ${t.testimonials.items.map(item => `
          <article class="v3-testi">
            <div class="v3-testi__stars">${item.stars}</div>
            <blockquote>${item.quote}</blockquote>
            <footer>
              <div class="v3-testi__avatar${item.avatarClass ? ' ' + item.avatarClass : ''}">${item.initials}</div>
              <div>
                <strong>${item.name}</strong>
                <span>${item.role}</span>
              </div>
              <div class="v3-testi__result">${item.result}</div>
            </footer>
          </article>`).join('')}
        </div>
      </div>
    </section>`;

    // ── FAQ ──
    const faqHTML = `
    <section class="v3-section v3-section--white">
      <div class="v3-container v3-faq-wrap">
        <div class="v3-faq-header">
          <span class="v3-label">${t.faq.label}</span>
          <h2 class="v3-h2">${t.faq.title}</h2>
          <p style="font-family:var(--font-sans);font-size:15px;color:var(--text-muted);line-height:1.6;margin-top:8px">${t.faq.helpText} <a href="contacto.html" style="color:var(--navy);font-weight:600">${t.faq.helpCta}</a></p>
        </div>
        <div class="v3-faq-list">
          ${t.faq.items.map(item => `
          <div class="v3-faq-q">
            <button>${item.question} <span>+</span></button>
            <div class="v3-faq-a" hidden><p>${item.answer}</p></div>
          </div>`).join('')}
        </div>
      </div>
    </section>`;

    // ── Final CTA ──
    const finalCtaHTML = `
    <section class="v3-section v3-section--navy v3-cta-final">
      <div class="v3-container">

            <a href="tel:+34648414863">${t.footer.contact.phone}</a>
            <span>${t.footer.contact.addresses}</span>
            <a href="https://www.linkedin.com/avson" target="_blank" rel="noopener">${t.footer.contact.linkedin}</a>

        </div>

          <strong>${t.footer.certifications.title}</strong>
          <ul>
            ${t.footer.certifications.items.map(i => `<li><a href="${i.href}">${i.label}</a></li>`).join('')}

        </div>
        <div class="v3-footer__col">
          <strong>${t.footer.company.title}</strong>

        </div>
      </div>
      <div class="v3-footer__bottom">
        <span>${t.footer.bottom.copyright}</span>
        <ul>
          ${t.footer.bottom.links.map(l => `<li><a href="${l.href}">${l.label}</a></li>`).join('')}
        </ul>
      </div>
    </div>`;

    // ── Inject into DOM ──
    document.getElementById('app').innerHTML = heroHTML + statsHTML + ensExplainHTML + expressHTML + packsHTML + testimonialsHTML + faqHTML + finalCtaHTML;
    document.getElementById('footer').innerHTML = footerHTML;

    // ── WhatsApp badge ──
    document.getElementById('whatsappBadge').innerHTML = t.whatsapp.badge;

    // ── Mobile CTA ──
    document.getElementById('mobileCtaLink').textContent = t.mobileCta;

    // ── Cookie banner ──
    document.getElementById('cookieText').innerHTML = `${t.cookie.text} <a href="cookies.html">${t.cookie.moreInfo}</a>.`;
    document.getElementById('cookieReject').textContent = t.cookie.reject;
    document.getElementById('cookieAccept').textContent = t.cookie.accept;

    // ── Exit popup ──
    document.getElementById('exitPopupIcon').textContent = t.exitPopup.icon;
    document.getElementById('exitPopupTitle').textContent = t.exitPopup.title;
    document.getElementById('exitPopupSub').textContent = t.exitPopup.subtitle;
    document.getElementById('exitPopupCTA').textContent = t.exitPopup.cta;
    document.getElementById('exitPopupDismiss').textContent = t.exitPopup.dismiss;

    initInteractions();

  } catch (error) {
    console.error('Error cargando el JSON:', error);
    document.getElementById('app').innerHTML = '<div class="loader">Error al cargar el contenido. Por favor, recarga la pagina.</div>';
  }
}

function initInteractions() {
  // ── Nav scroll ──
  const nav    = document.getElementById('mainNav');
  const sticky = document.getElementById('stickyBar');
  const waWrap = document.getElementById('whatsappWrap');

  window.addEventListener('scroll', () => {
    nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40);
    const heroH = document.querySelector('.v3-hero')?.offsetHeight ?? 500;
    sticky.classList.toggle('visible', window.scrollY > heroH * 0.65);
    if (waWrap) {
      const scrolled = window.scrollY + window.innerHeight;
      waWrap.classList.toggle('v3-wa--visible', scrolled > document.documentElement.scrollHeight * 0.78);
    }
  }, { passive: true });

  // ── Burger menu ──
  const burger  = document.getElementById('navBurger');
  const overlay = document.getElementById('navOverlay');
  const close   = document.getElementById('navClose');
  const toggleNav = open => {
    overlay.classList.toggle('open', open);
    document.body.classList.toggle('no-scroll', open);
    burger.setAttribute('aria-expanded', open);
  };
  burger.addEventListener('click', () => toggleNav(!overlay.classList.contains('open')));
  close?.addEventListener('click', () => toggleNav(false));
  overlay.addEventListener('click', (e) => { if (e.target === overlay) toggleNav(false); });

  // ── FAQ toggle ──
  document.querySelectorAll('.v3-faq-q button').forEach(btn => {
    btn.addEventListener('click', () => {
      const q = btn.closest('.v3-faq-q');
      const a = q.querySelector('.v3-faq-a');
      const icon = btn.querySelector('span');
      const isOpen = !a.hidden;
      document.querySelectorAll('.v3-faq-q').forEach(item => {
        item.querySelector('.v3-faq-a').hidden = true;
        item.querySelector('button span').textContent = '+';
        item.classList.remove('open');
      });
      if (!isOpen) {
        a.hidden = false;
        icon.textContent = '\u2212';
        q.classList.add('open');
      }
    });
  });

  // ── Fade-in animations ──
  document.querySelectorAll('.v3-pack-card, .v3-testi, .v3-fear-card').forEach(el => {
    el.classList.add('v3-fade');
    new IntersectionObserver(([e]) => { if (e.isIntersecting) el.classList.add('v3-fade--in'); }, { threshold: 0.1 }).observe(el);
  });

  // ── Animated counters ──
  const counters = document.querySelectorAll('.v3-counter');
  if (counters.length) {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const el = entry.target;
        const target = parseInt(el.dataset.target, 10);
        const suffix = el.dataset.suffix || '';
        const duration = 1200;
        const start = performance.now();
        const tick = (now) => {
          const p = Math.min((now - start) / duration, 1);
          const ease = 1 - Math.pow(1 - p, 3);
          el.textContent = Math.round(ease * target) + suffix;
          if (p < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
        obs.unobserve(el);
      });
    }, { threshold: 0.5 });
    counters.forEach(el => obs.observe(el));
  }

  // ── Cookie banner ──
  if (!localStorage.getItem('avson_cookies')) {
    setTimeout(() => document.getElementById('cookieBanner').classList.add('visible'), 1800);
  }

  // ── Social proof (deterministic by day) ──
  const liveEl = document.getElementById('liveCount');
  if (liveEl) {
    const now = new Date();
    const daySeed = now.getFullYear() * 1000 + (now.getMonth() + 1) * 50 + now.getDate();
    const count = 3 + (daySeed % 6);
    liveEl.textContent = count + ' empresas consultaron esta semana';
  }

  // ── Click tracking ──
  function track(event, props) {
    if (window.dataLayer) dataLayer.push({ event, ...props });
    if (window.clarity) window.clarity('event', event);
  }

  document.querySelectorAll('a[href^="tel:"]').forEach(el => {
    el.addEventListener('click', () => track('phone_click', { location: el.closest('section, nav, div')?.className || 'unknown' }));
  });
  document.querySelector('.v3-wa__btn')?.addEventListener('click', () => track('whatsapp_click', {}));
  document.querySelectorAll('a[href="contacto.html"]').forEach((el, i) => {
    el.addEventListener('click', () => track('cta_click', { cta_text: el.textContent.trim(), cta_position: i }));
  });

  // ── Form interaction tracking ──
  let formStarted = false;
  const heroForm = document.getElementById('heroForm');
  if (heroForm) {
    heroForm.querySelectorAll('input').forEach(input => {
      input.addEventListener('focus', () => {
        if (!formStarted) {
          formStarted = true;
          track('form_start', { form: 'hero' });
        }
      });
    });
  }

  // ── Form abandon detection ──
  window.addEventListener('beforeunload', () => {
    if (formStarted) {
      const nombre = document.getElementById('fNombre')?.value || '';
      const email = document.getElementById('fEmail')?.value || '';
      const filled = (nombre ? 1 : 0) + (email ? 1 : 0);
      if (filled > 0 && filled < 2) {
        track('form_abandon', { fields_filled: filled, nombre_filled: !!nombre, email_filled: !!email });
      }
    }
  });

  // ── Exit intent popup ──
  (function() {
    if (localStorage.getItem('exit_popup_shown')) return;
    let shown = false;
    const popup = document.getElementById('exitPopup');
    if (!popup) return;

    document.addEventListener('mouseleave', (e) => {
      if (e.clientY > 20 || shown || e.relatedTarget !== null) return;
      shown = true;
      localStorage.setItem('exit_popup_shown', '1');
      popup.classList.add('visible');
      track('exit_intent_shown', {});
    });

    let mobileTimer = setTimeout(() => {
      if (!shown && window.innerWidth < 768) {
        shown = true;
        popup.classList.add('visible');
        track('exit_intent_shown', { trigger: 'mobile_timer' });
      }
    }, 45000);

    document.getElementById('exitPopupClose')?.addEventListener('click', () => {
      popup.classList.remove('visible');
      track('exit_intent_dismissed', {});
    });
    document.getElementById('exitPopupCTA')?.addEventListener('click', () => {
      track('exit_intent_converted', {});
    });
    document.getElementById('exitPopupDismiss')?.addEventListener('click', () => {
      popup.classList.remove('visible');
      track('exit_intent_dismissed', {});
    });
  })();

  // ── Mobile scroll-to-form ──
  (function() {
    if (window.innerWidth > 768) return;
    const heroLeft = document.querySelector('.v3-hero__left');
    if (!heroLeft) return;
    const heroRight = document.querySelector('.v3-hero__right');
    heroLeft.querySelectorAll('a[href="contacto.html"]').forEach(link => {
      link.addEventListener('click', (e) => {
        if (heroRight) {
          e.preventDefault();
          heroRight.scrollIntoView({ behavior: 'smooth', block: 'start' });
          setTimeout(() => document.getElementById('fNombre')?.focus(), 600);
          track('mobile_scroll_to_form', {});
        }
      });
    });
  })();
}

function setCookies(choice) {
  localStorage.setItem('avson_cookies', choice);
  document.getElementById('cookieBanner').classList.remove('visible');
}

loadContent();
</script>

</body>
</html>
