        ]
      },
      {
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "¿Tienen oficina en Barcelona?",
            "acceptedAnswer": {"@type": "Answer", "text": "Avson GRC no tiene oficina física en Barcelona, pero trabaja de forma presencial en Barcelona y toda Cataluña desplazando a su equipo consultor. La mayor parte del proyecto ENS se gestiona en remoto a través de nuestra plataforma colaborativa, y coordinamos visitas presenciales para las fases clave del proyecto."}
          },
          {
            "@type": "Question",
            "name": "¿Cuánto cuesta la consultoría ENS en Barcelona?",
            "acceptedAnswer": {"@type": "Answer", "text": "El coste es el mismo que en cualquier otra ciudad española: desde 4.000€ para ENS básico hasta más de 18.000€ para ENS alto, dependiendo del tamaño y complejidad de la organización. El presupuesto sin compromiso incluye propuesta personalizada sin compromiso."}
          },
          {
            "@type": "Question",
            "name": "¿El ENS es obligatorio para las empresas que trabajan con la Generalitat de Catalunya?",
            "acceptedAnswer": {"@type": "Answer", "text": "Sí. La Generalitat de Catalunya, el Ayuntamiento de Barcelona y los organismos dependientes exigen el certificado ENS a sus proveedores TIC. El RD 311/2022 es de aplicación en toda España, incluida Cataluña. Si tu empresa presta servicios digitales a cualquier entidad pública catalana, necesitas el ENS."}
          }
        ]
      }
    ]
  }

  <script>
    async function loadContent() {
      try {
        const response = await fetch('assets/palabras.json');
        const data = await response.json();
        const lang = "es";
        const t = data[lang]?.ensBarcelona;
        if (!t) throw new Error('No se encontraron datos para ensBarcelona');

        // Meta
        document.title = t.meta.title;
        document.querySelector('meta[name="description"]').setAttribute('content', t.meta.description);
        document.querySelector('meta[name="keywords"]').setAttribute('content', t.meta.keywords);
        document.querySelector('meta[property="og:title"]').setAttribute('content', t.meta.ogTitle);
        document.querySelector('meta[property="og:description"]').setAttribute('content', t.meta.ogDescription);
        document.querySelector('meta[name="twitter:title"]').setAttribute('content', t.meta.twitterTitle);
        document.querySelector('meta[name="twitter:description"]').setAttribute('content', t.meta.twitterDescription);

        // Top bar
        document.getElementById('topBar').innerHTML = `${t.topBar.text} &nbsp;&middot;&nbsp; <a href="ens-express.html" style="color:#C9A84C;text-decoration:none;font-weight:500">${t.topBar.cta}</a>`;

        // Nav
        document.getElementById('navLinks').innerHTML = `
          <li><a href="ens.html">${t.nav.links.ens}</a></li>
          <li><a href="ens-express.html" class="nav-express">${t.nav.links.ensExpress}</a></li>
          <li><a href="iso22301.html">${t.nav.links.iso22301}</a></li>
          <li><a href="iso27001.html">${t.nav.links.iso27001}</a></li>
          <li><a href="otras.html">${t.nav.links.otras}</a></li>`;
        document.getElementById('navCta').innerHTML = t.nav.cta;
        document.getElementById('navOverlayLinks').innerHTML = `
          <a href="ens.html">${t.nav.links.ens}</a>
          <a href="ens-express.html">${t.nav.links.ensExpress}</a>
          <a href="iso22301.html">${t.nav.links.iso22301}</a>
          <a href="iso27001.html">${t.nav.links.iso27001}</a>
          <a href="otras.html">${t.nav.links.otras}</a>`;
        document.getElementById('navOverlayCta').innerHTML = t.nav.cta;

        // Hero
        const heroHTML = `
          <section class="section section--navy" style="padding-top:120px;padding-bottom:80px">
            <div class="container" style="max-width:900px">
              <ol style="display:flex;gap:8px;list-style:none;font-size:12px;color:rgba(255,255,255,.5);font-family:'Inter',sans-serif;margin-bottom:32px">
                <li><a href="index.html" style="color:rgba(255,255,255,.5);text-decoration:none">${t.hero.breadcrumb[0]}</a></li>
                <li style="color:rgba(255,255,255,.3)">/</li>
                <li><a href="ens.html" style="color:rgba(255,255,255,.5);text-decoration:none">${t.hero.breadcrumb[1]}</a></li>
                <li style="color:rgba(255,255,255,.3)">/</li>
                <li style="color:#C9A84C">${t.hero.breadcrumb[2]}</li>
              </ol>
              <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">
                ${t.hero.badges.map(b => `<span style="background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.4);color:#C9A84C;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:5px 14px">${b}</span>`).join('')}
              </div>
              <h1 style="font-family:'Cormorant Garamond',serif;font-size:clamp(32px,4.5vw,58px);font-weight:600;color:#fff;line-height:1.08;margin-bottom:24px">${t.hero.title}</h1>
              <p style="font-family:'Inter',sans-serif;font-size:16px;color:rgba(255,255,255,.75);line-height:1.7;max-width:680px;margin-bottom:40px">${t.hero.subtitle}</p>
              <form class="hero__form" action="contacto.html" method="get" style="display:flex;gap:12px;flex-wrap:wrap;max-width:520px">
                <input type="email" name="email" placeholder="${t.hero.formPlaceholder}" required style="flex:1;min-width:220px;padding:14px 18px;font-family:'Inter',sans-serif;font-size:14px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;outline:none">
                <button type="submit" style="padding:14px 28px;background:#C9A84C;color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:none">${t.hero.formButton}</button>
              </form>
              <p style="margin-top:12px;font-size:12px;color:rgba(255,255,255,.45);font-family:'Inter',sans-serif">${t.hero.note}</p>
            </div>
          </section>`;

        // National section
        const nationalHTML = `
          <section class="section section--white">
            <div class="container">
              <div class="gold-line"></div>
              <span class="label-tag">${t.national.label}</span>
              <h2 class="section-title" style="max-width:700px">${t.national.title}</h2>
              <div style="background:#1A2744;border-left:4px solid #C9A84C;padding:28px 36px;margin:40px 0">
                <p style="font-family:'Inter',sans-serif;font-size:15px;font-weight:500;color:rgba(255,255,255,.9);line-height:1.7">${t.national.message}</p>
              </div>
              ${t.national.paragraphs.map(p => `<p style="font-family:'Inter',sans-serif;font-size:15px;color:#5a6478;line-height:1.75;margin-bottom:20px">${p}</p>`).join('')}
            </div>
          </section>`;

        // Context section
        const contextHTML = `
          <section class="section section--pearl">
            <div class="container">
              <div class="gold-line"></div>
              <span class="label-tag">${t.context.label}</span>
              <h2 class="section-title" style="max-width:700px">${t.context.title}</h2>
              <p style="font-family:'Inter',sans-serif;font-size:16px;color:#5a6478;line-height:1.7;max-width:680px;margin-bottom:40px">${t.context.lead}</p>
              ${t.context.paragraphs.map(p => `<p style="font-family:'Inter',sans-serif;font-size:15px;color:#5a6478;line-height:1.75;margin-bottom:20px">${p}</p>`).join('')}
            </div>
          </section>`;

        // Process section
        const processHTML = `
          <section class="section section--white">
            <div class="container">
              <div class="gold-line"></div>
              <span class="label-tag">${t.process.label}</span>
              <h2 class="section-title">${t.process.title}</h2>
              <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-top:48px">
                ${t.process.steps.map(s => `
                  <div class="anim-fade-up" style="background:var(--white);border:1px solid #E2DDD6;padding:28px">
                    <div style="font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;color:#C9A84C;opacity:.5;line-height:1;margin-bottom:12px">${s.num}</div>
                    <div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:#1A2744;margin-bottom:10px">${s.title}</div>
                    <p style="font-family:'Inter',sans-serif;font-size:13px;color:#5a6478;line-height:1.65">${s.text}</p>
                  </div>
                `).join('')}
              </div>
            </div>
          </section>`;

        // Price section
        const priceHTML = `
          <section class="section section--pearl">
            <div class="container" style="max-width:800px">
              <div class="gold-line"></div>
              <span class="label-tag">${t.pricing.label}</span>
              <h2 class="section-title">${t.pricing.title}</h2>
              <div class="anim-fade-up" style="background:#F5F3EE;border:1px solid #E2DDD6;border-left:4px solid #C9A84C;padding:32px">
                <p style="font-family:'Inter',sans-serif;font-size:15px;color:#3a4557;line-height:1.75;margin-bottom:16px">${t.pricing.intro}</p>
                <ul style="list-style:none;font-family:'Inter',sans-serif;font-size:15px;color:#3a4557;line-height:1.75">
                  ${t.pricing.items.map(i => `<li style="display:flex;gap:12px;margin-bottom:10px"><span style="color:#C9A84C;font-weight:600">&rarr;</span> ${i}</li>`).join('')}
                </ul>
                <p style="font-family:'Inter',sans-serif;font-size:13px;color:#999;margin-top:16px">${t.pricing.note}</p>
              </div>
            </div>
          </section>`;

        // FAQ section
        const faqHTML = `
          <section class="section section--white">
            <div class="container" style="max-width:800px">
              <div class="gold-line" style="margin:0 auto 20px"></div>
              <div style="text-align:center;margin-bottom:48px">
                <span class="label-tag">${t.faq.label}</span>
                <h2 class="section-title">${t.faq.title}</h2>
              </div>
              <div>
                ${t.faq.items.map(item => `
                  <div class="faq-item anim-fade-up">
                    <div class="faq-item__question">${item.question}<div class="faq-item__icon">+</div></div>
                    <div class="faq-item__answer"><p>${item.answer}</p></div>
                  </div>
                `).join('')}
              </div>
            </div>
          </section>`;

        // Final CTA
        const finalCtaHTML = `
          <section class="section section--navy">
            <div class="container" style="text-align:center;max-width:700px">
              <div class="gold-line" style="margin:0 auto 20px"></div>
              <h2 style="font-family:'Cormorant Garamond',serif;font-size:clamp(26px,3.2vw,42px);font-weight:600;color:#fff;line-height:1.1;margin-bottom:20px">${t.finalCta.title}</h2>
              <p style="font-family:'Inter',sans-serif;font-size:16px;color:rgba(255,255,255,.75);line-height:1.7;max-width:680px;margin:0 auto 36px">${t.finalCta.subtitle}</p>
              <form action="contacto.html" method="get" style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:520px;margin:0 auto">
                <input type="email" name="email" placeholder="${t.finalCta.formPlaceholder}" required style="flex:1;min-width:220px;padding:14px 18px;font-family:'Inter',sans-serif;font-size:14px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;outline:none">
                <button type="submit" style="padding:14px 28px;background:#C9A84C;color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:none">${t.finalCta.formButton}</button>
              </form>
              <p style="font-family:'Inter',sans-serif;font-size:12px;color:rgba(255,255,255,.35);margin-top:16px">${t.finalCta.contact}</p>
              <p style="font-family:'Inter',sans-serif;font-size:12px;color:rgba(255,255,255,.35);margin-top:8px">${t.finalCta.seeAlso}</p>
            </div>
          </section>`;

        // Footer
        const footerHTML = `
          <div class="container">
            <div class="footer__grid">
              <div class="footer__col footer__col--wide">
                <div class="nav__logo" style="margin-bottom:16px">${t.footer.logo}</div>
                <p style="color:rgba(255,255,255,0.55);font-family:var(--font-sans);font-size:14px;line-height:1.7;max-width:280px">${t.footer.description}</p>
                <p style="color:rgba(255,255,255,0.4);font-family:var(--font-sans);font-size:13px;margin-top:16px">${t.footer.contact.email} &middot; ${t.footer.contact.phone}</p>
                <p style="font-size:12px;color:rgba(255,255,255,.35);margin-top:12px">${t.footer.contact.legal}</p>
              </div>
              <div class="footer__col"><h4 class="footer__heading">${t.footer.certifications.title}</h4><ul class="footer__links">${t.footer.certifications.items.map(i => `<li><a href="${i === 'ENS' ? 'ens.html' : i === 'ISO 27001' ? 'iso27001.html' : i === 'ISO 22301' ? 'iso22301.html' : i === 'DORA' ? 'dora.html' : i === 'NIS2' ? 'nis2.html' : i === 'TISAX' ? 'tisax.html' : '#'}">${i}</a></li>`).join('')}</ul></div>
              <div class="footer__col"><h4 class="footer__heading">${t.footer.resources.title}</h4><ul class="footer__links">${t.footer.resources.items.map(i => `<li><a href="${i.href}">${i.text}</a></li>`).join('')}</ul></div>
              <div class="footer__col"><h4 class="footer__heading">${t.footer.legal.title}</h4><ul class="footer__links">${t.footer.legal.items.map(i => `<li><a href="${i.href}">${i.text}</a></li>`).join('')}</ul></div>
            </div>
            <div class="footer__bottom"><p>${t.footer.bottom.copyright}</p><p>${t.footer.bottom.contact}</p></div>
          </div>`;

        // Floating elements
        document.getElementById('floatingCta').innerHTML = t.floatingCta;
        document.getElementById('exitModalLabel').innerHTML = t.exitModal.label;
        document.getElementById('exitModalTitle').innerHTML = t.exitModal.title;
        document.getElementById('exitModalDesc').innerHTML = t.exitModal.description;
        document.getElementById('exitModalCta').innerHTML = t.exitModal.cta;
        document.getElementById('exitModalDismiss').innerHTML = t.exitModal.dismiss;
        document.getElementById('stickyBarText').innerHTML = t.stickyBar.text;
        document.getElementById('stickyBarCta').innerHTML = t.stickyBar.cta;
        const waLink = document.getElementById('whatsappLink');
        if (waLink && t.whatsapp) { waLink.href = t.whatsapp.url; waLink.setAttribute('aria-label', t.whatsapp.ariaLabel); }

        // Assemble
        document.getElementById('app').innerHTML = heroHTML + nationalHTML + contextHTML + processHTML + priceHTML + faqHTML + finalCtaHTML;
        document.getElementById('footer').innerHTML = footerHTML;

        initInteractions();
      } catch(error) {
        console.error('Error cargando el JSON:', error);
        document.getElementById('app').innerHTML = '<div class="loader">Error al cargar el contenido. Por favor, recarga la página.</div>';
      }
    }

    function initInteractions() {
      const burger=document.getElementById('navBurger'),overlay=document.getElementById('navOverlay'),close=document.getElementById('navClose');
      const toggleNav=o=>{overlay.classList.toggle('open',o);document.body.classList.toggle('no-scroll',o)};
      burger?.addEventListener('click',()=>toggleNav(!overlay.classList.contains('open')));
      close?.addEventListener('click',()=>toggleNav(false));
      overlay?.addEventListener('click',e=>{if(e.target===overlay)toggleNav(false)});
      const nav=document.getElementById('mainNav');
      window.addEventListener('scroll',()=>nav.classList.toggle('v3-nav--scrolled',window.scrollY>40));
      const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')})},{threshold:0.08});
      document.querySelectorAll('.anim-fade-up').forEach(el=>obs.observe(el));
      document.querySelectorAll('.faq-item__question').forEach(q=>{q.addEventListener('click',()=>q.parentElement.classList.toggle('open'))});
      let exitShown=false;
      document.addEventListener('mouseleave',e=>{if(e.clientY<0&&!exitShown&&!sessionStorage.getItem('_exitShown')){document.getElementById('exitModal').style.display='flex';exitShown=true;sessionStorage.setItem('_exitShown','1')}});
      if(window.innerWidth<=768)document.getElementById('stickyBar').style.display='flex';
    }

    loadContent();
  </script>
</body>
</html>
