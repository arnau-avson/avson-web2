  <style>
    @media(max-width:700px) {
      .presupuesto-grid {
        grid-template-columns: 1fr !important;
        gap: 28px !important;
      }
    }

    .lang-switcher {
      position: relative;
      margin-left: 20px;
    }

    .lang-switcher__btn {
      background: none;
      border: none;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--navy);
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 40px;
      transition: background 0.2s;
    }

    .lang-switcher__btn:hover {
      background: rgba(0, 0, 0, 0.04);
    }

    .lang-switcher__dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
      min-width: 180px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: all 0.2s;
      z-index: 100;
    }

    .lang-switcher.open .lang-switcher__dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .lang-switcher__item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text-body);
      transition: background 0.2s;
    }

    .lang-switcher__item:hover {
      background: var(--pearl);
    }

    .lang-switcher__item--active {
      background: var(--pearl);
      color: var(--navy);
      font-weight: 500;
    }

    .lang-switcher__item-flag {
      font-size: 16px;
    }

    .lang-switcher__item-tag {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
    }

    @media (max-width: 860px) {
      .lang-switcher {
        display: none;
      }
    }

    .v3-nav__links {
      display: flex;
      align-items: center;
      gap: 28px;
      margin: 0;
    }

    @media (max-width: 860px) {
      .v3-nav__links {
        display: none;
      }
    }

    .scb-right {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--navy);
      padding: 16px;
      border-radius: 12px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      border: 1px solid var(--gold);
    }

    .scb-right span {
      font-family: var(--font-sans);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
    }

    .scb-right .v3-btn--gold {
      padding: 8px 16px;
      font-size: 11px;
    }

    @media (max-width: 860px) {
      .scb-right {
        display: none;
      }
    }
  </style>
</head>

  <script>
    function toggleLang() {
      document.getElementById('langSwitcher').classList.toggle('open');
    }
    document.addEventListener('click', (e) => {
      const ls = document.getElementById('langSwitcher');
      if (ls && !ls.contains(e.target)) ls.classList.remove('open');
    });

    async function loadContent() {
      try {
        const response = await fetch('assets/palabras.json');
        const data = await response.json();
        const lang = "es";
        const pageData = data[lang]?.packs;
        if (!pageData) throw new Error(`No se encontró el idioma "${lang}" o la clave "packs"`);
        const t = pageData;

        // Meta tags
        document.title = t.meta.title;
        document.querySelector('meta[name="description"]').setAttribute('content', t.meta.description);
        document.querySelector('meta[name="keywords"]').setAttribute('content', t.meta.keywords);
        document.querySelector('meta[property="og:title"]').setAttribute('content', t.meta.ogTitle);
        document.querySelector('meta[property="og:description"]').setAttribute('content', t.meta.ogDescription);
        document.querySelector('meta[name="twitter:title"]').setAttribute('content', t.meta.twitterTitle);
        document.querySelector('meta[name="twitter:description"]').setAttribute('content', t.meta.twitterDescription);

        // Top bar
        document.getElementById('topBar').innerHTML = `🔒 <strong>${t.topBar.text}</strong> &nbsp;·&nbsp; ${t.topBar.extra} &nbsp;·&nbsp; <a href="contacto.html" style="color:#C9A84C;text-decoration:none;font-weight:500">${t.topBar.cta}</a>`;

        // Nav
        const navLinks = document.getElementById('navLinks');
        navLinks.innerHTML = `
      <li><a href="ens.html">${t.nav.links.ens}</a></li>
      <li><a href="ens-express.html" class="nav-express">${t.nav.links.ensExpress}</a></li>
      <li><a href="iso22301.html">${t.nav.links.iso22301}</a></li>
      <li><a href="iso27001.html">${t.nav.links.iso27001}</a></li>
      <li><a href="otras.html">${t.nav.links.otras}</a></li>
    `;
        document.getElementById('navCta').innerHTML = t.nav.cta;
        document.getElementById('navOverlayLinks').innerHTML = `
      <a href="ens.html">${t.nav.links.ens}</a>
      <a href="ens-express.html">${t.nav.links.ensExpress}</a>
      <a href="iso22301.html">${t.nav.links.iso22301}</a>
      <a href="iso27001.html">${t.nav.links.iso27001}</a>
      <a href="otras.html">${t.nav.links.otras}</a>
    `;
        document.getElementById('navOverlayCta').innerHTML = t.nav.cta;

        // Sidebar right (scb)
        document.getElementById('scbText').innerHTML = t.scbRight.text;
        document.getElementById('scbCta').innerHTML = t.scbRight.cta;

        // Cookie banner
        const cookieBanner = document.getElementById('cookieBanner');
        document.getElementById('cookieText').innerHTML = `${t.cookieBanner.text} <a href="${t.cookieBanner.linkUrl}" style="color:var(--navy)">${t.cookieBanner.linkText}</a>`;
        document.getElementById('cookieAccept').innerHTML = t.cookieBanner.accept;
        document.getElementById('cookieDecline').innerHTML = t.cookieBanner.decline;
        if (!localStorage.getItem('cookieAccepted')) {
          setTimeout(() => cookieBanner.style.display = 'flex', 1200);
        }
        document.getElementById('cookieAccept').onclick = () => { localStorage.setItem('cookieAccepted', 'true'); cookieBanner.style.display = 'none'; };
        document.getElementById('cookieDecline').onclick = () => { localStorage.setItem('cookieAccepted', 'false'); cookieBanner.style.display = 'none'; };

        // Floating elements
        document.getElementById('floatingCta').innerHTML = t.floatingCta;
        document.getElementById('whatsappLink').href = t.whatsapp.url;
        document.getElementById('stickyBarText').innerHTML = t.stickyBar.text;
        document.getElementById('stickyBarCta').innerHTML = t.stickyBar.cta;
        document.getElementById('exitModalLabel').innerHTML = t.exitModal.title;
        document.getElementById('exitModalTitle').innerHTML = t.exitModal.question;
        document.getElementById('exitModalDesc').innerHTML = t.exitModal.description;
        document.getElementById('exitModalCta').innerHTML = t.exitModal.cta;
        document.getElementById('exitModalDismiss').innerHTML = t.exitModal.dismiss;
        if (window.innerWidth <= 768) document.getElementById('stickyBar').style.display = 'flex';

        // Hero
        const heroHTML = `
      <section class="section section--pearl" style="padding-top:160px;padding-bottom:60px">
        <div class="container">
          <h1 style="font-family:var(--font-serif);font-size:clamp(44px,6vw,76px);font-weight:300;color:var(--navy);line-height:1.1;margin:0 0 20px;max-width:700px">${t.hero.title}</h1>
          <p class="body-large" style="max-width:500px;margin-bottom:36px;color:var(--text-body)">${t.hero.subtitle}</p>
          <a href="contacto.html" class="v3-btn v3-btn--gold btn-impact-lg">${t.hero.cta}</a>
          <p style="font-family:var(--font-sans);font-size:12px;color:var(--text-muted);margin-top:12px">${t.hero.guarantee}</p>
        </div>
      </section>
    `;

        // Presupuesto inmediato (formulario mantiene names/ids para avson-quote.js)
        const quoteHTML = `
      <section class="section section--navy" style="padding-top:64px;padding-bottom:64px">
        <div class="container" style="max-width:920px">
          <div style="display:grid;grid-template-columns:1fr 1.1fr;gap:48px;align-items:start" class="presupuesto-grid">
            <div>
              <span class="label-tag" style="color:var(--gold)">${t.quote.label}</span>
              <h2 style="font-family:var(--font-serif);font-size:clamp(30px,4vw,44px);font-weight:300;color:#fff;line-height:1.15;margin:14px 0 16px">${t.quote.title}</h2>
              <p style="font-family:var(--font-sans);font-size:15px;color:rgba(255,255,255,0.75);line-height:1.6;margin-bottom:20px">${t.quote.description}</p>
              <ul style="list-style:none;padding:0;margin:0;font-family:var(--font-sans);font-size:14px;color:rgba(255,255,255,0.7);line-height:1.5">
                ${t.quote.bullets.map(b => `<li style="margin-bottom:8px">✓ ${b}</li>`).join('')}
              </ul>
            </div>
            <div>
              <div style="background:#fff;border-radius:12px;padding:28px">
                <form data-corp="1" onsubmit="avsonQuoteSubmit(event)" style="display:flex;flex-direction:column;gap:14px">
                  <div style="display:flex;gap:10px">
                    <input type="text" name="nombre" placeholder="${t.quote.form.namePlaceholder}" required style="flex:1;min-width:0;padding:12px 14px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:14px;color:#1A2744;outline:none">
                    <input type="email" name="email" placeholder="${t.quote.form.emailPlaceholder}" required style="flex:1.2;min-width:0;padding:12px 14px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:14px;color:#1A2744;outline:none">
                  </div>
                  <div>
                    <p style="font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#7A8499;margin:2px 0 8px">${t.quote.form.normasLabel}</p>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;font-family:var(--font-sans);font-size:13px;color:#1A2744">
                      ${t.quote.form.normas.map(n => `<label style="display:flex;gap:7px;align-items:center;cursor:pointer"><input type="checkbox" name="norma" value="${n.value}" style="accent-color:#1A2744">${n.label}</label>`).join('')}
                    </div>
                  </div>
                  <div style="display:flex;gap:10px">
                    <select name="ubicaciones" required style="flex:1;min-width:0;padding:11px 12px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:13px;color:#1A2744;background:#fff">
                      <option value="" disabled selected>${t.quote.form.ubicacionesPlaceholder}</option>
                      <option value="1">${t.quote.form.ubicaciones1}</option>
                      <option value="2">${t.quote.form.ubicaciones2}</option>
                      <option value="3">${t.quote.form.ubicaciones3}</option>
                    </select>
                    <select name="ensCategoria" style="flex:1;min-width:0;padding:11px 12px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:13px;color:#1A2744;background:#fff">
                      <option value="media" selected>${t.quote.form.ensCategoriaMedia}</option>
                      <option value="alta">${t.quote.form.ensCategoriaAlta}</option>
                    </select>
                  </div>
                  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
                    <select name="infra" style="flex:1;min-width:120px;padding:11px 12px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:13px;color:#1A2744;background:#fff">
                      <option value="cloud" selected>${t.quote.form.infraCloud}</option>

    function initInteractions() {
      const burger = document.getElementById('navBurger');
      const overlay = document.getElementById('navOverlay');
      const close = document.getElementById('navClose');
      const toggleNav = (open) => {
        overlay.classList.toggle('open', open);
        document.body.classList.toggle('no-scroll', open);
      };
      burger?.addEventListener('click', () => toggleNav(!overlay.classList.contains('open')));
      close?.addEventListener('click', () => toggleNav(false));
      overlay?.addEventListener('click', (e) => { if (e.target === overlay) toggleNav(false); });

      const nav = document.getElementById('mainNav');
      window.addEventListener('scroll', () => {
        nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40);
      });

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
        });
      }, { threshold: 0.08 });
      document.querySelectorAll('.anim-fade-up').forEach(el => observer.observe(el));

      document.querySelectorAll('.faq-item__question').forEach(q => {
        q.addEventListener('click', () => {
          const item = q.parentElement;
          item.classList.toggle('open');
        });
      });

      let exitShown = false;
      document.addEventListener('mouseleave', (e) => {
        if (e.clientY < 0 && !exitShown && !sessionStorage.getItem('_exitShown')) {
          document.getElementById('exitModal').style.display = 'flex';
          exitShown = true;
          sessionStorage.setItem('_exitShown', '1');
        }
      });
    }
