  <script>
    async function loadContent(){
      try{
        const response=await fetch('assets/palabras.json');
        const data=await response.json();
        const t=data["es"]?.ensAlto;
        if(!t) throw new Error('No se encontro la clave "ensAlto"');

        /* META */
        document.title=t.meta.title;
        document.querySelector('meta[name="description"]').setAttribute('content',t.meta.description);
        document.querySelector('meta[name="keywords"]').setAttribute('content',t.meta.keywords);
        document.querySelector('meta[property="og:title"]').setAttribute('content',t.meta.ogTitle);
        document.querySelector('meta[property="og:description"]').setAttribute('content',t.meta.ogDescription);
        document.querySelector('meta[name="twitter:title"]').setAttribute('content',t.meta.twitterTitle);
        document.querySelector('meta[name="twitter:description"]').setAttribute('content',t.meta.twitterDescription);

        /* NAV */

          <li><a href="iso22301.html">${t.nav.links.iso22301}</a></li>
          <li><a href="iso27001.html">${t.nav.links.iso27001}</a></li>
          <li><a href="otras.html">${t.nav.links.otras}</a></li>`;
        document.getElementById('navCta').innerHTML=t.nav.cta;
        document.getElementById('navOverlayLinks').innerHTML=`
          <a href="ens.html">${t.nav.links.ens}</a>
          <a href="ens-express.html">${t.nav.links.ensExpress}</a>
          <a href="iso22301.html">${t.nav.links.iso22301}</a>
          <a href="iso27001.html">${t.nav.links.iso27001}</a>
          <a href="otras.html">${t.nav.links.otras}</a>`;
        document.getElementById('navOverlayCta').innerHTML=t.nav.cta;

        /* HERO */

              <a href="index.html">${t.hero.breadcrumb[0]}</a><span>/</span>

              <span class="label-tag">${t.hero.label}</span>
              <div class="gold-line"></div>
              <h1 class="display-title">${t.hero.title}</h1>
              <div class="guarantee-seal" style="margin-bottom:24px">
                <span class="guarantee-seal__icon">${t.hero.guaranteeIcon}</span>
                <span class="guarantee-seal__text">${t.hero.guaranteeText}</span>
              </div>
              <p class="body-large mt-32" style="max-width:620px">${t.hero.description}</p>

                <a href="ens.html" class="btn-text">${t.hero.ctaSecondary}</a>
              </div>
            </div>
          </div>
        </section>`;

        const whatIsHTML=`

              <div class="anim-fade-up">
                <span class="label-tag">${t.whatIs.label}</span>
                <div class="gold-line"></div>

                ${t.whatIs.paragraphs.map(p=>`<p style="font-size:16px;line-height:1.8;color:var(--text-body);margin-bottom:20px">${p}</p>`).join('')}
              </div>
              <div class="anim-fade-up delay-2">
                ${t.whatIs.legalBoxes.map(box=>`<div class="legal-box" style="margin-bottom:24px"><div class="legal-box__label">${box.label}</div><div class="legal-box__text">${box.text}</div></div>`).join('')}
              </div>
            </div>
          </div>
        </section>`;

        /* WHO NEEDS */
        const whoNeedsHTML=`
        <section class="section section--pearl">
          <div class="container">
            <span class="label-tag">${t.whoNeeds.label}</span>
            <div class="gold-line"></div>
            <h2 class="section-title">${t.whoNeeds.title}</h2>

              ${t.whoNeeds.cards.map(c=>`<div style="border:1px solid var(--border);padding:32px 28px;background:var(--white)"><div style="font-size:28px;margin-bottom:16px">${c.icon}</div><div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--navy);margin-bottom:12px">${c.title}</div><p style="font-size:14px;color:var(--text-muted);line-height:1.7">${c.text}</p></div>`).join('')}

            <div class="grid-7-5">
              <div class="anim-fade-up">
                <span class="label-tag">${t.controls.label}</span>
                <div class="gold-line"></div>
                <h2 class="section-title">${t.controls.title}</h2>
                ${t.controls.paragraphs.map(p=>`<p style="font-size:16px;line-height:1.8;color:var(--text-body);margin-bottom:20px">${p}</p>`).join('')}

              <div class="anim-fade-up delay-2">

                  <span class="label-tag">${t.controls.sidebar.label}</span>
                  <div style="display:flex;flex-direction:column;gap:16px;margin-top:24px">
                    ${t.controls.sidebar.items.map((item,i)=>`<div style="border-left:2px solid ${item.dimmed?'rgba(201,168,76,0.4)':'var(--gold)'};padding-left:20px"><div style="font-size:14px;font-weight:600;color:rgba(255,255,255,0.9);margin-bottom:4px">${item.title}</div><div style="font-size:13px;color:rgba(255,255,255,0.45);line-height:1.6">${item.text}</div></div>`).join('')}

                  <a href="contacto.html" class="btn-primary btn-primary--white" style="margin-top:32px">${t.controls.sidebar.cta}</a>

            </div>

        <section class="section section--pearl">
          <div class="container">
            <span class="label-tag">${t.middleSection.label}</span>
            <div class="gold-line"></div>
            <h2 class="section-title">${t.middleSection.title}</h2>
            <div class="grid-7-5" style="margin-top:48px">
              <div>
                ${t.middleSection.paragraphs.map(p=>`<p style="font-size:16px;line-height:1.8;color:var(--text-body);margin-bottom:20px">${p}</p>`).join('')}

              </div>
              <div>
                ${t.middleSection.sidebar?`
                <div style="background:var(--navy);padding:40px 32px">
                  <span class="label-tag">${t.middleSection.sidebar.label}</span>
                  <div style="display:flex;flex-direction:column;gap:20px;margin-top:24px">
                    ${t.middleSection.sidebar.items.map(item=>`<div style="border-left:2px solid ${item.dimmed?'rgba(201,168,76,0.3)':'var(--gold)'};padding-left:20px"><div style="font-size:14px;font-weight:600;color:rgba(255,255,255,0.85);margin-bottom:4px">${item.title}</div><div style="font-size:13px;color:rgba(255,255,255,0.4);line-height:1.6">${item.text}</div></div>`).join('')}
                  </div>
                  ${t.middleSection.sidebar.cta?`<a href="contacto.html" class="btn-primary btn-primary--white" style="margin-top:32px">${t.middleSection.sidebar.cta}</a>`:''}
                </div>`:''}
                ${t.middleSection.boxes?t.middleSection.boxes.map(box=>`
                <div style="background:${box.dark?'var(--navy)':'var(--white)'};${box.dark?'':'border:1px solid var(--border);'}padding:36px 32px;margin-bottom:24px">
                  <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:${box.dark?'var(--white)':'var(--navy)'};margin-bottom:20px">${box.title}</div>
                  <div style="display:flex;flex-direction:column;gap:12px">
                    ${box.items.map(item=>`<div style="display:flex;gap:12px;align-items:flex-start"><span style="color:${item.color};font-size:16px;flex-shrink:0">${item.icon}</span><span style="font-size:14px;color:${box.dark?'rgba(255,255,255,0.7)':'var(--text-muted)'}">${item.text}</span></div>`).join('')}
                  </div>
                </div>`).join(''):''}
              </div>
            </div>
          </div>
        </section>`;

        /* EXTRA SECTION (ENS Medio: ISO synergy / ENS Alto: specialised consultancy + CCN section) */

        <section class="section section--white">
          <div class="container">
            <span class="label-tag">${t.extraSection.label}</span>
            <div class="gold-line"></div>
            <h2 class="section-title">${t.extraSection.title}</h2>
            <div class="grid-7-5" style="margin-top:48px">
              <div>
                ${t.extraSection.paragraphs.map(p=>`<p style="font-size:16px;line-height:1.8;color:var(--text-body);margin-bottom:20px">${p}</p>`).join('')}
              </div>
              <div>
                <div style="background:var(--navy);padding:40px 32px">
                  <span class="label-tag">${t.extraSection.sidebar.label}</span>
                  <div style="display:flex;flex-direction:column;gap:${t.extraSection.sidebar.useSteps?'20':'16'}px;margin-top:24px">
                    ${t.extraSection.sidebar.items.map((item,i)=>t.extraSection.sidebar.useSteps?`
                    <div style="display:flex;gap:16px;align-items:flex-start">
                      <div style="width:32px;height:32px;border-radius:50%;background:${i===0?'var(--gold)':'rgba(201,168,76,0.2)'};${i>0?'border:1px solid var(--gold);':''}display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:${item.icon?'16':'12'}px;font-weight:700;color:${i===0?'var(--navy)':'var(--gold)'}">${item.icon||item.number}</div>
                      <div><p style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.9);margin-bottom:4px">${item.title}</p><p style="font-size:12px;color:rgba(255,255,255,0.4);line-height:1.6">${item.text}</p></div>

                    <div style="padding:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)">

                      <div style="font-size:12px;color:rgba(255,255,255,0.4);line-height:1.5">${item.text}</div>
                    </div>`).join('')}
                  </div>
                  ${t.extraSection.sidebar.cta?`<a href="${t.extraSection.sidebar.ctaLink||'contacto.html'}" class="btn-primary btn-primary--white" style="margin-top:32px">${t.extraSection.sidebar.cta}</a>`:''}

              </div>
            </div>
          </div>
        </section>`:'';

        <section class="section section--white">
          <div class="container">
            <span class="label-tag">${t.extraSection2.label}</span>
            <div class="gold-line"></div>
            <h2 class="section-title">${t.extraSection2.title}</h2>
            <div class="grid-7-5" style="margin-top:48px">
              <div>
                ${t.extraSection2.paragraphs.map(p=>`<p style="font-size:16px;line-height:1.8;color:var(--text-body);margin-bottom:20px">${p}</p>`).join('')}
              </div>
              <div>
                <div style="background:var(--navy);padding:40px 32px">
                  <span class="label-tag">${t.extraSection2.sidebar.label}</span>
                  <div style="display:flex;flex-direction:column;gap:16px;margin-top:24px">
                    ${t.extraSection2.sidebar.items.map((item,i)=>`
                    <div style="display:flex;gap:16px;align-items:flex-start">
                      <div style="width:32px;height:32px;border-radius:50%;background:${i===0?'var(--gold)':'rgba(201,168,76,0.2)'};${i>0?'border:1px solid var(--gold);':''}display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;font-weight:700;color:${i===0?'var(--navy)':'var(--gold)'}">&#10003;</div>
                      <div><p style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.9);margin-bottom:4px">${item.title}</p><p style="font-size:12px;color:rgba(255,255,255,0.4);line-height:1.6">${item.text}</p></div>
                    </div>`).join('')}

                  <a href="contacto.html" class="btn-primary btn-primary--white" style="margin-top:32px">${t.extraSection2.sidebar.cta}</a>
                </div>
              </div>
            </div>
          </div>
        </section>`:'';

        /* ENTITIES / CERTIFICATION AUDITORS (only ENS Basico) */
        const entitiesHTML=t.entities?`
        <section class="section section--pearl">
          <div class="container">
            <div class="grid-7-5">
              <div class="anim-fade-up">
                <span class="label-tag">${t.entities.label}</span>
                <div class="gold-line"></div>
                <h2 class="section-title">${t.entities.title}</h2>
                ${t.entities.paragraphs.map(p=>`<p style="font-size:16px;line-height:1.8;color:var(--text-body);margin-bottom:20px">${p}</p>`).join('')}
              </div>
              <div class="anim-fade-up delay-2">
                <div style="background:var(--navy);padding:40px 32px">
                  <span class="label-tag">${t.entities.sidebar.label}</span>
                  <div style="display:flex;flex-direction:column;gap:12px;margin-top:24px">
                    ${t.entities.sidebar.items.map(item=>`
                    <div style="display:flex;gap:16px;align-items:center;padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)">
                      <div style="font-size:20px">${item.icon}</div>
                      <div><div style="font-size:14px;font-weight:600;color:rgba(255,255,255,0.9)">${item.name}</div><div style="font-size:12px;color:rgba(255,255,255,0.4)">${item.detail}</div></div>
                    </div>`).join('')}
                  </div>
                  <p style="font-size:12px;color:rgba(255,255,255,0.3);margin-top:20px;line-height:1.6">${t.entities.sidebar.note}</p>
                  <a href="contacto.html" class="btn-primary btn-primary--white" style="margin-top:24px">${t.entities.sidebar.cta}</a>
                </div>
              </div>
            </div>
          </div>
        </section>`:'';

        /* PROCESS */
        const processHTML=`
        <section class="section ${t.process.bgClass||'section--white'}" id="proceso">
          <div class="container">
            <span class="label-tag">${t.process.label}</span>
            <div class="gold-line"></div>
            <h2 class="section-title">${t.process.title}</h2>
            <p style="font-size:16px;line-height:1.8;color:var(--text-body);max-width:680px;margin-bottom:48px">${t.process.description}</p>
            <div class="timeline mt-32">
              ${t.process.steps.map((s,i)=>`
              <div class="timeline__step anim-fade-up${i>0?' delay-'+i:''}">
                <div class="timeline__number">${s.number}</div>
                <div class="timeline__week">${s.week}</div>
                <div class="timeline__title">${s.title}</div>
                <div class="timeline__desc">${s.desc}</div>
              </div>`).join('')}
            </div>
          </div>
        </section>`;

        /* COST */
        const costHTML=`
        <section class="section section--white">
          <div class="container">
            <span class="label-tag">${t.cost.label}</span>
            <div class="gold-line"></div>
            <h2 class="section-title">${t.cost.title}</h2>
            <div class="grid-7-5" style="margin-top:48px">
              <div>
                <p style="font-size:16px;line-height:1.8;color:var(--text-body);margin-bottom:24px">${t.cost.description}</p>
                <div style="display:flex;flex-direction:column;gap:20px;margin-bottom:32px">
                  ${t.cost.tiers.map(tier=>`
                  <div style="border:1px solid ${tier.highlighted?'var(--gold)':'var(--border)'};padding:24px 28px;${tier.highlighted?'background:rgba(201,168,76,0.03);':''}${tier.flex?'display:flex;gap:24px;align-items:center':''}">
                    ${tier.sizeLabel?`<div style="text-align:center;min-width:80px"><div style="font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--navy)">${tier.sizeLabel}</div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em">${tier.sizeSubLabel}</div></div>`:''}
                    <div>${tier.tierTitle?`<div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--navy);margin-bottom:8px">${tier.tierTitle}</div>`:''}
                    <p style="font-size:14px;color:var(--text-muted);line-height:1.7">${tier.text}</p></div>
                  </div>`).join('')}
                </div>
                <div class="urgency-box">
                  <p class="urgency-box__text">${t.cost.urgency}</p>
                </div>
              </div>
              <div>
                <div style="background:var(--navy);padding:40px 32px;position:sticky;top:100px">
                  <span class="label-tag">${t.cost.sidebar.label}</span>
                  <h3 style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;color:var(--white);line-height:1.3;margin:16px 0">${t.cost.sidebar.title}</h3>
                  <p style="font-size:14px;color:rgba(255,255,255,0.45);line-height:1.65;margin-bottom:28px">${t.cost.sidebar.text}</p>
                  <form onsubmit="avsonSubmitLead(event,{source:'${t.hero.formSource}',event:'category_lead'})" style="display:flex;gap:0;margin-bottom:16px;max-width:480px;box-shadow:0 4px 24px rgba(26,39,68,0.08)">
                    <input type="email" id="heroEmail2" name="email" required placeholder="${t.hero.formPlaceholder}" style="flex:1;padding:16px 20px;border:none;font-family:var(--font-sans);font-size:0.95rem;color:var(--navy);background:var(--white);outline:none;min-width:0">
                    <button type="submit" style="background:var(--gold);color:var(--navy);border:none;padding:16px 24px;font-family:var(--font-sans);font-size:0.85rem;font-weight:600;letter-spacing:0.04em;cursor:pointer;white-space:nowrap;transition:opacity 0.2s" onmouseover="this.style.opacity='0.88'" onmouseout="this.style.opacity='1'">${t.cost.sidebar.button}</button>
                  </form>
                  <p style="font-family:var(--font-sans);font-size:0.78rem;color:rgba(255,255,255,0.5)">${t.cost.sidebar.contact}</p>
                </div>
              </div>
            </div>
          </div>
        </section>`;

        /* FAQ */
        const faqHTML=`
        <section class="section section--pearl" id="faq">
          <div class="container">
            <span class="label-tag">${t.faq.label}</span>
            <div class="gold-line"></div>
            <h2 class="section-title">${t.faq.title}</h2>
            <div class="faq-list mt-48" style="max-width:820px">
              ${t.faq.items.map(item=>`<div class="faq-item"><div class="faq-item__question">${item.question}</div><div class="faq-item__answer">${item.answer}</div></div>`).join('')}
            </div>
          </div>
        </section>`;

        /* TESTIMONIALS */
        const testimonialsHTML=`
        <section class="section section--white">
          <div class="container">
            <span class="label-tag">${t.testimonials.label}</span>
            <div class="gold-line"></div>
            <h2 class="section-title" style="max-width:600px">${t.testimonials.title}</h2>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;margin-top:32px">
              ${t.testimonials.items.map(item=>`
              <div style="background:var(--pearl,#F7F7F5);border:1px solid #E5E5E0;border-radius:12px;padding:28px">
                <div style="color:#C9A84C;font-size:14px;letter-spacing:2px;margin-bottom:12px">${item.stars}</div>
                <p style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:#1A2744;line-height:1.5;font-style:italic;margin:0 0 16px">${item.quote}</p>
                <p style="font-family:'Inter',sans-serif;font-size:13px;color:#7A8499;font-weight:600;margin:0">${item.author}</p>
                <p style="font-family:'Inter',sans-serif;font-size:12px;color:#C9A84C;margin:4px 0 0">${item.badge}</p>
              </div>`).join('')}
            </div>
          </div>
        </section>`;

        /* CASES (only ENS Alto) */
        const casesHTML=t.cases?`
        <section class="section section--white">
          <div class="container">
            <span class="label-tag">${t.cases.label}</span>
            <div class="gold-line"></div>
            <h2 class="section-title">${t.cases.title}</h2>
            <div class="grid-3" style="gap:32px;margin-top:48px">
              ${t.cases.items.map(c=>`<div style="border:1px solid var(--border);padding:32px 28px;background:var(--white)"><div style="font-size:28px;margin-bottom:16px">${c.icon}</div><div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--navy);margin-bottom:12px">${c.title}</div><p style="font-size:14px;color:var(--text-muted);line-height:1.7">${c.text}</p></div>`).join('')}
            </div>
          </div>
        </section>`:'';

        /* ALSO INTERESTED */
        const alsoHTML=`
        <section class="section section--navy">
          <div class="container" style="text-align:center">
            <span class="label-tag">${t.also.label}</span>
            <div class="gold-line" style="margin:0 auto 24px"></div>
            <h2 class="section-title section-title--white">${t.also.title}</h2>
            <p style="font-size:16px;color:rgba(255,255,255,0.5);max-width:560px;margin:0 auto 48px">${t.also.description}</p>
            <div style="display:flex;gap:24px;justify-content:center;flex-wrap:wrap">
              ${t.also.links.map(link=>`<a href="${link.href}" style="display:inline-block;padding:20px 36px;border:${link.current?'2px solid var(--gold)':'1px solid rgba(255,255,255,0.2)'};color:${link.current?'var(--gold)':'rgba(255,255,255,0.75)'};font-family:var(--font-sans);font-size:0.9rem;font-weight:600;text-decoration:none;letter-spacing:0.04em;${link.current?'background:rgba(201,168,76,0.08)':'transition:all 0.2s'}"${link.current?'':` onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.2)';this.style.color='rgba(255,255,255,0.75)'"`}>${link.text}</a>`).join('')}
            </div>
            <div class="mt-48">
              <a href="ens.html" class="btn-text" style="color:rgba(255,255,255,0.5)">${t.also.backLink}</a>
            </div>
          </div>
        </section>`;

        /* FOOTER */
        const footerHTML=`
        <div class="container">
          <div class="footer__grid">
            <div class="footer__col footer__col--wide">
              <div class="nav__logo" style="margin-bottom:16px">${t.footer.logo}</div>
              <p style="color:rgba(255,255,255,0.55);font-family:var(--font-sans);font-size:14px;line-height:1.7;max-width:280px">${t.footer.description}</p>
              <p style="color:rgba(255,255,255,0.4);font-family:var(--font-sans);font-size:13px;margin-top:16px">${t.footer.contact.email} &middot; ${t.footer.contact.phone}</p>
              <p style="color:rgba(255,255,255,0.35);font-family:var(--font-sans);font-size:12px;margin-top:8px">${t.footer.contact.address}</p>
            </div>
            <div class="footer__col"><h4 class="footer__heading">${t.footer.certifications.title}</h4><ul class="footer__links">${t.footer.certifications.items.map(i=>`<li><a href="${i==='ENS'?'ens.html':i==='ENS Basico'||i==='ENS B\\u00e1sico'?'ens-basico.html':i==='ENS Medio'?'ens-medio.html':i==='ENS Alto'?'ens-alto.html':i==='ISO 27001'?'iso27001.html':i==='ISO 22301'?'iso22301.html':i==='DORA'?'dora.html':i==='NIS2'?'nis2.html':'#'}">${i}</a></li>`).join('')}</ul></div>
            <div class="footer__col"><h4 class="footer__heading">${t.footer.company.title}</h4><ul class="footer__links">${t.footer.company.items.map(i=>`<li><a href="${i==='Packs GRC'||i==='Packs'?'packs.html':i==='Equipo'?'equipo.html':i==='Unete al equipo'||i==='\\u00danete al equipo'?'unete.html':i==='Webinars'?'webinars.html':i==='Contacto'?'contacto.html':'#'}">${i}</a></li>`).join('')}</ul></div>
            <div class="footer__col"><h4 class="footer__heading">${t.footer.ctaBox.title}</h4><p style="color:rgba(255,255,255,0.55);font-family:var(--font-sans);font-size:14px;margin-bottom:20px">${t.footer.ctaBox.description}</p><a href="contacto.html" class="btn-primary" style="color:#fff;border-color:var(--gold);font-size:12px">${t.footer.ctaBox.button}</a></div>
          </div>
          <div class="footer__bottom"><p>${t.footer.bottom.copyright}</p><div>${t.footer.bottom.links.map(l=>`<a href="#">${l}</a>`).join(' &middot; ')}</div></div>
        </div>`;

        /* ASSEMBLE */
        document.getElementById('app').innerHTML=heroHTML+whatIsHTML+whoNeedsHTML+controlsHTML+middleHTML+extraHTML+extra2HTML+entitiesHTML+processHTML+costHTML+faqHTML+testimonialsHTML+casesHTML+alsoHTML;
        document.getElementById('footer').innerHTML=footerHTML;

        /* FLOATING ELEMENTS */
        document.getElementById('floatingCta').innerHTML=t.floatingCta;
        document.getElementById('exitModalLabel').innerHTML=t.exitModal.label;
        document.getElementById('exitModalTitle').innerHTML=t.exitModal.title;
        document.getElementById('exitModalDesc').innerHTML=t.exitModal.text;
        document.getElementById('exitModalCta').innerHTML=t.exitModal.cta;
        document.getElementById('exitModalDismiss').innerHTML=t.exitModal.dismiss;
        document.getElementById('stickyBarText').innerHTML=t.stickyBar.text;
        document.getElementById('stickyBarCta').innerHTML=t.stickyBar.cta;
        document.getElementById('whatsappLink').href=t.whatsapp.url;

        initInteractions();
      }catch(error){
        console.error('Error cargando JSON:',error);
        document.getElementById('app').innerHTML='<div class="loader">Error al cargar el contenido. Por favor, recarga la pagina.</div>';
      }
    }

    function initInteractions(){
      const burger=document.getElementById('navBurger');
      const overlay=document.getElementById('navOverlay');
      const close=document.getElementById('navClose');
      const toggleNav=(open)=>{overlay.classList.toggle('open',open);document.body.classList.toggle('no-scroll',open);};
      burger?.addEventListener('click',()=>toggleNav(!overlay.classList.contains('open')));
      close?.addEventListener('click',()=>toggleNav(false));
      overlay?.addEventListener('click',(e)=>{if(e.target===overlay)toggleNav(false);});

      const nav=document.getElementById('mainNav');
      window.addEventListener('scroll',()=>{nav.classList.toggle('v3-nav--scrolled',window.scrollY>40);},{passive:true});

      const observer=new IntersectionObserver((entries)=>{entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add('visible');observer.unobserve(entry.target);}});},{threshold:0.08});
      document.querySelectorAll('.anim-fade-up,.anim-fade').forEach(el=>observer.observe(el));

      document.querySelectorAll('.faq-item__question').forEach(q=>{q.addEventListener('click',()=>{const item=q.closest('.faq-item');const isOpen=item.classList.contains('open');document.querySelectorAll('.faq-item').forEach(i=>i.classList.remove('open'));if(!isOpen)item.classList.add('open');});});

      let exitShown=false;
      document.addEventListener('mouseleave',(e)=>{if(e.clientY<0&&!exitShown&&!sessionStorage.getItem('_exitShown')){document.getElementById('exitModal').style.display='flex';exitShown=true;sessionStorage.setItem('_exitShown','1');}});

      if(window.innerWidth<=768){document.getElementById('stickyBar').style.display='flex';}
    }

    loadContent();
  </script>
</body>
</html>
