<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="theme-color" content="#1A2744">
  <title>Cargando...</title>
  <meta name="description" content="">
  <link rel="canonical" href="https://avson.eu/contacto.html">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="text/javascript">(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y)})(window,document,"clarity","script","CLARITY_ID");</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#1A2744; --gold:#C9A84C; --pearl:#F7F7F5; --white:#FFFFFF; --border:#E5E5E0; --muted:#7A8499; }
    html { font-size:16px; -webkit-font-smoothing:antialiased; }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--pearl); color:var(--navy); }

    /* NAV */
    .cnav { position:sticky; top:0; z-index:200; background:rgba(255,255,255,0.97); border-bottom:1px solid var(--border); backdrop-filter:blur(8px); }
    .cnav__inner { max-width:1320px; margin:0 auto; padding:0 28px; height:64px; display:flex; align-items:center; justify-content:space-between; gap:24px; }
    .cnav__logo { font-family:'Inter',sans-serif; font-size:18px; font-weight:600; color:var(--navy); text-decoration:none; letter-spacing:0.02em; }
    .cnav__logo span { color:var(--gold); }
    .cnav__links { display:flex; gap:24px; align-items:center; }
    .cnav__links a { font-family:'Inter',sans-serif; font-size:14px; font-weight:500; color:var(--navy); text-decoration:none; transition:color .15s; }
    .cnav__links a:hover { color:var(--gold); }
    .cnav__links a.express { color:var(--gold); }
    @media (max-width:760px){ .cnav__links { display:none; } }

    /* MAIN (centra la tarjeta) */
    .cmain { min-height:calc(100vh - 64px); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 20px 64px; }

    .logo { display:none; }
    .fomo-bar { background:#FEF2F2; border:1px solid #FCA5A5; border-radius:8px; padding:10px 20px; font-size:12px; font-weight:600; color:#991B1B; text-align:center; margin-bottom:20px; max-width:420px; width:100%; }
    .card { background:var(--white); border-radius:16px; border:1px solid var(--border); padding:40px 36px 32px; width:100%; max-width:420px; box-shadow:0 8px 40px rgba(26,39,68,0.10); }
    .badge { display:inline-flex; align-items:center; gap:6px; background:#ECFDF5; color:#065F46; font-size:11px; font-weight:700; padding:5px 12px; border-radius:20px; margin-bottom:14px; }
    .card-title { font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:400; color:var(--navy); line-height:1.15; margin-bottom:4px; }
    .card-sub { font-size:13px; color:var(--muted); margin-bottom:24px; line-height:1.5; }
    .qual-label { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .qual-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:20px; }
    .qual-btn { font-family:'Inter',sans-serif; font-size:12px; font-weight:600; padding:9px 6px; border:1.5px solid var(--border); background:var(--pearl); color:var(--navy); border-radius:6px; cursor:pointer; transition:all 0.15s; text-align:center; }
    .qual-btn:hover { border-color:var(--navy); }
    .qual-btn--urgent { border-color:#FCA5A5; background:#FEF2F2; color:#991B1B; }
    .qual-btn--active { background:var(--navy); border-color:var(--navy); color:var(--white); }
    .form-group { margin-bottom:12px; }
    .form-group input { width:100%; padding:13px 16px; border:1.5px solid var(--border); border-radius:8px; font-family:'Inter',sans-serif; font-size:15px; color:var(--navy); background:var(--white); outline:none; transition:border-color 0.15s; }
    .form-group input:focus { border-color:var(--navy); }
    .form-group input::placeholder { color:#B0B8C4; }
    .rgpd { display:flex; align-items:flex-start; gap:10px; font-size:11px; color:var(--muted); line-height:1.5; margin:12px 0 18px; }
    .rgpd input { width:15px; height:15px; flex-shrink:0; margin-top:1px; accent-color:var(--navy); cursor:pointer; }
    .rgpd a { color:var(--navy); }
    .btn-cta { width:100%; background:var(--gold); color:var(--navy); border:none; padding:17px; border-radius:10px; font-family:'Inter',sans-serif; font-size:16px; font-weight:700; cursor:pointer; transition:background 0.15s,transform 0.1s; animation:pulse-gold 2.5s infinite; }
    .btn-cta:hover { background:#D9B84D; transform:translateY(-1px); }
    @keyframes pulse-gold { 0%,100% { box-shadow:0 6px 20px rgba(201,168,76,0.45),0 0 0 0 rgba(201,168,76,0.25); } 50% { box-shadow:0 6px 20px rgba(201,168,76,0.45),0 0 0 8px rgba(201,168,76,0); } }
    .lock-text { text-align:center; font-size:11px; color:var(--muted); margin-top:10px; }
    .alt-phone { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:20px; padding-top:20px; border-top:1px solid var(--border); font-size:13px; color:var(--muted); }
    .alt-phone a { font-weight:700; color:var(--navy); text-decoration:none; }
    .alt-phone a:hover { color:var(--gold); }
    .trust-strip { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; margin-top:24px; font-size:12px; color:var(--muted); max-width:420px; width:100%; }
    .trust-strip span::before { content:'✓ '; color:var(--gold); font-weight:700; }

    /* FOOTER */
    .cfooter { background:var(--navy); color:rgba(255,255,255,0.75); padding:48px 28px 28px; }
    .cfooter__grid { max-width:1100px; margin:0 auto; display:grid; grid-template-columns:1.4fr 1fr 1fr; gap:40px; }
    @media (max-width:760px){ .cfooter__grid { grid-template-columns:1fr; gap:28px; } }
    .cfooter__logo { font-family:'Inter',sans-serif; font-size:16px; font-weight:700; letter-spacing:0.04em; color:#fff; }
    .cfooter__logo span { color:var(--gold); }
    .cfooter p { font-size:13px; line-height:1.7; color:rgba(255,255,255,0.55); margin-top:12px; }
    .cfooter h4 { font-family:'Inter',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#fff; margin-bottom:14px; }
    .cfooter ul { list-style:none; }
    .cfooter ul li { margin-bottom:9px; }
    .cfooter ul a { color:rgba(255,255,255,0.6); text-decoration:none; font-size:14px; }
    .cfooter ul a:hover { color:var(--gold); }
    .cfooter__bottom { max-width:1100px; margin:32px auto 0; padding-top:20px; border-top:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; font-size:12px; color:rgba(255,255,255,0.4); }
    .cfooter__bottom a { color:rgba(255,255,255,0.5); text-decoration:none; }

    @media (max-width:480px) { .card { padding:28px 20px 24px; } }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="cnav" id="mainNav"></nav>

  <main class="cmain" id="app"></main>

  <!-- FOOTER -->
  <footer class="cfooter" id="footer"></footer>

  <script src="avson-leads.js"></script>
  <script>
    async function loadContent() {
      try {
        const response = await fetch('assets/palabras.json');
        const data = await response.json();
        const lang = "es";
        const t = data[lang]?.contacto;
        if (!t) throw new Error('No se encontro el idioma o la clave "contacto"');

        // Update meta tags
        document.title = t.meta.title;
        document.querySelector('meta[name="description"]').setAttribute('content', t.meta.description);

        // Nav
        document.getElementById('mainNav').innerHTML = `
          <div class="cnav__inner">
            <a href="index.html" class="cnav__logo">${t.nav.logo.text}<span>${t.nav.logo.separator}</span>${t.nav.logo.suffix}</a>
            <div class="cnav__links">
              ${t.nav.links.map(link => `<a href="${link.href}"${link.className ? ' class="' + link.className + '"' : ''}>${link.text}</a>`).join('')}
            </div>
          </div>
        `;

        // Main content
        const qualBtnsHTML = t.form.qualButtons.map(btn => {
          const urgentClass = btn.urgent ? ' qual-btn--urgent' : '';
          return `<button type="button" class="qual-btn${urgentClass}" data-value="${btn.value}">${btn.label}</button>`;
        }).join('');

        const appHTML = `
          <div class="fomo-bar">${t.fomoBar}</div>

          <div class="card">
            <span class="badge">${t.card.badge}</span>
            <h1 class="card-title">${t.card.title}</h1>
            <p class="card-sub">${t.card.subtitle}</p>

            <p class="qual-label">${t.form.qualLabel}</p>
            <div class="qual-grid">
              ${qualBtnsHTML}
            </div>
            <form id="contactForm" onsubmit="avsonSubmitLead(event,{source:'contacto',event:'contact_form_submit'})" novalidate>
              <input type="hidden" id="cNecesidad" name="necesidad" value="">
              <div class="form-group">
                <input type="text"  id="cNombre" name="nombre" placeholder="${t.form.namePlaceholder}" autocomplete="given-name" required>
              </div>
              <div class="form-group">
                <input type="email" id="cEmail"  name="email"  placeholder="${t.form.emailPlaceholder}" autocomplete="email" required>
              </div>
              <div class="rgpd">
                <input type="checkbox" id="cRgpd" required>
                <label for="cRgpd">${t.form.rgpdText} <a href="privacidad.html" target="_blank">${t.form.rgpdLink}</a></label>
              </div>
              <button type="submit" class="btn-cta">${t.form.submitButton}</button>
              <p class="lock-text">${t.form.lockText}</p>
            </form>

            <div class="alt-phone">
              <span>${t.form.altPhone.label}</span>
              <a href="tel:${t.form.altPhone.number.replace(/\s/g, '')}">${t.form.altPhone.number}</a>
            </div>
          </div>

          <div class="trust-strip">
            ${t.trustStrip.map(item => `<span>${item}</span>`).join('')}
          </div>
        `;

        document.getElementById('app').innerHTML = appHTML;

        // Footer
        const footerHTML = `
          <div class="cfooter__grid">
            <div>
              <div class="cfooter__logo">${t.footer.logo.text}<span>${t.footer.logo.separator}</span>${t.footer.logo.suffix}</div>
              <p>${t.footer.description}</p>
              <p style="margin-top:10px">${t.footer.contactInfo}</p>
              <a href="${t.footer.linkedin.href}" target="_blank" rel="noopener" style="display:inline-block;margin-top:12px;font-size:12px;color:var(--gold);text-decoration:none">${t.footer.linkedin.text}</a>
            </div>
            <div>
              <h4>${t.footer.certifications.title}</h4>
              <ul>
                ${t.footer.certifications.items.map(item => `<li><a href="${item.href}">${item.text}</a></li>`).join('')}
              </ul>
            </div>
            <div>
              <h4>${t.footer.company.title}</h4>
              <ul>
                ${t.footer.company.items.map(item => `<li><a href="${item.href}">${item.text}</a></li>`).join('')}
              </ul>
            </div>
          </div>
          <div class="cfooter__bottom">
            <span>${t.footer.bottom.copyright}</span>
            <span>${t.footer.bottom.links.map(link => `<a href="${link.href}">${link.text}</a>`).join(' · ')}</span>
          </div>
        `;

        document.getElementById('footer').innerHTML = footerHTML;

        initInteractions();
      } catch(error) {
        console.error('Error cargando el JSON:', error);
      }
    }

    function initInteractions() {
      // Qualification buttons (pickQ logic)
      document.querySelectorAll('.qual-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.getElementById('cNecesidad').value = this.dataset.value;
          document.querySelectorAll('.qual-btn').forEach(b => b.classList.remove('qual-btn--active'));
          this.classList.add('qual-btn--active');
        });
      });
    }

    loadContent();
  </script>
</body>
</html>
