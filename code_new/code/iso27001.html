  <script>
    async function loadContent() {
      try {
        const response = await fetch('assets/palabras.json');
        const data = await response.json();
        const t = data["es"]?.iso27001;
        if (!t) throw new Error('No se encontro la clave "iso27001"');

        // Meta
        document.title = t.meta.title;
        document.querySelector('meta[name="description"]').setAttribute('content', t.meta.description);
        document.querySelector('meta[name="keywords"]').setAttribute('content', t.meta.keywords);
        document.querySelector('meta[property="og:title"]').setAttribute('content', t.meta.ogTitle);
        document.querySelector('meta[property="og:description"]').setAttribute('content', t.meta.ogDescription);
        document.querySelector('meta[name="twitter:title"]').setAttribute('content', t.meta.twitterTitle);
        document.querySelector('meta[name="twitter:description"]').setAttribute('content', t.meta.twitterDescription);

        // Top bar
        document.getElementById('topBar').className = 'announce-bar';
        document.getElementById('topBar').innerHTML = `${t.topBar.text} &nbsp;&middot;&nbsp; <a href="contacto.html">${t.topBar.cta}</a>`;

        // Nav
        document.getElementById('navLogo').innerHTML = t.nav.logo;
        document.getElementById('navLinks').innerHTML = `
          <li><a href="ens.html">${t.nav.links.ens}</a></li>
          <li><a href="ens-express.html" class="nav-express">${t.nav.links.ensExpress}</a></li>
          <li><a href="iso22301.html">${t.nav.links.iso22301}</a></li>
          <li><a href="iso27001.html">${t.nav.links.iso27001}</a></li>
          <li><a href="otras.html">${t.nav.links.otras}</a></li>
        `;
        document.getElementById('navPhone').innerHTML = t.nav.phone;
        document.getElementById('navCta').innerHTML = t.nav.cta;
        document.getElementById('navOverlayLinks').innerHTML = `
          <a href="ens.html">${t.nav.links.ens}</a>
          <a href="ens-express.html">${t.nav.links.ensExpress}</a>
          <a href="iso22301.html">${t.nav.links.iso22301}</a>
          <a href="iso27001.html">${t.nav.links.iso27001}</a>
          <a href="otras.html">${t.nav.links.otras}</a>
        `;
        document.getElementById('navOverlayCta').innerHTML = t.nav.cta;

        // Hero
        const heroHTML = `
          <section class="section section--pearl" style="padding-top:120px;padding-bottom:64px">
            <div class="container">
              <div class="hero-conv">
                <div>
                  <span class="label-tag">${t.hero.label}</span>
                  <h1 style="font-family:var(--font-serif);font-size:clamp(40px,5.2vw,68px);font-weight:300;color:var(--navy);line-height:1.08;margin:14px 0 18px">${t.hero.title}</h1>
                  <p style="font-family:var(--font-sans);font-size:17px;line-height:1.6;color:var(--text-body);max-width:520px;margin:0">${t.hero.subtitle}</p>
                  <div class="hero-conv__kpis">
                    ${t.hero.kpis.map(k => `<div class="hero-conv__kpi"><strong>${k.value}</strong><span>${k.label}</span></div>`).join('')}
                  </div>
                  <div style="display:inline-flex;align-items:center;gap:8px;border:1px solid #C9A84C;padding:9px 16px;border-radius:8px">
                    <span style="font-size:16px;color:#C9A84C">&#10022;</span>
                    <span style="font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#1A2744">${t.hero.guarantee}</span>
                  </div>
                  <p style="font-family:var(--font-sans);font-size:14px;color:var(--text-body);line-height:1.6;margin:22px 0 0;max-width:480px">
                    <span style="color:#C9A84C;letter-spacing:1px">${t.hero.testimonial.stars}</span><br>
                    <em>${t.hero.testimonial.quote}</em> &mdash; ${t.hero.testimonial.author}
                  </p>
                </div>
                <div style="background:#fff;border:1px solid #E5E5E0;border-radius:14px;padding:30px;box-shadow:0 18px 50px rgba(26,39,68,0.12)">
                  <p style="font-family:var(--font-sans);font-size:13px;font-weight:700;color:#16a34a;margin:0 0 4px">${t.hero.form.badge}</p>
                  <p style="font-family:var(--font-serif);font-size:26px;color:var(--navy);margin:0 0 4px">${t.hero.form.title}</p>
                  <p style="font-family:var(--font-sans);font-size:13px;color:var(--text-muted);margin:0 0 18px">${t.hero.form.subtitle}</p>
                  <form onsubmit="avsonSubmitLead(event,{source:'iso27001_hero',event:'iso27001_lead'})" style="display:flex;flex-direction:column;gap:11px">
                    <input type="text" name="nombre" placeholder="${t.hero.form.namePlaceholder}" required style="padding:13px 16px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:15px;color:#1A2744;outline:none">
                    <input type="email" name="email" placeholder="${t.hero.form.emailPlaceholder}" required style="padding:13px 16px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:15px;color:#1A2744;outline:none">
                    <div style="display:flex;gap:8px;align-items:flex-start">
                      <input type="checkbox" required style="width:15px;height:15px;flex-shrink:0;margin-top:3px;accent-color:#1A2744">
                      <label style="font-family:var(--font-sans);font-size:11px;color:#7A8499;line-height:1.4">${t.hero.form.privacyLabel}</label>
                    </div>
                    <button type="submit" class="v3-btn v3-btn--gold v3-btn--full v3-btn--xl v3-btn--pulse">${t.hero.form.submitButton}</button>
                    <p style="font-family:var(--font-sans);font-size:11px;color:#B0B8C4;text-align:center;margin:0">${t.hero.form.note}</p>
                  </form>
                  <p style="font-family:var(--font-sans);font-size:13px;color:var(--text-muted);text-align:center;margin:14px 0 0">${t.hero.form.phoneText}</p>
                </div>
              </div>
            </div>
          </section>
        `;

        // Testimonials carousel
        const testimonialsHTML = `
          <section class="section section--white">
            <div class="container">
              <span class="label-tag" style="display:block;text-align:center">${t.testimonials.label}</span>
              <h2 class="section-title" style="text-align:center;max-width:640px;margin:6px auto 0">${t.testimonials.title}</h2>
              <div class="tcar" style="margin-top:36px">
                <button class="tcar__arrow tcar__arrow--prev" aria-label="Anterior">&#8249;</button>
                <button class="tcar__arrow tcar__arrow--next" aria-label="Siguiente">&#8250;</button>
                <div class="tcar__view"><div class="tcar__track">
                  ${t.testimonials.items.map(item => `
                    <div class="tcar__slide"><div class="tcar__card">
                      <div class="tcar__stars">${item.stars}</div>
                      <p class="tcar__quote">${item.quote}</p>
                      <p class="tcar__author">${item.author}</p>
                      <p class="tcar__result">${item.result}</p>
                    </div></div>
                  `).join('')}
                </div></div>
                <div class="tcar__dots">
                  ${t.testimonials.items.map((_, i) => `<button class="tcar__dot" aria-label="Opini\u00f3n ${i+1}"></button>`).join('')}
                </div>
              </div>
            </div>
          </section>
        `;

        // Process
        const processHTML = `
          <section class="section section--pearl" id="proceso">
            <div class="container">
              <span class="label-tag">${t.process.label}</span>
              <div class="gold-line"></div>
              <h2 class="section-title" style="max-width:520px">${t.process.title}</h2>
              <p style="font-family:var(--font-sans);font-size:16px;line-height:1.8;color:var(--text-body);max-width:640px;margin-bottom:52px">${t.process.description}</p>
              <div style="display:flex;flex-direction:column;gap:0">
                ${t.process.phases.map((phase, i) => `
                  <div class="anim-fade-up" style="display:grid;grid-template-columns:140px 1fr;gap:0;${i < t.process.phases.length - 1 ? 'border-bottom:1px solid rgba(0,0,0,0.08)' : ''}">
                    <div style="padding:32px 24px 32px 0;border-right:2px solid var(--gold)">
                      <p style="font-family:var(--font-sans);font-size:11px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">${phase.weeks}</p>
                      <p style="font-family:var(--font-serif);font-size:28px;font-weight:300;color:var(--navy)">${phase.phase}</p>
                    </div>
                    <div style="padding:32px 0 32px 32px">
                      <h3 style="font-family:var(--font-sans);font-size:16px;font-weight:600;color:var(--navy);margin-bottom:12px">${phase.title}</h3>
                      <p style="font-family:var(--font-sans);font-size:14px;line-height:1.7;color:var(--text-body)">${phase.description}</p>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </section>
        `;

        // What is
        const whatIsHTML = `
          <section class="section section--white" id="que-es">
            <div class="container">
              <span class="label-tag">${t.whatIs.label}</span>
              <div class="gold-line"></div>
              <h2 class="section-title" style="max-width:580px">${t.whatIs.title}</h2>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:60px;margin-top:52px;align-items:start">
                <div>
                  ${t.whatIs.paragraphs.map(p => `<p style="font-family:var(--font-sans);font-size:${p.bold ? '17px;line-height:1.75;font-weight:500' : '16px;line-height:1.8'};color:var(--text-body);margin-bottom:20px">${p.text}</p>`).join('')}
                </div>
                <div style="display:flex;flex-direction:column;gap:24px">
                  ${t.whatIs.infoBoxes.map(box => `
                    <div style="background:var(--pearl);padding:32px;border-left:3px solid var(--gold)">
                      <h3 style="font-family:var(--font-sans);font-size:13px;font-weight:600;color:var(--navy);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:20px">${box.title}</h3>
                      ${box.listItems ? `<ul style="list-style:none;padding:0;margin:0;font-family:var(--font-sans);font-size:14px;color:var(--text-body);line-height:1.7">${box.listItems.map(li => `<li style="padding:${li.noBorder ? '8px 0' : '8px 0;border-bottom:1px solid rgba(0,0,0,0.07)'}">${li.text}</li>`).join('')}</ul>` : ''}

                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
          </section>
        `;

        // Who needs
        const whoNeedsHTML = `
          <section class="section section--pearl" id="quien-necesita">
            <div class="container">
              <span class="label-tag">${t.whoNeeds.label}</span>
              <div class="gold-line"></div>
              <h2 class="section-title" style="max-width:560px">${t.whoNeeds.title}</h2>
              <p style="font-family:var(--font-sans);font-size:16px;line-height:1.8;color:var(--text-body);max-width:640px;margin-bottom:48px">${t.whoNeeds.description}</p>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                ${t.whoNeeds.items.map(item => `
                  <div class="anim-fade-up" style="background:var(--white);padding:28px 32px;display:flex;gap:20px;align-items:flex-start">
                    <span style="color:var(--gold);font-size:20px;flex-shrink:0;margin-top:2px">&#10003;</span>
                    <div>
                      <p style="font-family:var(--font-sans);font-size:15px;font-weight:500;color:var(--navy);margin-bottom:6px">${item.title}</p>
                      <p style="font-family:var(--font-sans);font-size:13px;color:var(--text-muted);line-height:1.6">${item.description}</p>
                    </div>
                  </div>
                `).join('')}
              </div>
              <div style="background:#F7F7F5;border:1px solid #E5E5E0;border-left:3px solid #C9A84C;padding:32px 36px;display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap;margin-top:48px">
                <span style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:#1A2744;line-height:1.3;flex:1;min-width:200px">${t.whoNeeds.quote}</span>
                <a href="packs.html" class="v3-btn v3-btn--gold">${t.whoNeeds.quoteCta}</a>
              </div>
            </div>
          </section>
        `;

        // Controls
        const controlsHTML = `
          <section class="section section--white" id="controles">
            <div class="container">
              <span class="label-tag">${t.controls.label}</span>
              <div class="gold-line"></div>
              <h2 class="section-title" style="max-width:580px">${t.controls.title}</h2>
              <p style="font-family:var(--font-sans);font-size:16px;line-height:1.8;color:var(--text-body);max-width:640px;margin-bottom:48px">${t.controls.description}</p>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
                ${t.controls.blocks.map(block => {
                  const isDark = block.dark;
                  return `
                    <div class="anim-fade-up" style="${isDark ? 'background:var(--navy);color:#fff;' : 'background:var(--pearl);'}padding:40px">
                      <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
                        <span style="font-family:var(--font-serif);font-size:48px;font-weight:300;color:var(--gold);line-height:1">${block.count}</span>
                        <div>
                          <p style="font-family:var(--font-sans);font-size:13px;font-weight:600;${isDark ? '' : 'color:var(--navy);'}text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">${block.name}</p>
                          <p style="font-family:var(--font-sans);font-size:11px;${isDark ? 'color:rgba(255,255,255,0.5);' : 'color:var(--text-muted);'}letter-spacing:0.06em">${block.code}</p>
                        </div>
                      </div>
                      <p style="font-family:var(--font-sans);font-size:14px;line-height:1.7;${isDark ? 'color:rgba(255,255,255,0.75)' : 'color:var(--text-body)'}">${block.description}</p>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          </section>
        `;

        // ENS synergy
        const synergyHTML = `
          <section class="section section--navy" id="ens-trampolin">
            <div class="container">
              <span class="label-tag" style="border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6)">${t.ensSynergy.label}</span>
              <div class="gold-line"></div>
              <h2 style="font-family:var(--font-serif);font-size:clamp(36px,4.5vw,58px);font-weight:300;color:#fff;line-height:1.15;margin:0 0 32px;max-width:620px">${t.ensSynergy.title}</h2>
              <p style="font-family:var(--font-sans);font-size:16px;line-height:1.8;color:rgba(255,255,255,0.7);max-width:620px;margin-bottom:52px">${t.ensSynergy.description}</p>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:48px">
                ${t.ensSynergy.columns.map(col => `
                  <div style="background:rgba(255,255,255,0.06);padding:36px;border:1px solid rgba(255,255,255,0.12)">
                    <h3 style="font-family:var(--font-sans);font-size:13px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:24px">${col.title}</h3>
                    <ul style="list-style:none;padding:0;margin:0;font-family:var(--font-sans);font-size:14px;color:rgba(255,255,255,0.7);line-height:1.8">
                      ${col.items.map(item => `<li style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.08)">${item}</li>`).join('')}
                    </ul>
                  </div>
                `).join('')}
              </div>
              <a href="packs.html" class="btn-primary" style="border-color:var(--gold);color:#fff">${t.ensSynergy.cta}</a>
            </div>
          </section>
        `;

        // Packs
        const packsHTML = `
          <section class="section section--white" id="packs">
            <div class="container">
              <span class="label-tag">${t.packs.label}</span>
              <div class="gold-line"></div>
              <h2 class="section-title" style="max-width:480px">${t.packs.title}</h2>
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-top:52px">
                ${t.packs.options.map(pack => {
                  const isHighlight = pack.highlight;
                  const bg = isHighlight ? 'background:var(--navy);' : 'border:1px solid var(--border);';
                  const textColor = isHighlight ? 'color:#fff;' : 'color:var(--navy);';
                  const mutedColor = isHighlight ? 'color:rgba(255,255,255,0.5);' : 'color:var(--text-muted);';
                  const listColor = isHighlight ? 'color:rgba(255,255,255,0.75);' : 'color:var(--text-body);';
                  const borderColor = isHighlight ? 'border-bottom:1px solid rgba(255,255,255,0.1)' : 'border-bottom:1px solid var(--border)';
                  return `
                    <div class="anim-fade-up" style="${bg}padding:40px;display:flex;flex-direction:column;position:relative">
                      ${pack.badge ? `<div style="position:absolute;top:0;right:0;background:var(--gold);padding:6px 16px;font-family:var(--font-sans);font-size:10px;font-weight:600;color:#fff;letter-spacing:0.08em;text-transform:uppercase">${pack.badge}</div>` : ''}
                      <p style="font-family:var(--font-sans);font-size:11px;font-weight:600;${mutedColor}text-transform:uppercase;letter-spacing:0.08em;margin-bottom:20px">${pack.optionLabel}</p>
                      <h3 style="font-family:var(--font-serif);font-size:28px;font-weight:300;${textColor}margin-bottom:8px">${pack.name}</h3>
                      <p style="font-family:var(--font-sans);font-size:13px;${mutedColor}margin-bottom:28px">${pack.subtitle}</p>
                      <ul style="list-style:none;padding:0;margin:0 0 32px;font-family:var(--font-sans);font-size:13px;${listColor}line-height:1.7;flex:1">
                        ${pack.features.map((f, fi) => `<li style="padding:6px 0;${fi < pack.features.length - 1 ? borderColor : ''}">${f}</li>`).join('')}
                      </ul>
                      <p style="font-family:var(--font-sans);font-size:12px;${mutedColor}margin-bottom:8px">${pack.timeline}</p>
                      <p style="font-family:var(--font-sans);font-size:11px;${mutedColor}margin-bottom:20px">${pack.forWhom}</p>
                      <a href="contacto.html" class="${isHighlight ? 'v3-btn v3-btn--gold' : 'btn-text'}" ${isHighlight ? 'style="border-color:var(--gold);color:#fff;text-align:center;justify-content:center"' : ''}>${pack.cta}</a>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          </section>
        `;

        // FAQ
        const faqHTML = `
          <section class="section section--pearl" id="faq">
            <div class="container" style="max-width:760px">
              <span class="label-tag">${t.faq.label}</span>
              <div class="gold-line"></div>
              <h2 class="section-title" style="max-width:480px">${t.faq.title}</h2>
              <div style="margin-top:48px">
                ${t.faq.items.map(item => `
                  <div class="faq-item">
                    <div class="faq-item__question">${item.question}<div class="faq-item__icon">+</div></div>
                    <div class="faq-item__answer"><p>${item.answer}</p></div>
                  </div>
                `).join('')}
              </div>
            </div>
          </section>
        `;

        // Final CTA
        const finalCtaHTML = `
          <section class="section section--navy">
            <div class="container" style="text-align:center">
              <span class="label-tag" style="border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6)">${t.finalCta.label}</span>
              <div class="gold-line" style="margin:20px auto 0"></div>
              <h2 style="font-family:var(--font-serif);font-size:clamp(36px,4.5vw,58px);font-weight:300;color:#fff;line-height:1.15;margin:32px 0 24px">${t.finalCta.title}</h2>
              <p style="font-family:var(--font-sans);font-size:17px;color:rgba(255,255,255,0.65);max-width:520px;margin:0 auto 40px;line-height:1.7">${t.finalCta.description}</p>
              <a href="contacto.html" class="v3-btn v3-btn--gold" style="border-color:var(--gold);color:#fff;font-size:15px;padding:18px 36px">${t.finalCta.cta}</a>
            </div>
          </section>
        `;

        // Footer
        const footerHTML = `
          <div class="container">
            <div class="footer__grid">
              <div class="footer__col footer__col--wide">
                <div class="nav__logo" style="margin-bottom:16px">${t.footer.logo}</div>
                <p style="color:rgba(255,255,255,0.55);font-family:var(--font-sans);font-size:14px;line-height:1.7;max-width:280px">${t.footer.tagline}</p>
                <p style="color:rgba(255,255,255,0.4);font-family:var(--font-sans);font-size:13px;margin-top:16px">${t.footer.contact.email} &middot; ${t.footer.contact.phone}</p>
                <a href="${t.footer.contact.linkedinUrl}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-family:var(--font-sans);font-size:12px;color:var(--gold);letter-spacing:0.04em">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                  ${t.footer.contact.linkedin}
                </a>
              </div>
              <div class="footer__col">
                <h4 class="footer__heading">${t.footer.certifications.title}</h4>
                <ul class="footer__links">
                  ${t.footer.certifications.items.map(i => `<li><a href="${i.url}">${i.label}</a></li>`).join('')}
                </ul>
              </div>
              <div class="footer__col">
                <h4 class="footer__heading">${t.footer.company.title}</h4>
                <ul class="footer__links">
                  ${t.footer.company.items.map(i => `<li><a href="${i.url}">${i.label}</a></li>`).join('')}
                </ul>
              </div>
              <div class="footer__col">
                <h4 class="footer__heading">${t.footer.startToday.title}</h4>
                <p style="color:rgba(255,255,255,0.55);font-family:var(--font-sans);font-size:14px;margin-bottom:20px">${t.footer.startToday.description}</p>
                <a href="contacto.html" class="v3-btn v3-btn--gold" style="color:#fff;border-color:var(--gold);font-size:12px">${t.footer.startToday.cta}</a>
              </div>
            </div>
            <div class="footer__bottom">
              <p>${t.footer.bottom.copyright}</p>
              <div>${t.footer.bottom.links.map(l => `<a href="${l.url}">${l.label}</a>`).join(' &middot; ')}</div>
            </div>
          </div>
        `;

        // Render
        document.getElementById('app').innerHTML = heroHTML + testimonialsHTML + processHTML + whatIsHTML + whoNeedsHTML + controlsHTML + synergyHTML + packsHTML + faqHTML + finalCtaHTML;
        document.getElementById('footer').innerHTML = footerHTML;

        // Floating elements
        document.getElementById('floatingCta').innerHTML = t.floatingCta;
        document.getElementById('exitModalLabel').innerHTML = t.exitModal.label;
        document.getElementById('exitModalTitle').innerHTML = t.exitModal.title;
        document.getElementById('exitModalDesc').innerHTML = t.exitModal.description;
        document.getElementById('exitModalCta').innerHTML = t.exitModal.cta;
        document.getElementById('exitModalDismiss').innerHTML = t.exitModal.dismiss;
        document.getElementById('stickyBarText').innerHTML = t.stickyBar.text;
        document.getElementById('stickyBarCta').innerHTML = t.stickyBar.cta;

        // WhatsApp
        document.getElementById('whatsappLink').setAttribute('href', t.whatsapp.url);
        document.getElementById('whatsappLink').setAttribute('aria-label', t.whatsapp.ariaLabel);

        initInteractions();
      } catch (error) {
        console.error('Error cargando el JSON:', error);
        document.getElementById('app').innerHTML = '<div style="text-align:center;padding:100px 20px;font-family:Inter,sans-serif;color:#1A2744;">Error al cargar el contenido. Por favor, recarga la pagina.</div>';
      }
    }

    function initInteractions() {
      // Mobile nav
      const burger = document.getElementById('navBurger');
      const overlay = document.getElementById('navOverlay');
      const close = document.getElementById('navClose');
      const toggleNav = (open) => { overlay.classList.toggle('open', open); document.body.classList.toggle('no-scroll', open); };
      burger?.addEventListener('click', () => toggleNav(!overlay.classList.contains('open')));
      close?.addEventListener('click', () => toggleNav(false));
      overlay?.addEventListener('click', (e) => { if (e.target === overlay) toggleNav(false); });

      // Scroll nav shadow
      const nav = document.getElementById('mainNav');
      window.addEventListener('scroll', () => { nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40); }, { passive: true });

      // Fade animations
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
      }, { threshold: 0.08 });
      document.querySelectorAll('.anim-fade-up').forEach(el => observer.observe(el));

      // FAQ accordion
      document.querySelectorAll('.faq-item__question').forEach(q => {
        q.addEventListener('click', () => { q.parentElement.classList.toggle('open'); });
      });

      // Exit modal
      let exitShown = false;
      document.addEventListener('mouseleave', (e) => {
        if (e.clientY < 0 && !exitShown && !sessionStorage.getItem('_exitShown')) {
          document.getElementById('exitModal').style.display = 'flex';
          exitShown = true;
          sessionStorage.setItem('_exitShown', '1');
        }
      });

      // Sticky bar (mobile)
      if (window.innerWidth <= 768) {
        document.getElementById('stickyBar').style.display = 'flex';
      }
    }

    loadContent();
  </script>
</body>
</html>
