      <section class="section section--pearl" id="portfolio">
        <div class="container">
          <span class="label-tag">${t.portfolio.label}</span>
          <div class="gold-line"></div>
          <h2 class="section-title" style="max-width:480px">${t.portfolio.title}</h2>
          <p style="font-family:var(--font-sans);font-size:16px;line-height:1.8;color:var(--text-body);max-width:640px;margin-bottom:48px">${t.portfolio.description}</p>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
            ${t.portfolio.combos.map(combo => `
              <div class="anim-fade-up" style="background:var(--white);padding:32px;border:1px solid var(--border)">
                <p style="font-family:var(--font-sans);font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:16px">${combo.sector}</p>
                <h3 style="font-family:var(--font-serif);font-size:22px;font-weight:300;color:var(--navy);margin-bottom:12px">${combo.title}</h3>
                <p style="font-family:var(--font-sans);font-size:13px;color:var(--text-body);line-height:1.6;margin-bottom:16px">${combo.description}</p>
                <a href="${combo.linkHref}" class="btn-text" style="font-size:12px">${combo.linkText}</a>
              </div>
            `).join('')}
          </div>
        </div>
      </section>
    `;

        // Process
        const processHTML = `
      <section class="section section--white" id="proceso">
        <div class="container">
          <span class="label-tag">${t.process.label}</span>
          <div class="gold-line"></div>
          <h2 class="section-title" style="max-width:520px">${t.process.title}</h2>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:20px;margin-top:52px">
            ${t.process.steps.map(step => `
              <div class="anim-fade-up" style="text-align:center;padding:32px 20px">
                <div style="width:56px;height:56px;background:var(--navy);margin:0 auto 20px;display:flex;align-items:center;justify-content:center">
                  <span style="font-family:var(--font-serif);font-size:24px;font-weight:300;color:var(--gold)">${step.num}</span>
                </div>
                <h3 style="font-family:var(--font-sans);font-size:14px;font-weight:600;color:var(--navy);margin-bottom:12px">${step.title}</h3>
                <p style="font-family:var(--font-sans);font-size:13px;color:var(--text-muted);line-height:1.6">${step.description}</p>
              </div>
            `).join('')}
          </div>
        </div>
      </section>
    `;

        // Testimonials
        const testimonialsHTML = `
      <section class="section section--pearl" id="casos">
        <div class="container">
          <span class="label-tag">${t.testimonials.label}</span>
          <div class="gold-line"></div>
          <h2 class="section-title" style="max-width:560px">${t.testimonials.title}</h2>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:52px">
            ${t.testimonials.items.map(item => `
              <div class="anim-fade-up" style="background:${item.dark ? 'var(--navy)' : 'var(--white)'};${item.dark ? '' : 'border:1px solid var(--border);'}padding:48px 40px;display:flex;flex-direction:column;justify-content:space-between;min-height:280px">
                <blockquote style="font-family:var(--font-serif);font-size:22px;font-weight:300;color:${item.dark ? '#fff' : 'var(--navy)'};line-height:1.5;margin:0;font-style:italic">${item.quote}</blockquote>
                <div style="margin-top:32px;padding-top:24px;border-top:1px solid ${item.dark ? 'rgba(255,255,255,0.15)' : 'var(--border)'}">
                  <p style="font-family:var(--font-sans);font-size:14px;font-weight:500;color:${item.dark ? '#fff' : 'var(--navy)'};margin:0">${item.name}</p>
                  <p style="font-family:var(--font-sans);font-size:11px;color:${item.dark ? 'rgba(255,255,255,0.45)' : 'var(--text-muted)'};margin:4px 0 0;letter-spacing:0.06em;text-transform:uppercase">${item.role}</p>
                </div>
              </div>
            `).join('')}
          </div>
          <div style="text-align:center;margin-top:48px"><a href="contacto.html" class="btn-primary">${t.testimonials.cta}</a></div>
        </div>
      </section>
    `;

        // FAQ
        const faqHTML = `
      <section class="section section--pearl" id="faq">
        <div class="container" style="max-width:760px">
          <span class="label-tag">${t.faq.label}</span>
          <div class="gold-line"></div>
          <h2 class="section-title" style="max-width:520px">${t.faq.title}</h2>
          <div style="margin-top:48px">
            ${t.faq.items.map(item => `
              <div class="faq-item">
                <div class="faq-item__question">${item.question}<div class="faq-item__icon">+</div></div>
                <div class="faq-item__answer"><p>${item.answer}</p></div>
              </div>
            `).join('')}
          </div>
        </div>
      </section>
    `;

        // Final CTA
        const finalCtaHTML = `
      <section class="section section--navy">
        <div class="container" style="text-align:center">
          <span class="label-tag" style="border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6)">${t.finalCta.label}</span>
          <div class="gold-line" style="margin:20px auto 0"></div>
          <h2 style="font-family:var(--font-serif);font-size:clamp(36px,4.5vw,58px);font-weight:300;color:#fff;line-height:1.15;margin:32px 0 24px">${t.finalCta.title}</h2>
          <p style="font-family:var(--font-sans);font-size:17px;color:rgba(255,255,255,0.65);max-width:520px;margin:0 auto 40px;line-height:1.7">${t.finalCta.description}</p>
          <a href="contacto.html" class="btn-primary" style="border-color:var(--gold);color:#fff;font-size:15px;padding:18px 36px">${t.finalCta.cta}</a>
        </div>
      </section>
    `;

        // Footer
        const footerHTML = `
      <div class="container">
        <div class="footer__grid">
          <div class="footer__col footer__col--wide">
            <div class="nav__logo" style="margin-bottom:16px">${t.footer.logo}</div>
            <p style="color:rgba(255,255,255,0.55);font-family:var(--font-sans);font-size:14px;line-height:1.7;max-width:280px">${t.footer.description}</p>
            <p style="color:rgba(255,255,255,0.4);font-family:var(--font-sans);font-size:13px;margin-top:16px">${t.footer.contact.email} · ${t.footer.contact.phone}</p>
            <a href="https://www.linkedin.com/avson" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-family:var(--font-sans);font-size:12px;color:var(--gold);letter-spacing:0.04em">${t.footer.contact.linkedin}</a>
          </div>
          <div class="footer__col"><h4 class="footer__heading">${t.footer.certifications.title}</h4><ul class="footer__links">${t.footer.certifications.items.map(i => `<li><a href="${i === 'ENS' ? 'ens.html' : i === '⚡ ENS Express' ? 'ens-express.html' : i === 'ISO 27001' ? 'iso27001.html' : i === 'ISO 22301' ? 'iso22301.html' : i === 'DORA' ? 'dora.html' : i === 'NIS2' ? 'nis2.html' : i === 'TISAX' ? 'tisax.html' : '#'}">${i}</a></li>`).join('')}</ul></div>
          <div class="footer__col"><h4 class="footer__heading">${t.footer.company.title}</h4><ul class="footer__links">${t.footer.company.items.map(i => `<li><a href="${i === 'Equipo' ? 'equipo.html' : i === 'Únete al equipo' ? 'unete.html' : i === 'Packs' ? 'packs.html' : i === 'Webinars' ? 'webinars.html' : i === 'Contacto' ? 'contacto.html' : '#'}">${i}</a></li>`).join('')}</ul></div>
          <div class="footer__col"><h4 class="footer__heading">${t.footer.ctaBox.title}</h4><p style="color:rgba(255,255,255,0.55);font-family:var(--font-sans);font-size:14px;margin-bottom:20px">${t.footer.ctaBox.description}</p><a href="contacto.html" class="btn-primary" style="color:#fff;border-color:var(--gold);font-size:12px">${t.footer.ctaBox.button}</a></div>
        </div>
        <div class="footer__bottom"><p>${t.footer.bottom.copyright}</p><div>${t.footer.bottom.links.map(l => `<a href="#">${l}</a>`).join(' · ')}</div></div>
      </div>
    `;

        // Floating elements
        document.getElementById('floatingCta').innerHTML = t.floatingCta;
        document.getElementById('exitModalLabel').innerHTML = t.exitModal.title;
        document.getElementById('exitModalTitle').innerHTML = t.exitModal.question;
        document.getElementById('exitModalDesc').innerHTML = t.exitModal.description;
        document.getElementById('exitModalCta').innerHTML = t.exitModal.cta;
        document.getElementById('exitModalDismiss').innerHTML = t.exitModal.dismiss;
        document.getElementById('stickyBarText').innerHTML = t.stickyBar.text;
        document.getElementById('stickyBarCta').innerHTML = t.stickyBar.cta;
        const whatsappLink = document.getElementById('whatsappLink');
        if (whatsappLink && t.whatsapp.url) whatsappLink.href = t.whatsapp.url;

        // Assemble
        document.getElementById('app').innerHTML = heroHTML + certsHTML + integratedHTML + portfolioHTML + processHTML + testimonialsHTML + faqHTML + finalCtaHTML;
        document.getElementById('footer').innerHTML = footerHTML;

        initInteractions();
      } catch (error) {
        console.error('Error cargando el JSON:', error);
        document.getElementById('app').innerHTML = '<div class="loader">Error al cargar el contenido. Por favor, recarga la página.</div>';
      }
    }

    function initInteractions() {
      const burger = document.getElementById('navBurger');
      const overlay = document.getElementById('navOverlay');
      const close = document.getElementById('navClose');
      const toggleNav = (open) => { overlay.classList.toggle('open', open); document.body.classList.toggle('no-scroll', open); };
      burger?.addEventListener('click', () => toggleNav(!overlay.classList.contains('open')));
      close?.addEventListener('click', () => toggleNav(false));
      overlay?.addEventListener('click', (e) => { if (e.target === overlay) toggleNav(false); });

      const nav = document.getElementById('mainNav');
      window.addEventListener('scroll', () => { nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40); });

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
      }, { threshold: 0.08 });
      document.querySelectorAll('.anim-fade-up').forEach(el => observer.observe(el));

      document.querySelectorAll('.faq-item__question').forEach(q => {
        q.addEventListener('click', () => { q.parentElement.classList.toggle('open'); });
      });

      let exitShown = false;
      document.addEventListener('mouseleave', (e) => {
        if (e.clientY < 0 && !exitShown && !sessionStorage.getItem('_exitShown')) {
          document.getElementById('exitModal').style.display = 'flex';
          exitShown = true;
          sessionStorage.setItem('_exitShown', '1');
        }
      });

      if (window.innerWidth <= 768) { document.getElementById('stickyBar').style.display = 'flex'; }
    }

    loadContent();
  </script>
</body>

</html>
