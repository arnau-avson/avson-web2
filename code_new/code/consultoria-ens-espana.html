          <li><a href="ens-express.html">${t.nav.links.ensExpress}</a></li>
          <li><a href="iso22301.html">${t.nav.links.iso22301}</a></li>
          <li><a href="iso27001.html">${t.nav.links.iso27001}</a></li>
          <li><a href="otras.html">${t.nav.links.otras}</a></li>

        document.getElementById('navCta').innerHTML = t.nav.cta;

          <a href="ens-express.html">${t.nav.links.ensExpress}</a>
          <a href="iso22301.html">${t.nav.links.iso22301}</a>
          <a href="iso27001.html">${t.nav.links.iso27001}</a>
          <a href="otras.html">${t.nav.links.otras}</a>
        `;
        document.getElementById('navOverlayCta').innerHTML = t.nav.cta;

        // Hero
        const heroHTML = `
          <section class="hero">
            <div class="container container--narrow">
              <ol class="breadcrumb">
                ${t.hero.breadcrumb.map((b, i) => i < t.hero.breadcrumb.length - 1
                  ? `<li><a href="${b.url}">${b.label}</a></li><li class="sep">/</li>`
                  : `<li class="current">${b.label}</li>`
                ).join('')}
              </ol>
              <p class="hero__label">${t.hero.label}</p>
              <h1 class="hero__h1">${t.hero.title}</h1>
              <p class="hero__sub">${t.hero.description}</p>
              <form class="hero__form" action="/contacto.html" method="get">
                <input type="email" name="email" placeholder="${t.hero.form.placeholder}" required />
                <button type="submit">${t.hero.form.button}</button>
              </form>
              <p class="hero__note">${t.hero.form.note}</p>
            </div>
          </section>
        `;

        // Stats bar
        const statsHTML = `
          <div class="stats-bar">
            <div class="stats-bar__inner">
              ${t.statsBar.map(s => `
                <div class="stat-item">
                  <div class="stat-item__number">${s.number}</div>
                  <div class="stat-item__label">${s.label}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;

        // Coverage section
        const coverageHTML = `
          <section class="section section--white">
            <div class="container">
              <div class="gold-line"></div>
              <p class="section__label">${t.coverage.label}</p>
              <h2 class="section__h2">${t.coverage.title}</h2>
              <p class="section__lead">${t.coverage.lead}</p>
              <div class="national-msg"><p>${t.coverage.nationalMsg}</p></div>
              <p style="font-family:'Inter',sans-serif;font-size:15px;color:#5a6478;line-height:1.7;margin-bottom:32px;">${t.coverage.paragraph1}</p>
              <p style="font-family:'Inter',sans-serif;font-size:15px;color:#5a6478;line-height:1.7;margin-bottom:32px;">${t.coverage.paragraph2}</p>
              <div class="city-grid anim-fade-up">
                ${t.coverage.cities.map(c => `<div class="city-item"><span class="city-dot"></span>${c}</div>`).join('')}
              </div>
            </div>
          </section>
        `;

        // Differentiators section
        const diffIcons = [
          '<svg class="diff-card__icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><circle cx="24" cy="24" r="20"/><path d="M16 24l6 6 10-12"/></svg>',
          '<svg class="diff-card__icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><rect x="8" y="8" width="32" height="32" rx="2"/><path d="M16 20h16M16 28h10"/></svg>',
          '<svg class="diff-card__icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><path d="M24 4L4 16v16l20 12 20-12V16L24 4z"/><path d="M24 4v40M4 16l20 12 20-12"/></svg>',
          '<svg class="diff-card__icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><circle cx="24" cy="18" r="8"/><path d="M8 40c0-8.8 7.2-16 16-16s16 7.2 16 16"/></svg>'
        ];
        const diffHTML = `
          <section class="section section--pearl">
            <div class="container">
              <div class="text-center" style="max-width:700px;margin:0 auto 56px;">
                <div class="gold-line gold-line--center"></div>
                <p class="section__label">${t.differentiators.label}</p>
                <h2 class="section__h2">${t.differentiators.title}</h2>
                <p class="section__lead">${t.differentiators.lead}</p>
              </div>
              <div class="diff-grid">
                ${t.differentiators.cards.map((card, i) => `
                  <div class="diff-card anim-fade-up">
                    ${diffIcons[i] || ''}
                    <div class="diff-card__title">${card.title}</div>
                    <p class="diff-card__text">${card.text}</p>
                  </div>
                `).join('')}
              </div>
            </div>
          </section>
        `;

        // Levels comparison table
        const levelsHTML = `
          <section class="section section--white">
            <div class="container">
              <div class="gold-line"></div>
              <p class="section__label">${t.levels.label}</p>
              <h2 class="section__h2">${t.levels.title}</h2>
              <p class="section__lead">${t.levels.lead}</p>
              <div style="overflow-x:auto;">
                <table class="compare-table">
                  <thead>
                    <tr>
                      <th>${t.levels.table.headers[0]}</th>
                      <th><span class="level-badge level-badge--basic">${t.levels.table.headers[1]}</span></th>
                      <th><span class="level-badge level-badge--medio">${t.levels.table.headers[2]}</span></th>
                      <th><span class="level-badge level-badge--alto">${t.levels.table.headers[3]}</span></th>
                    </tr>
                  </thead>
                  <tbody>
                    ${t.levels.table.rows.map(row => `
                      <tr>
                        <td><strong>${row.criteria}</strong></td>
                        <td>${row.basic}</td>
                        <td>${row.medium}</td>
                        <td>${row.high}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
              <p style="font-family:'Inter',sans-serif;font-size:12px;color:#999;margin-top:12px;">${t.levels.disclaimer}</p>
            </div>
          </section>
        `;

        // Remote methodology section
        const remoteHTML = `
          <section class="section section--pearl">
            <div class="container">
              <div class="gold-line"></div>
              <p class="section__label">${t.remoteMethodology.label}</p>
              <h2 class="section__h2">${t.remoteMethodology.title}</h2>
              <p class="section__lead">${t.remoteMethodology.lead}</p>
              <div class="steps-grid">
                ${t.remoteMethodology.steps.map(step => `
                  <div class="step-card anim-fade-up">
                    <div class="step-card__num">${step.num}</div>
                    <div class="step-card__title">${step.title}</div>
                    <p class="step-card__text">${step.text}</p>
                  </div>
                `).join('')}
              </div>
            </div>
          </section>
        `;

        // FAQ section
        const faqHTML = `
          <section class="section section--white">
            <div class="container">
              <div class="text-center" style="margin-bottom:56px;">
                <div class="gold-line gold-line--center"></div>
                <p class="section__label">${t.faq.label}</p>
                <h2 class="section__h2">${t.faq.title}</h2>
              </div>
              <div class="faq-list">
                ${t.faq.items.map(item => `
                  <div class="faq-item anim-fade-up">
                    <button class="faq-item__q">
                      ${item.question}
                      <span class="faq-item__icon">+</span>
                    </button>
                    <div class="faq-item__a"><p>${item.answer}</p></div>
                  </div>
                `).join('')}
              </div>
            </div>
          </section>
        `;

        // Final CTA
        const finalCtaHTML = `
          <section class="section section--navy">
            <div class="container" style="text-align:center;max-width:700px;">
              <div class="gold-line gold-line--center"></div>
              <h2 class="section__h2 section__h2--white">${t.finalCta.title}</h2>
              <p class="section__lead section__lead--white" style="margin:0 auto 36px;">${t.finalCta.description}</p>
              <form class="cta-form" action="/contacto.html" method="get">
                <input type="email" name="email" placeholder="${t.finalCta.form.placeholder}" required />
                <button type="submit">${t.finalCta.form.button}</button>
              </form>
              <p style="font-family:'Inter',sans-serif;font-size:12px;color:rgba(255,255,255,.35);margin-top:16px;">${t.finalCta.contactLine}</p>
            </div>
          </section>
        `;

        // Footer
        const footerHTML = `
          <div class="container">
            <div class="footer__grid">
              <div>
                <div class="footer__logo">${t.footer.logo}</div>
                <p class="footer__tagline">${t.footer.tagline}</p>
                <p style="font-size:12px;color:rgba(255,255,255,.35);margin-top:12px;">${t.footer.legalInfo}</p>
              </div>
              <div class="footer__col">
                <h4>${t.footer.services.title}</h4>
                <ul>${t.footer.services.items.map(i => `<li><a href="${i.url}">${i.label}</a></li>`).join('')}</ul>
              </div>
              <div class="footer__col">
                <h4>${t.footer.resources.title}</h4>
                <ul>${t.footer.resources.items.map(i => `<li><a href="${i.url}">${i.label}</a></li>`).join('')}</ul>
              </div>
              <div class="footer__col">
                <h4>${t.footer.legal.title}</h4>
                <ul>${t.footer.legal.items.map(i => `<li><a href="${i.url}">${i.label}</a></li>`).join('')}</ul>
              </div>
            </div>
            <div class="footer__bottom">
              <p>${t.footer.bottom.copyright}</p>
              <p>${t.footer.bottom.contact}</p>
            </div>
          </div>
        `;

        // Render
        document.getElementById('app').innerHTML = heroHTML + statsHTML + coverageHTML + diffHTML + levelsHTML + remoteHTML + faqHTML + finalCtaHTML;
        document.getElementById('footer').innerHTML = footerHTML;

        // Floating elements
        document.getElementById('floatingCta').innerHTML = t.floatingCta;
        document.getElementById('exitModalLabel').innerHTML = t.exitModal.title;
        document.getElementById('exitModalTitle').innerHTML = t.exitModal.question;
        document.getElementById('exitModalDesc').innerHTML = t.exitModal.description;
        document.getElementById('exitModalCta').innerHTML = t.exitModal.cta;
        document.getElementById('exitModalDismiss').innerHTML = t.exitModal.dismiss;
        document.getElementById('stickyBarText').innerHTML = t.stickyBar.text;
        document.getElementById('stickyBarCta').innerHTML = t.stickyBar.cta;

        // WhatsApp
        document.getElementById('whatsappLink').setAttribute('href', t.whatsapp.url);
        document.getElementById('whatsappLink').setAttribute('aria-label', t.whatsapp.ariaLabel);

        initInteractions();
      } catch (error) {
        console.error('Error cargando el JSON:', error);
        document.getElementById('app').innerHTML = '<div style="text-align:center;padding:100px 20px;font-family:Inter,sans-serif;color:#1A2744;">Error al cargar el contenido. Por favor, recarga la pagina.</div>';
      }
    }

    function initInteractions() {
      // Mobile nav
      const burger = document.getElementById('navBurger');
      const overlay = document.getElementById('navOverlay');
      const close = document.getElementById('navClose');
      const toggleNav = (open) => { overlay.classList.toggle('open', open); document.body.classList.toggle('no-scroll', open); };
      burger?.addEventListener('click', () => toggleNav(!overlay.classList.contains('open')));
      close?.addEventListener('click', () => toggleNav(false));
      overlay?.addEventListener('click', (e) => { if (e.target === overlay) toggleNav(false); });

      // Scroll nav shadow
      const nav = document.getElementById('mainNav');
      window.addEventListener('scroll', () => { nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40); }, { passive: true });

      // Fade animations
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
      }, { threshold: 0.12 });
      document.querySelectorAll('.anim-fade-up').forEach(el => observer.observe(el));

      // FAQ accordion
      document.querySelectorAll('.faq-item__q').forEach(q => {
        q.addEventListener('click', () => { q.closest('.faq-item').classList.toggle('open'); });
      });

      // Exit modal
      let exitShown = false;
      document.addEventListener('mouseleave', (e) => {
        if (e.clientY < 0 && !exitShown && !sessionStorage.getItem('_exitShown')) {
          document.getElementById('exitModal').style.display = 'flex';
          exitShown = true;
          sessionStorage.setItem('_exitShown', '1');
        }
      });

      // Sticky bar (mobile)
      if (window.innerWidth <= 768) {
        document.getElementById('stickyBar').style.display = 'flex';
      }
    }

    loadContent();
  </script>
</body>
</html>
