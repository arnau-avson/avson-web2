  <style>
    .loader { text-align: center; padding: 100px 20px; font-family: 'Inter', sans-serif; color: #1A2744; }
    /* -- Equipo - rediseno de tarjetas -- */
    .team-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:28px; }
    @media (max-width:900px){ .team-grid{ grid-template-columns:repeat(2,1fr); } }
    @media (max-width:600px){ .team-grid{ grid-template-columns:1fr; } }
    .team-card { background:#fff; border:1px solid #E8E4DD; border-radius:16px; overflow:hidden;
      display:flex; flex-direction:column; transition:transform .18s ease, box-shadow .18s ease; }
    .team-card:hover { transform:translateY(-5px); box-shadow:0 20px 46px rgba(26,39,68,0.13); }
    .team-photo-wrap { position:relative; border-bottom:3px solid #C9A84C; }
    .team-avatar { width:100%; aspect-ratio:1/1; display:flex; align-items:center; justify-content:center;
      background:radial-gradient(circle at 30% 25%, #2D3F6B 0%, #1A2744 70%);
      color:#C9A84C; font-family:'Cormorant Garamond',serif; font-size:clamp(46px,6.5vw,70px);
      font-weight:300; letter-spacing:.04em; user-select:none; }
    .team-photo { width:100%; aspect-ratio:1/1; object-fit:cover; display:block; }
    .team-info { padding:22px 22px 26px; display:flex; flex-direction:column; gap:5px; flex:1; }
    .team-name { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:500; color:#1A2744; margin:0; line-height:1.12; }
    .team-role { font-family:'Inter',sans-serif; font-size:12.5px; font-weight:600; color:#B68F2E; letter-spacing:.02em; }
    .team-badge { display:inline-block; align-self:flex-start; background:#F7F5F0; border:1px solid #E8E4DD;
      border-radius:20px; padding:3px 12px; font-family:'Inter',sans-serif; font-size:11px; font-weight:600;
      color:#3D4A5C; margin:6px 0 8px; }
    .team-bio { font-family:'Inter',sans-serif; font-size:13.5px; line-height:1.62; color:#3D4A5C; margin:0; }
  </style>

    "url": "https://avson.eu/equipo.html"
  }
  </script>

</head>
<body>

  <div style="background:#1A2744;color:rgba(255,255,255,0.85);font-family:'Inter',sans-serif;font-size:12px;font-weight:400;letter-spacing:0.04em;text-align:center;padding:10px 40px;position:relative;z-index:200" id="topBar"></div>

  <nav class="v3-nav" id="mainNav">
    <div class="v3-nav__inner">
      <a href="index.html" class="v3-nav__logo" id="navLogo">AVSON<span>·</span>GRC</a>
      <ul class="v3-nav__links" id="navLinks"></ul>
      <a href="contacto.html" class="v3-btn v3-btn--gold v3-btn--sm v3-nav__cta" id="navCta"></a>
      <button class="v3-nav__burger" id="navBurger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </nav>
  <div class="v3-nav__overlay" id="navOverlay">
    <button class="v3-nav__overlay-close" id="navClose">&#10005;</button>
    <div id="navOverlayLinks"></div>
    <a href="contacto.html" class="v3-btn v3-btn--gold" id="navOverlayCta"></a>
  </div>

  <main id="app"></main>
  <footer class="footer" id="footer"></footer>

  <a href="contacto.html" class="floating-cta" id="floatingCta"></a>

  <div id="exitModal" style="display:none;position:fixed;inset:0;background:rgba(26,39,68,0.72);z-index:9999;align-items:center;justify-content:center;padding:20px">
    <div style="background:#fff;max-width:520px;width:100%;padding:48px 40px;position:relative">
      <button onclick="this.parentElement.parentElement.style.display='none'" style="position:absolute;top:16px;right:20px;font-size:22px;color:#7A8499;cursor:pointer;background:none;border:none;font-family:inherit">&times;</button>
      <span style="font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:#C9A84C;display:block;margin-bottom:16px" id="exitModalLabel"></span>
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:#1A2744;line-height:1.2;margin-bottom:16px" id="exitModalTitle"></h2>
      <p style="font-family:'Inter',sans-serif;font-size:14px;color:#7A8499;line-height:1.65;margin-bottom:28px" id="exitModalDesc"></p>
      <a href="contacto.html" id="exitModalCta" style="display:block;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#1A2744;border:1px solid #C9A84C;padding:14px 28px;text-align:center;text-decoration:none"></a>
      <p style="font-family:'Inter',sans-serif;font-size:12px;color:#7A8499;text-align:center;margin-top:12px;cursor:pointer;text-decoration:underline" onclick="document.getElementById('exitModal').style.display='none'" id="exitModalDismiss"></p>
    </div>
  </div>

  <div id="stickyBar" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;background:#1A2744;border-top:1px solid rgba(255,255,255,0.08);padding:14px 20px;justify-content:space-between;gap:12px;align-items:center">
    <span style="font-family:'Inter',sans-serif;font-size:13px;color:rgba(255,255,255,0.7)" id="stickyBarText"></span>
    <a href="contacto.html" style="font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#fff;border:1px solid #fff;padding:10px 20px;text-decoration:none;white-space:nowrap" id="stickyBarCta"></a>
  </div>

  <a id="whatsappLink" href="" class="wa-float" target="_blank" rel="noopener" aria-label="Contactar por WhatsApp">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </a>

  <script>
    async function loadContent(){
      try{
        const response=await fetch('assets/palabras.json');
        const data=await response.json();
        const t=data["es"]?.equipo;
        if(!t) throw new Error('No se encontro la clave "equipo"');

        /* META */
        document.title=t.meta.title;
        document.querySelector('meta[name="description"]').setAttribute('content',t.meta.description);
        document.querySelector('meta[name="keywords"]').setAttribute('content',t.meta.keywords);
        document.querySelector('meta[property="og:title"]').setAttribute('content',t.meta.ogTitle);
        document.querySelector('meta[property="og:description"]').setAttribute('content',t.meta.ogDescription);

        /* TOP BAR */
        document.getElementById('topBar').innerHTML=`${t.topBar.icon} <strong>${t.topBar.text}</strong> &nbsp;&middot;&nbsp; ${t.topBar.subtext} &nbsp;&middot;&nbsp; <a href="contacto.html" style="color:#C9A84C;text-decoration:none;font-weight:500">${t.topBar.cta}</a>`;

        /* NAV */
        document.getElementById('navLinks').innerHTML=`
          <li><a href="ens.html">${t.nav.links.ens}</a></li>
          <li><a href="ens-express.html" class="nav-express">${t.nav.links.ensExpress}</a></li>
          <li><a href="iso22301.html">${t.nav.links.iso22301}</a></li>
          <li><a href="iso27001.html">${t.nav.links.iso27001}</a></li>
          <li><a href="otras.html">${t.nav.links.otras}</a></li>`;
        document.getElementById('navCta').innerHTML=t.nav.cta;
        document.getElementById('navOverlayLinks').innerHTML=`
          <a href="ens.html">${t.nav.links.ens}</a>
          <a href="ens-express.html">${t.nav.links.ensExpress}</a>
          <a href="iso22301.html">${t.nav.links.iso22301}</a>
          <a href="iso27001.html">${t.nav.links.iso27001}</a>
          <a href="otras.html">${t.nav.links.otras}</a>`;
        document.getElementById('navOverlayCta').innerHTML=t.nav.cta;

        /* HERO */
        const heroHTML=`
        <section class="section section--pearl" style="padding-top:160px;padding-bottom:80px">
          <div class="container">
            <span class="label-tag">${t.hero.label}</span>
            <div class="gold-line"></div>
            <h1 class="display-title" style="max-width:700px">${t.hero.title}</h1>
            <p class="body-large mt-24" style="max-width:580px;color:var(--text-body)">${t.hero.description}</p>
          </div>
        </section>`;

        /* STATS BAR */
        const statsHTML=`
        <section class="section section--white" style="padding-top:0;padding-bottom:48px">
          <div class="container">
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border)">
              ${t.stats.map(s=>`
              <div style="background:var(--white);padding:36px 28px;text-align:center">
                <div style="font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;color:var(--navy);line-height:1">${s.value}</div>
                <div style="font-family:'Inter',sans-serif;font-size:11px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:8px">${s.label}</div>
              </div>`).join('')}
            </div>
          </div>
        </section>`;

        /* TEAM GRID */
        const teamHTML=`
        <section class="section section--white">
          <div class="container">
            <div class="team-grid">
              ${t.team.map(m=>`
              <div class="team-card anim-fade-up">
                <div class="team-photo-wrap">
                  <img class="team-photo" src="${m.photo}" alt="${m.alt}" loading="lazy">
                </div>
                <div class="team-info">
                  <h3 class="team-name">${m.name}</h3>
                  <span class="team-role">${m.role}</span>
                  <span class="team-badge">${m.badge}</span>
                  <p class="team-bio">${m.bio}</p>
                </div>
              </div>`).join('')}
            </div>
          </div>
        </section>`;

        /* COMO TRABAJAMOS */
        const howWeWorkHTML=`
        <section class="section section--pearl" id="como-trabajamos">
          <div class="container">
            <span class="label-tag">${t.howWeWork.label}</span>
            <div class="gold-line"></div>
            <h2 class="section-title" style="max-width:560px">${t.howWeWork.title}</h2>
            <p style="font-family:var(--font-sans);font-size:16px;line-height:1.8;color:var(--text-body);max-width:640px;margin-bottom:52px">${t.howWeWork.description}</p>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
              ${t.howWeWork.cards.map(c=>`
              <div class="anim-fade-up" style="background:var(--white);padding:40px;border-left:4px solid var(--gold)">
                <h3 style="font-family:var(--font-sans);font-size:16px;font-weight:600;color:var(--navy);margin-bottom:16px">${c.title}</h3>
                <p style="font-family:var(--font-sans);font-size:14px;line-height:1.8;color:var(--text-body)">${c.text}</p>
              </div>`).join('')}
            </div>
          </div>
        </section>`;

        /* CREDENCIALES */
        const credentialsHTML=`
        <section class="section section--white" id="credenciales">
          <div class="container">
            <span class="label-tag">${t.credentials.label}</span>
            <div class="gold-line"></div>
            <h2 class="section-title" style="max-width:520px">${t.credentials.title}</h2>
            <p style="font-family:var(--font-sans);font-size:16px;line-height:1.8;color:var(--text-body);max-width:640px;margin-bottom:52px">${t.credentials.description}</p>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px">
              ${t.credentials.certs.map(c=>`
              <div class="anim-fade-up" style="background:${c.dark?'var(--navy)':'var(--pearl)'};padding:28px;text-align:center">
                <div style="font-family:var(--font-serif);font-size:20px;font-weight:600;color:${c.dark?'var(--gold)':'var(--navy)'};margin-bottom:8px">${c.name}</div>
                <div style="font-family:var(--font-sans);font-size:11px;font-weight:600;color:${c.dark?'rgba(255,255,255,0.6)':'var(--gold)'};text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px">${c.subtitle}</div>
                <p style="font-family:var(--font-sans);font-size:12px;color:${c.dark?'rgba(255,255,255,0.6)':'var(--text-muted)'};line-height:1.5">${c.text}</p>
                <p style="font-family:var(--font-sans);font-size:10px;color:${c.dark?'rgba(255,255,255,0.4)':'var(--text-muted)'};margin-top:8px">${c.issuer}</p>
              </div>`).join('')}
            </div>
          </div>
        </section>`;

        /* GARANTIA */
        const guaranteeHTML=`
        <section class="section section--navy" style="text-align:center">
          <div class="container">
            <div style="max-width:640px;margin:0 auto">
              <span class="label-tag" style="text-align:center">${t.guarantee.label}</span>
              <div class="gold-line gold-line--center"></div>
              <h2 class="section-title section-title--white">${t.guarantee.title}</h2>
              <p style="font-size:17px;color:rgba(255,255,255,0.55);line-height:1.65;margin-top:24px;max-width:520px;margin-left:auto;margin-right:auto">${t.guarantee.description}</p>
              <div style="display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(201,168,76,0.4);padding:14px 24px;margin-top:32px;margin-bottom:40px">
                <span style="font-size:20px;color:#C9A84C">${t.guarantee.sealIcon}</span>
                <span style="font-family:'Inter',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.8)">${t.guarantee.sealText}</span>
              </div>
              <div style="display:block">
                <a href="contacto.html" class="btn-primary btn-primary--white">${t.guarantee.cta}</a>
              </div>
            </div>
          </div>
        </section>`;

        /* FOOTER */
        const footerHTML=`
        <div class="container">
          <div class="footer__grid">
            <div class="footer__col footer__col--wide">
              <div class="nav__logo" style="margin-bottom:16px">${t.footer.logo}</div>
              <p style="color:rgba(255,255,255,0.55);font-family:var(--font-sans);font-size:14px;line-height:1.7;max-width:280px">${t.footer.description}</p>
              <p style="color:rgba(255,255,255,0.4);font-family:var(--font-sans);font-size:13px;margin-top:16px">${t.footer.contact.email} · ${t.footer.contact.phone}</p>
              <a href="https://www.linkedin.com/avson" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-family:var(--font-sans);font-size:12px;color:var(--gold);letter-spacing:0.04em">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                ${t.footer.contact.linkedin}
              </a>
            </div>
            <div class="footer__col">
              <h4 class="footer__heading">${t.footer.certifications.title}</h4>
              <ul class="footer__links">
                ${t.footer.certifications.items.map(i=>'<li><a href="'+(i==='ENS'?'ens.html':i==='ENS Express'?'ens-express.html':i==='ISO 27001'?'iso27001.html':i==='ISO 22301'?'iso22301.html':i==='DORA'?'dora.html':i==='NIS2'?'nis2.html':i==='TISAX'?'tisax.html':'#')+'">'+i+'</a></li>').join('')}
              </ul>
            </div>
            <div class="footer__col">
              <h4 class="footer__heading">${t.footer.company.title}</h4>
              <ul class="footer__links">
                ${t.footer.company.items.map(i=>'<li><a href="'+(i==='Equipo'?'equipo.html':i==='Unete al equipo'?'unete.html':i==='Packs'?'packs.html':i==='Webinars'?'webinars.html':i==='Contacto'?'contacto.html':'#')+'">'+i+'</a></li>').join('')}
              </ul>
            </div>
            <div class="footer__col">
              <h4 class="footer__heading">${t.footer.ctaBox.title}</h4>
              <p style="color:rgba(255,255,255,0.55);font-family:var(--font-sans);font-size:14px;margin-bottom:20px">${t.footer.ctaBox.description}</p>
              <a href="contacto.html" class="btn-primary" style="color:#fff;border-color:var(--gold);font-size:12px">${t.footer.ctaBox.button}</a>
            </div>
          </div>
          <div class="footer__bottom">
            <p>${t.footer.bottom.copyright}</p>
            <div>${t.footer.bottom.links.map(l=>'<a href="#">'+l+'</a>').join(' · ')}</div>
          </div>
        </div>`;

        /* RENDER */
        document.getElementById('app').innerHTML=heroHTML+statsHTML+teamHTML+howWeWorkHTML+credentialsHTML+guaranteeHTML;
        document.getElementById('footer').innerHTML=footerHTML;

        /* FLOATING / EXIT / STICKY / WHATSAPP */
        document.getElementById('floatingCta').innerHTML=t.floatingCta;
        document.getElementById('exitModalLabel').innerHTML=t.exitModal.title;
        document.getElementById('exitModalTitle').innerHTML=t.exitModal.question;
        document.getElementById('exitModalDesc').innerHTML=t.exitModal.description;
        document.getElementById('exitModalCta').innerHTML=t.exitModal.cta;
        document.getElementById('exitModalDismiss').innerHTML=t.exitModal.dismiss;
        document.getElementById('stickyBarText').innerHTML=t.stickyBar.text;
        document.getElementById('stickyBarCta').innerHTML=t.stickyBar.cta;
        document.getElementById('whatsappLink').href=t.whatsapp.href;
        document.getElementById('whatsappLink').setAttribute('aria-label',t.whatsapp.ariaLabel);

        initInteractions();
      }catch(error){
        console.error('Error cargando el JSON:',error);
        document.getElementById('app').innerHTML='<div class="loader">Error al cargar el contenido. Por favor, recarga la pagina.</div>';
      }
    }

    function initInteractions(){
      /* Mobile menu */
      const burger=document.getElementById('navBurger');
      const overlay=document.getElementById('navOverlay');
      const close=document.getElementById('navClose');
      const toggleNav=(open)=>{overlay.classList.toggle('open',open);document.body.classList.toggle('no-scroll',open);};
      burger?.addEventListener('click',()=>toggleNav(!overlay.classList.contains('open')));
      close?.addEventListener('click',()=>toggleNav(false));
      overlay?.addEventListener('click',(e)=>{if(e.target===overlay)toggleNav(false);});

      /* Scroll nav */
      const nav=document.getElementById('mainNav');
      window.addEventListener('scroll',()=>{nav.classList.toggle('v3-nav--scrolled',window.scrollY>40);},{passive:true});

      /* Fade animations */
      const observer=new IntersectionObserver((entries)=>{entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add('visible');observer.unobserve(entry.target);}});},{threshold:0.08});
      document.querySelectorAll('.anim-fade-up,.anim-fade').forEach(el=>observer.observe(el));

      /* Exit intent modal */
      let exitShown=false;
      document.addEventListener('mouseleave',(e)=>{if(e.clientY<0&&!exitShown&&!sessionStorage.getItem('_exitShown')){document.getElementById('exitModal').style.display='flex';exitShown=true;sessionStorage.setItem('_exitShown','1');}});

      /* Sticky bar on mobile */
      if(window.innerWidth<=768){document.getElementById('stickyBar').style.display='flex';}
    }

    loadContent();
  </script>
</body>
</html>
