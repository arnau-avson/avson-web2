  <style>
    .loader {
      text-align: center;
      padding: 100px 20px;
      font-family: 'Inter', sans-serif;
      color: #1A2744;
    }

    /* Estilos del mockup de Praesys (se mantienen igual que en el original) */
    .praesys-mockup {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(4px);
      padding: 20px;
    }

    .mockup-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .mockup-dot {
      width: 10px;
      height: 10px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.3);
    }

    .mockup-dot:first-child {
      background: #FF5F57;
    }

    .mockup-dot:nth-child(2) {
      background: #FEBC2E;
    }

    .mockup-dot:nth-child(3) {
      background: #28C840;
    }

    .mockup-title {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-left: 8px;
    }

    .mockup-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .mockup-block {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 14px;
    }

    .mockup-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.35);
      display: block;
      margin-bottom: 8px;
    }

    .mockup-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      color: var(--gold);
      display: inline-block;
      margin-bottom: 6px;
    }

    .mockup-bar-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }

    .mockup-bar-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 4px;
    }

    .mockup-bar-fill--green {
      background: #2A7D4F;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      margin-top: 48px;
    }

    .feature-item {
      background: var(--white);
      padding: 32px;
      border: 1px solid var(--border);
      transition: all 0.25s;
    }

    .feature-item__number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 20px;
    }

    .feature-item__title {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 12px;
    }

    .feature-item__desc {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      margin-top: 48px;
    }

    .pricing-card {
      background: var(--white);
      border: 1px solid var(--border);
      padding: 40px 32px;
      transition: all 0.25s;
    }

    .pricing-card--featured {
      background: var(--navy);
      color: #fff;
      border-color: var(--gold);
      position: relative;
    }

    .pricing-card__tier {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }

    .pricing-card__name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 24px;
    }

    .pricing-card--featured .pricing-card__name {
      color: #fff;
    }

    .pricing-card__desc {
      font-size: 14px;
      line-height: 1.65;
      margin-bottom: 28px;
      color: var(--text-muted);
    }

    .grid-7-5 {
      display: grid;
      grid-template-columns: 7fr 5fr;
      gap: 60px;
      align-items: center;
    }

    @media (max-width: 860px) {
      .grid-7-5 {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .features-grid,
      .pricing-grid {
        grid-template-columns: 1fr;
      }

      .mockup-row {
        grid-template-columns: 1fr;
      }
    }

    .lang-switcher {
      position: relative;
      margin-left: 20px;
    }

    .lang-switcher__btn {
      background: none;
      border: none;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--navy);
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 40px;
      transition: background 0.2s;
    }

    .lang-switcher__btn:hover {
      background: rgba(0, 0, 0, 0.04);
    }

    .lang-switcher__dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
      min-width: 180px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: all 0.2s;
      z-index: 100;
    }

    .lang-switcher.open .lang-switcher__dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .lang-switcher__item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text-body);
      transition: background 0.2s;
    }

    .lang-switcher__item:hover {
      background: var(--pearl);
    }

    .lang-switcher__item--active {
      background: var(--pearl);
      color: var(--navy);
      font-weight: 500;
    }

    .lang-switcher__item-flag {
      font-size: 16px;
    }

    .lang-switcher__item-tag {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
    }

    @media (max-width: 860px) {
      .lang-switcher {
        display: none;
      }
    }

    .v3-nav__links {
      display: flex;
      align-items: center;
      gap: 28px;
      margin: 0;
    }

    @media (max-width: 860px) {
      .v3-nav__links {
        display: none;
      }
    }
  </style>
</head>

  <script>
    function toggleLang() {
      document.getElementById('langSwitcher').classList.toggle('open');
    }
    document.addEventListener('click', (e) => {
      const ls = document.getElementById('langSwitcher');
      if (ls && !ls.contains(e.target)) ls.classList.remove('open');
    });

    async function loadContent() {
      try {
        const response = await fetch('assets/palabras.json');
        const data = await response.json();
        const lang = "es";
        const pageData = data[lang]?.praesys;
        if (!pageData) throw new Error(`No se encontró el idioma "${lang}" o la clave "praesys"`);
        const t = pageData;

        // Meta tags
        document.title = t.meta.title;
        document.querySelector('meta[name="description"]').setAttribute('content', t.meta.description);
        document.querySelector('meta[name="keywords"]').setAttribute('content', t.meta.keywords);
        document.querySelector('meta[property="og:title"]').setAttribute('content', t.meta.ogTitle);
        document.querySelector('meta[property="og:description"]').setAttribute('content', t.meta.ogDescription);
        document.querySelector('meta[name="twitter:title"]').setAttribute('content', t.meta.twitterTitle);
        document.querySelector('meta[name="twitter:description"]').setAttribute('content', t.meta.twitterDescription);

        // Top bar
        document.getElementById('topBar').innerHTML = `🔒 <strong>${t.topBar.text}</strong> &nbsp;·&nbsp; ${t.topBar.extra} &nbsp;·&nbsp; <a href="contacto.html" style="color:#C9A84C;text-decoration:none;font-weight:500">${t.topBar.cta}</a>`;

        // Nav
        const navLinks = document.getElementById('navLinks');
        navLinks.innerHTML = `
      <li><a href="ens.html">${t.nav.links.ens}</a></li>
      <li><a href="ens-express.html" class="nav-express">${t.nav.links.ensExpress}</a></li>
      <li><a href="iso22301.html">${t.nav.links.iso22301}</a></li>
      <li><a href="iso27001.html">${t.nav.links.iso27001}</a></li>
      <li><a href="otras.html">${t.nav.links.otras}</a></li>
    `;
        document.getElementById('navCta').innerHTML = t.nav.cta;
        document.getElementById('navOverlayLinks').innerHTML = `
      <a href="ens.html">${t.nav.links.ens}</a>
      <a href="ens-express.html">${t.nav.links.ensExpress}</a>
      <a href="iso22301.html">${t.nav.links.iso22301}</a>
      <a href="iso27001.html">${t.nav.links.iso27001}</a>
      <a href="otras.html">${t.nav.links.otras}</a>
    `;
        document.getElementById('navOverlayCta').innerHTML = t.nav.cta;

        // Cookie banner
        const cookieBanner = document.getElementById('cookieBanner');
        document.getElementById('cookieText').innerHTML = `${t.cookieBanner.text} <a href="${t.cookieBanner.linkUrl}" style="color:var(--navy)">${t.cookieBanner.linkText}</a>`;
        document.getElementById('cookieAccept').innerHTML = t.cookieBanner.accept;
        document.getElementById('cookieDecline').innerHTML = t.cookieBanner.decline;
        if (!localStorage.getItem('cookieAccepted')) {
          setTimeout(() => cookieBanner.style.display = 'flex', 1200);
        }
        document.getElementById('cookieAccept').onclick = () => { localStorage.setItem('cookieAccepted', 'true'); cookieBanner.style.display = 'none'; };
        document.getElementById('cookieDecline').onclick = () => { localStorage.setItem('cookieAccepted', 'false'); cookieBanner.style.display = 'none'; };

        // Floating elements
        document.getElementById('floatingCta').innerHTML = t.floatingCta;
        document.getElementById('whatsappLink').href = t.whatsapp.url;
        document.getElementById('stickyBarText').innerHTML = t.stickyBar.text;
        document.getElementById('stickyBarCta').innerHTML = t.stickyBar.cta;
        document.getElementById('exitModalLabel').innerHTML = t.exitModal.title;
        document.getElementById('exitModalTitle').innerHTML = t.exitModal.question;
        document.getElementById('exitModalDesc').innerHTML = t.exitModal.description;
        document.getElementById('exitModalCta').innerHTML = t.exitModal.cta;
        document.getElementById('exitModalDismiss').innerHTML = t.exitModal.dismiss;
        if (window.innerWidth <= 768) document.getElementById('stickyBar').style.display = 'flex';

        // Hero
        const mockupRows = t.hero.mockup.rows.map(row => {
          let fillClass = '';
          let colorStyle = '';
          if (row.color === 'gold') colorStyle = 'background:var(--gold)';
          else if (row.color === 'green') colorStyle = 'background:#2A7D4F';
          else if (row.color === 'blue') colorStyle = 'background:#6B7FD4';
          else colorStyle = 'background:rgba(255,255,255,0.15)';
          return `<div class="mockup-block"><span class="mockup-label">${row.label}</span><span class="mockup-value" style="${row.color === 'gray' ? 'color:rgba(255,255,255,0.7);font-size:22px' : ''}">${row.value}</span><div class="mockup-bar-track"><div class="mockup-bar-fill" style="width:${row.value.replace('%', '')}%; ${colorStyle}"></div></div></div>`;
        }).join('');
        const alertsHTML = t.hero.mockup.alerts.map(alert => `<div style="font-size:11px;color:${alert.includes('Política') ? 'var(--gold)' : 'rgba(255,255,255,0.4)'};padding:6px 10px;background:${alert.includes('Política') ? 'rgba(201,168,76,0.1)' : 'rgba(255,255,255,0.04)'};border-left:2px solid ${alert.includes('Política') ? 'var(--gold)' : 'rgba(255,255,255,0.1)'}">${alert}</div>`).join('');
        const cardsHTML = t.hero.mockup.cards.map(card => `<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);padding:12px;text-align:center"><div style="font-size:18px;font-weight:600;color:${card.number === '98%' ? 'var(--gold)' : card.number === '12' ? '#2A7D4F' : 'rgba(255,255,255,0.7)'};font-family:'Cormorant Garamond',serif">${card.number}</div><div style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-top:2px">${card.label}</div></div>`).join('');
        const mockupHTML = `

          <div><div class="footer__col-title">${t.footer.newsletter.title}</div><p class="footer__newsletter-text">${t.footer.newsletter.text}</p><div class="footer__newsletter-form"><input type="email" class="footer__newsletter-input" placeholder="${t.footer.newsletter.placeholder}"><button class="footer__newsletter-btn">→</button></div></div>

        <div class="footer__bottom"><span class="footer__copy">${t.footer.bottom.copyright}</span><ul class="footer__legal">${t.footer.bottom.links.map(l => `<li><a href="${l.url}">${l.text}</a></li>`).join('')}</ul></div>

    `;

        document.getElementById('app').innerHTML = heroHTML + whatIsHTML + featuresHTML + frameworksHTML + pricingHTML + demoHTML;
        document.getElementById('footer').innerHTML = footerHTML;

        initInteractions();
      } catch (error) {
        console.error('Error cargando el JSON:', error);
        document.getElementById('app').innerHTML = '<div class="loader">Error al cargar el contenido. Por favor, recarga la página.</div>';
      }
    }

    function initInteractions() {
      const burger = document.getElementById('navBurger');
      const overlay = document.getElementById('navOverlay');
      const close = document.getElementById('navClose');
      const toggleNav = (open) => {
        overlay.classList.toggle('open', open);
        document.body.classList.toggle('no-scroll', open);
      };
      burger?.addEventListener('click', () => toggleNav(!overlay.classList.contains('open')));
      close?.addEventListener('click', () => toggleNav(false));
      overlay?.addEventListener('click', (e) => { if (e.target === overlay) toggleNav(false); });

      const nav = document.getElementById('mainNav');
      window.addEventListener('scroll', () => {
        nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40);
      });

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
        });
      }, { threshold: 0.12 });
      document.querySelectorAll('.anim-fade-up').forEach(el => observer.observe(el));

      let exitShown = false;
      document.addEventListener('mouseleave', (e) => {
        if (e.clientY < 0 && !exitShown && !sessionStorage.getItem('_exitShown')) {
          document.getElementById('exitModal').style.display = 'flex';
          exitShown = true;
          sessionStorage.setItem('_exitShown', '1');
        }
      });
    }

    loadContent();
  </script>
