<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.svg">
  <meta name="theme-color" content="#1A2744">
  <title>Cargando...</title>
  <meta name="description" content="">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://avson.eu/404.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="avson-leads.js" defer></script>
  <style>
    .loader {
      text-align: center;
      padding: 100px 20px;
      font-family: 'Inter', sans-serif;
      color: #1A2744;
    }

    /* ===== 404 PAGE SPECIFIC STYLES ===== */

    /* HERO 404 */
    .error-hero {
      padding: 120px 0 80px;
      background: var(--pearl, #F5F3EE);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .error-hero__number {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(100px, 20vw, 200px);
      font-weight: 300;
      color: var(--navy, #1A2744);
      opacity: 0.08;
      line-height: 1;
      margin: 0;
      user-select: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      pointer-events: none;
    }
    .error-hero__content {
      position: relative;
      z-index: 1;
      padding: 40px 24px;
    }
    .error-hero__icon {
      width: 72px;
      height: 72px;
      background: rgba(201,168,76,0.10);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }
    .error-hero h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 600;
      color: var(--navy, #1A2744);
      margin: 0 0 20px;
      line-height: 1.2;
    }
    .error-hero__desc {
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      color: #5a5a5a;
      max-width: 540px;
      margin: 0 auto 48px;
      line-height: 1.7;
    }

    /* SEARCH BAR */
    .error-search {
      display: flex;
      gap: 0;
      max-width: 480px;
      margin: 0 auto 16px;
      box-shadow: 0 2px 20px rgba(26,39,68,0.10);
      border-radius: 3px;
      overflow: hidden;
    }
    .error-search input[type="text"] {
      flex: 1;
      border: 1.5px solid var(--border, #E2DDD6);
      border-right: none;
      border-radius: 3px 0 0 3px;
      padding: 14px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: #333;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .error-search input[type="text"]:focus {
      border-color: var(--gold, #C9A84C);
    }
    .error-search button {
      background: var(--navy, #1A2744);
      color: #fff;
      border: none;
      padding: 14px 22px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      border-radius: 0 3px 3px 0;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .error-search button:hover {
      background: #0f1a33;
    }
    .error-search__hint {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: #aaa;
      text-align: center;
    }

    /* NAVIGATION CARDS */
    .error-nav {
      padding: 72px 0 80px;
      background: #fff;
    }
    .error-nav__title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      font-weight: 600;
      color: var(--navy, #1A2744);
      text-align: center;
      margin: 0 0 40px;
    }
    .error-nav__grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      max-width: 760px;
      margin: 0 auto;
    }
    .error-nav-card {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      padding: 28px 24px;
      border: 1px solid var(--border, #E2DDD6);
      border-radius: 4px;
      text-decoration: none;
      background: var(--pearl, #F5F3EE);
      transition: box-shadow 0.2s, border-color 0.2s, transform 0.2s;
    }
    .error-nav-card:hover {
      box-shadow: 0 6px 28px rgba(26,39,68,0.10);
      border-color: var(--gold, #C9A84C);
      transform: translateY(-2px);
    }
    .error-nav-card__icon {
      width: 44px;
      height: 44px;
      min-width: 44px;
      background: rgba(26,39,68,0.07);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error-nav-card__body {}
    .error-nav-card__label {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--gold, #C9A84C);
      margin-bottom: 4px;
    }
    .error-nav-card__title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--navy, #1A2744);
      margin: 0 0 6px;
      line-height: 1.3;
    }
    .error-nav-card__desc {
      font-family: 'Inter', sans-serif;
      font-size: 0.83rem;
      color: #6a6a6a;
      line-height: 1.55;
      margin: 0;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .error-hero { padding: 100px 0 60px; }
      .error-hero__content { padding: 40px 20px; }
      .error-nav { padding: 56px 20px 60px; }
      .error-nav__grid {
        grid-template-columns: 1fr;
      }
      .error-search {
        flex-direction: column;
        box-shadow: none;
        border-radius: 0;
        overflow: visible;
      }
      .error-search input[type="text"] {
        border-right: 1.5px solid var(--border, #E2DDD6);
        border-radius: 3px;
        margin-bottom: 8px;
      }
      .error-search button {
        border-radius: 3px;
        padding: 14px;
      }
    }
  </style>
  <!-- Microsoft Clarity -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y)})(window,document,"clarity","script","CLARITY_ID");

</head>
<body>

  <div style="background:#1A2744;color:rgba(255,255,255,0.85);font-family:'Inter',sans-serif;font-size:12px;font-weight:400;letter-spacing:0.04em;text-align:center;padding:10px 40px;position:relative;z-index:200" id="announceBar"></div>

  <nav class="v3-nav" id="mainNav">
    <div class="v3-nav__inner">
      <a href="index.html" class="v3-nav__logo" id="navLogo">AVSON<span>·</span>GRC</a>
      <ul class="v3-nav__links" id="navLinks"></ul>
      <a href="contacto.html" class="v3-btn v3-btn--gold v3-btn--sm v3-nav__cta" id="navCta"></a>
      <button class="v3-nav__burger" id="navBurger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </nav>
  <div class="v3-nav__overlay" id="navOverlay">
    <button class="v3-nav__overlay-close" id="navClose">&#10005;</button>
    <div id="navOverlayLinks"></div>
    <a href="contacto.html" class="v3-btn v3-btn--gold" id="navOverlayCta"></a>
  </div>

  <main id="app"></main>
  <footer class="footer" id="footer"></footer>

  <a href="contacto.html" class="floating-cta" id="floatingCta"></a>

  <div id="exitModal" style="display:none;position:fixed;inset:0;background:rgba(26,39,68,0.72);z-index:9999;align-items:center;justify-content:center;padding:20px">
    <div style="background:#fff;max-width:520px;width:100%;padding:48px 40px;position:relative">
      <button onclick="this.parentElement.parentElement.style.display='none'" style="position:absolute;top:16px;right:20px;font-size:22px;color:#7A8499;cursor:pointer;background:none;border:none;font-family:inherit">&times;</button>
      <span style="font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:#C9A84C;display:block;margin-bottom:16px" id="exitModalLabel"></span>
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:#1A2744;line-height:1.2;margin-bottom:16px" id="exitModalTitle"></h2>
      <p style="font-family:'Inter',sans-serif;font-size:14px;color:#7A8499;line-height:1.65;margin-bottom:28px" id="exitModalDesc"></p>
      <a href="contacto.html" id="exitModalCta" style="display:block;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#1A2744;border:1px solid #C9A84C;padding:14px 28px;text-align:center;text-decoration:none"></a>
      <p style="font-family:'Inter',sans-serif;font-size:12px;color:#7A8499;text-align:center;margin-top:12px;cursor:pointer;text-decoration:underline" onclick="document.getElementById('exitModal').style.display='none'" id="exitModalDismiss"></p>
    </div>
  </div>

  <div id="stickyBar" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;background:#1A2744;border-top:1px solid rgba(255,255,255,0.08);padding:14px 20px;justify-content:space-between;gap:12px;align-items:center">
    <span style="font-family:'Inter',sans-serif;font-size:13px;color:rgba(255,255,255,0.7)" id="stickyBarText"></span>
    <a href="contacto.html" style="font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#fff;border:1px solid #fff;padding:10px 20px;text-decoration:none;white-space:nowrap" id="stickyBarCta"></a>
  </div>

  <a href="https://wa.me/34648414863?text=Hola%2C%20me%20interesa%20información%20sobre%20consultoría%20GRC%20y%20certificaciones%20ENS%2FISO" class="wa-float" target="_blank" rel="noopener" aria-label="Contactar por WhatsApp">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
  </a>

  <script>
    async function loadContent() {
      try {
        const response = await fetch('assets/palabras.json');
        const data = await response.json();
        const lang = "es";
        const pageData = data[lang]?.notFound;
        if (!pageData) throw new Error(`No se encontro el idioma "${lang}" o la clave "notFound"`);
        const t = pageData;

        // Actualizar meta tags
        document.title = t.meta.title;
        document.querySelector('meta[name="description"]').setAttribute('content', t.meta.description);

        // Announce bar
        document.getElementById('announceBar').innerHTML = `🔒 <strong>${t.announceBar.text}</strong> &nbsp;&middot;&nbsp; <a href="contacto.html" style="color:#C9A84C;text-decoration:none;font-weight:500">${t.announceBar.cta}</a>`;

        // Nav
        const navLinks = document.getElementById('navLinks');
        navLinks.innerHTML = `
          <li><a href="ens.html">${t.nav.links.ens}</a></li>
          <li><a href="ens-express.html" class="nav-express">${t.nav.links.ensExpress}</a></li>
          <li><a href="iso22301.html">${t.nav.links.iso22301}</a></li>
          <li><a href="iso27001.html">${t.nav.links.iso27001}</a></li>
          <li><a href="otras.html">${t.nav.links.otras}</a></li>
        `;
        document.getElementById('navCta').innerHTML = t.nav.cta;
        document.getElementById('navOverlayLinks').innerHTML = `
          <a href="ens.html">${t.nav.links.ens}</a>
          <a href="ens-express.html">${t.nav.links.ensExpress}</a>
          <a href="iso22301.html">${t.nav.links.iso22301}</a>
          <a href="iso27001.html">${t.nav.links.iso27001}</a>
          <a href="otras.html">${t.nav.links.otras}</a>
        `;
        document.getElementById('navOverlayCta').innerHTML = t.nav.cta;

        // Hero 404
        const heroHTML = `
          <section class="error-hero">
            <p class="error-hero__number" aria-hidden="true">${t.hero.bigNumber}</p>
            <div class="error-hero__content">
              <div class="error-hero__icon anim-fade-up">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
              </div>
              <h1 class="anim-fade-up">${t.hero.title}</h1>
              <p class="error-hero__desc anim-fade-up">${t.hero.description}</p>

              <form action="https://www.google.com/search" method="get" class="error-search anim-fade-up">
                <input type="hidden" name="sitesearch" value="avson.eu" />
                <input type="text" name="q" placeholder="${t.hero.search.placeholder}" autocomplete="off" />
                <button type="submit">${t.hero.search.button}</button>
              </form>
              <p class="error-search__hint anim-fade-up">${t.hero.search.hint}</p>
            </div>
          </section>
        `;

        // Navigation cards
        const cardsHTML = t.navCards.items.map(card => `
          <a href="${card.href}" class="error-nav-card anim-fade-up">
            <div class="error-nav-card__icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1A2744" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${card.iconPath}</svg>
            </div>
            <div class="error-nav-card__body">
              <p class="error-nav-card__label">${card.label}</p>
              <h3 class="error-nav-card__title">${card.title}</h3>
              <p class="error-nav-card__desc">${card.description}</p>
            </div>
          </a>
        `).join('');

        const navCardsSection = `
          <section class="error-nav">
            <div class="container" style="padding:0 24px;">
              <h2 class="error-nav__title anim-fade-up">${t.navCards.title}</h2>
              <div class="error-nav__grid">${cardsHTML}</div>
            </div>
          </section>
        `;

        // Footer
        const footerHTML = `
          <div class="container">
            <div class="footer__grid">
              <div class="footer__col footer__col--wide">
                <div class="nav__logo" style="margin-bottom:16px">${t.footer.logo}</div>
                <p style="color:rgba(255,255,255,0.55);font-family:var(--font-sans);font-size:14px;line-height:1.7;max-width:280px">${t.footer.description}</p>
                <p style="color:rgba(255,255,255,0.4);font-family:var(--font-sans);font-size:13px;margin-top:16px">${t.footer.contact.email} &middot; ${t.footer.contact.phone}</p>
                <a href="https://www.linkedin.com/avson" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-family:var(--font-sans);font-size:12px;color:var(--gold);letter-spacing:0.04em">${t.footer.contact.linkedin}</a>
              </div>
              <div class="footer__col"><h4 class="footer__heading">${t.footer.certifications.title}</h4><ul class="footer__links">${t.footer.certifications.items.map(i => `<li><a href="${i === 'ENS' ? 'ens.html' : i === 'ENS Express' ? 'ens-express.html' : i === 'ISO 27001' ? 'iso27001.html' : i === 'ISO 22301' ? 'iso22301.html' : i === 'DORA' ? 'dora.html' : i === 'NIS2' ? 'nis2.html' : i === 'TISAX' ? 'tisax.html' : '#'}">${i}</a></li>`).join('')}</ul></div>
              <div class="footer__col"><h4 class="footer__heading">${t.footer.company.title}</h4><ul class="footer__links">${t.footer.company.items.map(i => `<li><a href="${i === 'Equipo' ? 'equipo.html' : i === 'Packs' ? 'packs.html' : i === 'Webinars' ? 'webinars.html' : i === 'Contacto' ? 'contacto.html' : '#'}">${i}</a></li>`).join('')}</ul></div>
              <div class="footer__col"><h4 class="footer__heading">${t.footer.legal.title}</h4><ul class="footer__links">${t.footer.legal.items.map(i => `<li><a href="${i.href}">${i.text}</a></li>`).join('')}</ul></div>
            </div>
            <div class="footer__bottom"><p>${t.footer.bottom.copyright}</p><div>${t.footer.bottom.links.map(l => `<a href="#">${l}</a>`).join(' &middot; ')}</div></div>
          </div>
        `;

        document.getElementById('app').innerHTML = heroHTML + navCardsSection;
        document.getElementById('footer').innerHTML = footerHTML;

        // Floating elements
        document.getElementById('floatingCta').innerHTML = t.floatingCta;
        document.getElementById('exitModalLabel').innerHTML = t.exitModal.title;
        document.getElementById('exitModalTitle').innerHTML = t.exitModal.question;
        document.getElementById('exitModalDesc').innerHTML = t.exitModal.description;
        document.getElementById('exitModalCta').innerHTML = t.exitModal.cta;
        document.getElementById('exitModalDismiss').innerHTML = t.exitModal.dismiss;
        document.getElementById('stickyBarText').innerHTML = t.stickyBar.text;
        document.getElementById('stickyBarCta').innerHTML = t.stickyBar.cta;

        initInteractions();
      } catch (error) {
        console.error('Error cargando el JSON:', error);
        document.getElementById('app').innerHTML = '<div class="loader">Error al cargar el contenido. Por favor, recarga la pagina.</div>';
      }
    }

    function initInteractions() {
      const burger = document.getElementById('navBurger');
      const overlay = document.getElementById('navOverlay');
      const close = document.getElementById('navClose');
      const toggleNav = (open) => {
        overlay.classList.toggle('open', open);
        document.body.classList.toggle('no-scroll', open);
      };
      burger?.addEventListener('click', () => toggleNav(!overlay.classList.contains('open')));
      close?.addEventListener('click', () => toggleNav(false));
      overlay?.addEventListener('click', (e) => { if (e.target === overlay) toggleNav(false); });

      const nav = document.getElementById('mainNav');
      window.addEventListener('scroll', () => {
        nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40);
      });

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add('visible');
        });
      }, { threshold: 0.08 });
      document.querySelectorAll('.anim-fade-up').forEach(el => observer.observe(el));

      let exitShown = false;
      document.addEventListener('mouseleave', (e) => {
        if (e.clientY < 0 && !exitShown && !sessionStorage.getItem('_exitShown')) {
          document.getElementById('exitModal').style.display = 'flex';
          exitShown = true;
          sessionStorage.setItem('_exitShown', '1');
        }
      });

      if (window.innerWidth <= 768) {
        document.getElementById('stickyBar').style.display = 'flex';
      }
    }

    loadContent();
  </script>
</body>
</html>
