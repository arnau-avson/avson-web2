      <span
        style="font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:#C9A84C;display:block;margin-bottom:16px"

      <h2
        style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:#1A2744;line-height:1.2;margin-bottom:16px"

      <p style="font-family:'Inter',sans-serif;font-size:14px;color:#7A8499;line-height:1.65;margin-bottom:28px"
        id="exitModalDesc"></p>
      <a href="contacto.html" id="exitModalCta"
        style="display:block;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#1A2744;border:1px solid #C9A84C;padding:14px 28px;text-align:center;text-decoration:none"></a>
      <p style="font-family:'Inter',sans-serif;font-size:12px;color:#7A8499;text-align:center;margin-top:12px;cursor:pointer;text-decoration:underline"

    <span style="font-family:'Inter',sans-serif;font-size:13px;color:rgba(255,255,255,0.7)" id="stickyBarText"></span>

      style="font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#fff;border:1px solid #fff;padding:10px 20px;text-decoration:none;white-space:nowrap"
      id="stickyBarCta"></a>

  <a href="https://wa.me/34648414863?text=Hola%2C%20me%20interesa%20información%20sobre%20consultoría%20GRC%20y%20certificaciones%20ENS%2FISO"

    <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
      <path
        d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />

  <script>
    async function loadContent() {
      try {
        const response = await fetch('assets/palabras.json');
        const data = await response.json();
        // Se espera data = { "es": { "webinars": { ... } } }
        const lang = "es";
        const pageData = data[lang]?.webinars;
        if (!pageData) throw new Error(`No se encontró el idioma "${lang}" o la clave "webinars"`);
        const t = pageData;

        // Actualizar meta tags
        document.title = t.meta.title;
        document.querySelector('meta[name="description"]').setAttribute('content', t.meta.description);
        document.querySelector('meta[name="keywords"]').setAttribute('content', t.meta.keywords);
        document.querySelector('meta[property="og:title"]').setAttribute('content', t.meta.ogTitle);
        document.querySelector('meta[property="og:description"]').setAttribute('content', t.meta.ogDescription);
        document.querySelector('meta[name="twitter:title"]').setAttribute('content', t.meta.twitterTitle);
        document.querySelector('meta[name="twitter:description"]').setAttribute('content', t.meta.twitterDescription);

        // Announce bar
        document.getElementById('announceBar').innerHTML = `🔒 <strong>${t.announceBar.text}</strong> &nbsp;·&nbsp; <a href="contacto.html" style="color:#C9A84C;text-decoration:none;font-weight:500">${t.announceBar.cta}</a>`;

        // Nav
        const navLinks = document.getElementById('navLinks');
        navLinks.innerHTML = `
      <li><a href="ens.html">${t.nav.links.ens}</a></li>
      <li><a href="ens-express.html" class="nav-express">${t.nav.links.ensExpress}</a></li>
      <li><a href="iso22301.html">${t.nav.links.iso22301}</a></li>
      <li><a href="iso27001.html">${t.nav.links.iso27001}</a></li>
      <li><a href="otras.html">${t.nav.links.otras}</a></li>
    `;
        document.getElementById('navCta').innerHTML = t.nav.cta;
        document.getElementById('navOverlayLinks').innerHTML = `
      <a href="ens.html">${t.nav.links.ens}</a>
      <a href="ens-express.html">${t.nav.links.ensExpress}</a>
      <a href="iso22301.html">${t.nav.links.iso22301}</a>
      <a href="iso27001.html">${t.nav.links.iso27001}</a>
      <a href="otras.html">${t.nav.links.otras}</a>
    `;
        document.getElementById('navOverlayCta').innerHTML = t.nav.cta;

        // Hero
        const heroHTML = `
      <section class="section section--pearl" style="padding-top:160px;padding-bottom:100px">
        <div class="container">
          <span class="label-tag">${t.hero.label}</span>
          <div class="gold-line"></div>
          <h1 style="font-family:var(--font-serif);font-size:clamp(48px,6vw,80px);font-weight:300;color:var(--navy);line-height:1.1;margin:0 0 32px;max-width:760px">${t.hero.title}</h1>
          <p class="body-large" style="max-width:640px;margin-bottom:40px">${t.hero.description}</p>
          <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:52px">
            <a href="#proximos" class="btn-primary">${t.hero.buttons.primary}</a>
            <a href="#grabaciones" class="btn-text">${t.hero.buttons.secondary}</a>
          </div>
          <div style="display:flex;gap:40px;flex-wrap:wrap">
            ${t.hero.stats.map(stat => `<div style="display:flex;flex-direction:column"><span style="font-family:var(--font-serif);font-size:36px;font-weight:300;color:var(--navy)">${stat.value}</span><span style="font-family:var(--font-sans);font-size:11px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase">${stat.label}</span></div>`).join('')}
          </div>
        </div>
      </section>
    `;

        // Próximos webinars
        const upcomingWebinars = t.upcoming.webinars.map(web => `
      <div class="anim-fade-up" style="display:grid;grid-template-columns:120px 1fr auto;gap:0;background:var(--pearl);overflow:hidden">
        <div style="background:var(--navy);padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">
          <p style="font-family:var(--font-serif);font-size:36px;font-weight:300;color:var(--gold);line-height:1;margin-bottom:4px">${web.date.day}</p>
          <p style="font-family:var(--font-sans);font-size:11px;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.06em">${web.date.month}</p>
        </div>
        <div style="padding:28px 32px">
          <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
            ${web.tags.map(tag => `<span style="font-family:var(--font-sans);font-size:10px;font-weight:600;color:#fff;background:var(--navy);padding:3px 10px;text-transform:uppercase;letter-spacing:0.06em">${tag}</span>`).join('')}
          </div>
          <h3 style="font-family:var(--font-serif);font-size:22px;font-weight:400;color:var(--navy);margin-bottom:8px">${web.title}</h3>
          <p style="font-family:var(--font-sans);font-size:13px;color:var(--text-body);line-height:1.6;margin-bottom:12px">${web.description}</p>
          <p style="font-family:var(--font-sans);font-size:12px;color:var(--text-muted)">Impartido por <strong style="color:var(--navy)">${web.instructor}</strong></p>
        </div>
        <div style="padding:28px 24px;display:flex;align-items:center">
          <a href="contacto.html" class="btn-primary" style="font-size:12px;white-space:nowrap">${web.cta}</a>
        </div>
      </div>
    `).join('');

        const upcomingSection = `
      <section class="section section--white" id="proximos">
        <div class="container">
          <span class="label-tag">${t.upcoming.label}</span>
          <div class="gold-line"></div>
          <h2 class="section-title" style="max-width:480px">${t.upcoming.title}</h2>
          <div style="background:var(--navy);padding:40px;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background-color:rgba(255,255,255,0.08);margin-bottom:48px;margin-top:40px">
            ${t.upcoming.badges.map(b => `<div style="background:var(--navy);padding:28px 24px;text-align:center"><div style="font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;color:#C9A84C">${b.number || b.text}</div><div style="font-family:'Inter',sans-serif;font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.08em;text-transform:uppercase;margin-top:6px">${b.subtext || b.text}</div></div>`).join('')}
          </div>
          <div style="display:flex;flex-direction:column;gap:24px;margin-top:0">${upcomingWebinars}</div>
          <div style="background:var(--pearl);border:1px solid var(--border);border-left:3px solid #C9A84C;padding:32px 36px;display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap;margin-top:48px">
            <span style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--navy);line-height:1.3;flex:1;min-width:200px">${t.upcoming.consultationBox.text}</span>
            <a href="contacto.html" class="btn-primary">${t.upcoming.consultationBox.cta}</a>
          </div>
        </div>
      </section>
    `;

        // Grabaciones
        const tableRows = t.recordings.table.rows.map(row => `
      <tr style="border-bottom:1px solid var(--border)">
        <td style="padding:16px 20px"><span style="font-weight:500;color:var(--navy);display:block">${row.title}</span><span style="color:var(--text-muted);font-size:12px">${row.subtitle}</span></td>
        <td style="padding:16px 20px;color:var(--text-muted)">${row.duration}</td>
        <td style="padding:16px 20px;color:var(--text-muted)">${row.views}</td>
        <td style="padding:16px 20px"><a href="contacto.html" class="btn-text" style="font-size:12px">${row.cta}</a></td>
      </tr>
    `).join('');

        const recordingsSection = `
      <section class="section section--pearl" id="grabaciones">
        <div class="container">
          <span class="label-tag">${t.recordings.label}</span>
          <div class="gold-line"></div>
          <h2 class="section-title" style="max-width:480px">${t.recordings.title}</h2>
          <p style="font-family:var(--font-sans);font-size:16px;line-height:1.8;color:var(--text-body);max-width:640px;margin-bottom:52px">${t.recordings.description}</p>
          <div style="background:var(--white);overflow:auto">
            <table style="width:100%;border-collapse:collapse;font-family:var(--font-sans);font-size:14px">
              <thead><tr style="border-bottom:2px solid var(--border)">${t.recordings.table.headers.map(h => `<th style="padding:14px 20px;text-align:left;font-weight:600;color:var(--navy);font-size:11px;letter-spacing:0.06em;text-transform:uppercase">${h}</th>`).join('')}</tr></thead>
              <tbody>${tableRows}</tbody>
            </table>
          </div>
        </div>
      </section>
    `;

        // Newsletter
        const newsletterHTML = `
      <section class="section section--navy" id="newsletter">
        <div class="container">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center">
            <div>
              <span class="label-tag" style="border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6)">${t.newsletter.label}</span>
              <div class="gold-line"></div>
              <h2 style="font-family:var(--font-serif);font-size:clamp(32px,4vw,50px);font-weight:300;color:#fff;line-height:1.2;margin:32px 0 20px">${t.newsletter.title}</h2>
              <p style="font-family:var(--font-sans);font-size:16px;color:rgba(255,255,255,0.65);line-height:1.7">${t.newsletter.description}</p>
            </div>
            <div>
              <div style="background:rgba(255,255,255,0.06);padding:40px;border:1px solid rgba(255,255,255,0.12)">
                <h3 style="font-family:var(--font-sans);font-size:14px;font-weight:600;color:#fff;margin-bottom:24px">${t.newsletter.form.title}</h3>
                <div style="display:flex;flex-direction:column;gap:16px">
                  <div><label style="font-family:var(--font-sans);font-size:12px;color:rgba(255,255,255,0.6);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em">${t.newsletter.form.nameLabel}</label><input type="text" placeholder="${t.newsletter.form.namePlaceholder}" style="width:100%;padding:14px 16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;font-family:var(--font-sans);font-size:14px;outline:none;box-sizing:border-box"></div>
                  <div><label style="font-family:var(--font-sans);font-size:12px;color:rgba(255,255,255,0.6);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em">${t.newsletter.form.emailLabel}</label><input type="email" placeholder="${t.newsletter.form.emailPlaceholder}" style="width:100%;padding:14px 16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;font-family:var(--font-sans);font-size:14px;outline:none;box-sizing:border-box"></div>
                  <div><label style="font-family:var(--font-sans);font-size:12px;color:rgba(255,255,255,0.6);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em">${t.newsletter.form.interestsLabel}</label><div style="display:flex;gap:8px;flex-wrap:wrap">${t.newsletter.form.interests.map(i => `<label style="display:flex;align-items:center;gap:6px;font-family:var(--font-sans);font-size:12px;color:rgba(255,255,255,0.7);cursor:pointer"><input type="checkbox" style="margin:0"> ${i}</label>`).join('')}</div></div>
                  <button onclick="alert('¡Suscripción recibida! Te avisaremos del próximo webinar.')" class="btn-primary" style="border-color:var(--gold);color:#fff;width:100%;justify-content:center;padding:16px">${t.newsletter.form.submitButton}</button>
                  <p style="font-family:var(--font-sans);font-size:11px;color:rgba(255,255,255,0.4);text-align:center">${t.newsletter.form.footnote}</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    `;

        // FAQ
        const faqItems = t.faq.items.map(item => `
      <div class="faq-item">
        <div class="faq-item__question">${item.question}<div class="faq-item__icon">+</div></div>
        <div class="faq-item__answer"><p>${item.answer}</p></div>
      </div>
    `).join('');

        const faqSection = `
      <section class="section section--pearl" id="faq">
        <div class="container" style="max-width:760px">
          <span class="label-tag">${t.faq.label}</span>
          <div class="gold-line"></div>
          <h2 class="section-title" style="max-width:480px">${t.faq.title}</h2>
          <div style="margin-top:48px">${faqItems}</div>
        </div>
      </section>
    `;

        // Final CTA
        const finalCta = `
      <section class="section section--navy">
        <div class="container" style="text-align:center">
          <span class="label-tag" style="border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6)">${t.finalCta.label}</span>
          <div class="gold-line" style="margin:20px auto 0"></div>
          <h2 style="font-family:var(--font-serif);font-size:clamp(36px,4.5vw,58px);font-weight:300;color:#fff;line-height:1.15;margin:32px 0 24px">${t.finalCta.title}</h2>
          <p style="font-family:var(--font-sans);font-size:17px;color:rgba(255,255,255,0.65);max-width:520px;margin:0 auto 40px;line-height:1.7">${t.finalCta.description}</p>
          <a href="contacto.html" class="btn-primary" style="border-color:var(--gold);color:#fff;font-size:15px;padding:18px 36px">${t.finalCta.cta}</a>
        </div>
      </section>
    `;

        // Footer
        const footerHTML = `
      <div class="container">
        <div class="footer__grid">
          <div class="footer__col footer__col--wide">
            <div class="nav__logo" style="margin-bottom:16px">${t.footer.logo}</div>
            <p style="color:rgba(255,255,255,0.55);font-family:var(--font-sans);font-size:14px;line-height:1.7;max-width:280px">${t.footer.description}</p>
            <p style="color:rgba(255,255,255,0.4);font-family:var(--font-sans);font-size:13px;margin-top:16px">${t.footer.contact.email} · ${t.footer.contact.phone}</p>
            <a href="https://www.linkedin.com/avson" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-family:var(--font-sans);font-size:12px;color:var(--gold);letter-spacing:0.04em">${t.footer.contact.linkedin}</a>
          </div>
          <div class="footer__col"><h4 class="footer__heading">${t.footer.certifications.title}</h4><ul class="footer__links">${t.footer.certifications.items.map(i => `<li><a href="${i === 'ENS' ? 'ens.html' : i === '⚡ ENS Express' ? 'ens-express.html' : i === 'ISO 27001' ? 'iso27001.html' : i === 'ISO 22301' ? 'iso22301.html' : i === 'DORA' ? 'dora.html' : i === 'NIS2' ? 'nis2.html' : i === 'TISAX' ? 'tisax.html' : '#'}">${i}</a></li>`).join('')}</ul></div>
          <div class="footer__col"><h4 class="footer__heading">${t.footer.company.title}</h4><ul class="footer__links">${t.footer.company.items.map(i => `<li><a href="${i === 'Equipo' ? 'equipo.html' : i === 'Únete al equipo' ? 'unete.html' : i === 'Packs' ? 'packs.html' : i === 'Webinars' ? 'webinars.html' : i === 'Contacto' ? 'contacto.html' : '#'}">${i}</a></li>`).join('')}</ul></div>
          <div class="footer__col"><h4 class="footer__heading">${t.footer.ctaBox.title}</h4><p style="color:rgba(255,255,255,0.55);font-family:var(--font-sans);font-size:14px;margin-bottom:20px">${t.footer.ctaBox.description}</p><a href="contacto.html" class="btn-primary" style="color:#fff;border-color:var(--gold);font-size:12px">${t.footer.ctaBox.button}</a></div>
        </div>
        <div class="footer__bottom"><p>${t.footer.bottom.copyright}</p><div>${t.footer.bottom.links.map(l => `<a href="#">${l}</a>`).join(' · ')}</div></div>
      </div>
    `;

        document.getElementById('app').innerHTML = heroHTML + upcomingSection + recordingsSection + newsletterHTML + faqSection + finalCta;
        document.getElementById('footer').innerHTML = footerHTML;

        // Elementos sueltos
        document.getElementById('floatingCta').innerHTML = t.floatingCta;
        document.getElementById('exitModalLabel').innerHTML = t.exitModal.title;
        document.getElementById('exitModalTitle').innerHTML = t.exitModal.question;
        document.getElementById('exitModalDesc').innerHTML = t.exitModal.description;
        document.getElementById('exitModalCta').innerHTML = t.exitModal.cta;
        document.getElementById('exitModalDismiss').innerHTML = t.exitModal.dismiss;
        document.getElementById('stickyBarText').innerHTML = t.stickyBar.text;
        document.getElementById('stickyBarCta').innerHTML = t.stickyBar.cta;

        initInteractions();
      } catch (error) {
        console.error('Error cargando el JSON:', error);
        document.getElementById('app').innerHTML = '<div class="loader">Error al cargar el contenido. Por favor, recarga la página.</div>';
      }
    }

    function initInteractions() {
      const burger = document.getElementById('navBurger');
      const overlay = document.getElementById('navOverlay');
      const close = document.getElementById('navClose');
      const toggleNav = (open) => {
        overlay.classList.toggle('open', open);
        document.body.classList.toggle('no-scroll', open);
      };
      burger?.addEventListener('click', () => toggleNav(!overlay.classList.contains('open')));
      close?.addEventListener('click', () => toggleNav(false));
      overlay?.addEventListener('click', (e) => { if (e.target === overlay) toggleNav(false); });

      const nav = document.getElementById('mainNav');
      window.addEventListener('scroll', () => {
        nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40);
      });

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add('visible');
        });
      }, { threshold: 0.08 });
      document.querySelectorAll('.anim-fade-up').forEach(el => observer.observe(el));

      document.querySelectorAll('.faq-item__question').forEach(q => {
        q.addEventListener('click', () => {
          const item = q.parentElement;
          item.classList.toggle('open');
        });
      });

      let exitShown = false;
      document.addEventListener('mouseleave', (e) => {
        if (e.clientY < 0 && !exitShown && !sessionStorage.getItem('_exitShown')) {
          document.getElementById('exitModal').style.display = 'flex';
          exitShown = true;
          sessionStorage.setItem('_exitShown', '1');
        }
      });

      if (window.innerWidth <= 768) {
        document.getElementById('stickyBar').style.display = 'flex';
      }
    }

    loadContent();
  </script>
</body>
