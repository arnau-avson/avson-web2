  <style>
    /* -- Diagnostico / Quiz -- */
    .quiz-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* Progress */
    .quiz-progress-bar {
      height: 3px;
      background: var(--border);
      margin-bottom: 56px;
      position: relative;
      overflow: hidden;
    }
    .quiz-progress-bar__fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: var(--gold);
      transition: width 0.45s cubic-bezier(0.4,0,0.2,1);
    }
    .quiz-progress-label {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    /* Question */
    .quiz-question { display: none; animation: quizFade 0.3s ease; }
    .quiz-question.active { display: block; }
    @keyframes quizFade {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .quiz-q-title {
      font-family: var(--font-serif);
      font-size: clamp(26px, 3.5vw, 40px);
      font-weight: 400;
      color: var(--navy);
      line-height: 1.2;
      margin-bottom: 40px;
    }

    /* Options */
    .quiz-options { display: flex; flex-direction: column; gap: 12px; }
    .quiz-option {
      border: 1px solid var(--border);
      padding: 20px 24px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--white);
    }
    .quiz-option:hover {
      border-color: var(--gold);
      background: var(--pearl);
    }
    .quiz-option.selected {
      border-color: var(--navy);
      background: var(--pearl);
    }
    .quiz-option__radio {
      width: 20px;
      height: 20px;
      border: 1px solid var(--border);
      border-radius: 50%;
      flex-shrink: 0;
      transition: all 0.2s;
      position: relative;
    }
    .quiz-option.selected .quiz-option__radio {
      border-color: var(--navy);
      background: var(--navy);
    }
    .quiz-option.selected .quiz-option__radio::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--white);
    }
    .quiz-option__label {
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 500;
      color: var(--navy);
      margin-bottom: 2px;
    }
    .quiz-option__desc {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Cert cards in result */
    .cert-card {
      border: 1px solid var(--border);
      padding: 28px 32px;
      margin-bottom: 16px;
      position: relative;
      transition: border-color 0.2s;
    }
    .cert-card--primary {
      border-color: var(--navy);
      border-left: 4px solid var(--gold);
    }
    .cert-card__badge {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--white);
      background: var(--navy);
      padding: 3px 10px;
      margin-bottom: 12px;
      display: inline-block;
    }
    .cert-card--primary .cert-card__badge {
      background: var(--gold);
      color: var(--navy);
    }
    .cert-card__title {
      font-family: var(--font-serif);
      font-size: 26px;
      font-weight: 400;
      color: var(--navy);
      margin-bottom: 6px;
    }
    .cert-card__desc {
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .cert-card__link {
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--navy);
      text-decoration: none;
      border-bottom: 1px solid var(--gold);
      padding-bottom: 1px;
      transition: color 0.2s;
    }
    .cert-card__link:hover { color: var(--gold); }

    /* Synergy box */
    .synergy-box {
      background: linear-gradient(135deg, var(--navy) 0%, #2D3F6B 100%);
      padding: 32px 36px;
      margin: 32px 0;
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }
    .synergy-box__icon {
      font-size: 28px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .synergy-box__title {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 400;
      color: var(--white);
      margin-bottom: 6px;
    }
    .synergy-box__text {
      font-family: var(--font-sans);
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      .quiz-container { padding: 0 20px; }
      .quiz-option { padding: 16px 18px; }
      .cert-card { padding: 22px 20px; }
      .synergy-box { flex-direction: column; gap: 12px; }
    }
  </style>

  <script>

    const scores = { ens: 0, iso27001: 0, iso22301: 0, dora: 0 };
    let tamano = 'pequena';
    let currentQ = 1;
    const totalQ = 5;
    let _t = null; // JSON texts reference

    async function loadContent() {
      try {
        const response = await fetch('assets/palabras.json');
        const data = await response.json();
        const t = data["es"]?.diagnostico;
        if (!t) throw new Error('No se encontro la clave "diagnostico"');
        _t = t;

        // Meta
        document.title = t.meta.title;
        document.querySelector('meta[name="description"]').setAttribute('content', t.meta.description);
        document.querySelector('meta[name="keywords"]').setAttribute('content', t.meta.keywords);
        document.querySelector('meta[property="og:title"]').setAttribute('content', t.meta.ogTitle);
        document.querySelector('meta[property="og:description"]').setAttribute('content', t.meta.ogDescription);

        // Top bar
        document.getElementById('topBar').className = 'announce-bar';
        document.getElementById('topBar').innerHTML = `${t.topBar.text} &nbsp;&middot;&nbsp; <a href="contacto.html">${t.topBar.cta}</a>`;

        // Nav

        document.getElementById('navLinks').innerHTML = `

        document.getElementById('navCta').innerHTML = t.nav.cta;
        document.getElementById('navOverlayLinks').innerHTML = `
          <a href="ens.html">${t.nav.links.ens}</a>
          <a href="ens-express.html">${t.nav.links.ensExpress}</a>
          <a href="iso22301.html">${t.nav.links.iso22301}</a>
          <a href="iso27001.html">${t.nav.links.iso27001}</a>
          <a href="otras.html">${t.nav.links.otras}</a>

        document.getElementById('navOverlayCta').innerHTML = t.nav.cta;

        // Hero
        const heroHTML = `
          <section style="background:var(--navy);padding:100px 0 64px;text-align:center">
            <div class="container">
              <span class="label-tag" style="text-align:center;display:block">${t.hero.label}</span>
              <div class="gold-line gold-line--center"></div>
              <h1 class="display-title" style="color:var(--white);text-align:center;max-width:700px;margin:0 auto">
                ${t.hero.title}

            </div>
          </section>

        // Quiz
        const quizHTML = `

                  <h2 class="quiz-q-title">${q.title}</h2>
                  <div class="quiz-options">
                    ${q.options.map(opt => `

                        <div>

                          <p class="quiz-option__desc">${opt.desc}</p>

        // Lead gate modal
        const leadGateHTML = `

                  onfocus="this.style.borderColor='#C9A84C'" onblur="this.style.borderColor='#D8D8D8'">
                <input type="text" id="gateEmpresa" placeholder="${t.leadGate.companyPlaceholder}" required
                  style="width:100%;padding:14px 18px;border:1.5px solid #D8D8D8;font-family:var(--font-sans);font-size:0.95rem;color:var(--navy);background:var(--white);outline:none;box-sizing:border-box"
                  onfocus="this.style.borderColor='#C9A84C'" onblur="this.style.borderColor='#D8D8D8'">
                <button type="submit" style="background:var(--navy);color:var(--white);border:none;padding:18px 32px;font-family:var(--font-sans);font-size:0.95rem;font-weight:600;letter-spacing:0.04em;cursor:pointer;transition:opacity 0.2s;width:100%"
                  onmouseover="this.style.opacity='0.88'" onmouseout="this.style.opacity='1'">
                  ${t.leadGate.submitButton}
                </button>
                <p style="font-family:var(--font-sans);font-size:0.75rem;color:var(--navy-60);text-align:center;margin:0">${t.leadGate.privacyNote}</p>
              </form>
            </div>
          </div>
        `;

        // Footer
        const footerHTML = `
          <div class="container">
            <div class="footer__grid">
              <div>
                <div class="footer__logo">${t.footer.logo}</div>
                <p class="footer__tagline">${t.footer.tagline}</p>
                <div style="font-size:13px;line-height:1.8;color:rgba(255,255,255,.5)">
                  <a href="mailto:${t.footer.contact.email}" style="color:rgba(255,255,255,.6);text-decoration:none">${t.footer.contact.email}</a><br>
                  <a href="${t.footer.contact.linkedinUrl}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-family:var(--font-sans);font-size:12px;color:var(--gold);letter-spacing:0.04em">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                    ${t.footer.contact.linkedin}
                  </a><br>
                  <a href="tel:${t.footer.contact.phone.replace(/\s/g,'')}" style="color:rgba(255,255,255,.6);text-decoration:none">${t.footer.contact.phone}</a><br>
                  ${t.footer.contact.addresses}
                </div>
              </div>
              <div class="footer__col">
                <h4>${t.footer.certifications.title}</h4>
                <ul>${t.footer.certifications.items.map(i => `<li><a href="${i.url}">${i.label}</a></li>`).join('')}</ul>
              </div>
              <div class="footer__col">
                <h4>${t.footer.company.title}</h4>
                <ul>${t.footer.company.items.map(i => `<li><a href="${i.url}">${i.label}</a></li>`).join('')}</ul>
              </div>
              <div class="footer__col">
                <h4>${t.footer.newsletter.title}</h4>
                <p style="font-size:13px;line-height:1.6;color:rgba(255,255,255,.5);margin-bottom:12px">${t.footer.newsletter.description}</p>
                <div style="display:flex;gap:0">
                  <input type="email" placeholder="${t.footer.newsletter.placeholder}" style="flex:1;padding:10px 14px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-family:var(--font-sans);font-size:13px;outline:none">
                  <button style="background:var(--gold);color:var(--navy);border:none;padding:10px 16px;font-family:var(--font-sans);font-weight:600;cursor:pointer">&rarr;</button>
                </div>
              </div>
            </div>
            <div class="footer__bottom">
              <p>${t.footer.bottom.copyright}</p>
              <p>${t.footer.bottom.links.map(l => `<a href="${l.url}" style="color:rgba(255,255,255,.35);text-decoration:none;margin:0 8px">${l.label}</a>`).join(' &middot; ')}</p>
            </div>
          </div>
        `;

        // Render
        document.getElementById('app').innerHTML = heroHTML + quizHTML + leadGateHTML;
        document.getElementById('footer').innerHTML = footerHTML;

        // Floating elements
        document.getElementById('floatingCta').innerHTML = t.floatingCta;
        document.getElementById('exitModalLabel').innerHTML = t.exitModal.title;
        document.getElementById('exitModalTitle').innerHTML = t.exitModal.question;
        document.getElementById('exitModalDesc').innerHTML = t.exitModal.description;
        document.getElementById('exitModalCta').innerHTML = t.exitModal.cta;
        document.getElementById('exitModalDismiss').innerHTML = t.exitModal.dismiss;
        document.getElementById('stickyBarText').innerHTML = t.stickyBar.text;
        document.getElementById('stickyBarCta').innerHTML = t.stickyBar.cta;

        // WhatsApp
        document.getElementById('whatsappLink').setAttribute('href', t.whatsapp.url);
        document.getElementById('whatsappLink').setAttribute('aria-label', t.whatsapp.ariaLabel);

        initInteractions();
      } catch (error) {
        console.error('Error cargando el JSON:', error);
        document.getElementById('app').innerHTML = '<div style="text-align:center;padding:100px 20px;font-family:Inter,sans-serif;color:#1A2744;">Error al cargar el contenido. Por favor, recarga la pagina.</div>';
      }
    }

    function initInteractions() {
      // Mobile nav
      const burger = document.getElementById('navBurger');
      const overlay = document.getElementById('navOverlay');
      const close = document.getElementById('navClose');
      const toggleNav = (open) => { overlay.classList.toggle('open', open); document.body.classList.toggle('no-scroll', open); };
      burger?.addEventListener('click', () => toggleNav(!overlay.classList.contains('open')));
      close?.addEventListener('click', () => toggleNav(false));
      overlay?.addEventListener('click', (e) => { if (e.target === overlay) toggleNav(false); });

      // Scroll nav shadow
      const nav = document.getElementById('mainNav');
      window.addEventListener('scroll', () => { nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40); }, { passive: true });

      // Exit modal
      let exitShown = false;
      document.addEventListener('mouseleave', (e) => {
        if (e.clientY < 0 && !exitShown && !sessionStorage.getItem('_exitShown')) {
          document.getElementById('exitModal').style.display = 'flex';
          exitShown = true;
          sessionStorage.setItem('_exitShown', '1');
        }
      });

      // Sticky bar (mobile)
      if (window.innerWidth <= 768) {
        document.getElementById('stickyBar').style.display = 'flex';
      }
    }

    // -- Quiz logic --
    function answer(el, qNum, points) {
      const parent = el.closest('.quiz-question');
      parent.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');

      if (points.tamano) tamano = points.tamano;
      if (points.ens)      scores.ens      += points.ens;
      if (points.iso27001) scores.iso27001 += points.iso27001;
      if (points.iso22301) scores.iso22301 += points.iso22301;
      if (points.dora)     scores.dora     += points.dora;

      currentQ = qNum + 1;

      setTimeout(() => {
        if (qNum < totalQ) {
          showQuestion(qNum + 1);
        } else {
          showLeadGate();
        }
      }, 380);
    }

    function showQuestion(n) {
      document.querySelectorAll('.quiz-question').forEach(q => q.classList.remove('active'));
      document.getElementById('q' + n).classList.add('active');

      const pct = (n / totalQ) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
      if (_t) {
        document.getElementById('progressLabel').textContent = _t.quiz.progressLabel.replace('{n}', n).replace('{total}', totalQ);
      }

      const container = document.querySelector('.quiz-container');
      window.scrollTo({ top: container.getBoundingClientRect().top + window.scrollY - 120, behavior: 'smooth' });
    }

    function showResult() {
      document.querySelectorAll('.quiz-question').forEach(q => q.classList.remove('active'));
      document.getElementById('qResult').classList.add('active');

      document.getElementById('progressHeader').style.display = 'none';
      document.getElementById('progressBarWrap').style.display = 'none';

      buildResult();

      const container = document.querySelector('.quiz-container');
      window.scrollTo({ top: container.getBoundingClientRect().top + window.scrollY - 120, behavior: 'smooth' });
    }

    function buildResult() {
      if (!_t) return;
      const r = _t.result;
      const recs = [];

      if (scores.ens >= 3) {
        const nivel = tamano === 'micro' || tamano === 'pequena' ? 'Basica'
                    : tamano === 'mediana' ? 'Media'
                    : 'Media o Alta';
        recs.push({
          key: 'ens',
          primary: true,
          badge: r.cards.ens.badgePrimary,
          title: r.cards.ens.titleTemplate.replace('{nivel}', nivel),
          desc: r.cards.ens.descTemplate.replace('{nivel}', nivel),
          link: 'ens.html',
          linkText: r.cards.ens.linkText
        });
      }

      if (scores.iso27001 >= 2) {
        recs.push({
          key: 'iso27001',
          primary: scores.ens < 3,
          badge: scores.ens >= 3 ? r.cards.iso27001.badgeSecondary : r.cards.iso27001.badgePrimary,
          title: r.cards.iso27001.title,
          desc: r.cards.iso27001.desc,
          link: 'iso27001.html',
          linkText: r.cards.iso27001.linkText
        });
      }

      if (scores.iso22301 >= 3) {
        recs.push({
          key: 'iso22301',
          primary: false,
          badge: r.cards.iso22301.badge,
          title: r.cards.iso22301.title,
          desc: r.cards.iso22301.desc,
          link: 'iso22301.html',
          linkText: r.cards.iso22301.linkText
        });
      }

      if (scores.dora >= 3) {
        recs.push({
          key: 'dora',
          primary: false,
          badge: r.cards.dora.badge,
          title: r.cards.dora.title,
          desc: r.cards.dora.desc,
          link: 'dora.html',
          linkText: r.cards.dora.linkText
        });
      }

      if (recs.length === 0) {
        recs.push({
          key: 'iso27001',
          primary: true,
          badge: r.cards.fallback.badge,
          title: r.cards.fallback.title,
          desc: r.cards.fallback.desc,
          link: 'iso27001.html',
          linkText: r.cards.fallback.linkText
        });
      }

      const cardsHTML = recs.map(rec => `
        <div class="cert-card ${rec.primary ? 'cert-card--primary' : ''}">
          <span class="cert-card__badge">${rec.badge}</span>
          <h3 class="cert-card__title">${rec.title}</h3>
          <p class="cert-card__desc">${rec.desc}</p>
          <a href="${rec.link}" class="cert-card__link">${rec.linkText}</a>
        </div>
      `).join('');
      document.getElementById('certCards').innerHTML = cardsHTML;

      const hasENS = recs.some(rec => rec.key === 'ens');
      const hasISO = recs.some(rec => rec.key === 'iso27001');
      if (hasENS && hasISO) {
        document.getElementById('synergyBox').innerHTML = `
          <div class="synergy-box">
            <div class="synergy-box__icon">&#10022;</div>
            <div>
              <p class="synergy-box__title">${r.synergy.title}</p>
              <p class="synergy-box__text">${r.synergy.text}</p>
            </div>
          </div>
        `;
      }
    }

    function showLeadGate() {
      const modal = document.getElementById('leadGateModal');
      modal.style.display = 'flex';
    }

    function submitLeadGate(e) {
      e.preventDefault();
      const nombre = document.getElementById('gateNombre').value.trim();
      const email = document.getElementById('gateEmail').value.trim();
      const empresa = document.getElementById('gateEmpresa').value.trim();
      if (!nombre || !email || !empresa) return;
      if (window.dataLayer) dataLayer.push({event: 'lead_generated', form_type: 'diagnostico_gate', email: email});
      document.getElementById('leadGateModal').style.display = 'none';
      showResult();
    }

    function reiniciarQuiz() {
      Object.keys(scores).forEach(k => scores[k] = 0);
      tamano = 'pequena';
      currentQ = 1;

      document.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
      document.getElementById('certCards').innerHTML = '';
      document.getElementById('synergyBox').innerHTML = '';
      document.getElementById('progressHeader').style.display = '';
      document.getElementById('progressBarWrap').style.display = '';
      document.getElementById('progressFill').style.width = '20%';
      if (_t) {
        document.getElementById('progressLabel').textContent = _t.quiz.progressLabel.replace('{n}', '1').replace('{total}', totalQ);
      }

      showQuestion(1);
      document.querySelectorAll('.quiz-question').forEach(q => q.classList.remove('active'));
      document.getElementById('q1').classList.add('active');
      window.scrollTo({ top: document.querySelector('.quiz-container').getBoundingClientRect().top + window.scrollY - 120, behavior: 'smooth' });
    }

    loadContent();
  </script>
</body>
</html>
