<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando...</title>
  <meta name="description" content="">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="text/javascript">(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y)})(window,document,"clarity","script","CLARITY_ID");</script>
  <script src="avson-leads.js" defer></script>
  <!-- Google Ads conversion — activar cuando esté configurada la cuenta -->
  <!-- <script> gtag('event', 'conversion', { 'send_to': 'AW-CONVERSION_ID/CONVERSION_LABEL' }); </script> -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:#1A2744; --gold:#C9A84C; --gold-h:#D9B84D;
      --pearl:#F7F7F5; --white:#FFFFFF; --border:#E5E5E0; --muted:#7A8499;
    }
    html { font-size:16px; -webkit-font-smoothing:antialiased; }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--pearl); }

    /* ── Top bar ── */
    .top-bar {
      background:var(--navy); text-align:center;
      font-family:'Inter',sans-serif; font-size:13px; font-weight:500;
      color:rgba(255,255,255,0.9); padding:10px 20px;
    }
    .top-bar strong { color:var(--gold); }

    /* ── Header ── */
    .ppc-header {
      background:var(--white); border-bottom:1px solid var(--border);
      padding:16px 40px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .ppc-logo {
      font-family:'Inter',sans-serif; font-size:15px; font-weight:700;
      letter-spacing:0.12em; text-transform:uppercase; color:var(--navy);
      text-decoration:none;
    }
    .ppc-logo span { color:var(--gold); }
    .ppc-phone {
      font-family:'Inter',sans-serif; font-size:14px; font-weight:600;
      color:var(--navy); text-decoration:none;
    }
    .ppc-phone:hover { color:var(--gold); }

    /* ── Hero ── */
    .ppc-hero {
      display:grid; grid-template-columns:1fr 1fr;
      max-width:1100px; margin:0 auto;
      gap:60px; padding:60px 40px;
      align-items:start;
    }

    .fomo { background:#FEF2F2; border:1px solid #FCA5A5; border-radius:8px;
      padding:8px 16px; font-size:12px; font-weight:700; color:#991B1B;
      display:inline-block; margin-bottom:20px;
    }

    h1 {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(40px,4.5vw,64px); font-weight:400;
      color:var(--navy); line-height:1.1; margin-bottom:18px;
    }
    h1 em { font-style:italic; }

    .hero-sub {
      font-size:17px; font-weight:400; color:#4a4a4a;
      line-height:1.65; margin-bottom:24px; max-width:480px;
    }
    .hero-sub strong { color:var(--navy); }

    .trust-row {
      display:flex; gap:20px; flex-wrap:wrap;
      font-size:13px; color:var(--muted);
    }
    .trust-row span::before { content:'✓ '; color:var(--gold); font-weight:700; }

    /* ── Stats ── */
    .ppc-stats {
      display:flex; gap:32px; margin-top:32px; padding-top:24px;
      border-top:1px solid var(--border);
    }
    .ppc-stat { text-align:center; }
    .ppc-stat strong {
      display:block; font-family:'Cormorant Garamond',serif;
      font-size:36px; font-weight:500; color:var(--navy); line-height:1;
    }
    .ppc-stat span { font-size:12px; color:var(--muted); }

    /* ── Form card ── */
    .form-card {
      background:var(--white); border-radius:16px;
      border:1px solid var(--border); padding:36px 32px;
      box-shadow:0 12px 40px rgba(26,39,68,0.12);
      position:sticky; top:20px;
    }
    .live-badge {
      display:inline-flex; align-items:center; gap:6px;
      background:#ECFDF5; color:#065F46; font-size:11px; font-weight:700;
      padding:5px 11px; border-radius:20px; margin-bottom:14px;
    }
    .form-title {
      font-family:'Cormorant Garamond',serif; font-size:26px;
      font-weight:400; color:var(--navy); margin-bottom:4px;
    }
    .form-sub { font-size:13px; color:var(--muted); margin-bottom:22px; }

    .qual-label { font-size:10px; font-weight:700; letter-spacing:0.1em;
      text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .qual-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:16px; }
    .qual-btn {
      font-family:'Inter',sans-serif; font-size:12px; font-weight:600;
      padding:9px 6px; border:1.5px solid var(--border);
      background:var(--pearl); color:var(--navy); border-radius:6px;
      cursor:pointer; transition:all 0.15s;
    }
    .qual-btn:hover { border-color:var(--navy); }
    .qual-btn--urgent { border-color:#FCA5A5; background:#FEF2F2; color:#991B1B; }
    .qual-btn--active { background:var(--navy); border-color:var(--navy); color:var(--white); }

    .form-group { margin-bottom:10px; }
    .form-group input {
      width:100%; padding:13px 16px; border:1.5px solid var(--border);
      border-radius:8px; font-family:'Inter',sans-serif; font-size:15px;
      color:var(--navy); background:var(--white); outline:none;
      transition:border-color 0.15s;
    }
    .form-group input:focus { border-color:var(--navy); }
    .form-group input::placeholder { color:#B0B8C4; }

    .rgpd {
      display:flex; align-items:flex-start; gap:9px; font-size:11px;
      color:var(--muted); line-height:1.5; margin:12px 0 16px;
    }
    .rgpd input { width:15px; height:15px; flex-shrink:0; margin-top:1px;
      accent-color:var(--navy); cursor:pointer; }
    .rgpd a { color:var(--navy); }

    .btn-cta {
      width:100%; background:var(--gold); color:var(--navy);
      border:none; padding:17px; border-radius:10px;
      font-family:'Inter',sans-serif; font-size:16px; font-weight:700;
      cursor:pointer; transition:background 0.15s, transform 0.1s;
      animation:pulse 2.5s infinite;
    }
    .btn-cta:hover { background:var(--gold-h); transform:translateY(-1px); }
    @keyframes pulse {
      0%,100% { box-shadow:0 6px 20px rgba(201,168,76,0.45),0 0 0 0 rgba(201,168,76,0.25); }
      50%      { box-shadow:0 6px 20px rgba(201,168,76,0.45),0 0 0 8px rgba(201,168,76,0); }
    }
    .lock-text { font-size:11px; color:var(--muted); text-align:center; margin-top:10px; }
    .alt-phone {
      display:flex; align-items:center; justify-content:center; gap:8px;
      margin-top:16px; padding-top:16px; border-top:1px solid var(--border);
      font-size:13px; color:var(--muted);
    }
    .alt-phone a { font-weight:700; color:var(--navy); text-decoration:none; }
    .alt-phone a:hover { color:var(--gold); }

    /* ── Testimonials strip ── */
    .testi-strip {
      background:var(--white); border-top:1px solid var(--border);
      border-bottom:1px solid var(--border); padding:40px;
      display:grid; grid-template-columns:repeat(3,1fr); gap:32px;
      max-width:1100px; margin:0 auto;
    }
    .testi { }
    .testi-stars { color:var(--gold); font-size:14px; letter-spacing:2px; margin-bottom:10px; }
    .testi-quote {
      font-family:'Cormorant Garamond',serif; font-size:16px;
      font-weight:300; font-style:italic; color:#333; line-height:1.6;
      margin-bottom:12px;
    }
    .testi-author { font-size:12px; color:var(--muted); font-weight:600; }
    .testi-result { font-size:11px; color:var(--gold); margin-top:4px; }

    /* ── Footer minimal ── */
    .ppc-footer {
      text-align:center; padding:24px; font-size:12px; color:var(--muted);
      border-top:1px solid var(--border);
    }
    .ppc-footer a { color:var(--muted); text-decoration:none; margin:0 8px; }
    .ppc-footer a:hover { color:var(--navy); }

    @media (max-width:768px) {
      .ppc-hero { grid-template-columns:1fr; padding:32px 20px; gap:32px; }
      .ppc-header { padding:14px 20px; }
      .testi-strip { grid-template-columns:1fr; padding:32px 20px; }
      .ppc-stats { gap:20px; }
      .form-card { position:static; }
    }
  </style>
</head>
<body>

<div class="top-bar" id="topBar"></div>

<header class="ppc-header">
  <a href="index.html" class="ppc-logo" id="headerLogo"></a>
  <a href="tel:+34648414863" class="ppc-phone" id="headerPhone"></a>
</header>

<div class="ppc-hero" id="heroSection"></div>

<!-- Testimonials -->
<div class="testi-strip" id="testiStrip"></div>

<footer class="ppc-footer" id="ppcFooter"></footer>

<script>
function pickQ(btn, val) {
  document.getElementById('pNecesidad').value = val;
  document.querySelectorAll('.qual-btn').forEach(b => b.classList.remove('qual-btn--active'));
  btn.classList.add('qual-btn--active');
}
function submitPPC(e) {
  e.preventDefault();
  const d = { nombre: pNombre.value, email: pEmail.value, necesidad: pNecesidad.value, source: 'ppc_ens' };
  if (window.dataLayer) dataLayer.push({ event: 'ppc_lead', ...d });
  window.location.href = 'gracias.html?nombre=' + encodeURIComponent(d.nombre) + '&source=ppc_ens';
}

async function loadContent() {
  try {
    const response = await fetch('assets/palabras.json');
    const data = await response.json();
    const lang = "es";
    const t = data[lang]?.ensPpc;
    if (!t) throw new Error('No se encontraron datos para "ensPpc"');

    // 1. Meta
    document.title = t.meta.title;
    document.querySelector('meta[name="description"]').setAttribute('content', t.meta.description);

    // 2. Top bar
    document.getElementById('topBar').innerHTML = `${t.topBar.icon} <strong>${t.topBar.text}</strong> ${t.topBar.suffix}`;

    // 3. Header
    document.getElementById('headerLogo').innerHTML = `${t.header.logoPrefix}<span>${t.header.logoDot}</span>${t.header.logoSuffix}`;
    document.getElementById('headerPhone').innerHTML = t.header.phone;

    // 4. Hero section
    const qualBtns = t.form.qualButtons.map(btn => {
      const urgentClass = btn.urgent ? ' qual-btn--urgent' : '';
      return `<button type="button" class="qual-btn${urgentClass}" onclick="pickQ(this,'${btn.value}')">${btn.label}</button>`;
    }).join('');

    const statsHTML = t.stats.map(stat =>
      `<div class="ppc-stat"><strong>${stat.value}</strong><span>${stat.label}</span></div>`
    ).join('');

    const trustItems = t.hero.trustItems.map(item =>
      `<span>${item}</span>`
    ).join('');

    document.getElementById('heroSection').innerHTML = `
      <!-- Left: copy -->
      <div>
        <div class="fomo">${t.hero.fomo}</div>
        <h1>${t.hero.title}</h1>
        <p class="hero-sub">${t.hero.subtitle}</p>
        <div class="trust-row">${trustItems}</div>
        <div class="ppc-stats">${statsHTML}</div>
      </div>

      <!-- Right: form -->
      <div class="form-card">
        <span class="live-badge">${t.form.liveBadge}</span>
        <p class="form-title">${t.form.title}</p>
        <p class="form-sub">${t.form.subtitle}</p>

        <p class="qual-label">${t.form.qualLabel}</p>
        <div class="qual-grid">${qualBtns}</div>
        <input type="hidden" id="pNecesidad" value="">

        <form id="ppcForm" onsubmit="avsonSubmitLead(event,{source:'ppc_ens',event:'ppc_lead'})" novalidate>
          <div class="form-group">
            <input type="text" id="pNombre" name="nombre" placeholder="${t.form.namePlaceholder}" autocomplete="given-name" required>
          </div>
          <div class="form-group">
            <input type="email" id="pEmail" name="email" placeholder="${t.form.emailPlaceholder}" autocomplete="email" required>
          </div>
          <div class="rgpd">
            <input type="checkbox" id="pRgpd" required>
            <label for="pRgpd">${t.form.rgpdText} <a href="privacidad.html" target="_blank">${t.form.rgpdLink}</a></label>
          </div>
          <button type="submit" class="btn-cta">${t.form.submitButton}</button>
          <p class="lock-text">${t.form.lockText}</p>
        </form>

        <div class="alt-phone">
          <span>${t.form.altPhoneLabel}</span>
          <a href="tel:+34648414863">${t.form.altPhoneNumber}</a>
        </div>
      </div>
    `;

    // 5. Testimonials
    const testisHTML = t.testimonials.map(testi => `
      <div class="testi">
        <div class="testi-stars">${testi.stars}</div>
        <p class="testi-quote">${testi.quote}</p>
        <p class="testi-author">${testi.author}</p>
        <p class="testi-result">${testi.result}</p>
      </div>
    `).join('');
    document.getElementById('testiStrip').innerHTML = testisHTML;

    // 6. Footer
    document.getElementById('ppcFooter').innerHTML = `
      ${t.footer.copyright}
      <a href="privacidad.html">${t.footer.links.privacy}</a> ·
      <a href="cookies.html">${t.footer.links.cookies}</a>
    `;

    initInteractions();
  } catch(error) {
    console.error('Error cargando el JSON:', error);
    document.getElementById('heroSection').innerHTML = '<div style="text-align:center;padding:100px 20px;font-family:Inter,sans-serif">Error cargando contenido</div>';
  }
}

function initInteractions() {
  // No standard nav/overlay on PPC pages - minimal interactions only
}

loadContent();
</script>

</body>
</html>
