<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando...</title>
  <meta name="description" content="">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="text/javascript">(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y)})(window,document,"clarity","script","CLARITY_ID");</script>
  <script src="avson-leads.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --navy:#1A2744; --gold:#C9A84C; --red:#dc2626; --pearl:#F7F7F5; --white:#fff; --border:#E5E5E0; --muted:#7A8499; }
    html { font-size:16px; -webkit-font-smoothing:antialiased; }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--navy); min-height:100vh; }

    /* ── Urgency bar ── */
    .urgency-bar {
      background:var(--red); text-align:center;
      font-family:'Inter',sans-serif; font-size:13px; font-weight:700;
      color:#fff; padding:10px 20px; letter-spacing:0.02em;
    }

    /* ── Header ── */
    .header {
      background:rgba(255,255,255,0.05); border-bottom:1px solid rgba(255,255,255,0.1);
      padding:16px 40px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .logo { font-family:'Inter',sans-serif; font-size:15px; font-weight:700;
      letter-spacing:0.12em; text-transform:uppercase; color:#fff; text-decoration:none; }
    .logo span { color:var(--gold); }
    .header-phone { font-family:'Inter',sans-serif; font-size:14px; font-weight:600;
      color:var(--gold); text-decoration:none; }

    /* ── Hero ── */
    .hero {
      display:grid; grid-template-columns:1fr 1fr;
      max-width:1100px; margin:0 auto; gap:56px;
      padding:60px 40px; align-items:start;
    }

    .express-badge {
      display:inline-flex; align-items:center; gap:8px;
      background:rgba(220,38,38,0.2); border:1px solid rgba(220,38,38,0.5);
      color:#fca5a5; font-family:'Inter',sans-serif; font-size:12px; font-weight:700;
      padding:7px 16px; border-radius:20px; margin-bottom:24px;
      letter-spacing:0.04em; text-transform:uppercase;
    }

    h1 {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(42px,5vw,68px); font-weight:400;
      color:#fff; line-height:1.05; margin-bottom:20px;
    }
    h1 em { font-style:italic; color:var(--gold); }

    .hero-sub { font-size:17px; color:rgba(255,255,255,0.7); line-height:1.65; margin-bottom:28px; }
    .hero-sub strong { color:#fff; }

    /* ── How it works ── */
    .how { display:flex; gap:0; margin-bottom:36px; }
    .how-step {
      flex:1; background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1); border-right:none;
      padding:16px 14px; text-align:center;
    }
    .how-step:last-child { border-right:1px solid rgba(255,255,255,0.1); }
    .how-step__num { font-family:'Cormorant Garamond',serif; font-size:28px;
      font-weight:300; color:var(--gold); }
    .how-step__text { font-family:'Inter',sans-serif; font-size:11px;
      color:rgba(255,255,255,0.6); margin-top:6px; line-height:1.4; }

    /* ── Form card ── */
    .form-card {
      background:var(--white); border-radius:16px;
      padding:36px 32px; box-shadow:0 20px 60px rgba(0,0,0,0.3);
      position:sticky; top:20px;
    }
    .live-badge {
      display:inline-flex; align-items:center; gap:6px;
      background:#ECFDF5; color:#065F46; font-size:11px; font-weight:700;
      padding:5px 11px; border-radius:20px; margin-bottom:14px;
    }
    .form-title { font-family:'Cormorant Garamond',serif; font-size:26px;
      font-weight:400; color:var(--navy); margin-bottom:4px; }
    .form-sub { font-size:13px; color:var(--muted); margin-bottom:8px; }
    .form-urgency { font-family:'Inter',sans-serif; font-size:12px; font-weight:700;
      color:var(--red); margin-bottom:20px; }

    .form-group { margin-bottom:10px; }
    .form-group input {
      width:100%; padding:13px 16px; border:1.5px solid var(--border); border-radius:8px;
      font-family:'Inter',sans-serif; font-size:15px; color:var(--navy);
      background:var(--white); outline:none; transition:border-color 0.15s;
    }
    .form-group input:focus { border-color:var(--navy); }
    .form-group input::placeholder { color:#B0B8C4; }

    .rgpd { display:flex; align-items:flex-start; gap:9px; font-size:11px;
      color:var(--muted); line-height:1.5; margin:12px 0 16px; }
    .rgpd input { width:15px; height:15px; flex-shrink:0; margin-top:1px;
      accent-color:var(--navy); cursor:pointer; }
    .rgpd a { color:var(--navy); }

    .btn-cta {
      width:100%; background:var(--red); color:#fff; border:none; padding:17px;
      border-radius:10px; font-family:'Inter',sans-serif; font-size:16px; font-weight:700;
      cursor:pointer; transition:background 0.15s, transform 0.1s;
      animation:pulse-red 2.2s infinite;
    }
    .btn-cta:hover { background:#b91c1c; transform:translateY(-1px); }
    @keyframes pulse-red {
      0%,100% { box-shadow:0 6px 20px rgba(220,38,38,0.45),0 0 0 0 rgba(220,38,38,0.25); }
      50%      { box-shadow:0 6px 20px rgba(220,38,38,0.45),0 0 0 8px rgba(220,38,38,0); }
    }

    .lock-text { font-size:11px; color:var(--muted); text-align:center; margin-top:10px; }
    .alt-phone { display:flex; align-items:center; justify-content:center; gap:8px;
      margin-top:16px; padding-top:16px; border-top:1px solid var(--border);
      font-size:13px; color:var(--muted); }
    .alt-phone a { font-weight:700; color:var(--navy); text-decoration:none; }

    /* ── Trust strip ── */
    .trust-strip {
      background:rgba(255,255,255,0.05); border-top:1px solid rgba(255,255,255,0.08);
      padding:28px 40px; display:flex; align-items:center;
      justify-content:center; gap:48px; flex-wrap:wrap;
    }
    .trust-item { text-align:center; }
    .trust-item strong { display:block; font-family:'Cormorant Garamond',serif;
      font-size:36px; font-weight:500; color:var(--gold); line-height:1; }
    .trust-item span { font-family:'Inter',sans-serif; font-size:12px; color:rgba(255,255,255,0.5); }

    /* ── Testimonials ── */
    .testi-section { max-width:1080px; margin:0 auto; padding:8px 24px 56px; }
    .testi-section__title {
      font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:300;
      color:#fff; text-align:center; margin:0 0 28px;
    }
    .testi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px; }
    .testi-card { background:#fff; border-radius:12px; padding:24px; }
    .testi-card__stars { color:var(--gold); font-size:14px; letter-spacing:2px; margin-bottom:10px; }
    .testi-card__quote { font-family:'Inter',sans-serif; font-size:14px; color:var(--navy); line-height:1.6; margin:0 0 14px; }
    .testi-card__author { font-family:'Inter',sans-serif; font-size:12px; color:var(--muted); font-weight:600; margin:0; }
    .testi-card__result { font-family:'Inter',sans-serif; font-size:11px; color:var(--gold); margin:4px 0 0; }

    /* ── Footer ── */
    .ppc-footer { text-align:center; padding:20px; font-size:12px;
      color:rgba(255,255,255,0.3); border-top:1px solid rgba(255,255,255,0.08); }
    .ppc-footer a { color:rgba(255,255,255,0.3); text-decoration:none; margin:0 8px; }

    @media (max-width:768px) {
      .hero { grid-template-columns:1fr; padding:32px 20px; gap:32px; }
      .header { padding:14px 20px; }
      .trust-strip { gap:24px; padding:24px 20px; }
      .how { flex-direction:column; }
      .how-step { border-right:1px solid rgba(255,255,255,0.1); border-bottom:none; }
      .how-step:last-child { border-bottom:1px solid rgba(255,255,255,0.1); }
      .form-card { position:static; }
    }
  </style>
</head>
<body>

<div class="urgency-bar" id="urgencyBar"></div>

<header class="header">
  <a href="index.html" class="logo" id="headerLogo"></a>
  <a href="tel:+34648414863" class="header-phone" id="headerPhone"></a>
</header>

<div class="hero" id="heroSection"></div>

<div class="trust-strip" id="trustStrip"></div>

<!-- Testimonials -->
<div class="testi-section" id="testiSection"></div>

<footer class="ppc-footer" id="ppcFooter"></footer>

<script>
function submitExpress(e) {
  e.preventDefault();
  const d = {
    nombre: eNombre.value, email: eEmail.value,
    pliego: ePliego.value, source: 'ppc_ens_express'
  };
  if (window.dataLayer) dataLayer.push({ event: 'express_lead', ...d });
  window.location.href = 'gracias.html?nombre=' + encodeURIComponent(d.nombre) + '&source=express';
}

async function loadContent() {
  try {
    const response = await fetch('assets/palabras.json');
    const data = await response.json();
    const lang = "es";
    const t = data[lang]?.ensExpressPpc;
    if (!t) throw new Error('No se encontraron datos para "ensExpressPpc"');

    // 1. Meta
    document.title = t.meta.title;
    document.querySelector('meta[name="description"]').setAttribute('content', t.meta.description);

    // 2. Urgency bar
    document.getElementById('urgencyBar').innerHTML = t.urgencyBar;

    // 3. Header
    document.getElementById('headerLogo').innerHTML = `${t.header.logoPrefix}<span>${t.header.logoDot}</span>${t.header.logoSuffix}`;
    document.getElementById('headerPhone').innerHTML = t.header.phone;

    // 4. Hero section
    const howSteps = t.hero.howSteps.map(step =>
      `<div class="how-step"><div class="how-step__num">${step.num}</div><p class="how-step__text">${step.text}</p></div>`
    ).join('');

    document.getElementById('heroSection').innerHTML = `
      <!-- Left -->
      <div>
        <div class="express-badge">${t.hero.badge}</div>
        <h1>${t.hero.title}</h1>
        <p class="hero-sub">${t.hero.subtitle}</p>

        <div class="how">${howSteps}</div>

        <p style="font-family:'Inter',sans-serif;font-size:13px;color:rgba(255,255,255,0.5)">
          ${t.hero.availableNote}
        </p>
      </div>

      <!-- Right: form -->
      <div class="form-card">
        <span class="live-badge">${t.form.liveBadge}</span>
        <p class="form-title">${t.form.title}</p>
        <p class="form-sub">${t.form.subtitle}</p>
        <p class="form-urgency">${t.form.urgencyNote}</p>

        <form id="expressForm" onsubmit="avsonSubmitLead(event,{source:'ppc_express',event:'ppc_express_lead'})" novalidate>
          <div class="form-group">
            <input type="text" id="eNombre" name="nombre" placeholder="${t.form.namePlaceholder}" autocomplete="given-name" required>
          </div>
          <div class="form-group">
            <input type="email" id="eEmail" name="email" placeholder="${t.form.emailPlaceholder}" autocomplete="email" required>
          </div>
          <div class="form-group">
            <input type="text" id="ePliego" name="pliego" placeholder="${t.form.pliegoPlaceholder}" autocomplete="off">
          </div>
          <div class="rgpd">
            <input type="checkbox" id="eRgpd" required>
            <label for="eRgpd">${t.form.rgpdText} <a href="privacidad.html" target="_blank">${t.form.rgpdLink}</a></label>
          </div>
          <button type="submit" class="btn-cta">${t.form.submitButton}</button>
          <p class="lock-text">${t.form.lockText}</p>
        </form>

        <div class="alt-phone">
          <span>${t.form.altPhoneLabel}</span>
          <a href="tel:+34648414863">${t.form.altPhoneNumber}</a>
        </div>
      </div>
    `;

    // 5. Trust strip
    const trustItems = t.trustStrip.map(item =>
      `<div class="trust-item"><strong>${item.value}</strong><span>${item.label}</span></div>`
    ).join('');
    document.getElementById('trustStrip').innerHTML = trustItems;

    // 6. Testimonials
    const testisHTML = t.testimonials.items.map(testi => `
      <div class="testi-card">
        <div class="testi-card__stars">${testi.stars}</div>
        <p class="testi-card__quote">${testi.quote}</p>
        <p class="testi-card__author">${testi.author}</p>
        <p class="testi-card__result">${testi.result}</p>
      </div>
    `).join('');
    document.getElementById('testiSection').innerHTML = `
      <p class="testi-section__title">${t.testimonials.title}</p>
      <div class="testi-grid">${testisHTML}</div>
    `;

    // 7. Footer
    document.getElementById('ppcFooter').innerHTML = `
      ${t.footer.copyright}
      <a href="privacidad.html">${t.footer.links.privacy}</a> ·
      <a href="index.html">${t.footer.links.home}</a>
    `;

    initInteractions();
  } catch(error) {
    console.error('Error cargando el JSON:', error);
    document.getElementById('heroSection').innerHTML = '<div style="text-align:center;padding:100px 20px;font-family:Inter,sans-serif;color:#fff">Error cargando contenido</div>';
  }
}

function initInteractions() {
  // No standard nav/overlay on PPC pages - minimal interactions only
}

loadContent();
</script>
</body>
</html>
