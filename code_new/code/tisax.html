  <style>
    .loader {
      text-align: center;
      padding: 100px 20px;
      font-family: 'Inter', sans-serif;
      color: #1A2744;
    }

    .hero-conv {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 48px;
      align-items: center;
    }

    .hero-conv__kpis {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      margin: 26px 0 22px;
    }

    .hero-conv__kpi strong {
      font-family: var(--font-serif);
      font-size: 40px;
      font-weight: 300;
      color: var(--navy);
      line-height: 1;
      display: block;
    }

    .hero-conv__kpi span {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    @media (max-width:860px) {
      .hero-conv {
        grid-template-columns: 1fr;
        gap: 32px;
      }
    }

    .tcar {
      position: relative;
      overflow: hidden;
    }

    .tcar__view {
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .tcar__view::-webkit-scrollbar {
      display: none;
    }

    .tcar__track {
      display: flex;
      gap: 24px;
      padding: 8px 4px 24px;
    }

    .tcar__slide {
      flex: 0 0 320px;
      scroll-snap-align: start;
    }

    .tcar__card {
      background: #fff;
      border: 1px solid #E8E4DD;
      border-radius: 14px;
      padding: 24px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .tcar__stars {
      color: #C9A84C;
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .tcar__quote {
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-body);
      margin: 0 0 16px;
      flex: 1;
    }

    .tcar__author {
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 600;
      color: var(--navy);
      margin: 0 0 6px;
    }

    .tcar__result {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--text-muted);
      margin: 0;
    }

    .tcar__arrow {
      position: absolute;
      top: 40%;
      transform: translateY(-50%);
      background: #fff;
      border: 1px solid #E5E5E0;
      border-radius: 40px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: all 0.2s;
    }

    .tcar__arrow--prev {
      left: -12px;
    }

    .tcar__arrow--next {
      right: -12px;
    }

    .tcar__dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
    }

    .tcar__dot {
      width: 8px;
      height: 8px;
      border-radius: 8px;
      background: #D1CEC8;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tcar__dot.active {
      width: 24px;
      background: var(--navy);
    }

    @media (max-width: 680px) {
      .tcar__arrow {
        display: none;
      }
    }
  </style>
</head>

  <script>
    async function loadContent() {
      try {
        const response = await fetch('assets/palabras.json');
        const data = await response.json();
        const lang = localStorage.getItem('avsonLang') || "es";
        const pageData = data[lang]?.tisax;
        if (!pageData) throw new Error(`No se encontró el idioma "${lang}" o la clave "tisax"`);
        const t = pageData;

        // Actualizar meta tags
        document.title = t.meta.title;
        document.querySelector('meta[name="description"]').setAttribute('content', t.meta.description);
        document.querySelector('meta[name="keywords"]').setAttribute('content', t.meta.keywords);
        document.querySelector('meta[property="og:title"]').setAttribute('content', t.meta.ogTitle);
        document.querySelector('meta[property="og:description"]').setAttribute('content', t.meta.ogDescription);
        document.querySelector('meta[name="twitter:title"]').setAttribute('content', t.meta.twitterTitle);
        document.querySelector('meta[name="twitter:description"]').setAttribute('content', t.meta.twitterDescription);

        // Top bar
        document.getElementById('topBar').innerHTML = `🔒 <strong>${t.topBar.text}</strong> &nbsp;·&nbsp; ${t.topBar.extra} &nbsp;·&nbsp; <a href="contacto.html" style="color:#C9A84C;text-decoration:none;font-weight:500">${t.topBar.cta}</a>`;

        // Nav
        const navLinks = document.getElementById('navLinks');
        navLinks.innerHTML = `
      <li><a href="ens.html">${t.nav.links.ens}</a></li>
      <li><a href="ens-express.html" class="nav-express">${t.nav.links.ensExpress}</a></li>
      <li><a href="iso22301.html">${t.nav.links.iso22301}</a></li>
      <li><a href="iso27001.html">${t.nav.links.iso27001}</a></li>
      <li><a href="otras.html">${t.nav.links.otras}</a></li>
    `;
        document.getElementById('navCta').innerHTML = t.nav.cta;
        document.getElementById('navOverlayLinks').innerHTML = `
      <a href="ens.html">${t.nav.links.ens}</a>
      <a href="ens-express.html">${t.nav.links.ensExpress}</a>
      <a href="iso22301.html">${t.nav.links.iso22301}</a>
      <a href="iso27001.html">${t.nav.links.iso27001}</a>
      <a href="otras.html">${t.nav.links.otras}</a>
    `;
        document.getElementById('navOverlayCta').innerHTML = t.nav.cta;

        // Language selector
        const langSelector = document.getElementById('langSelector');
        if (langSelector) {
          const langs = [{ code: 'es', label: 'Español', flag: '🇪🇸' }];
          const current = langs.find(l => l.code === lang) || langs[0];
          langSelector.innerHTML = `
            <button class="lang-selector__btn" id="langBtn">
              ${current.flag} ${current.code.toUpperCase()}
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2.5 4L5 6.5L7.5 4" stroke="currentColor" stroke-width="1.2"/></svg>
            </button>
            <div class="lang-selector__dropdown" id="langDropdown">
              ${langs.map(l => `<button class="lang-selector__option${l.code === lang ? ' active' : ''}" data-lang="${l.code}">${l.flag} ${l.label}</button>`).join('')}
            </div>`;
        }

        // Hero
        const heroHTML = `
      <section class="section section--pearl" style="padding-top:120px;padding-bottom:64px">
        <div class="container">
          <div class="hero-conv">
            <div>
              <span class="label-tag">${t.hero.label}</span>
              <h1 style="font-family:var(--font-serif);font-size:clamp(40px,5.2vw,68px);font-weight:300;color:var(--navy);line-height:1.08;margin:14px 0 18px">${t.hero.title}</h1>
              <p style="font-family:var(--font-sans);font-size:17px;line-height:1.6;color:var(--text-body);max-width:520px;margin:0">${t.hero.description}</p>
              <div class="hero-conv__kpis">
                ${t.hero.stats.map(stat => `<div class="hero-conv__kpi"><strong>${stat.value}</strong><span>${stat.label}</span></div>`).join('')}
              </div>
              <div style="display:inline-flex;align-items:center;gap:8px;border:1px solid #C9A84C;padding:9px 16px;border-radius:8px">
                <span style="font-size:16px;color:#C9A84C">${t.hero.guaranteeBadge.icon}</span>
                <span style="font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#1A2744">${t.hero.guaranteeBadge.text}</span>
              </div>
              <p style="font-family:var(--font-sans);font-size:14px;color:var(--text-body);line-height:1.6;margin:22px 0 0;max-width:480px">
                <span style="color:#C9A84C;letter-spacing:1px">${t.hero.testimonialPlaceholder.stars}</span><br>
                <em>${t.hero.testimonialPlaceholder.quote}</em> — ${t.hero.testimonialPlaceholder.author}
              </p>
            </div>
            <div style="background:#fff;border:1px solid #E5E5E0;border-radius:14px;padding:30px;box-shadow:0 18px 50px rgba(26,39,68,0.12)">

              <p style="font-family:var(--font-serif);font-size:26px;color:var(--navy);margin:0 0 4px">${t.hero.form.title}</p>
              <p style="font-family:var(--font-sans);font-size:13px;color:var(--text-muted);margin:0 0 18px">${t.hero.form.subtitle}</p>

                <input type="text" name="nombre" placeholder="${t.hero.form.namePlaceholder}" required style="padding:13px 16px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:15px;color:#1A2744;outline:none">
                <input type="email" name="email" placeholder="${t.hero.form.emailPlaceholder}" required style="padding:13px 16px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:15px;color:#1A2744;outline:none">
                <div style="display:flex;gap:8px;align-items:flex-start">
                  <input type="checkbox" required style="width:15px;height:15px;flex-shrink:0;margin-top:3px;accent-color:#1A2744">
                  <label style="font-family:var(--font-sans);font-size:11px;color:#7A8499;line-height:1.4">${t.hero.form.privacyText} <a href="privacidad.html" target="_blank" style="color:#1A2744">${t.hero.form.privacyLink}</a></label>
                </div>
                <button type="submit" class="v3-btn v3-btn--gold v3-btn--full v3-btn--xl v3-btn--pulse">${t.hero.form.submitButton}</button>
                <p style="font-family:var(--font-sans);font-size:11px;color:#B0B8C4;text-align:center;margin:0">${t.hero.form.lockText}</p>
              </form>
              <p style="font-family:var(--font-sans);font-size:13px;color:var(--text-muted);text-align:center;margin:14px 0 0">${t.hero.form.phoneAlternative} <a href="tel:${t.hero.form.phoneNumber.replace(/\s/g, '')}" style="color:var(--navy);font-weight:600">${t.hero.form.phoneNumber}</a></p>

        // Testimonials carousel
        const testimonialsHTML = `
      <section class="section section--white">
        <div class="container">
          <span class="label-tag" style="display:block;text-align:center">${t.testimonials.label}</span>

            <button class="tcar__arrow tcar__arrow--prev" aria-label="Anterior">‹</button>
            <button class="tcar__arrow tcar__arrow--next" aria-label="Siguiente">›</button>
            <div class="tcar__view">
              <div class="tcar__track">
                ${t.testimonials.items.map(item => `
                  <div class="tcar__slide">
                    <div class="tcar__card">
                      <div class="tcar__stars">${item.stars}</div>
                      <p class="tcar__quote">${item.quote}</p>
                      <p class="tcar__author">${item.author}</p>
                      <p class="tcar__result">${item.result}</p>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
            <div class="tcar__dots">
              ${t.testimonials.items.map((_, idx) => `<button class="tcar__dot" data-slide="${idx}" aria-label="Opinión ${idx + 1}"></button>`).join('')}
            </div>
          </div>
        </div>
      </section>
    `;

        // Qué es TISAX
        const whatIsHTML = `
      <section class="section section--white" id="que-es">
        <div class="container">
          <span class="label-tag">${t.whatIs.label}</span>
          <div class="gold-line"></div>
          <h2 class="section-title" style="max-width:600px">${t.whatIs.title}</h2>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:60px;margin-top:52px;align-items:start">
            <div>${t.whatIs.description}</div>
            <div style="display:flex;flex-direction:column;gap:24px">
              <h3 style="font-family:var(--font-sans);font-size:13px;font-weight:600;color:var(--navy);letter-spacing:0.08em;text-transform:uppercase">Los tres niveles de assessment</h3>

                    <p style="font-family:var(--font-sans);font-size:14px;font-weight:600;color:${level.highlight ? '#fff' : 'var(--navy)'};margin:0">${level.title}</p>
                  </div>
                  <p style="font-family:var(--font-sans);font-size:13px;color:${level.highlight ? 'rgba(255,255,255,0.75)' : 'var(--text-body)'};line-height:1.6">${level.description}</p>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      </section>
    `;

        // Quién necesita TISAX
        const whoNeedsHTML = `
      <section class="section section--pearl" id="quien-necesita">
        <div class="container">
          <span class="label-tag">${t.whoNeeds.label}</span>
          <div class="gold-line"></div>
          <h2 class="section-title" style="max-width:620px">${t.whoNeeds.title}</h2>
          <p style="font-family:var(--font-sans);font-size:16px;line-height:1.8;color:var(--text-body);max-width:640px;margin-bottom:48px">${t.whoNeeds.description}</p>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px">
            ${t.whoNeeds.cards.map(card => `
              <div class="anim-fade-up" style="background:var(--white);padding:28px;display:flex;flex-direction:column;gap:12px">
                <div style="width:44px;height:44px;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0">
                  <span style="color:var(--gold);font-family:var(--font-sans);font-weight:600;font-size:14px">${card.icon}</span>

    function initInteractions() {
      // Language selector
      const langBtn = document.getElementById('langBtn');
      const langDropdown = document.getElementById('langDropdown');
      if (langBtn && langDropdown) {
        langBtn.addEventListener('click', e => { e.stopPropagation(); langDropdown.classList.toggle('open'); });
        document.addEventListener('click', () => langDropdown.classList.remove('open'));
        langDropdown.querySelectorAll('.lang-selector__option').forEach(opt => {
          opt.addEventListener('click', () => { localStorage.setItem('avsonLang', opt.dataset.lang); location.reload(); });
        });
      }

      // Menú móvil
      const burger = document.getElementById('navBurger');
      const overlay = document.getElementById('navOverlay');
      const close = document.getElementById('navClose');
      const toggleNav = (open) => {
        overlay.classList.toggle('open', open);
        document.body.classList.toggle('no-scroll', open);
      };
      burger?.addEventListener('click', () => toggleNav(!overlay.classList.contains('open')));
      close?.addEventListener('click', () => toggleNav(false));
      overlay?.addEventListener('click', (e) => { if (e.target === overlay) toggleNav(false); });

      // Scroll effect en nav
      const nav = document.getElementById('mainNav');
      window.addEventListener('scroll', () => {
        nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40);
      });

      // Animaciones fade-up
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add('visible');
        });
      }, { threshold: 0.08 });
      document.querySelectorAll('.anim-fade-up').forEach(el => observer.observe(el));

      // FAQ accordion
      document.querySelectorAll('.faq-item__question').forEach(q => {
        q.addEventListener('click', () => {
          const item = q.parentElement;
          item.classList.toggle('open');
        });
      });

      // Carrusel de testimonios
      const track = document.querySelector('.tcar__track');
      const prevBtn = document.querySelector('.tcar__arrow--prev');
      const nextBtn = document.querySelector('.tcar__arrow--next');
      const dots = document.querySelectorAll('.tcar__dot');
      if (track && prevBtn && nextBtn && dots.length) {
        let currentIndex = 0;
        const slideWidth = document.querySelector('.tcar__slide')?.offsetWidth + 24 || 344;
        const updateDots = () => {
          dots.forEach((dot, i) => dot.classList.toggle('active', i === currentIndex));
        };
        const scrollToIndex = (index) => {
          const maxIndex = dots.length - 1;
          currentIndex = Math.min(maxIndex, Math.max(0, index));
          track.scrollTo({ left: currentIndex * slideWidth, behavior: 'smooth' });
          updateDots();
        };
        prevBtn.addEventListener('click', () => scrollToIndex(currentIndex - 1));
        nextBtn.addEventListener('click', () => scrollToIndex(currentIndex + 1));
        dots.forEach((dot, i) => dot.addEventListener('click', () => scrollToIndex(i)));
        track.addEventListener('scroll', () => {
          const newIndex = Math.round(track.scrollLeft / slideWidth);
          if (newIndex !== currentIndex && !isNaN(newIndex)) {
            currentIndex = newIndex;
            updateDots();
          }
        });
        updateDots();
      }

      // Exit intent
      let exitShown = false;
      document.addEventListener('mouseleave', (e) => {
        if (e.clientY < 0 && !exitShown && !sessionStorage.getItem('_exitShown')) {
          document.getElementById('exitModal').style.display = 'flex';
          exitShown = true;
          sessionStorage.setItem('_exitShown', '1');
        }
      });

      // Sticky bar en móvil
      if (window.innerWidth <= 768) {
        document.getElementById('stickyBar').style.display = 'flex';
      }
    }

    loadContent();
  </script>
