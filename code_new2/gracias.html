  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#1f2023; --gold:#e85838; --gold-hover:#d04428; --pearl:#eef3f8; --white:#FFFFFF; --border:#d9e2ec; --muted:#7A8499; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--pearl);
      min-height: 100vh;
    }

    /* NAV estándar */
    .cnav { position:sticky; top:0; z-index:200; background:rgba(255,255,255,0.97); border-bottom:1px solid var(--border); backdrop-filter:blur(8px); }
    .cnav__inner { max-width:1320px; margin:0 auto; padding:0 28px; height:64px; display:flex; align-items:center; justify-content:space-between; gap:24px; }
    .cnav__logo { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; color:var(--navy); text-decoration:none; letter-spacing:-0.02em; white-space:nowrap; }
    .logo-o { position:relative; display:inline-block; }
    .logo-o::after { content:"\02C6"; position:absolute; top:-0.46em; left:50%; transform:translateX(-50%); font-size:0.62em; line-height:1; color:var(--gold); }
    .cnav__links { display:flex; gap:24px; align-items:center; }
    .cnav__links a { font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; color:var(--navy); text-decoration:none; transition:color .15s; }
    .cnav__links a:hover { color:var(--gold); }
    .cnav__phone { font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; color:var(--navy); text-decoration:none; white-space:nowrap; }
    .cnav__phone:hover { color:var(--gold); }
    .cnav__cta { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; color:#fff; background:var(--gold); border-radius:10px; padding:10px 16px; text-decoration:none; white-space:nowrap; transition:background .15s; }
    .cnav__cta:hover { background:var(--gold-hover); }
    .lang-switch { position:relative; font-size:13px; font-family:'DM Sans',sans-serif; }
    .lang-switch > button { background:none; border:1px solid var(--border); border-radius:8px; padding:6px 10px; cursor:pointer; color:inherit; font-family:inherit; }
    .lang-switch__menu { display:none; position:absolute; top:110%; right:0; background:var(--white); border:1px solid var(--border); border-radius:10px; padding:6px; min-width:90px; box-shadow:0 8px 24px rgba(17,19,24,.10); z-index:60; }
    .lang-switch:hover .lang-switch__menu, .lang-switch:focus-within .lang-switch__menu { display:block; }
    .lang-switch__menu a { display:block; padding:6px 10px; border-radius:6px; color:var(--navy); text-decoration:none; }
    .lang-switch__menu a:hover { background:var(--pearl); }
    @media (max-width:980px){ .cnav__links { display:none; } }
    @media (max-width:640px){ .cnav__phone, .lang-switch { display:none; } }

    .gmain {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
      text-align: center;
    }

    /* Check circle */
    .check-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(232,88,56,0.10);
      border: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
    }
    .check-circle svg { display: block; }

    /* Headline */
    h1 {
      font-family: 'Syne', serif;
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 700; color: var(--navy);
      line-height: 1.15; margin-bottom: 14px;
    }
    h1 em { font-style: normal; color: var(--gold); }

    .sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px; font-weight: 400;
      color: var(--muted); line-height: 1.6;
      max-width: 440px; margin: 0 auto 48px;
    }
    .sub strong { color: var(--navy); }

    /* Steps */
    .steps {
      display: flex; gap: 0;
      max-width: 640px; width: 100%;
      margin: 0 auto 48px;
    }
    .step {
      flex: 1; padding: 24px 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-right: none;
      position: relative;
    }
    .step:first-child { border-radius: 8px 0 0 8px; }
    .step:last-child  { border-right: 1px solid var(--border); border-radius: 0 8px 8px 0; }
    .step__num {
      font-family: 'Syne', serif;
      font-size: 32px; font-weight: 300; color: var(--gold);
      line-height: 1; margin-bottom: 8px;
    }
    .step__text {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; color: var(--muted);
      line-height: 1.55;
    }

    /* CTA secondary */
    .secondary-cta {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
      color: var(--navy); text-decoration: none;
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 12px 24px; transition: border-color 0.15s, color 0.15s;
      background: var(--white);
    }
    .secondary-cta:hover { border-color: var(--gold); color: var(--gold); }

    .separator { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--border); margin: 20px 0; }

    .linkedin-cta {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      color: #0A66C2; text-decoration: none;
      border: 1.5px solid #0A66C2; border-radius: 8px;
      padding: 10px 20px; transition: background 0.15s, color 0.15s;
    }
    .linkedin-cta:hover { background: #0A66C2; color: white; }

    .footnote {
      margin-top: 40px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; color: var(--border);
    }
    .footnote a { color: var(--muted); text-decoration: none; }
    .footnote a:hover { color: var(--navy); }

    @media (max-width: 600px) {
      .steps { flex-direction: column; }
      .step { border-right: 1px solid var(--border); border-bottom: none; border-radius: 0; }
      .step:first-child { border-radius: 8px 8px 0 0; }
      .step:last-child  { border-bottom: 1px solid var(--border); border-radius: 0 0 8px 8px; }
    }
  </style>

  <script>
    // Personalize with name from URL — wait for i18n translations to load
    document.addEventListener('i18n:ready', function () {
      var params = new URLSearchParams(window.location.search);
      var nombre = params.get('nombre');
      var titulo = document.getElementById('graciasTitulo');
      if (!titulo) return;

      // Resolve i18n keys from the page data
      var pathParts = window.location.pathname.split('/').filter(Boolean);
      var LANG = (pathParts.length > 1 && pathParts[0].length === 2) ? pathParts[0] : 'es';
      var jsonPath = LANG === 'es' ? '/assets/palabras.json' : '/' + LANG + '/assets/palabras.json';

      fetch(jsonPath).then(function (res) { return res.json(); }).then(function (data) {
        var t = data[LANG] && data[LANG].gracias;
        if (!t) return;

        if (nombre) {
          var capitalName = nombre.charAt(0).toUpperCase() + nombre.slice(1);
          titulo.innerHTML = capitalName + (t['hero.titleWithName'] || '');
        }

        // Checklist variant
        if ((params.get('source') || '').indexOf('checklist') > -1) {
          if (nombre) {
            var capitalName2 = nombre.charAt(0).toUpperCase() + nombre.slice(1);
            titulo.innerHTML = capitalName2 + ', ' + (t['hero.titleChecklist'] || '');
          } else {
            titulo.innerHTML = t['hero.titleChecklistNoName'] || '';
          }
          var dl = document.getElementById('checklistDownload');
          if (dl) dl.style.display = 'block';
        }
      });
    });
  </script>
