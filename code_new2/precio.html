  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Inicio", "item": "https://avson.eu/" },
          { "@type": "ListItem", "position": 2, "name": "Precio consultoría ENS e ISO", "item": "https://avson.eu/precio.html" }
        ]
      },
      {
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "¿El precio incluye la auditoría externa?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. El precio de la consultoría cubre todo el trabajo de implantación: análisis de brecha, documentación, formación, gestión de controles y acompañamiento en auditoría. Los honorarios de la entidad certificadora acreditada (ENAC para ENS, o cualquier certificadora ISO acreditada) se contratan directamente con ellos y varían entre 2.000€ y 6.000€ según el alcance. En el presupuesto sin compromiso te informamos del coste exacto de certificación para tu caso específico."
            }
          },
          {
            "@type": "Question",
            "name": "¿Hay algún coste adicional que no esté incluido?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "El único coste no incluido en nuestra propuesta son los honorarios del organismo certificador externo (mencionados arriba) y las posibles herramientas tecnológicas de terceros que decidas implantar. Nuestra propuesta es de precio cerrado: sin sorpresas ni presupuestos adicionales por cambios de alcance menores."
            }
          },
          {
            "@type": "Question",
            "name": "¿La garantía de éxito tiene coste adicional?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. La garantía de éxito en primera auditoría está incluida en todos nuestros proyectos sin coste adicional. Si la certificadora detecta no conformidades mayores imputables a nuestra consultoría, asumimos los costes de la auditoría de seguimiento y el trabajo adicional sin cargo al cliente."
            }
          },
          {
            "@type": "Question",
            "name": "¿Puedo financiar la consultoría?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. Ofrecemos planes de pago fraccionado en hasta 6 mensualidades sin intereses para proyectos superiores a 8.000€. También informamos sobre ayudas y subvenciones disponibles (Kit Digital, fondos Next Generation EU, convocatorias INCIBE) que pueden cubrir parte del coste de la consultoría en función del perfil de tu empresa."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cuánto ahorro si ya tengo el ENS y quiero el ISO 27001?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "El certificado ENS cubre aproximadamente el 65% de los controles de ISO 27001. Si ya estás certificado en ENS Medio o Alto, el proyecto de certificación ISO 27001 puede reducirse hasta un 50% respecto al precio estándar, ya que gran parte de la documentación, análisis de riesgos y controles ya están implantados. En el presupuesto sin compromiso te damos un presupuesto exacto de la ampliación."
            }
          }
        ]
      }
    ]
  }

  <style>
    /* ===== PRECIO PAGE SPECIFIC STYLES ===== */

    /* HERO */
    .precio-hero {
      padding: 140px 0 80px;
      background: var(--pearl, #F5F3EE);
      text-align: center;
    }
    .precio-hero__eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold, #e85838);
      margin-bottom: 20px;
    }
    .precio-hero h1 {
      font-family: 'Syne', Georgia, serif;
      font-size: clamp(2rem, 4.5vw, 3.4rem);
      font-weight: 600;
      color: var(--navy, #1f2023);
      max-width: 820px;
      margin: 0 auto 24px;
      line-height: 1.2;
    }
    .precio-hero__intro {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.1rem;
      color: #4a4a4a;
      max-width: 680px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* FACTORES */
    .precio-factores {
      padding: 80px 0;
      background: #fff;
    }
    .precio-factores__title {
      font-family: 'Syne', Georgia, serif;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 600;
      color: var(--navy, #1f2023);
      text-align: center;
      margin: 0 0 12px;
    }
    .precio-factores__sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: #6b6b6b;
      text-align: center;
      margin: 0 0 52px;
    }
    .precio-factores__grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 32px;
      max-width: 960px;
      margin: 0 auto;
    }
    .precio-factor {
      text-align: center;
      padding: 40px 28px;
      border: 1px solid var(--border, #E2DDD6);
      border-radius: 4px;
      background: var(--pearl, #F5F3EE);
    }
    .precio-factor__icon {
      width: 56px;
      height: 56px;
      background: rgba(26,39,68,0.07);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .precio-factor h3 {
      font-family: 'Syne', Georgia, serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--navy, #1f2023);
      margin: 0 0 10px;
    }
    .precio-factor p {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: #5a5a5a;
      line-height: 1.65;
      margin: 0;
    }

    /* TABLA DE PRECIOS */
    .precio-tabla {
      padding: 80px 0;
      background: var(--pearl, #F5F3EE);
    }
    .precio-tabla__title {
      font-family: 'Syne', Georgia, serif;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 600;
      color: var(--navy, #1f2023);
      text-align: center;
      margin: 0 0 12px;
    }
    .precio-tabla__sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: #6b6b6b;
      text-align: center;
      margin: 0 0 48px;
    }
    .precio-tabla__wrapper {
      max-width: 960px;
      margin: 0 auto;
      overflow-x: auto;
    }
    .precio-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'DM Sans', sans-serif;
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 2px 20px rgba(26,39,68,0.07);
    }
    .precio-table thead tr {
      background: var(--navy, #1f2023);
      color: #fff;
    }
    .precio-table thead th {
      padding: 18px 20px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .precio-table thead th:first-child {
      color: rgba(255,255,255,0.7);
    }
    .precio-table thead th:not(:first-child) {
      text-align: center;
      color: var(--gold, #e85838);
    }
    .precio-table tbody tr {
      border-bottom: 1px solid var(--border, #E2DDD6);
      transition: background 0.15s;
    }
    .precio-table tbody tr:last-child {
      border-bottom: none;
    }
    .precio-table tbody tr:hover {
      background: rgba(232,88,56,0.05);
    }
    .precio-table tbody tr.highlight {
      background: rgba(26,39,68,0.04);
    }
    .precio-table td {
      padding: 16px 20px;
      font-size: 0.9rem;
      color: #333;
    }
    .precio-table td:first-child {
      font-weight: 500;
      color: var(--navy, #1f2023);
    }
    .precio-table td:not(:first-child) {
      text-align: center;
      color: #1a1a1a;
    }
    .precio-table td .consultar {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gold, #e85838);
      cursor: pointer;
      text-decoration: none;
      border-bottom: 1px solid rgba(232,88,56,0.4);
    }
    .precio-table td .tag-pack {
      display: inline-block;
      background: var(--gold, #e85838);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .precio-table__note {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-top: 20px;
      font-style:normal;
    }

    /* POR QUÉ COMPENSA */
    .precio-argumentos {
      padding: 80px 0;
      background: var(--navy, #1f2023);
    }
    .precio-argumentos__title {
      font-family: 'Syne', Georgia, serif;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 600;
      color: #fff;
      text-align: center;
      margin: 0 0 12px;
    }
    .precio-argumentos__sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: rgba(255,255,255,0.65);
      text-align: center;
      margin: 0 0 52px;
    }
    .precio-argumentos__grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 28px;
      max-width: 960px;
      margin: 0 auto;
    }
    .precio-argumento {
      padding: 36px 24px;
      border: 1px solid rgba(232,88,56,0.2);
      border-radius: 4px;
    }
    .precio-argumento__icon {
      width: 44px;
      height: 44px;
      background: rgba(232,88,56,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .precio-argumento h3 {
      font-family: 'Syne', Georgia, serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--gold, #e85838);
      margin: 0 0 10px;
    }
    .precio-argumento p {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: rgba(255,255,255,0.78);
      line-height: 1.65;
      margin: 0;
    }

    /* CTA BOX */
    .precio-cta {
      padding: 80px 0;
      background: #fff;
    }
    .precio-cta__box {
      max-width: 680px;
      margin: 0 auto;
      background: var(--navy, #1f2023);
      border-radius: 4px;
      padding: 56px 48px;
      text-align: center;
    }
    .precio-cta__eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold, #e85838);
      margin-bottom: 16px;
    }
    .precio-cta__title {
      font-family: 'Syne', Georgia, serif;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 600;
      color: #fff;
      margin: 0 0 16px;
      line-height: 1.25;
    }
    .precio-cta__desc {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.75);
      margin: 0 0 36px;
      line-height: 1.65;
    }
    .precio-cta__btn {
      display: inline-block;
      background: var(--gold, #e85838);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 16px 36px;
      border-radius: 2px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .precio-cta__btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    /* FAQ */
    .precio-faq {
      padding: 80px 0;
      background: var(--pearl, #F5F3EE);
    }
    .precio-faq__title {
      font-family: 'Syne', Georgia, serif;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 600;
      color: var(--navy, #1f2023);
      text-align: center;
      margin: 0 0 48px;
    }
    .precio-faq__list {
      max-width: 760px;
      margin: 0 auto;
    }
    .faq-item {
      border: 1px solid var(--border, #E2DDD6);
      border-radius: 4px;
      margin-bottom: 12px;
      background: #fff;
      overflow: hidden;
    }
    .faq-item__question {
      width: 100%;
      background: none;
      border: none;
      padding: 22px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      cursor: pointer;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--navy, #1f2023);
      transition: background 0.15s;
    }
    .faq-item__question:hover {
      background: rgba(232,88,56,0.05);
    }
    .faq-item__icon {
      font-size: 1.3rem;
      font-weight: 300;
      color: var(--gold, #e85838);
      flex-shrink: 0;
      line-height: 1;
    }
    .faq-item__answer {
      display: none;
      padding: 0 24px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: #4a4a4a;
      line-height: 1.7;
    }
    .faq-item.open .faq-item__answer {
      display: block;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .precio-hero { padding: 120px 24px 60px; }
      .precio-factores { padding: 60px 24px; }
      .precio-tabla { padding: 60px 24px; }
      .precio-argumentos { padding: 60px 24px; }
      .precio-cta { padding: 60px 24px; }
      .precio-cta__box { padding: 40px 24px; }
      .precio-faq { padding: 60px 24px; }
    }
    @media (max-width: 760px) {
      .precio-table th, .precio-table td { padding: 12px 12px; font-size: 0.82rem; }
    }
  </style>

  <!-- FACTORES QUE DETERMINAN EL PRECIO -->
  <section class="precio-factores">
    <div class="container" style="padding:0 24px;">
      <h2 class="precio-factores__title anim-fade-up" data-i18n="factors.title"></h2>
      <p class="precio-factores__sub anim-fade-up" data-i18n="factors.subtitle"></p>
      <div class="precio-factores__grid">

        <div class="precio-factor anim-fade-up">
          <div class="precio-factor__icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1f2023" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <h3 data-i18n="factors.card1.title"></h3>
          <p data-i18n="factors.card1.text"></p>
        </div>

        <div class="precio-factor anim-fade-up">
          <div class="precio-factor__icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1f2023" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>

  <script>
  // Wait for i18n.js to inject content before initializing interactions
  document.addEventListener('i18n:ready', function () {
    // INTERSECTION OBSERVER - FADE UP
    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
      });
    }, { threshold: 0.12 });
    document.querySelectorAll('.anim-fade-up').forEach(function (el) { observer.observe(el); });

    // FAQ ACCORDION
    document.querySelectorAll('.faq-item__question').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var item = btn.closest('.faq-item');
        var isOpen = item.classList.contains('open');
        document.querySelectorAll('.faq-item.open').forEach(function (i) {
          i.classList.remove('open');
          i.querySelector('.faq-item__question').setAttribute('aria-expanded', 'false');
          i.querySelector('.faq-item__icon').textContent = '+';
        });
        if (!isOpen) {
          item.classList.add('open');
          btn.setAttribute('aria-expanded', 'true');
          btn.querySelector('.faq-item__icon').textContent = '\u00d7';
        }
      });
    });
  });

  // LANGUAGE SWITCHER
  function toggleLang() {
    document.getElementById('langSwitcher').classList.toggle('open');
  }
  document.addEventListener('click', function (e) {
    var ls = document.getElementById('langSwitcher');
    if (ls && !ls.contains(e.target)) ls.classList.remove('open');
  });
  </script>

<script>
(function(){
  var nav = document.getElementById('mainNav');
  var burger = document.getElementById('navBurger');
  var overlay = document.getElementById('navOverlay');
  var close = document.getElementById('navClose');
  if(nav) window.addEventListener('scroll', function(){ nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40); }, {passive:true});
  function toggleNav(open){ if(overlay){ overlay.classList.toggle('open',open); document.body.classList.toggle('no-scroll',open); } }
  if(burger) burger.addEventListener('click', function(){ toggleNav(!overlay.classList.contains('open')); });
  if(close) close.addEventListener('click', function(){ toggleNav(false); });
})();
</script>
