<!-- ENS HERO — conversión primero (página estrella) -->
<style>
  .hero-conv { display:grid; grid-template-columns:1.05fr 0.95fr; gap:48px; align-items:center; }
  .hero-conv__kpis { display:flex; gap:30px; flex-wrap:wrap; margin:24px 0 20px; }
  .hero-conv__kpi strong { font-family:var(--font-serif); font-size:42px; font-weight:300; color:var(--navy); line-height:1; display:block; }
  .hero-conv__kpi span { font-family:var(--font-sans); font-size:11px; color:var(--text-muted); letter-spacing:0.07em; text-transform:uppercase; }
  .ens-fomo-chip { display:inline-block; background:rgba(232,88,56,0.08); border:1px solid var(--gold); color:#b4421f; font-family:var(--font-sans); font-size:12.5px; font-weight:600; padding:7px 14px; border-radius:20px; margin-bottom:16px; }

</style>
<section class="page-hero" style="padding-bottom:56px">
  <div class="container">
    <div class="page-hero__breadcrumb">
      <a href="index.html" data-i18n="hero.breadcrumb.home"></a>
      <span>/</span>
      <span style="color:var(--navy)" data-i18n="hero.breadcrumb.current"></span>
    </div>
    <div class="hero-conv">

      <!-- IZQUIERDA -->
      <div>
        <span class="ens-fomo-chip" data-i18n="hero.chip"></span>
        <h1 class="display-title" style="margin:0" data-i18n="hero.title"></h1>
        <p class="body-large" style="max-width:540px;margin-top:18px" data-i18n="hero.description"></p>

        <div class="hero-conv__kpis">
          <div class="hero-conv__kpi"><strong data-i18n="hero.kpi1.value"></strong><span data-i18n="hero.kpi1.label"></span></div>
          <div class="hero-conv__kpi"><strong data-i18n="hero.kpi2.value"></strong><span data-i18n="hero.kpi2.label"></span></div>
          <div class="hero-conv__kpi"><strong data-i18n="hero.kpi3.value"></strong><span data-i18n="hero.kpi3.label"></span></div>
        </div>

        <div style="display:inline-flex;align-items:center;gap:8px;border:1px solid #e85838;padding:9px 16px;border-radius:8px">
          <span style="font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#1f2023" data-i18n="hero.guarantee"></span>
        </div>

        <!-- Prueba social (PROVISIONAL · sustituir por reseña real) -->
        <p style="font-family:var(--font-sans);font-size:14px;color:var(--text-body);line-height:1.6;margin:20px 0 0;max-width:480px" data-i18n="hero.testimonial"></p>
      </div>

      <!-- DERECHA: formulario -->
      <div style="background:#fff;border:1px solid #E5E5E0;border-radius:14px;padding:30px;box-shadow:0 18px 50px rgba(26,39,68,0.12)">
        <p style="font-family:var(--font-sans);font-size:13px;font-weight:700;color:var(--gold);margin:0 0 4px" data-i18n="heroForm.preTitle"></p>
        <p style="font-family:var(--font-serif);font-size:27px;color:var(--navy);margin:0 0 4px" data-i18n="heroForm.title"></p>
        <form onsubmit="avsonSubmitLead(event,{source:'ens_hero',event:'ens_lead'})" style="display:flex;flex-direction:column;gap:11px">
          <input type="text" name="nombre" placeholder="" required style="padding:13px 16px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:15px;color:#1f2023;outline:none" data-i18n-placeholder="heroForm.placeholderName">
          <input type="email" name="email" placeholder="" required style="padding:13px 16px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:15px;color:#1f2023;outline:none" data-i18n-placeholder="heroForm.placeholderEmail">
          <div style="display:flex;align-items:flex-start;gap:9px;font-family:var(--font-sans);font-size:11px;color:#7A8499;line-height:1.5">
            <input type="checkbox" required style="width:15px;height:15px;flex-shrink:0;margin-top:1px;accent-color:#1f2023">
            <span data-i18n="heroForm.checkbox"></span>
          </div>
          <button type="submit" class="v3-btn v3-btn--gold v3-btn--full v3-btn--xl v3-btn--pulse" data-i18n="heroForm.submit"></button>
          <p style="font-family:var(--font-sans);font-size:11px;color:#B0B8C4;text-align:center;margin:0" data-i18n="heroForm.note"></p>
        </form>
        <p style="font-family:var(--font-sans);font-size:13px;color:var(--text-muted);text-align:center;margin:14px 0 0" data-i18n="heroForm.phoneText"></p>
      </div>

    </div>
  </div>
</section>

<script>
document.addEventListener('i18n:ready', function () {
  window.addEventListener('scroll', function () { var n = document.getElementById('mainNav'); if (n) n.classList.toggle('scrolled', window.scrollY > 40); });
  window.addEventListener('load', function () { if (!localStorage.getItem('cookieAccepted')) { setTimeout(function () { document.getElementById('cookieBanner').classList.add('visible'); }, 1200); } });

  var obs = new IntersectionObserver(function (entries) { entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } }); }, { threshold: 0.12 });
  document.querySelectorAll('.anim-fade-up, .anim-fade').forEach(function (el) { obs.observe(el); });
  document.querySelectorAll('.faq-item__question').forEach(function (q) { q.addEventListener('click', function () { var item = q.closest('.faq-item'); var isOpen = item.classList.contains('open'); document.querySelectorAll('.faq-item').forEach(function (i) { i.classList.remove('open'); }); if (!isOpen) item.classList.add('open'); }); });
});

function closeCookie() { localStorage.setItem('cookieAccepted', 'true'); document.getElementById('cookieBanner').classList.remove('visible'); }

// Exit intent
var exitShown = false;
document.addEventListener('mouseleave', function (e) {
  if (e.clientY < 0 && !exitShown && !sessionStorage.getItem('exitShown')) {
    document.getElementById('exitModal').classList.add('visible');
    exitShown = true;
    sessionStorage.setItem('exitShown', '1');
  }
});
function closeExitModal() {
  document.getElementById('exitModal').classList.remove('visible');
}

function heroSubmit(e) {
  e.preventDefault();
  var email = document.getElementById('heroEmail').value.trim();
  if (!email) return;
  if (window.dataLayer) dataLayer.push({event: 'lead_generated', form_type: 'hero_ens'});
  window.location.href = 'contacto.html?email=' + encodeURIComponent(email);
}
</script>
