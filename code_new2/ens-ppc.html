<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <meta name="description" content="">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <script src="i18n.js?v=4"></script>
  <script type="text/javascript">(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y)})(window,document,"clarity","script","CLARITY_ID");</script>
  <script src="avson-leads.js" defer></script>
  <script src="avson-consent.js"></script>
  <!-- ═══ GOOGLE ADS REMARKETING TAG — descomentar al crear la campaña ═══ -->

  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-TU_CONVERSION_ID');

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:#1f2023; --gold:#e85838; --gold-h:#d04428;
      --pearl:#eef3f8; --white:#FFFFFF; --border:#d8dfe8; --muted:#7A8499;
    }
    html { font-size:16px; -webkit-font-smoothing:antialiased; }
    body { font-family:'DM Sans',system-ui,sans-serif; background:var(--pearl); }

    /* ── Top bar ── */
    .top-bar {
      background:var(--navy); text-align:center;
      font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
      color:rgba(255,255,255,0.9); padding:10px 20px;
    }
    .top-bar strong { color:var(--gold); }

    /* ── Header ── */
    .ppc-header {
      background:var(--white); border-bottom:1px solid var(--border);
      padding:16px 40px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .ppc-logo {
      font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700;
      letter-spacing:0.12em; text-transform:uppercase; color:var(--navy);
      text-decoration:none;
    }
    .ppc-logo span { color:var(--gold); }
    .ppc-phone {
      font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
      color:var(--navy); text-decoration:none;
    }
    .ppc-phone:hover { color:var(--gold); }

    /* ── Hero ── */
    .ppc-hero {
      display:grid; grid-template-columns:1fr 1fr;
      max-width:1100px; margin:0 auto;
      gap:60px; padding:60px 40px;
      align-items:start;
    }

    .fomo { background:rgba(232,88,56,0.08); border:1px solid rgba(232,88,56,0.35); border-radius:8px;
      padding:8px 16px; font-size:12px; font-weight:700; color:#d04428;
      display:inline-block; margin-bottom:20px;
    }

    h1 {
      font-family:'Syne',serif;
      font-size:clamp(40px,4.5vw,64px); font-weight:400;
      color:var(--navy); line-height:1.1; margin-bottom:18px;
    }
    h1 em { font-style:normal; }

    .hero-sub {
      font-size:17px; font-weight:400; color:#4a4a4a;
      line-height:1.65; margin-bottom:24px; max-width:480px;
    }
    .hero-sub strong { color:var(--navy); }

    .trust-row {
      display:flex; gap:20px; flex-wrap:wrap;
      font-size:13px; color:var(--muted);
    }
    .trust-row span::before { content:'✓ '; color:var(--gold); font-weight:700; }

    /* ── Stats ── */
    .ppc-stats {
      display:flex; gap:32px; margin-top:32px; padding-top:24px;
      border-top:1px solid var(--border);
    }
    .ppc-stat { text-align:center; }
    .ppc-stat strong {
      display:block; font-family:'Syne',serif;
      font-size:36px; font-weight:500; color:var(--navy); line-height:1;
    }
    .ppc-stat span { font-size:12px; color:var(--muted); }

    /* ── Form card ── */
    .form-card {
      background:var(--white); border-radius:16px;
      border:1px solid var(--border); padding:36px 32px;
      box-shadow:0 12px 40px rgba(26,39,68,0.12);
      position:sticky; top:20px;
    }
    .live-badge {
      display:inline-flex; align-items:center; gap:6px;
      background:#e2eaf2; color:#1f2023; font-size:11px; font-weight:700;
      padding:5px 11px; border-radius:20px; margin-bottom:14px;
    }
    .form-title {
      font-family:'Syne',serif; font-size:26px;
      font-weight:400; color:var(--navy); margin-bottom:4px;
    }
    .form-sub { font-size:13px; color:var(--muted); margin-bottom:22px; }

    .qual-label { font-size:10px; font-weight:700; letter-spacing:0.1em;
      text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .qual-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:16px; }
    .qual-btn {
      font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600;
      padding:9px 6px; border:1.5px solid var(--border);
      background:var(--pearl); color:var(--navy); border-radius:6px;
      cursor:pointer; transition:all 0.15s;
    }
    .qual-btn:hover { border-color:var(--navy); }
    .qual-btn--urgent { border-color:rgba(232,88,56,0.45); background:rgba(232,88,56,0.07); color:#d04428; }
    .qual-btn--active { background:var(--navy); border-color:var(--navy); color:var(--white); }

    .form-group { margin-bottom:10px; }
    .form-group input {
      width:100%; padding:13px 16px; border:1.5px solid var(--border);
      border-radius:8px; font-family:'DM Sans',sans-serif; font-size:15px;
      color:var(--navy); background:var(--white); outline:none;
      transition:border-color 0.15s;
    }
    .form-group input:focus { border-color:var(--navy); }
    .form-group input::placeholder { color:#B0B8C4; }

    .rgpd {
      display:flex; align-items:flex-start; gap:9px; font-size:11px;
      color:var(--muted); line-height:1.5; margin:12px 0 16px;
    }
    .rgpd input { width:15px; height:15px; flex-shrink:0; margin-top:1px;
      accent-color:var(--navy); cursor:pointer; }
    .rgpd a { color:var(--navy); }

    .btn-cta {
      width:100%; background:var(--gold); color:#fff;
      border:none; padding:17px; border-radius:10px;
      font-family:'DM Sans',sans-serif; font-size:16px; font-weight:700;
      cursor:pointer; transition:background 0.15s, transform 0.1s;
      animation:pulse 2.5s infinite;
    }
    .btn-cta:hover { background:var(--gold-h); transform:translateY(-1px); }
    @keyframes pulse {
      0%,100% { box-shadow:0 6px 20px rgba(232,88,56,0.45),0 0 0 0 rgba(232,88,56,0.25); }
      50%      { box-shadow:0 6px 20px rgba(232,88,56,0.45),0 0 0 8px rgba(232,88,56,0); }
    }
    .lock-text { font-size:11px; color:var(--muted); text-align:center; margin-top:10px; }
    .alt-phone {
      display:flex; align-items:center; justify-content:center; gap:8px;
      margin-top:16px; padding-top:16px; border-top:1px solid var(--border);
      font-size:13px; color:var(--muted);
    }
    .alt-phone a { font-weight:700; color:var(--navy); text-decoration:none; }
    .alt-phone a:hover { color:var(--gold); }

    /* ── Testimonials strip ── */
    .testi-strip {
      background:var(--white); border-top:1px solid var(--border);
      border-bottom:1px solid var(--border); padding:40px;
      display:grid; grid-template-columns:repeat(3,1fr); gap:32px;
      max-width:1100px; margin:0 auto;
    }
    .testi { }
    .testi-stars { color:var(--gold); font-size:14px; letter-spacing:2px; margin-bottom:10px; }
    .testi-quote {
      font-family:'Syne',serif; font-size:16px;
      font-weight:300; font-style:normal; color:#333; line-height:1.6;
      margin-bottom:12px;
    }
    .testi-author { font-size:12px; color:var(--muted); font-weight:600; }
    .testi-result { font-size:11px; color:var(--gold); margin-top:4px; }

    /* ── Footer minimal ── */
    .ppc-footer {
      text-align:center; padding:24px; font-size:12px; color:var(--muted);
      border-top:1px solid var(--border);
    }
    .ppc-footer a { color:var(--muted); text-decoration:none; margin:0 8px; }
    .ppc-footer a:hover { color:var(--navy); }

    @media (max-width:768px) {
      .ppc-hero { grid-template-columns:1fr; padding:32px 20px; gap:32px; }
      .ppc-header { padding:14px 20px; }
      .testi-strip { grid-template-columns:1fr; padding:32px 20px; }
      .ppc-stats { gap:20px; }
      .form-card { position:static; }
    }

    /* ── Sticky CTA solo móvil ── */
    .sticky-cta { display:none; }
    @media (max-width:640px) {
      body { padding-bottom:64px; }
      .sticky-cta {
        display:block; position:fixed; bottom:0; left:0; right:0;
        background:#e85838; color:#fff; border:none; padding:16px;
        font-family:'DM Sans',sans-serif; font-size:16px; font-weight:700;
        text-align:center; cursor:pointer; z-index:9999; width:100%;
      }
      .form-group input { min-height:52px; }
      .btn-cta { min-height:52px; }
      .qual-btn { min-height:44px; }
    }
  </style>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T6KDZDV6" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<div class="top-bar" data-i18n="topbar.text"></div>

<header class="ppc-header">
  <span class="ppc-logo">AVSON<span> · </span>GRC</span>
  <a href="tel:+34648414863" class="ppc-phone">+34 648 414 863</a>
</header>

<div class="ppc-hero">

  <!-- Left: copy -->
  <div>
    <div class="fomo" data-i18n="hero.fomo"></div>
    <h1 data-i18n="hero.title"></h1>
    <p class="hero-sub" data-i18n="hero.subtitle"></p>
    <div class="trust-row">
      <span data-i18n="hero.trust1"></span>
      <span data-i18n="hero.trust2"></span>
      <span data-i18n="hero.trust3"></span>
    </div>
    <div class="ppc-stats">
      <div class="ppc-stat"><strong data-i18n="stats.stat1.value"></strong><span data-i18n="stats.stat1.label"></span></div>
      <div class="ppc-stat"><strong data-i18n="stats.stat2.value"></strong><span data-i18n="stats.stat2.label"></span></div>
      <div class="ppc-stat"><strong data-i18n="stats.stat3.value"></strong><span data-i18n="stats.stat3.label"></span></div>
    </div>
  </div>

  <!-- Right: form -->
  <div class="form-card">
    <span class="live-badge" data-i18n="form.liveBadge"></span>
    <p class="form-title" data-i18n="form.title"></p>
    <p class="form-sub" data-i18n="form.subtitle"></p>

    <p class="qual-label" data-i18n="form.qualLabel"></p>
    <div class="qual-grid">
      <button type="button" class="qual-btn qual-btn--urgent" onclick="pickQ(this,'ENS Express urgente')" data-i18n="form.qualBtn1"></button>
      <button type="button" class="qual-btn" onclick="pickQ(this,'ENS estándar')" data-i18n="form.qualBtn2"></button>
      <button type="button" class="qual-btn" onclick="pickQ(this,'ISO 27001')" data-i18n="form.qualBtn3"></button>
      <button type="button" class="qual-btn" onclick="pickQ(this,'No lo sé aún')" data-i18n="form.qualBtn4"></button>
    </div>
    <input type="hidden" id="pNecesidad" value="">

    <form id="ppcForm" onsubmit="avsonSubmitLead(event,{source:'ppc_ens',event:'ppc_lead'})" novalidate>
      <div class="form-group">
        <input type="text"  id="pNombre" name="nombre" placeholder="" autocomplete="given-name" required data-i18n-placeholder="form.placeholderName">
      </div>
      <div class="form-group">
        <input type="email" id="pEmail"  name="email"  placeholder="" autocomplete="email" required data-i18n-placeholder="form.placeholderEmail">
      </div>
      <div class="rgpd">
        <input type="checkbox" id="pRgpd" required>
        <label for="pRgpd" data-i18n="form.rgpd"></label>
      </div>
      <div class="rgpd">
        <input type="checkbox" id="pComercial" name="comercial">
        <label for="pComercial" data-i18n="form.comercial"></label>
      </div>
      <button type="submit" class="btn-cta" data-i18n="form.submit"></button>
      <p class="lock-text" data-i18n="form.lockText1"></p>
      <p class="lock-text" style="margin-top:6px;font-weight:600;color:var(--navy)" data-i18n="form.lockText2"></p>
    </form>

    <div class="alt-phone">
      <span data-i18n="form.altPhoneLabel"></span>
      <a href="tel:+34648414863">+34 648 414 863</a>
    </div>
  </div>

</div>

<!-- Testimonials -->
<div class="testi-strip" data-i18n-list="testimonials.items" data-i18n-template="tpl-testimonial">
  <template id="tpl-testimonial">
    <div class="testi">
      <div class="testi-stars">★★★★★</div>
      <p class="testi-quote">{{quote}}</p>
      <p class="testi-author">{{author}}</p>
      <p class="testi-result">{{result}}</p>
    </div>
  </template>
</div>

<footer class="ppc-footer">
  <span data-i18n="footer.text"></span>
  <a href="privacidad.html" target="_blank" rel="noopener" data-i18n="footer.privacy"></a>
</footer>

<button type="button" class="sticky-cta" onclick="document.getElementById('ppcForm').scrollIntoView({behavior:'smooth',block:'center'})" data-i18n="stickyCta.text"></button>

<script>
function pickQ(btn, val) {
  document.getElementById('pNecesidad').value = val;
  document.querySelectorAll('.qual-btn').forEach(b => b.classList.remove('qual-btn--active'));
  btn.classList.add('qual-btn--active');
}
function submitPPC(e) {
  e.preventDefault();
  const d = { nombre: pNombre.value, email: pEmail.value, necesidad: pNecesidad.value, source: 'ppc_ens' };
  if (window.dataLayer) dataLayer.push({ event: 'ppc_lead', ...d });
  window.location.href = 'gracias.html?nombre=' + encodeURIComponent(d.nombre) + '&source=ppc_ens';
}
</script>

</body>
</html>
