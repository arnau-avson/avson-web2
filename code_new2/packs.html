<!-- ══════════════════════════════════════════════════════════════════
     PRESUPUESTO INMEDIATO — gateado por email corporativo
     El cálculo lo hace avson-quote.js EN EL NAVEGADOR (fase de validación).

     DESARROLLADOR — ATENCIÓN:
       1) EL PRECIO SOLO SE ENTREGA TRAS VALIDAR EMAIL CORPORATIVO (modelo
          aseguradora). El gate está en avsonQuoteSubmit() y debe REPLICARSE
          en el backend: el endpoint no devuelve cifra sin email de empresa.
       2) Antes de publicar, mover avsonComputeQuote() al backend para no
          exponer la lógica de precios. Ver EDITAR_ANTES_DE_PUBLICAR.md.
══════════════════════════════════════════════════════════════════ -->
<section class="section section--navy" style="padding-top:64px;padding-bottom:64px">
  <div class="container" style="max-width:920px">
    <div style="display:grid;grid-template-columns:1fr 1.1fr;gap:48px;align-items:start" class="presupuesto-grid">
      <div>
        <h2 style="font-family:var(--font-serif);font-size:clamp(30px,4vw,44px);font-weight:300;color:#fff;line-height:1.15;margin:14px 0 16px" data-i18n="quote.title"></h2>
        <p style="font-family:var(--font-sans);font-size:15px;color:rgba(255,255,255,0.75);line-height:1.6;margin-bottom:20px" data-i18n="quote.subtitle"></p>
        <ul style="list-style:none;padding:0;margin:0;font-family:var(--font-sans);font-size:14px;color:rgba(255,255,255,0.7);line-height:1.5">
          <li style="margin-bottom:8px" data-i18n="quote.benefit1"></li>
          <li style="margin-bottom:8px" data-i18n="quote.benefit2"></li>
          <li data-i18n="quote.benefit3"></li>
        </ul>
      </div>
      <div>
        <div style="background:#fff;border-radius:12px;padding:28px">
          <form data-corp="1" onsubmit="avsonQuoteSubmit(event)" style="display:flex;flex-direction:column;gap:14px">
            <div style="display:flex;gap:10px">
              <input type="text" name="nombre" placeholder="" required
                style="flex:1;min-width:0;padding:12px 14px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:14px;color:#1f2023;outline:none" data-i18n-placeholder="quote.placeholderName">
              <input type="email" name="email" placeholder="" required
                style="flex:1.2;min-width:0;padding:12px 14px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:14px;color:#1f2023;outline:none" data-i18n-placeholder="quote.placeholderEmail">
            </div>
            <input type="tel" name="telefono" placeholder="" data-i18n-placeholder="quote.placeholderPhone" autocomplete="tel"
              style="padding:12px 14px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:14px;color:#1f2023;outline:none">

            <div>
              <p style="font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#7A8499;margin:2px 0 8px" data-i18n="quote.normasLabel"></p>
              <p style="font-family:var(--font-sans);font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#1f2023;margin:0 0 6px" data-i18n="quote.normasPrincipales"></p>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;font-family:var(--font-sans);font-size:13px;font-weight:600;color:#1f2023;margin-bottom:10px">
                <label style="display:flex;gap:7px;align-items:center;cursor:pointer"><input type="checkbox" name="norma" value="ens" style="accent-color:#1f2023">ENS</label>
                <label style="display:flex;gap:7px;align-items:center;cursor:pointer"><input type="checkbox" name="norma" value="iso27001" style="accent-color:#1f2023">ISO 27001</label>
                <label style="display:flex;gap:7px;align-items:center;cursor:pointer"><input type="checkbox" name="norma" value="iso22301" style="accent-color:#1f2023">ISO 22301</label>
                <label style="display:flex;gap:7px;align-items:center;cursor:pointer"><input type="checkbox" name="norma" value="dora" style="accent-color:#1f2023">DORA</label>
              </div>
              <p style="font-family:var(--font-sans);font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#7A8499;margin:0 0 6px" data-i18n="quote.normasOtras"></p>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;font-family:var(--font-sans);font-size:13px;color:#7A8499">
                <label style="display:flex;gap:7px;align-items:center;cursor:pointer"><input type="checkbox" name="norma" value="iso9001" style="accent-color:#1f2023">ISO 9001</label>
                <label style="display:flex;gap:7px;align-items:center;cursor:pointer"><input type="checkbox" name="norma" value="iso14001" style="accent-color:#1f2023">ISO 14001</label>
                <label style="display:flex;gap:7px;align-items:center;cursor:pointer"><input type="checkbox" name="norma" value="iso42001" style="accent-color:#1f2023">ISO 42001</label>
                <label style="display:flex;gap:7px;align-items:center;cursor:pointer"><input type="checkbox" name="norma" value="iso50001" style="accent-color:#1f2023">ISO 50001</label>
              </div>
            </div>

            <div style="display:flex;gap:10px">
              <select name="ubicaciones" required style="flex:1;min-width:0;padding:11px 12px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:13px;color:#1f2023;background:#fff">
                <option value="" disabled selected data-i18n-text="quote.ubicacionesDefault"></option>
                <option value="1" data-i18n-text="quote.ubicaciones1"></option>
                <option value="2" data-i18n-text="quote.ubicaciones2"></option>
                <option value="3" data-i18n-text="quote.ubicaciones3"></option>
              </select>
              <select name="ensCategoria" style="flex:1;min-width:0;padding:11px 12px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:13px;color:#1f2023;background:#fff">
                <option value="media" selected data-i18n-text="quote.ensCatMedia"></option>
                <option value="alta" data-i18n-text="quote.ensCatAlta"></option>
              </select>
            </div>

            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
              <select name="infra" style="flex:1;min-width:120px;padding:11px 12px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:13px;color:#1f2023;background:#fff">
                <option value="cloud" selected data-i18n-text="quote.infraCloud"></option>
                <option value="onprem" data-i18n-text="quote.infraOnprem"></option>
              </select>
              <label style="display:flex;gap:7px;align-items:center;cursor:pointer;font-family:var(--font-sans);font-size:13px;color:#1f2023;flex:1;min-width:120px">
                <input type="checkbox" name="express" value="si" style="accent-color:#e85838"><span data-i18n="quote.expressLabel"></span>
              </label>
            </div>

            <div style="display:flex;gap:8px;align-items:flex-start">
              <input type="checkbox" required style="width:15px;height:15px;flex-shrink:0;margin-top:3px;accent-color:#1f2023">
              <label style="font-family:var(--font-sans);font-size:12px;color:#7A8499;line-height:1.4" data-i18n="quote.consent"></label>
            </div>
            <button type="submit" class="v3-btn v3-btn--gold v3-btn--pulse" style="width:100%;justify-content:center;padding:15px" data-i18n="quote.submit"></button>
            <p style="font-family:var(--font-sans);font-size:11px;color:var(--text-muted);text-align:center;margin-top:8px;margin-bottom:0" data-i18n="quote.note"></p>
          </form>
        </div>
        <!-- Panel de resultado (se rellena con avson-quote.js) -->
        <div id="quoteResult" style="display:none;margin-top:16px"></div>
      </div>
    </div>
  </div>
</section>

<script>
(function(){
  var bar=document.getElementById("scroll-cta-bar");
  if(!bar)return;
  window.addEventListener("scroll",function(){if(window.scrollY>300){bar.classList.add("visible");}else{bar.classList.remove("visible");}},{passive:true});
})();
</script>

<script>
(function(){
  var nav = document.getElementById('mainNav');
  var burger = document.getElementById('navBurger');
  var overlay = document.getElementById('navOverlay');
  var close = document.getElementById('navClose');
  if(nav) window.addEventListener('scroll', function(){ nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40); }, {passive:true});
  function toggleNav(open){ if(overlay){ overlay.classList.toggle('open',open); document.body.classList.toggle('no-scroll',open); } }
  if(burger) burger.addEventListener('click', function(){ toggleNav(!overlay.classList.contains('open')); });
  if(close) close.addEventListener('click', function(){ toggleNav(false); });
})();
</script>

<script>
// Wait for i18n.js to inject content before initializing interactions
document.addEventListener('i18n:ready', function () {
  var obs = new IntersectionObserver(function (e) { e.forEach(function (el) { if (el.isIntersecting) el.target.classList.add('visible'); }); }, { threshold: 0.08 });
  document.querySelectorAll('.anim-fade-up').forEach(function (el) { obs.observe(el); });
  document.querySelectorAll('.faq-item__question').forEach(function (q) {
    q.addEventListener('click', function () { q.parentElement.classList.toggle('open'); });
  });
});

var _exitShown = false;
document.addEventListener('mouseleave', function (e) {
  if (e.clientY < 0 && !_exitShown && !sessionStorage.getItem('_exitShown')) {
    document.getElementById('exitModal').style.display = 'flex';
    _exitShown = true;
    sessionStorage.setItem('_exitShown', '1');
  }
});
if (window.innerWidth <= 768) { document.getElementById('stickyBar').style.display = 'flex'; }
</script>
