      {"@type": "Question","name": "¿Cómo sé si mi empresa necesita ENS Básico o Medio?","acceptedAnswer": {"@type": "Answer","text": "La categoría se determina por el impacto potencial de un incidente de seguridad en los sistemas que prestan servicio a la AP. Si el impacto más alto posible en alguna de las cinco dimensiones (confidencialidad, integridad, disponibilidad, autenticidad, trazabilidad) es Medio, la categoría es Media. Avson realiza este análisis de forma gratuita como parte del diagnóstico inicial."}},

      {"@type": "Question","name": "¿Cuánto más exigente es el ENS Medio respecto al Básico?","acceptedAnswer": {"@type": "Answer","text": "El ENS Medio exige aproximadamente 60 medidas frente a las 45 del Básico, y con mayor nivel de detalle. Las diferencias más relevantes son: doble factor de autenticación obligatorio, monitorización continua de la seguridad, gestión formal de vulnerabilidades, planes de continuidad más desarrollados y mayor exigencia en la gestión de incidentes."}},
      {"@type": "Question","name": "¿Tengo que renovar el ENS Medio cada cierto tiempo?","acceptedAnswer": {"@type": "Answer","text": "Sí. El certificado ENS Medio tiene una validez de dos años. Antes del vencimiento es obligatorio someterse a una auditoría de renovación. En Avson monitorizamos la caducidad y gestionamos todo el proceso de renovación como parte de nuestra relación vitalicia con cada cliente."}},
      {"@type": "Question","name": "Si ya tengo ISO 27001, ¿cuánto tiempo me lleva el ENS Medio?","acceptedAnswer": {"@type": "Answer","text": "Si ya dispones de un SGSI ISO 27001 activo, el proceso ENS Medio puede reducirse significativamente, ya que el 65% de los controles se solapan. En Avson hacemos un análisis de diferencias específico para clientes con ISO 27001 y diseñamos un plan de implementación que aprovecha al máximo la base existente."}}

<script>
document.addEventListener('i18n:ready', function() {
  var obs = new IntersectionObserver(function(entries) { entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }}); }, { threshold: 0.12 });
  document.querySelectorAll('.anim-fade-up, .anim-fade').forEach(function(el) { obs.observe(el); });
  document.querySelectorAll('.faq-item__question').forEach(function(q) { q.addEventListener('click', function() { var item = q.closest('.faq-item'); var isOpen = item.classList.contains('open'); document.querySelectorAll('.faq-item').forEach(function(i) { i.classList.remove('open'); }); if (!isOpen) item.classList.add('open'); }); });
});

window.addEventListener('scroll', function() { var n = document.getElementById('mainNav'); if (n) n.classList.toggle('v3-nav--scrolled', window.scrollY > 40); });
function toggleNav() { document.getElementById('navOverlay').classList.toggle('open'); document.body.classList.toggle('no-overflow'); }
window.addEventListener('load', function() { if (!localStorage.getItem('cookieAccepted')) { setTimeout(function() { document.getElementById('cookieBanner').classList.add('visible'); }, 1200); } });
function closeCookie() { localStorage.setItem('cookieAccepted', 'true'); document.getElementById('cookieBanner').classList.remove('visible'); }

var exitShown = false;
document.addEventListener('mouseleave', function(e) {
  if (e.clientY < 0 && !exitShown && !sessionStorage.getItem('exitShown')) {
    document.getElementById('exitModal').classList.add('visible');
    exitShown = true;
    sessionStorage.setItem('exitShown', '1');
  }
});
function closeExitModal() { document.getElementById('exitModal').classList.remove('visible'); }

function toggleLang() { document.getElementById('langSwitcher').classList.toggle('open'); }
document.addEventListener('click', function(e) { var ls = document.getElementById('langSwitcher'); if (ls && !ls.contains(e.target)) ls.classList.remove('open'); });

function heroSubmit(e) {
  e.preventDefault();
  var emailField = document.getElementById('heroEmail') || document.getElementById('heroEmail2');
  var email = emailField ? emailField.value.trim() : '';
  if (!email) return;
  if (window.dataLayer) dataLayer.push({event: 'lead_generated', form_type: 'hero_ens_medio'});
  window.location.href = 'contacto.html?email=' + encodeURIComponent(email) + '&servicio=ENS+Medio';
}
</script>

<script>
(function(){
  var nav = document.getElementById('mainNav');
  var burger = document.getElementById('navBurger');
  var overlay = document.getElementById('navOverlay');
  var close = document.getElementById('navClose');
  if(nav) window.addEventListener('scroll', function(){ nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40); }, {passive:true});
  function toggleNav(open){ if(overlay){ overlay.classList.toggle('open',open); document.body.classList.toggle('no-scroll',open); } }
  if(burger) burger.addEventListener('click', function(){ toggleNav(!overlay.classList.contains('open')); });
  if(close) close.addEventListener('click', function(){ toggleNav(false); });
})();
</script>
