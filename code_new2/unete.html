<script>
  // Menú móvil
  (function(){
    var b=document.getElementById('navBurger'), o=document.getElementById('navOverlay'), c=document.getElementById('navClose');
    if(b&&o){ b.addEventListener('click',function(){o.classList.toggle('open');}); }
    if(c&&o){ c.addEventListener('click',function(){o.classList.remove('open');}); }
  })();
  // Candidatura — envío sin redirigir a la página de gracias de ventas
  function applyCareers(e){
    e.preventDefault();
    var f=e.target, fd=new FormData(f), email=fd.get('email')||'';
    if(typeof avsonIsValidEmail==='function' && !avsonIsValidEmail(email)){ alert('Introduce un email válido.'); return false; }
    var data={}; fd.forEach(function(v,k){data[k]=v;});
    data.source='careers'; data.page=location.pathname; data.ts=new Date().toISOString();
    if(typeof avsonTrack==='function') avsonTrack('career_application',{posicion:data.posicion||''});
    var ep = window.AVSON_CONFIG && window.AVSON_CONFIG.LEAD_ENDPOINT;
    if(ep){ fetch(ep,{method:window.AVSON_CONFIG.ENDPOINT_METHOD,headers:window.AVSON_CONFIG.ENDPOINT_HEADERS,body:JSON.stringify(data)}).catch(function(err){console.error('[Avson] Error candidatura:',err);}); }
    else { console.info('[Avson] Candidatura (modo validación · sin endpoint):', data); }
    f.style.display='none';
    document.getElementById('careerThanks').style.display='block';
    return false;
  }
</script>
