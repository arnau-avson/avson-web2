    "mainEntity": [
      {"@type": "Question","name": "¿Es suficiente la Declaración de Conformidad o necesito el certificado ENS Básico?","acceptedAnswer": {"@type": "Answer","text": "Depende del pliego. El RD 311/2022 permite la Declaración de Conformidad para la categoría Básica, pero la mayoría de organismos públicos exigen el certificado emitido por entidad acreditada por ENAC, especialmente en contratos de cierta cuantía. Avson analiza el pliego concreto y recomienda la opción adecuada."}},
      {"@type": "Question","name": "¿El ENS Básico caduca?","acceptedAnswer": {"@type": "Answer","text": "Sí. El certificado ENS Básico tiene una validez de dos años. Antes del vencimiento es necesario someterse a una auditoría de renovación para mantener la certificación vigente."}},
      {"@type": "Question","name": "¿Cuántos controles tiene el ENS Básico?","acceptedAnswer": {"@type": "Answer","text": "El ENS Básico exige aproximadamente 45 medidas de seguridad del Anexo II del RD 311/2022, un subconjunto del total de 73 controles, con nivel de exigencia inferior al requerido en las categorías Media y Alta."}},
      {"@type": "Question","name": "¿Qué diferencia hay entre ENS Básico y ENS Medio?","acceptedAnswer": {"@type": "Answer","text": "La diferencia principal es el nivel de impacto potencial. El ENS Básico aplica cuando el impacto sería limitado; el Medio cuando podría ser grave. El Medio exige medidas adicionales: doble factor de autenticación, monitorización más estricta y mayor exigencia en continuidad del servicio."}},
      {"@type": "Question","name": "¿El ENS Básico sirve para cualquier licitación pública?","acceptedAnswer": {"@type": "Answer","text": "No. Solo es válido para pliegos que especifiquen esa categoría. Muchos contratos de la AGE y Comunidades Autónomas exigen ENS Medio como mínimo. Es fundamental revisar el pliego antes de iniciar el proceso."}}

<script>
document.addEventListener('i18n:ready', function() {
  var obs = new IntersectionObserver(function(entries) { entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }}); }, { threshold: 0.12 });
  document.querySelectorAll('.anim-fade-up, .anim-fade').forEach(function(el) { obs.observe(el); });
  document.querySelectorAll('.faq-item__question').forEach(function(q) { q.addEventListener('click', function() { var item = q.closest('.faq-item'); var isOpen = item.classList.contains('open'); document.querySelectorAll('.faq-item').forEach(function(i) { i.classList.remove('open'); }); if (!isOpen) item.classList.add('open'); }); });
});

window.addEventListener('scroll', function() { var n = document.getElementById('mainNav'); if (n) n.classList.toggle('v3-nav--scrolled', window.scrollY > 40); });
function toggleNav() { document.getElementById('navOverlay').classList.toggle('open'); document.body.classList.toggle('no-overflow'); }
var exitShown = false;
document.addEventListener('mouseleave', function(e) {
  if (e.clientY < 0 && !exitShown && !sessionStorage.getItem('exitShown')) {
    document.getElementById('exitModal').classList.add('visible');
    exitShown = true;
    sessionStorage.setItem('exitShown', '1');
  }
});
function closeExitModal() { document.getElementById('exitModal').classList.remove('visible'); }

function toggleLang() { document.getElementById('langSwitcher').classList.toggle('open'); }
document.addEventListener('click', function(e) { var ls = document.getElementById('langSwitcher'); if (ls && !ls.contains(e.target)) ls.classList.remove('open'); });

function heroSubmit(e) {
  e.preventDefault();
  var emailField = document.getElementById('heroEmail') || document.getElementById('heroEmail2');
  var email = emailField ? emailField.value.trim() : '';
  if (!email) return;
  if (window.dataLayer) dataLayer.push({event: 'lead_generated', form_type: 'hero_ens_basico'});
  window.location.href = 'contacto.html?email=' + encodeURIComponent(email) + '&servicio=ENS+Basico';
}
</script>

<script>
(function(){
  var nav = document.getElementById('mainNav');
  var burger = document.getElementById('navBurger');
  var overlay = document.getElementById('navOverlay');
  var close = document.getElementById('navClose');
  if(nav) window.addEventListener('scroll', function(){ nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40); }, {passive:true});
  function toggleNav(open){ if(overlay){ overlay.classList.toggle('open',open); document.body.classList.toggle('no-scroll',open); } }
  if(burger) burger.addEventListener('click', function(){ toggleNav(!overlay.classList.contains('open')); });
  if(close) close.addEventListener('click', function(){ toggleNav(false); });
})();
</script>
