<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <meta name="description" content="">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <script src="i18n.js"></script>
  <script type="text/javascript">(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y)})(window,document,"clarity","script","CLARITY_ID");</script>
  <script src="avson-leads.js" defer></script>
  <!-- ═══ GOOGLE ADS REMARKETING TAG — descomentar al crear la campaña ═══ -->
  <!-- <script async src="https://www.googletagmanager.com/gtag/js?id=AW-TU_CONVERSION_ID"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-TU_CONVERSION_ID');
  </script> -->
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --navy:#1f2023; --gold:#e85838; --red:#e85838; --pearl:#eef3f8; --white:#fff; --border:#d8dfe8; --muted:#7A8499; }
    html { font-size:16px; -webkit-font-smoothing:antialiased; }
    body { font-family:'DM Sans',system-ui,sans-serif; background:var(--navy); min-height:100vh; }

    /* ── Urgency bar ── */
    .urgency-bar {
      background:var(--red); text-align:center;
      font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700;
      color:#fff; padding:10px 20px; letter-spacing:0.02em;
    }

    /* ── Header ── */
    .header {
      background:rgba(255,255,255,0.05); border-bottom:1px solid rgba(255,255,255,0.1);
      padding:16px 40px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .logo { font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700;
      letter-spacing:0.12em; text-transform:uppercase; color:#fff; text-decoration:none; }
    .logo span { color:var(--gold); }
    .header-phone { font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
      color:var(--gold); text-decoration:none; }

    /* ── Hero ── */
    .hero {
      display:grid; grid-template-columns:1fr 1fr;
      max-width:1100px; margin:0 auto; gap:56px;
      padding:60px 40px; align-items:start;
    }

    .express-badge {
      display:inline-flex; align-items:center; gap:8px;
      background:rgba(232,88,56,0.2); border:1px solid rgba(232,88,56,0.5);
      color:#f4906e; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:700;
      padding:7px 16px; border-radius:20px; margin-bottom:24px;
      letter-spacing:0.04em; text-transform:uppercase;
    }

    h1 {
      font-family:'Syne',serif;
      font-size:clamp(42px,5vw,68px); font-weight:400;
      color:#fff; line-height:1.05; margin-bottom:20px;
    }
    h1 em { font-style:normal; color:var(--gold); }

    .hero-sub { font-size:17px; color:rgba(255,255,255,0.7); line-height:1.65; margin-bottom:28px; }
    .hero-sub strong { color:#fff; }

    /* ── How it works ── */
    .how { display:flex; gap:0; margin-bottom:36px; }
    .how-step {
      flex:1; background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1); border-right:none;
      padding:16px 14px; text-align:center;
    }
    .how-step:last-child { border-right:1px solid rgba(255,255,255,0.1); }
    .how-step__num { font-family:'Syne',serif; font-size:28px;
      font-weight:300; color:var(--gold); }
    .how-step__text { font-family:'DM Sans',sans-serif; font-size:11px;
      color:rgba(255,255,255,0.6); margin-top:6px; line-height:1.4; }

    /* ── Form card ── */
    .form-card {
      background:var(--white); border-radius:16px;
      padding:36px 32px; box-shadow:0 20px 60px rgba(0,0,0,0.3);
      position:sticky; top:20px;
    }
    .live-badge {
      display:inline-flex; align-items:center; gap:6px;
      background:#e2eaf2; color:#1f2023; font-size:11px; font-weight:700;
      padding:5px 11px; border-radius:20px; margin-bottom:14px;
    }
    .form-title { font-family:'Syne',serif; font-size:26px;
      font-weight:400; color:var(--navy); margin-bottom:4px; }
    .form-sub { font-size:13px; color:var(--muted); margin-bottom:8px; }
    .form-urgency { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:700;
      color:var(--red); margin-bottom:20px; }

    .form-group { margin-bottom:10px; }
    .form-group input {
      width:100%; padding:13px 16px; border:1.5px solid var(--border); border-radius:8px;
      font-family:'DM Sans',sans-serif; font-size:15px; color:var(--navy);
      background:var(--white); outline:none; transition:border-color 0.15s;
    }
    .form-group input:focus { border-color:var(--navy); }
    .form-group input::placeholder { color:#B0B8C4; }

    .rgpd { display:flex; align-items:flex-start; gap:9px; font-size:11px;
      color:var(--muted); line-height:1.5; margin:12px 0 16px; }
    .rgpd input { width:15px; height:15px; flex-shrink:0; margin-top:1px;
      accent-color:var(--navy); cursor:pointer; }
    .rgpd a { color:var(--navy); }

    .btn-cta {
      width:100%; background:var(--red); color:#fff; border:none; padding:17px;
      border-radius:10px; font-family:'DM Sans',sans-serif; font-size:16px; font-weight:700;
      cursor:pointer; transition:background 0.15s, transform 0.1s;
      animation:pulse-red 2.2s infinite;
    }
    .btn-cta:hover { background:#d04428; transform:translateY(-1px); }
    @keyframes pulse-red {
      0%,100% { box-shadow:0 6px 20px rgba(232,88,56,0.45),0 0 0 0 rgba(232,88,56,0.25); }
      50%      { box-shadow:0 6px 20px rgba(232,88,56,0.45),0 0 0 8px rgba(232,88,56,0); }
    }

    .lock-text { font-size:11px; color:var(--muted); text-align:center; margin-top:10px; }
    .alt-phone { display:flex; align-items:center; justify-content:center; gap:8px;
      margin-top:16px; padding-top:16px; border-top:1px solid var(--border);
      font-size:13px; color:var(--muted); }
    .alt-phone a { font-weight:700; color:var(--navy); text-decoration:none; }

    /* ── Trust strip ── */
    .trust-strip {
      background:rgba(255,255,255,0.05); border-top:1px solid rgba(255,255,255,0.08);
      padding:28px 40px; display:flex; align-items:center;
      justify-content:center; gap:48px; flex-wrap:wrap;
    }
    .trust-item { text-align:center; }
    .trust-item strong { display:block; font-family:'Syne',serif;
      font-size:36px; font-weight:500; color:var(--gold); line-height:1; }
    .trust-item span { font-family:'DM Sans',sans-serif; font-size:12px; color:rgba(255,255,255,0.5); }

    /* ── Footer ── */
    .ppc-footer { text-align:center; padding:20px; font-size:12px;
      color:rgba(255,255,255,0.3); border-top:1px solid rgba(255,255,255,0.08); }
    .ppc-footer a { color:rgba(255,255,255,0.3); text-decoration:none; margin:0 8px; }

    @media (max-width:768px) {
      .hero { grid-template-columns:1fr; padding:32px 20px; gap:32px; }
      .header { padding:14px 20px; }
      .trust-strip { gap:24px; padding:24px 20px; }
      .how { flex-direction:column; }
      .how-step { border-right:1px solid rgba(255,255,255,0.1); border-bottom:none; }
      .how-step:last-child { border-bottom:1px solid rgba(255,255,255,0.1); }
      .form-card { position:static; }
    }

    /* ── Sticky CTA solo móvil ── */
    .sticky-cta { display:none; }
    @media (max-width:640px) {
      body { padding-bottom:64px; }
      .sticky-cta {
        display:block; position:fixed; bottom:0; left:0; right:0;
        background:#e85838; color:#fff; border:none; padding:16px;
        font-family:'DM Sans',sans-serif; font-size:16px; font-weight:700;
        text-align:center; cursor:pointer; z-index:9999; width:100%;
      }
      .form-group input { min-height:52px; }
      .btn-cta { min-height:52px; }
    }
  </style>
</head>
<body>

<div class="urgency-bar" data-i18n="urgencyBar.text"></div>

<header class="header">
  <span class="logo">AVSON<span> · </span>GRC</span>
  <a href="tel:+34648414863" class="header-phone">+34 648 414 863</a>
</header>

<div class="hero">

  <!-- Left -->
  <div>
    <div class="express-badge" data-i18n="hero.badge"></div>
    <h1 data-i18n="hero.title"></h1>
    <p class="hero-sub" data-i18n="hero.subtitle"></p>

    <div class="how">
      <div class="how-step">
        <div class="how-step__num" data-i18n="hero.step1.num"></div>
        <p class="how-step__text" data-i18n="hero.step1.text"></p>
      </div>
      <div class="how-step">
        <div class="how-step__num" data-i18n="hero.step2.num"></div>
        <p class="how-step__text" data-i18n="hero.step2.text"></p>
      </div>
      <div class="how-step">
        <div class="how-step__num" data-i18n="hero.step3.num"></div>
        <p class="how-step__text" data-i18n="hero.step3.text"></p>
      </div>
    </div>

    <p style="font-family:'DM Sans',sans-serif;font-size:13px;color:rgba(255,255,255,0.5)" data-i18n="hero.availability"></p>
  </div>

  <!-- Right: form -->
  <div class="form-card">
    <span class="live-badge" data-i18n="form.liveBadge"></span>
    <p class="form-title" data-i18n="form.title"></p>
    <p class="form-sub" data-i18n="form.subtitle"></p>
    <p class="form-urgency" data-i18n="form.urgency"></p>

    <form id="expressForm" onsubmit="avsonSubmitLead(event,{source:'ppc_express',event:'ppc_express_lead'})" novalidate>
      <div class="form-group">
        <input type="text"  id="eNombre" name="nombre" placeholder="" autocomplete="given-name" required data-i18n-placeholder="form.placeholderName">
      </div>
      <div class="form-group">
        <input type="email" id="eEmail"  name="email"  placeholder="" autocomplete="email" required data-i18n-placeholder="form.placeholderEmail">
      </div>
      <div class="form-group">
        <input type="text" id="ePliego" name="pliego" placeholder="" autocomplete="off" data-i18n-placeholder="form.placeholderPliego">
      </div>
      <div class="rgpd">
        <input type="checkbox" id="eRgpd" required>
        <label for="eRgpd" data-i18n="form.rgpd"></label>
      </div>
      <button type="submit" class="btn-cta" data-i18n="form.submit"></button>
      <p class="lock-text" data-i18n="form.lockText1"></p>
      <p class="lock-text" style="margin-top:6px;font-weight:600;color:var(--navy)" data-i18n="form.lockText2"></p>
    </form>

    <div class="alt-phone">
      <span data-i18n="form.altPhoneLabel"></span>
      <a href="tel:+34648414863">+34 648 414 863</a>
    </div>
  </div>

</div>

<div class="trust-strip" data-i18n-list="trust.items" data-i18n-template="tpl-trust">
  <template id="tpl-trust">
    <div class="trust-item"><strong>{{value}}</strong><span>{{label}}</span></div>
  </template>
</div>

<!-- ═══ TESTIMONIOS (PROVISIONALES · sustituir por reseñas reales de clientes) ═══ -->
<div style="max-width:1080px;margin:0 auto;padding:8px 24px 56px">
  <p style="font-family:'Syne',serif;font-size:28px;font-weight:300;color:#fff;text-align:center;margin:0 0 28px" data-i18n="testimonials.heading"></p>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px" data-i18n-list="testimonials.items" data-i18n-template="tpl-testimonial">
    <template id="tpl-testimonial">
      <div style="background:#fff;border-radius:12px;padding:24px">
        <div style="color:var(--gold);font-size:14px;letter-spacing:2px;margin-bottom:10px">★★★★★</div>
        <p style="font-family:'DM Sans',sans-serif;font-size:14px;color:var(--navy);line-height:1.6;margin:0 0 14px">{{quote}}</p>
        <p style="font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);font-weight:600;margin:0">{{author}}</p>
        <p style="font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gold);margin:4px 0 0">{{badge}}</p>
      </div>
    </template>
  </div>
</div>

<footer class="ppc-footer">
  <span data-i18n="footer.text"></span>
  <a href="privacidad.html" target="_blank" rel="noopener" data-i18n="footer.privacy"></a>
</footer>

<button type="button" class="sticky-cta" onclick="document.getElementById('expressForm').scrollIntoView({behavior:'smooth',block:'center'})" data-i18n="stickyCta.text"></button>

<script>
function submitExpress(e) {
  e.preventDefault();
  const d = {
    nombre: eNombre.value, email: eEmail.value,
    pliego: ePliego.value, source: 'ppc_ens_express'
  };
  if (window.dataLayer) dataLayer.push({ event: 'express_lead', ...d });
  window.location.href = 'gracias.html?nombre=' + encodeURIComponent(d.nombre) + '&source=express';
}
</script>
</body>
</html>
