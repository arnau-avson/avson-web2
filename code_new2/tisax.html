<!-- SCRIPTS -->
<script>
// Wait for i18n.js to inject content before initializing interactions
document.addEventListener('i18n:ready', function () {
  var obs = new IntersectionObserver(function (e) { e.forEach(function (el) { if (el.isIntersecting) el.target.classList.add('visible'); }); }, { threshold: 0.08 });
  document.querySelectorAll('.anim-fade-up').forEach(function (el) { obs.observe(el); });
  document.querySelectorAll('.faq-item__question').forEach(function (q) {
    q.addEventListener('click', function () { q.parentElement.classList.toggle('open'); });
  });
});

var _exitShown = false;
document.addEventListener('mouseleave', function (e) {
  if (e.clientY < 0 && !_exitShown && !sessionStorage.getItem('_exitShown')) {
    document.getElementById('exitModal').style.display = 'flex';
    _exitShown = true;
    sessionStorage.setItem('_exitShown', '1');
  }
});
if (window.innerWidth <= 768) { document.getElementById('stickyBar').style.display = 'flex'; }
</script>

<script>
(function(){
  var nav = document.getElementById('mainNav');
  var burger = document.getElementById('navBurger');
  var overlay = document.getElementById('navOverlay');
  var close = document.getElementById('navClose');
  if(nav) window.addEventListener('scroll', function(){ nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40); }, {passive:true});
  function toggleNav(open){ if(overlay){ overlay.classList.toggle('open',open); document.body.classList.toggle('no-scroll',open); } }
  if(burger) burger.addEventListener('click', function(){ toggleNav(!overlay.classList.contains('open')); });
  if(close) close.addEventListener('click', function(){ toggleNav(false); });
})();
</script>
