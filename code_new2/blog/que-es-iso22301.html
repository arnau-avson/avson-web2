  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "¿Es obligatoria la ISO 22301 en España?",
        "acceptedAnswer": {"@type": "Answer","text": "ISO 22301 no es obligatoria con carácter general, pero sectores como el financiero (DORA) o infraestructuras críticas la exigen de facto. Muchos pliegos públicos y contratos corporativos la incorporan como requisito o criterio de valoración."}
      },
      {
        "@type": "Question",
        "name": "¿Cuánto tiempo lleva certificarse en ISO 22301?",
        "acceptedAnswer": {"@type": "Answer","text": "Con una consultora especializada, entre 3 y 4 meses. Sin acompañamiento experto, el proceso puede extenderse a 9-12 meses por la complejidad del BIA, los planes de continuidad y los ejercicios de prueba."}
      },
      {
        "@type": "Question",
        "name": "¿ISO 22301 y continuidad de negocio son lo mismo?",
        "acceptedAnswer": {"@type": "Answer","text": "No exactamente. La continuidad de negocio es la disciplina de gestión. ISO 22301 es la norma que estandariza cómo implementar y certificar un SGCN. Tener un plan de continuidad no equivale a estar certificado en ISO 22301."}
      },
      {
        "@type": "Question",
        "name": "¿Qué es el BIA en ISO 22301?",
        "acceptedAnswer": {"@type": "Answer","text": "El BIA (Business Impact Analysis) identifica los procesos críticos, determina el impacto de su interrupción en el tiempo y establece el RTO (tiempo máximo de recuperación tolerable) y el RPO (máxima pérdida de datos tolerable) para cada proceso."}
      },
      {
        "@type": "Question",
        "name": "Si ya tengo ENS, ¿cuánto me falta para ISO 22301?",
        "acceptedAnswer": {"@type": "Answer","text": "Con ENS categoría media o alta, tienes cubierto aproximadamente el 55% de ISO 22301. El trabajo adicional se centra en el BIA formal, los planes de continuidad con detalle operativo y los ejercicios documentados."}
      }
    ]
  }
  </script>

function toggleNav() {
  document.getElementById('navOverlay').classList.toggle('open');
  document.body.classList.toggle('no-overflow');
}
function toggleLang() {
  document.getElementById('langSwitcher').classList.toggle('open');
}
document.addEventListener('click', (e) => {
  const ls = document.getElementById('langSwitcher');
  if (ls && !ls.contains(e.target)) ls.classList.remove('open');
});

document.addEventListener('i18n:ready', function() {
  document.querySelectorAll('.faq-article-q').forEach(q => {
    q.addEventListener('click', () => {
      const item = q.closest('.faq-article-item');
      const isOpen = item.classList.contains('open');
      document.querySelectorAll('.faq-article-item').forEach(i => i.classList.remove('open'));
      if (!isOpen) item.classList.add('open');
    });
  });
  document.querySelectorAll('.anim-fade-up').forEach(el => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.style.opacity='1'; e.target.style.transform='translateY(0)'; } });
    }, {threshold:0.1});
    el.style.opacity='0'; el.style.transform='translateY(24px)'; el.style.transition='opacity 0.6s ease, transform 0.6s ease';
    obs.observe(el);
  });

  // BLOG POPUP
  (function() {
    if (sessionStorage.getItem('_blogPopupShown')) return;
    var shown = false;
    function showBlogPopup() {
      if (shown) return;
      shown = true;
      sessionStorage.setItem('_blogPopupShown', '1');
      document.getElementById('blogPopup').style.display = 'flex';
    }
    // Show after 45 seconds
    setTimeout(showBlogPopup, 45000);
    // OR show when scrolled 65%
    window.addEventListener('scroll', function() {
      var scrollPct = (window.scrollY + window.innerHeight) / document.documentElement.scrollHeight;
      if (scrollPct > 0.65) showBlogPopup();
    }, { passive: true });
  })();
});

function closeBlogPopup() {
  document.getElementById('blogPopup').style.display = 'none';
  sessionStorage.setItem('_blogPopupShown', '1');
}

function submitBlogPopup(e) {
  e.preventDefault();
  var email = document.getElementById('popupEmail').value.trim();
  var empresa = document.getElementById('popupEmpresa').value.trim();
  if (!email || !empresa) return;
  if (window.dataLayer) dataLayer.push({event: 'lead_generated', form_type: 'blog_popup', email: email});
  document.getElementById('blogPopup').style.display = 'none';
  window.location.href = '../contacto.html';
}
</script>

<!-- BLOG LEAD CAPTURE POPUP -->
<div id="blogPopup" style="display:none;position:fixed;inset:0;background:rgba(26,39,68,0.78);z-index:8888;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--white);max-width:440px;width:100%;padding:40px 36px;position:relative">
    <button onclick="closeBlogPopup()" style="position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;color:var(--navy-60);cursor:pointer;line-height:1">×</button>
    <span style="font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:12px" data-i18n="popup.label"></span>
    <h2 style="font-family:var(--font-serif);font-size:clamp(22px,2.5vw,28px);font-weight:400;color:var(--navy);margin-bottom:12px;line-height:1.2" data-i18n="popup.title"></h2>
    <p style="font-family:var(--font-sans);font-size:0.88rem;color:var(--navy-60);line-height:1.65;margin-bottom:28px" data-i18n="popup.text"></p>
    <form onsubmit="submitBlogPopup(event)" style="display:flex;flex-direction:column;gap:12px">
      <input type="email" id="popupEmail" placeholder="" required
        style="width:100%;padding:14px 18px;border:1.5px solid #D8D8D8;font-family:var(--font-sans);font-size:0.9rem;color:var(--navy);outline:none;box-sizing:border-box"
        onfocus="this.style.borderColor='#e85838'" onblur="this.style.borderColor='#D8D8D8'"
        data-i18n-placeholder="popup.emailPlaceholder">
      <input type="text" id="popupEmpresa" placeholder="" required
        style="width:100%;padding:14px 18px;border:1.5px solid #D8D8D8;font-family:var(--font-sans);font-size:0.9rem;color:var(--navy);outline:none;box-sizing:border-box"
        onfocus="this.style.borderColor='#e85838'" onblur="this.style.borderColor='#D8D8D8'"
        data-i18n-placeholder="popup.empresaPlaceholder">
      <input type="tel" id="popupTelefono" placeholder="" required data-i18n-placeholder="popup.phonePlaceholder" autocomplete="tel"
        style="width:100%;padding:14px 18px;border:1.5px solid #D8D8D8;font-family:var(--font-sans);font-size:0.9rem;color:var(--navy);outline:none;box-sizing:border-box"
        onfocus="this.style.borderColor='#e85838'" onblur="this.style.borderColor='#D8D8D8'">
      <button type="submit" style="background:var(--navy);color:var(--white);border:none;padding:16px;font-family:var(--font-sans);font-size:0.9rem;font-weight:600;letter-spacing:0.04em;cursor:pointer;width:100%" data-i18n="popup.submit">
      </button>
    </form>
    <p style="font-family:var(--font-sans);font-size:0.72rem;color:var(--navy-60);text-align:center;margin-top:12px;margin-bottom:0" data-i18n="popup.disclaimer"></p>
    <button onclick="closeBlogPopup()" style="display:block;width:100%;background:none;border:none;font-family:var(--font-sans);font-size:0.78rem;color:var(--navy-60);cursor:pointer;padding:8px;margin-top:4px" data-i18n="popup.dismiss">
    </button>
  </div>
</div>
