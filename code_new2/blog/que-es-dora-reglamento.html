  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "¿DORA aplica a mi empresa?",
        "acceptedAnswer": {"@type": "Answer","text": "DORA aplica a las entidades financieras reguladas en la UE: bancos, empresas de inversión, entidades de pago, entidades de dinero electrónico, gestoras de fondos, aseguradoras, reaseguradoras, fondos de pensiones, agencias de calificación crediticia, plataformas de crowdfunding, proveedores de servicios de criptoactivos y los proveedores TIC críticos que les prestan servicios. Si tu empresa es alguna de estas entidades o les presta servicios tecnológicos esenciales, DORA muy probablemente te aplica."}
      },
      {
        "@type": "Question",
        "name": "¿DORA es lo mismo que NIS2?",
        "acceptedAnswer": {"@type": "Answer","text": "No. DORA (Reglamento UE 2022/2554) es una norma específica para el sector financiero, con requisitos mucho más detallados y prescriptivos en materia de resiliencia operacional digital. NIS2 es una directiva de ciberseguridad de aplicación horizontal que cubre sectores críticos más ampliamente (energía, transporte, sanidad, etc.). Las entidades financieras sujetas a DORA están exentas de NIS2 en las materias cubiertas por DORA, según el principio lex specialis."}
      },
      {
        "@type": "Question",
        "name": "¿Cuándo entró en vigor DORA?",
        "acceptedAnswer": {"@type": "Answer","text": "El Reglamento DORA (UE 2022/2554) se publicó en el Diario Oficial de la UE el 27 de diciembre de 2022 y entró en vigor el 16 de enero de 2023. Sin embargo, su aplicación obligatoria —la fecha a partir de la cual las entidades deben cumplir todos sus requisitos— fue el 17 de enero de 2025, tras un período de transición de 24 meses."}
      },
      {
        "@type": "Question",
        "name": "¿Qué sanciones tiene el incumplimiento de DORA?",
        "acceptedAnswer": {"@type": "Answer","text": "Las sanciones por incumplimiento de DORA varían según el tipo de entidad y el supervisor competente. Para las entidades financieras, los reguladores nacionales (Banco de España, CNMV, DGSFP) pueden imponer multas y medidas correctivas significativas. Para los proveedores TIC críticos supervisados directamente por las ESAs (EBA, ESMA, EIOPA), las multas pueden alcanzar hasta el 1% de su facturación media diaria mundial hasta un máximo de 5 millones de euros, con multas periódicas coercitivas de hasta 100.000 euros diarios."}
      },
      {
        "@type": "Question",
        "name": "¿Cuánto tiempo lleva cumplir con DORA?",
        "acceptedAnswer": {"@type": "Answer","text": "El tiempo depende de la madurez de la entidad y de su tamaño. Para una entidad mediana que parte de cero, el cumplimiento integral de DORA puede llevar entre 6 y 18 meses. Con el acompañamiento de una consultora especializada y aprovechando sinergias con marcos previos (ISO 27001, ISO 22301, ENS), el proceso puede acelerarse a 4-6 meses para los requisitos más críticos."}
      }
    ]
  }

<script>
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 40);
});
function toggleNav() {
  document.getElementById('navOverlay').classList.toggle('open');
  document.body.classList.toggle('no-overflow');
}
function toggleLang() {
  document.getElementById('langSwitcher').classList.toggle('open');
}
document.addEventListener('click', (e) => {
  const ls = document.getElementById('langSwitcher');
  if (ls && !ls.contains(e.target)) ls.classList.remove('open');
});
document.addEventListener('i18n:ready', function() {
  document.querySelectorAll('.faq-article-q').forEach(q => {
    q.addEventListener('click', () => {
      const item = q.closest('.faq-article-item');
      const isOpen = item.classList.contains('open');
      document.querySelectorAll('.faq-article-item').forEach(i => i.classList.remove('open'));
      if (!isOpen) item.classList.add('open');
    });
  });
  document.querySelectorAll('.anim-fade-up').forEach(el => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.style.opacity='1'; e.target.style.transform='translateY(0)'; } });
    }, {threshold:0.1});
    el.style.opacity='0'; el.style.transform='translateY(24px)'; el.style.transition='opacity 0.6s ease, transform 0.6s ease';
    obs.observe(el);
  });
  (function() {
    if (sessionStorage.getItem('_blogPopupShown')) return;
    var shown = false;
    function showBlogPopup() {
      if (shown) return;
      shown = true;
      sessionStorage.setItem('_blogPopupShown', '1');
      document.getElementById('blogPopup').style.display = 'flex';
    }
    setTimeout(showBlogPopup, 45000);
    window.addEventListener('scroll', function() {
      var scrollPct = (window.scrollY + window.innerHeight) / document.documentElement.scrollHeight;
      if (scrollPct > 0.65) showBlogPopup();
    }, { passive: true });
  })();
});
function closeBlogPopup() {
  document.getElementById('blogPopup').style.display = 'none';
  sessionStorage.setItem('_blogPopupShown', '1');
}
function submitBlogPopup(e) {
  e.preventDefault();
  var email = document.getElementById('popupEmail').value.trim();
  var empresa = document.getElementById('popupEmpresa').value.trim();
  if (!email || !empresa) return;
  if (window.dataLayer) dataLayer.push({event: 'lead_generated', form_type: 'blog_popup', email: email});
  document.getElementById('blogPopup').style.display = 'none';
  window.location.href = '../contacto.html';
}
</script>

<!-- BLOG LEAD CAPTURE POPUP -->
<div id="blogPopup" style="display:none;position:fixed;inset:0;background:rgba(26,39,68,0.78);z-index:8888;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--white);max-width:440px;width:100%;padding:40px 36px;position:relative">
    <button onclick="closeBlogPopup()" style="position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;color:var(--navy-60);cursor:pointer;line-height:1">&#215;</button>
    <span style="font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:12px" data-i18n="popup.label"></span>
    <h2 style="font-family:var(--font-serif);font-size:clamp(22px,2.5vw,28px);font-weight:400;color:var(--navy);margin-bottom:12px;line-height:1.2" data-i18n="popup.title"></h2>
    <p style="font-family:var(--font-sans);font-size:0.88rem;color:var(--navy-60);line-height:1.65;margin-bottom:28px" data-i18n="popup.text"></p>
    <form onsubmit="submitBlogPopup(event)" style="display:flex;flex-direction:column;gap:12px">
      <input type="email" id="popupEmail" placeholder="" data-i18n-placeholder="popup.emailPlaceholder" required
        style="width:100%;padding:14px 18px;border:1.5px solid #D8D8D8;font-family:var(--font-sans);font-size:0.9rem;color:var(--navy);outline:none;box-sizing:border-box"
        onfocus="this.style.borderColor='#e85838'" onblur="this.style.borderColor='#D8D8D8'">
      <input type="text" id="popupEmpresa" placeholder="" data-i18n-placeholder="popup.empresaPlaceholder" required
        style="width:100%;padding:14px 18px;border:1.5px solid #D8D8D8;font-family:var(--font-sans);font-size:0.9rem;color:var(--navy);outline:none;box-sizing:border-box"
        onfocus="this.style.borderColor='#e85838'" onblur="this.style.borderColor='#D8D8D8'">
      <button type="submit" style="background:var(--navy);color:var(--white);border:none;padding:16px;font-family:var(--font-sans);font-size:0.9rem;font-weight:600;letter-spacing:0.04em;cursor:pointer;width:100%" data-i18n="popup.submit"></button>
    </form>
    <p style="font-family:var(--font-sans);font-size:0.72rem;color:var(--navy-60);text-align:center;margin-top:12px;margin-bottom:0" data-i18n="popup.disclaimer"></p>
    <button onclick="closeBlogPopup()" style="display:block;width:100%;background:none;border:none;font-family:var(--font-sans);font-size:0.78rem;color:var(--navy-60);cursor:pointer;padding:8px;margin-top:4px" data-i18n="popup.dismiss"></button>
  </div>
</div>
