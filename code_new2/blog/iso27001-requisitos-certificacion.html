  {"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"¿Cuántos controles tiene ISO 27001?","acceptedAnswer":{"@type":"Answer","text":"ISO 27001:2022 tiene 93 controles en el Anexo A, organizados en 4 categorías: controles organizativos (37), controles de personas (8), controles físicos (14) y controles tecnológicos (34). No todos los controles son obligatorios para todas las organizaciones: la norma exige seleccionar los controles aplicables en función del análisis de riesgos y documentar las razones para excluir los que no aplican en la Declaración de Aplicabilidad (SoA)."}},{"@type":"Question","name":"¿Qué auditores certifican ISO 27001 en España?","acceptedAnswer":{"@type":"Answer","text":"En España, la certificación ISO 27001 es emitida por entidades de certificación acreditadas por ENAC (Entidad Nacional de Acreditación) bajo el esquema ISO/IEC 17021. Las principales entidades de certificación que operan en España incluyen AENOR, Bureau Veritas, TÜV Rheinland, SGS, Lloyd's Register, BSI y DNV. La elección de la entidad certificadora no afecta al valor del certificado, pero puede influir en el reconocimiento internacional y en el coste."}},{"@type":"Question","name":"¿ISO 27001 tiene que renovarse?","acceptedAnswer":{"@type":"Answer","text":"El certificado ISO 27001 tiene una vigencia de 3 años. Durante ese período, la entidad de certificación realiza auditorías de seguimiento anuales (generalmente más cortas que la auditoría de certificación inicial) para verificar que el SGSI sigue siendo conforme y efectivo. Al tercer año, se realiza una auditoría de renovación completa para obtener un nuevo certificado por otros 3 años."}},{"@type":"Question","name":"¿Cuánto tiempo lleva la auditoría de certificación ISO 27001?","acceptedAnswer":{"@type":"Answer","text":"La duración de la auditoría de certificación depende del tamaño de la organización y el alcance del SGSI. Para una pyme de 20-50 empleados con alcance limitado, la auditoría de Fase 2 (auditoría principal) suele durar 1-2 días. Para organizaciones medianas (50-200 empleados), puede durar 3-4 días. Para grandes organizaciones con múltiples ubicaciones, puede extenderse varias semanas. Previamente, la Fase 1 (revisión documental) suele durar medio día o un día completo."}},{"@type":"Question","name":"¿ISO 27001 es obligatoria en España?","acceptedAnswer":{"@type":"Answer","text":"ISO 27001 es una norma voluntaria a nivel general. Sin embargo, puede ser de obligado cumplimiento contractual en numerosos contextos: algunos pliegos de licitación pública la exigen, muchos contratos con grandes empresas la requieren como condición de entrada en la cadena de suministro, y sectores como banca, seguros o salud la consideran requisito de facto. En el contexto de NIS2 y DORA, la certificación ISO 27001 se reconoce como evidencia de cumplimiento de obligaciones de gestión de riesgos."}}]}

<script>
window.addEventListener('scroll', () => { document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 40); });
function toggleNav() { document.getElementById('navOverlay').classList.toggle('open'); document.body.classList.toggle('no-overflow'); }
function toggleLang() { document.getElementById('langSwitcher').classList.toggle('open'); }
document.addEventListener('click', (e) => { const ls = document.getElementById('langSwitcher'); if (ls && !ls.contains(e.target)) ls.classList.remove('open'); });

document.addEventListener('i18n:ready', function () {
  document.querySelectorAll('.faq-article-q').forEach(q => {
    q.addEventListener('click', () => {
      const item = q.closest('.faq-article-item');
      const isOpen = item.classList.contains('open');
      document.querySelectorAll('.faq-article-item').forEach(i => i.classList.remove('open'));
      if (!isOpen) item.classList.add('open');
    });
  });

  // BLOG POPUP
  (function() {
    if (sessionStorage.getItem('_blogPopupShown')) return;
    var shown = false;
    function showBlogPopup() {
      if (shown) return;
      shown = true;
      sessionStorage.setItem('_blogPopupShown', '1');
      document.getElementById('blogPopup').style.display = 'flex';
    }
    setTimeout(showBlogPopup, 45000);
    window.addEventListener('scroll', function() {
      var scrollPct = (window.scrollY + window.innerHeight) / document.documentElement.scrollHeight;
      if (scrollPct > 0.65) showBlogPopup();
    }, { passive: true });
  })();
});

function closeBlogPopup() {
  document.getElementById('blogPopup').style.display = 'none';
  sessionStorage.setItem('_blogPopupShown', '1');
}

function submitBlogPopup(e) {
  e.preventDefault();
  var email = document.getElementById('popupEmail').value.trim();
  var empresa = document.getElementById('popupEmpresa').value.trim();
  if (!email || !empresa) return;
  if (window.dataLayer) dataLayer.push({event: 'lead_generated', form_type: 'blog_popup', email: email});
  document.getElementById('blogPopup').style.display = 'none';
  window.location.href = '../contacto.html';
}
</script>
<!-- WHATSAPP FLOAT -->
<div class="human-float" id="humanFloat">
  <div class="human-float__card">
    <p class="human-float__title" data-i18n="float.title"></p>
    <p class="human-float__txt" data-i18n="float.text"></p>
    <a href="../contacto.html" class="human-float__cta" data-i18n="float.cta" onclick="var f=document.querySelector('form');if(f){f.scrollIntoView({behavior:'smooth'});var i=f.querySelector('input');if(i)setTimeout(function(){i.focus()},600);return false;}"></a>
  </div>
  <button class="human-float__btn" onclick="document.getElementById('humanFloat').classList.toggle('open')" aria-expanded="false" aria-label="Te atiende una persona, no una IA"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span data-i18n="float.btn"></span></button>
</div>
<!-- BLOG LEAD CAPTURE POPUP -->
<div id="blogPopup" style="display:none;position:fixed;inset:0;background:rgba(26,39,68,0.78);z-index:8888;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--white);max-width:440px;width:100%;padding:40px 36px;position:relative">
    <button onclick="closeBlogPopup()" style="position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;color:var(--navy-60);cursor:pointer;line-height:1">×</button>
    <span style="font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:12px" data-i18n="popup.label"></span>
    <h2 style="font-family:var(--font-serif);font-size:clamp(22px,2.5vw,28px);font-weight:400;color:var(--navy);margin-bottom:12px;line-height:1.2" data-i18n="popup.title"></h2>
    <p style="font-family:var(--font-sans);font-size:0.88rem;color:var(--navy-60);line-height:1.65;margin-bottom:28px" data-i18n="popup.text"></p>
    <form onsubmit="submitBlogPopup(event)" style="display:flex;flex-direction:column;gap:12px">
      <input type="email" id="popupEmail" data-i18n-placeholder="popup.emailPlaceholder" required
        style="width:100%;padding:14px 18px;border:1.5px solid #D8D8D8;font-family:var(--font-sans);font-size:0.9rem;color:var(--navy);outline:none;box-sizing:border-box"
        onfocus="this.style.borderColor='#e85838'" onblur="this.style.borderColor='#D8D8D8'">
      <input type="text" id="popupEmpresa" data-i18n-placeholder="popup.empresaPlaceholder" required
        style="width:100%;padding:14px 18px;border:1.5px solid #D8D8D8;font-family:var(--font-sans);font-size:0.9rem;color:var(--navy);outline:none;box-sizing:border-box"
        onfocus="this.style.borderColor='#e85838'" onblur="this.style.borderColor='#D8D8D8'">
      <button type="submit" style="background:var(--navy);color:var(--white);border:none;padding:16px;font-family:var(--font-sans);font-size:0.9rem;font-weight:600;letter-spacing:0.04em;cursor:pointer;width:100%" data-i18n="popup.submit"></button>
    </form>
    <p style="font-family:var(--font-sans);font-size:0.72rem;color:var(--navy-60);text-align:center;margin-top:12px;margin-bottom:0" data-i18n="popup.disclaimer"></p>
    <button onclick="closeBlogPopup()" style="display:block;width:100%;background:none;border:none;font-family:var(--font-sans);font-size:0.78rem;color:var(--navy-60);cursor:pointer;padding:8px;margin-top:4px" data-i18n="popup.dismiss"></button>
  </div>
</div>
