    <span style="font-family:'Syne',serif;font-size:28px;font-weight:500;color:var(--gold);display:block;margin-bottom:12px">{{name}}</span>
    <span style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.3)">{{ref}}</span>
    <p style="font-size:13px;color:rgba(255,255,255,0.45);margin-top:12px;line-height:1.65">{{desc}}</p>
  </div>
</template>

<script>
document.addEventListener('i18n:ready', function () {
  var obs = new IntersectionObserver(function (entries) { entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } }); }, { threshold: 0.1 });
  document.querySelectorAll('.anim-fade-up,.anim-fade').forEach(function (el) { obs.observe(el); });
});

// Language switcher
function toggleLang() {
  document.getElementById('langSwitcher').classList.toggle('open');
}
document.addEventListener('click', function (e) {
  var ls = document.getElementById('langSwitcher');
  if (ls && !ls.contains(e.target)) ls.classList.remove('open');
});
</script>
<!-- WHATSAPP FLOAT -->
<div class="human-float" id="humanFloat">
  <div class="human-float__card">
    <p class="human-float__title" data-i18n="humanFloat.title"></p>
    <p class="human-float__txt" data-i18n="humanFloat.text"></p>
    <a href="contacto.html" class="human-float__cta" data-i18n="humanFloat.cta" onclick="var f=document.querySelector('form');if(f){f.scrollIntoView({behavior:'smooth'});var i=f.querySelector('input');if(i)setTimeout(function(){i.focus()},600);return false;}"></a>
  </div>
  <button class="human-float__btn" onclick="document.getElementById('humanFloat').classList.toggle('open')" aria-expanded="false" aria-label="Te atiende una persona, no una IA"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span data-i18n="humanFloat.button"></span></button>
</div>
<script>
(function(){
  var nav = document.getElementById('mainNav');
  var burger = document.getElementById('navBurger');
  var overlay = document.getElementById('navOverlay');
  var close = document.getElementById('navClose');
  if(nav) window.addEventListener('scroll', function(){ nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40); }, {passive:true});
  function toggleNav(open){ if(overlay){ overlay.classList.toggle('open',open); document.body.classList.toggle('no-scroll',open); } }
  if(burger) burger.addEventListener('click', function(){ toggleNav(!overlay.classList.contains('open')); });
  if(close) close.addEventListener('click', function(){ toggleNav(false); });
})();
</script>
