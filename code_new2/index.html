<!-- LEAD MAGNET: CHECKLIST PLIEGO ENS -->
<section class="section section--pearl" id="checklist">
  <div class="container">
    <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:48px;align-items:center;background:var(--white);border:1px solid var(--border);border-radius:16px;padding:48px" class="magnet-grid">
      <div>
        <span class="label-tag" data-i18n="checklist.label"></span>
        <h2 style="font-family:var(--font-serif);font-size:30px;font-weight:700;color:var(--navy);line-height:1.15;margin:10px 0 12px" data-i18n="checklist.title"></h2>
        <p style="font-family:var(--font-sans);font-size:15px;color:var(--text-body);line-height:1.6;margin:0" data-i18n="checklist.text"></p>
      </div>
      <form onsubmit="return avsonSubmitLead(event, { source: 'checklist_pliego', event: 'lead_magnet' })" style="display:flex;flex-direction:column;gap:12px">
        <input type="text" name="nombre" placeholder="" required style="padding:13px 16px;border:1px solid var(--border);border-radius:10px;font-family:var(--font-sans);font-size:14px" data-i18n-placeholder="checklist.placeholderName">
        <input type="email" name="email" placeholder="" required style="padding:13px 16px;border:1px solid var(--border);border-radius:10px;font-family:var(--font-sans);font-size:14px" data-i18n-placeholder="checklist.placeholderEmail">

<script>
const nav    = document.getElementById('mainNav');
const sticky = document.getElementById('stickyBar');
const waWrap = document.querySelector('.v3-wa');

window.addEventListener('scroll', () => {
  nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40);
  const heroH = document.querySelector('.v3-hero')?.offsetHeight ?? 500;
  sticky.classList.toggle('visible', window.scrollY > heroH * 0.65);
  if (waWrap) {
    const scrolled = window.scrollY + window.innerHeight;
    waWrap.classList.toggle('v3-wa--visible', scrolled > document.documentElement.scrollHeight * 0.78);
  }
}, { passive: true });

const burger  = document.getElementById('navBurger');
const overlay = document.getElementById('navOverlay');
const close   = document.getElementById('navClose');
const toggleNav = open => {
  overlay.classList.toggle('open', open);
  document.body.classList.toggle('no-scroll', open);
  burger.setAttribute('aria-expanded', open);
};
burger.addEventListener('click', () => toggleNav(!overlay.classList.contains('open')));
close?.addEventListener('click', () => toggleNav(false));
// Close on backdrop click
overlay.addEventListener('click', (e) => { if (e.target === overlay) toggleNav(false); });

document.addEventListener('i18n:ready', function() {
  document.querySelectorAll('.v3-pack-card, .v3-testi').forEach(el => {
    el.classList.add('v3-fade');
    new IntersectionObserver(([e]) => { if (e.isIntersecting) el.classList.add('v3-fade--in'); }, { threshold: 0.1 }).observe(el);
  });
});

// ─── ANIMATED COUNTERS ──────────────────────────────
(function() {
  const counters = document.querySelectorAll('.v3-counter');
  if (!counters.length) return;
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const el = entry.target;
      const target = parseInt(el.dataset.target, 10);
      const suffix = el.dataset.suffix || '';
      const duration = 1200;
      const start = performance.now();
      const tick = (now) => {
        const p = Math.min((now - start) / duration, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(ease * target) + suffix;
        if (p < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
      obs.unobserve(el);
    });
  }, { threshold: 0.5 });
  counters.forEach(el => obs.observe(el));
})();

// ─── SOCIAL PROOF (determinista por día) ─────────────
// Evita el "dark pattern" detectable: el número NO cambia al refrescar ni entre
// pestañas; es el mismo para todos los visitantes de un mismo día y varía según
// la fecha. Sustituir por datos reales de Clarity/CRM cuando estén disponibles.
(function() {
  const el = document.getElementById('liveCount');
  if (!el) return;
  const now = new Date();
  const daySeed = now.getFullYear() * 1000 + (now.getMonth() + 1) * 50 + now.getDate();
  const count = 3 + (daySeed % 6); // rango estable 3–8 según el día
  el.textContent = count + ' empresas consultaron esta semana';
})();

// ─── CLICK TRACKING ──────────────────────────────────
function track(event, props) {
  if (window.dataLayer) dataLayer.push({ event, ...props });
  if (window.clarity) window.clarity('event', event);
}

// Teléfono
document.querySelectorAll('a[href^="tel:"]').forEach(el => {
  el.addEventListener('click', () => track('phone_click', { location: el.closest('section, nav, div')?.className || 'unknown' }));
});

// WhatsApp
document.querySelector('.human-float__btn')?.addEventListener('click', () => track('human_float_open', {}));

// CTAs
document.querySelectorAll('a[href="contacto.html"]').forEach((el, i) => {
  el.addEventListener('click', () => track('cta_click', { cta_text: el.textContent.trim(), cta_position: i }));
});

// ─── FORM INTERACTION TRACKING ───────────────────────
let formStarted = false;
const heroForm = document.getElementById('heroForm');
if (heroForm) {
  heroForm.querySelectorAll('input').forEach(input => {
    input.addEventListener('focus', () => {
      if (!formStarted) {
        formStarted = true;
        track('form_start', { form: 'hero' });
      }
    });
  });
}

// ─── FORM ABANDON DETECTION ──────────────────────────
window.addEventListener('beforeunload', () => {
  if (formStarted) {
    const nombre = document.getElementById('fNombre')?.value || '';
    const email = document.getElementById('fEmail')?.value || '';
    const filled = (nombre ? 1 : 0) + (email ? 1 : 0);
    if (filled > 0 && filled < 2) {
      track('form_abandon', { fields_filled: filled, nombre_filled: !!nombre, email_filled: !!email });
    }
  }
});

// ─── EXIT INTENT POPUP ───────────────────────────────
(function() {
  if (localStorage.getItem('exit_popup_shown')) return;
  let shown = false;
  const popup = document.getElementById('exitPopup');
  if (!popup) return;

  document.addEventListener('mouseleave', (e) => {
    if (e.clientY > 20 || shown || e.relatedTarget !== null) return;
    shown = true;
    localStorage.setItem('exit_popup_shown', '1');
    popup.classList.add('visible');
    track('exit_intent_shown', {});
  });

  // Mobile: show after 45s of inactivity
  let mobileTimer = setTimeout(() => {
    if (!shown && window.innerWidth < 768) {
      shown = true;
      popup.classList.add('visible');
      track('exit_intent_shown', { trigger: 'mobile_timer' });
    }
  }, 45000);

  document.getElementById('exitPopupClose')?.addEventListener('click', () => {
    popup.classList.remove('visible');
    track('exit_intent_dismissed', {});
  });
  document.getElementById('exitPopupCTA')?.addEventListener('click', () => {
    track('exit_intent_converted', {});
  });
})();

// ─── MOBILE SCROLL-TO-FORM ───────────────────────────
(function() {
  if (window.innerWidth > 768) return;
  // Hero CTA should scroll to the on-page form, not go to contacto
  const heroLeft = document.querySelector('.v3-hero__left');
  const formSection = document.getElementById('contacto');
  if (!heroLeft || !formSection) return;
  heroLeft.querySelectorAll('a[href="contacto.html"]').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      formSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      setTimeout(() => document.getElementById('fNombre')?.focus(), 600);
      track('mobile_scroll_to_form', {});
    });
  });
})();
</script>
