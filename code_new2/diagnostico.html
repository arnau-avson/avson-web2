  <style>
    /* ── Diagnóstico / Quiz ── */
    .quiz-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* Progress */
    .quiz-progress-bar {
      height: 3px;
      background: var(--border);
      margin-bottom: 56px;
      position: relative;
      overflow: hidden;
    }
    .quiz-progress-bar__fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: var(--gold);
      transition: width 0.45s cubic-bezier(0.4,0,0.2,1);
    }
    .quiz-progress-label {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    /* Question */
    .quiz-question { display: none; animation: quizFade 0.3s ease; }
    .quiz-question.active { display: block; }
    @keyframes quizFade {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .quiz-q-title {
      font-family: var(--font-serif);
      font-size: clamp(26px, 3.5vw, 40px);
      font-weight: 400;
      color: var(--navy);
      line-height: 1.2;
      margin-bottom: 40px;
    }

    /* Options */
    .quiz-options { display: flex; flex-direction: column; gap: 12px; }
    .quiz-option {
      border: 1px solid var(--border);
      padding: 20px 24px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--white);
    }
    .quiz-option:hover {
      border-color: var(--gold);
      background: var(--pearl);
    }
    .quiz-option.selected {
      border-color: var(--navy);
      background: var(--pearl);
    }
    .quiz-option__radio {
      width: 20px;
      height: 20px;
      border: 1px solid var(--border);
      border-radius: 50%;
      flex-shrink: 0;
      transition: all 0.2s;
      position: relative;
    }
    .quiz-option.selected .quiz-option__radio {
      border-color: var(--navy);
      background: var(--navy);
    }
    .quiz-option.selected .quiz-option__radio::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--white);
    }
    .quiz-option__label {
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 500;
      color: var(--navy);
      margin-bottom: 2px;
    }
    .quiz-option__desc {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Cert cards in result */
    .cert-card {
      border: 1px solid var(--border);
      padding: 28px 32px;
      margin-bottom: 16px;
      position: relative;
      transition: border-color 0.2s;
    }
    .cert-card--primary {
      border-color: var(--navy);
      border-left: 4px solid var(--gold);
    }
    .cert-card__badge {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--white);
      background: var(--navy);
      padding: 3px 10px;
      margin-bottom: 12px;
      display: inline-block;
    }
    .cert-card--primary .cert-card__badge {
      background: var(--gold);
      color: var(--navy);
    }
    .cert-card__title {
      font-family: var(--font-serif);
      font-size: 26px;
      font-weight: 400;
      color: var(--navy);
      margin-bottom: 6px;
    }
    .cert-card__desc {
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .cert-card__link {
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--navy);
      text-decoration: none;
      border-bottom: 1px solid var(--gold);
      padding-bottom: 1px;
      transition: color 0.2s;
    }
    .cert-card__link:hover { color: var(--gold); }

    /* Synergy box */
    .synergy-box {
      background: var(--navy);
      padding: 32px 36px;
      margin: 32px 0;
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }
    .synergy-box__icon {
      font-size: 28px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .synergy-box__title {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 400;
      color: var(--white);
      margin-bottom: 6px;
    }
    .synergy-box__text {
      font-family: var(--font-sans);
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      .quiz-container { padding: 0 20px; }
      .quiz-option { padding: 16px 18px; }
      .cert-card { padding: 22px 20px; }
      .synergy-box { flex-direction: column; gap: 12px; }
    }

<script>
// ── Nav ──────────────────────────────────────────────────────
(function(){
  var nav = document.getElementById('mainNav');
  var burger = document.getElementById('navBurger');
  var overlay = document.getElementById('navOverlay');
  var close = document.getElementById('navClose');
  if(nav) window.addEventListener('scroll', function(){ nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40); }, {passive:true});
  function toggleNav(open){ if(overlay){ overlay.classList.toggle('open',open); document.body.classList.toggle('no-scroll',open); } }
  if(burger) burger.addEventListener('click', function(){ toggleNav(!overlay.classList.contains('open')); });
  if(close) close.addEventListener('click', function(){ toggleNav(false); });
})();

// ── Quiz ─────────────────────────────────────────────────────
const scores = { ens: 0, iso27001: 0, iso22301: 0, dora: 0 };
let tamano = 'pequeña';
let currentQ = 1;
const totalQ = 5;

// Helper: read i18n string from hidden span
function i18nStr(key) {
  var el = document.querySelector('#i18nResultStrings [data-i18n="' + key + '"]');
  return el ? el.innerHTML : key;
}

function answer(el, qNum, points) {
  // Highlight selected option
  const parent = el.closest('.quiz-question');
  parent.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');

  // Accumulate scores
  if (points.tamano) tamano = points.tamano;
  if (points.ens)      scores.ens      += points.ens;
  if (points.iso27001) scores.iso27001 += points.iso27001;
  if (points.iso22301) scores.iso22301 += points.iso22301;
  if (points.dora)     scores.dora     += points.dora;

  currentQ = qNum + 1;

  // Auto-advance after short delay (reduces friction)
  setTimeout(() => {
    if (qNum < totalQ) {
      showQuestion(qNum + 1);
    } else {
      showLeadGate();
    }
  }, 380);
}

function showQuestion(n) {
  // Hide all
  document.querySelectorAll('.quiz-question').forEach(q => q.classList.remove('active'));
  document.getElementById('q' + n).classList.add('active');

  // Update progress
  const pct = (n / totalQ) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  var tpl = i18nStr('quiz.progressLabel');
  document.getElementById('progressLabel').textContent = tpl.replace('{{current}}', n).replace('{{total}}', totalQ);

  // Scroll
  const container = document.querySelector('.quiz-container');
  window.scrollTo({ top: container.getBoundingClientRect().top + window.scrollY - 120, behavior: 'smooth' });
}

function showResult() {
  document.querySelectorAll('.quiz-question').forEach(q => q.classList.remove('active'));
  document.getElementById('qResult').classList.add('active');

  // Hide progress indicators
  document.getElementById('progressHeader').style.display = 'none';
  document.getElementById('progressBarWrap').style.display = 'none';

  // Build cert cards
  buildResult();

  // Scroll
  const container = document.querySelector('.quiz-container');
  window.scrollTo({ top: container.getBoundingClientRect().top + window.scrollY - 120, behavior: 'smooth' });
}

function buildResult() {
  const recs = [];

  // ENS
  if (scores.ens >= 3) {
    const nivel = tamano === 'micro' || tamano === 'pequeña' ? i18nStr('result.ens.nivel.basica')
                : tamano === 'mediana' ? i18nStr('result.ens.nivel.media')
                : i18nStr('result.ens.nivel.mediaAlta');
    recs.push({
      key: 'ens',
      primary: true,
      badge: i18nStr('result.ens.badgePrimary'),
      title: i18nStr('result.ens.titlePrefix') + nivel,
      desc: i18nStr('result.ens.desc1') + nivel + i18nStr('result.ens.desc2'),
      link: 'ens.html',
      linkText: i18nStr('result.ens.link')
    });
  }

  // ISO 27001
  if (scores.iso27001 >= 2) {
    recs.push({
      key: 'iso27001',
      primary: scores.ens < 3,
      badge: scores.ens >= 3 ? i18nStr('result.iso27001.badgeSecondary') : i18nStr('result.iso27001.badgePrimary'),
      title: i18nStr('result.iso27001.title'),
      desc: i18nStr('result.iso27001.desc'),
      link: 'iso27001.html',
      linkText: i18nStr('result.iso27001.link')
    });
  }

  // ISO 22301
  if (scores.iso22301 >= 3) {
    recs.push({
      key: 'iso22301',
      primary: false,
      badge: i18nStr('result.iso22301.badge'),
      title: i18nStr('result.iso22301.title'),
      desc: i18nStr('result.iso22301.desc'),
      link: 'iso22301.html',
      linkText: i18nStr('result.iso22301.link')
    });
  }

  // DORA
  if (scores.dora >= 3) {
    recs.push({
      key: 'dora',
      primary: false,
      badge: i18nStr('result.dora.badge'),
      title: i18nStr('result.dora.title'),
      desc: i18nStr('result.dora.desc'),
      link: 'dora.html',
      linkText: i18nStr('result.dora.link')
    });
  }

  // Fallback: si nada puntúa alto, recomendar ISO 27001 básico
  if (recs.length === 0) {
    recs.push({
      key: 'iso27001',
      primary: true,
      badge: i18nStr('result.iso27001.fallbackBadge'),
      title: i18nStr('result.iso27001.title'),
      desc: i18nStr('result.iso27001.fallbackDesc'),
      link: 'iso27001.html',
      linkText: i18nStr('result.iso27001.link')
    });
  }

  // Render cards
  const cardsHTML = recs.map(r => `
    <div class="cert-card ${r.primary ? 'cert-card--primary' : ''}">
      <span class="cert-card__badge">${r.badge}</span>
      <h3 class="cert-card__title">${r.title}</h3>
      <p class="cert-card__desc">${r.desc}</p>
      <a href="${r.link}" class="cert-card__link">${r.linkText}</a>
    </div>
  `).join('');
  document.getElementById('certCards').innerHTML = cardsHTML;

  // Synergy box: ENS + ISO 27001 together
  const hasENS = recs.some(r => r.key === 'ens');
  const hasISO = recs.some(r => r.key === 'iso27001');
  if (hasENS && hasISO) {
    document.getElementById('synergyBox').innerHTML = `
      <div class="synergy-box">
        <div>
          <p class="synergy-box__title">${i18nStr('result.synergy.title')}</p>
          <p class="synergy-box__text">${i18nStr('result.synergy.text')}</p>
        </div>
      </div>
    `;
  }
}

function showLeadGate() {
  const modal = document.getElementById('leadGateModal');
  modal.style.display = 'flex';
}

function submitLeadGate(e) {
  e.preventDefault();
  const nombre = document.getElementById('gateNombre').value.trim();
  const email = document.getElementById('gateEmail').value.trim();
  const empresa = document.getElementById('gateEmpresa').value.trim();
  if (!nombre || !email || !empresa) return;
  if (window.dataLayer) dataLayer.push({event: 'lead_generated', form_type: 'diagnostico_gate', email: email});
  document.getElementById('leadGateModal').style.display = 'none';
  // Show diagnostic result
  showResult();
}

function reiniciarQuiz() {
  // Reset scores
  Object.keys(scores).forEach(k => scores[k] = 0);
  tamano = 'pequeña';
  currentQ = 1;

  // Reset UI
  document.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
  document.getElementById('certCards').innerHTML = '';
  document.getElementById('synergyBox').innerHTML = '';
  document.getElementById('progressHeader').style.display = '';
  document.getElementById('progressBarWrap').style.display = '';
  document.getElementById('progressFill').style.width = '20%';
  var tpl = i18nStr('quiz.progressLabel');
  document.getElementById('progressLabel').textContent = tpl.replace('{{current}}', '1').replace('{{total}}', totalQ);

  showQuestion(1);
  document.querySelectorAll('.quiz-question').forEach(q => q.classList.remove('active'));
  document.getElementById('q1').classList.add('active');
  window.scrollTo({ top: document.querySelector('.quiz-container').getBoundingClientRect().top + window.scrollY - 120, behavior: 'smooth' });
}
</script>

        autocomplete="tel">
      <div style="display:flex;align-items:flex-start;gap:10px;font-size:11px;color:var(--text-muted);line-height:1.5">
        <input type="checkbox" id="gateRgpd" required style="width:15px;height:15px;flex-shrink:0;margin-top:1px;accent-color:var(--navy);cursor:pointer">
        <label for="gateRgpd" data-i18n="form.rgpd"></label>
      </div>
      <div style="display:flex;align-items:flex-start;gap:10px;font-size:11px;color:var(--text-muted);line-height:1.5">
        <input type="checkbox" id="gateComercial" name="comercial" style="width:15px;height:15px;flex-shrink:0;margin-top:1px;accent-color:var(--navy);cursor:pointer">
        <label for="gateComercial" data-i18n="form.comercial"></label>
      </div>
      <button type="submit" style="background:var(--navy);color:var(--white);border:none;padding:18px 32px;font-family:var(--font-sans);font-size:0.95rem;font-weight:600;letter-spacing:0.04em;cursor:pointer;transition:opacity 0.2s;width:100%"
        onmouseover="this.style.opacity='0.88'" onmouseout="this.style.opacity='1'" data-i18n="leadGate.submit"></button>
      <p style="font-family:var(--font-sans);font-size:11px;color:var(--text-muted);text-align:center;margin-top:8px;margin-bottom:0" data-i18n="leadGate.note"></p>
    </form>
  </div>
</div>
