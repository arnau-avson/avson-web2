  <style>
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .express-hero {
      background: var(--navy);
      padding: 140px 0 80px;
      position: relative;
      overflow: hidden;
    }
    .express-hero::before {
      content: 'EXPRESS';
      position: absolute;
      top: 50%;
      right: -40px;
      transform: translateY(-50%);
      font-family: 'Syne', serif;
      font-size: 260px;
      font-weight: 700;
      color: rgba(232,88,56,0.05);
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }
    .express-hero h1 {
      font-family: 'Syne', serif;
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 600;
      color: var(--white);
      line-height: 1.1;
      margin: 0 0 24px;
    }
    .express-hero h1 em {
      font-style:normal;
      color: var(--gold);
    }
    .express-hero .subtitle {
      font-family: var(--font-sans);
      font-size: 1.05rem;
      color: rgba(255,255,255,0.75);
      max-width: 580px;
      line-height: 1.75;
      margin-bottom: 36px;

    .express-badge-guarantee {

      align-items: center;
      gap: 10px;
      background: rgba(232,88,56,0.1);
      border: 1px solid var(--gold);
      padding: 10px 18px;
      margin-top: 16px;
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .fit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }
    @media (max-width: 700px) { .fit-grid { grid-template-columns: 1fr; } }
    .fit-col { padding: 36px; }
    .fit-col--yes { background: var(--pearl); border: 1.5px solid var(--gold); }
    .fit-col--no  { background: var(--white); border: 1.5px solid var(--border); }
    .fit-col__title { font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px; }
    .fit-col--yes .fit-col__title { color: var(--gold); }
    .fit-col--no .fit-col__title  { color: var(--text-muted); }
    .fit-item { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; font-family: var(--font-sans); font-size: 14px; color: var(--navy); line-height: 1.55; }
    .fit-item__icon { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; margin-top: 1px; }
    .fit-item__icon--yes { background: var(--gold); color: white; }
    .fit-item__icon--no  { background: var(--border); color: var(--text-muted); }
    .method-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .method-card { background: var(--white); border: 1px solid var(--border); padding: 28px 24px; }
    .method-card__day { font-family: var(--font-sans); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); margin: 0 0 10px; }
    .method-card h3 { font-family: 'Syne', serif; font-size: 18px; font-weight: 600; color: var(--navy); margin: 0 0 8px; line-height: 1.3; }
    .method-card p { font-family: var(--font-sans); font-size: 13px; color: var(--text-muted); line-height: 1.6; margin: 0; }
    .method-card--final { border: 2px solid var(--gold); }
    .loss-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    @media (max-width: 800px) { .loss-cards { grid-template-columns: 1fr; } }
    .loss-card { background: var(--white); border: 1px solid var(--border); padding: 36px 28px; text-align: center; }
    .loss-card__number { font-family: 'Syne', serif; font-size: 52px; font-weight: 700; color: var(--navy); line-height: 1; margin-bottom: 12px; }
    .loss-card__number span { color: var(--gold); }
    .loss-card__text { font-family: var(--font-sans); font-size: 14px; color: var(--navy); line-height: 1.65; margin-bottom: 8px; }
    .loss-card__source { font-family: var(--font-sans); font-size: 11px; color: var(--text-muted); font-style:normal; }
    .testimonial-express { background: var(--white); border: 1px solid var(--border); border-left: 3px solid var(--gold); padding: 36px 32px; }
    .testimonial-express__quote { font-family: 'Syne', serif; font-size: 19px; font-style:normal; color: var(--navy); line-height: 1.6; margin-bottom: 20px; }
    .testimonial-express__author { font-family: var(--font-sans); font-size: 12px; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; }
    .scarcity-box { background: var(--navy); padding: 60px 40px; text-align: center; }
    .scarcity-box h2 { font-family: 'Syne', serif; font-size: clamp(1.8rem, 3.5vw, 2.6rem); font-weight: 500; color: var(--white); margin: 0 0 16px; line-height: 1.2; }
    .scarcity-box p { font-family: var(--font-sans); font-size: 15px; color: rgba(255,255,255,0.7); max-width: 560px; margin: 0 auto 32px; line-height: 1.7; }
    .available-slots { display: inline-flex; align-items: center; gap: 12px; background: rgba(232,88,56,0.12); border: 1px solid var(--gold); padding: 14px 24px; margin-bottom: 32px; font-family: var(--font-sans); font-size: 13px; color: var(--gold); }
    .slot-count { font-family: 'Syne', serif; font-size: 28px; font-weight: 700; color: var(--gold); }
    .compare-table { width: 100%; border-collapse: collapse; font-family: var(--font-sans); }
    .compare-table th { background: var(--navy); color: var(--white); padding: 16px 20px; text-align: left; font-size: 13px; font-weight: 600; letter-spacing: 0.04em; }
    .compare-table th:first-child { color: rgba(255,255,255,0.6); font-weight: 400; }
    .compare-table th.col-express { color: var(--gold); }
    .compare-table td { padding: 14px 20px; font-size: 13px; color: var(--navy); border-bottom: 1px solid #eef0f3; vertical-align: middle; }
    .compare-table tr:nth-child(even) td { background: #f8f9fb; }
    .compare-table tr:nth-child(odd)  td { background: var(--white); }
    .compare-table td:first-child { font-weight: 500; color: #555; font-size: 12px; letter-spacing: 0.03em; }
    .compare-table td.col-express { font-weight: 600; color: var(--navy); }
    .compare-table td.check-gold { color: var(--gold); font-weight: 700; font-size: 16px; }
    .testimonials-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 28px; }
    @media (max-width: 700px) { .testimonials-grid { grid-template-columns: 1fr; } }
    .roi-highlight { display: inline-block; background: var(--gold); color: var(--navy); font-family: 'Syne', serif; font-size: 28px; font-weight: 700; padding: 4px 12px; margin: 8px 0; }

<script>
window.addEventListener('load', () => { if (!localStorage.getItem('cookieAccepted')) { setTimeout(() => document.getElementById('cookieBanner').classList.add('visible'), 1200); } });
function closeCookie() { localStorage.setItem('cookieAccepted', 'true'); document.getElementById('cookieBanner').classList.remove('visible'); }

document.addEventListener('i18n:ready', function() {
  var obs = new IntersectionObserver(function(entries) { entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }}); }, { threshold: 0.12 });
  document.querySelectorAll('.anim-fade-up, .anim-fade').forEach(function(el) { obs.observe(el); });
  document.querySelectorAll('.faq-item__question').forEach(function(q) { q.addEventListener('click', function() { var item = q.closest('.faq-item'); var isOpen = item.classList.contains('open'); document.querySelectorAll('.faq-item').forEach(function(i) { i.classList.remove('open'); }); if (!isOpen) item.classList.add('open'); }); });
});

let exitShown = false;
document.addEventListener('mouseleave', (e) => {
  if (e.clientY < 0 && !exitShown && !sessionStorage.getItem('exitShown')) {
    document.getElementById('exitModal').classList.add('visible');
    exitShown = true;
    sessionStorage.setItem('exitShown', '1');
  }
});
function closeExitModal() { document.getElementById('exitModal').classList.remove('visible'); }

function toggleLang() { document.getElementById('langSwitcher').classList.toggle('open'); }
document.addEventListener('click', (e) => {
  const ls = document.getElementById('langSwitcher');
  if (ls && !ls.contains(e.target)) ls.classList.remove('open');
});

function heroSubmit(e) {
  e.preventDefault();
  const email = document.getElementById('heroEmail').value.trim();
  if (!email) return;
  if (window.dataLayer) dataLayer.push({event: 'lead_generated', form_type: 'hero_ens_express'});
  window.location.href = 'contacto.html?email=' + encodeURIComponent(email) + '&service=ens-express';
}
</script>

<script>
(function(){
  var nav = document.getElementById('mainNav');
  var burger = document.getElementById('navBurger');
  var overlay = document.getElementById('navOverlay');
  var close = document.getElementById('navClose');
  if(nav) window.addEventListener('scroll', function(){ nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40); }, {passive:true});
  function toggleNav(open){ if(overlay){ overlay.classList.toggle('open',open); document.body.classList.toggle('no-scroll',open); } }
  if(burger) burger.addEventListener('click', function(){ toggleNav(!overlay.classList.contains('open')); });
  if(close) close.addEventListener('click', function(){ toggleNav(false); });
})();
</script>
