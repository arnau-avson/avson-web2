<!-- HERO — conversión primero: KPIs + prueba social + formulario -->
<style>
  .hero-conv { display:grid; grid-template-columns:1.05fr 0.95fr; gap:48px; align-items:center; }
  .hero-conv__kpis { display:flex; gap:30px; flex-wrap:wrap; margin:26px 0 22px; }
  .hero-conv__kpi strong { font-family:var(--font-serif); font-size:40px; font-weight:300; color:var(--navy); line-height:1; display:block; }
  .hero-conv__kpi span { font-family:var(--font-sans); font-size:11px; color:var(--text-muted); letter-spacing:0.07em; text-transform:uppercase; }
  @media (max-width:860px){ .hero-conv{ grid-template-columns:1fr; gap:32px; } }
</style>
<section class="section section--pearl" style="padding-top:120px;padding-bottom:64px">
  <div class="container">
    <div class="hero-conv">

      <!-- IZQUIERDA: propuesta + KPIs + prueba social -->
      <div>
        <span class="label-tag" data-i18n="hero.label"></span>
        <h1 class="display-title" style="margin:14px 0 18px" data-i18n="hero.title"></h1>
        <p style="font-family:var(--font-sans);font-size:17px;line-height:1.6;color:var(--text-body);max-width:520px;margin:0" data-i18n="hero.subtitle"></p>

        <div class="hero-conv__kpis">
          <div class="hero-conv__kpi"><strong data-i18n="hero.kpi1.value"></strong><span data-i18n="hero.kpi1.label"></span></div>
          <div class="hero-conv__kpi"><strong data-i18n="hero.kpi2.value"></strong><span data-i18n="hero.kpi2.label"></span></div>
          <div class="hero-conv__kpi"><strong data-i18n="hero.kpi3.value"></strong><span data-i18n="hero.kpi3.label"></span></div>
        </div>

        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
          <div style="display:inline-flex;align-items:center;gap:8px;border:1px solid #e85838;padding:9px 16px;border-radius:8px">
            <span style="font-size:16px;color:#e85838">&#10022;</span>
            <span style="font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#1f2023" data-i18n="hero.guarantee"></span>
          </div>
        </div>

      </div>

      <!-- DERECHA: formulario de captura en el hero -->
      <div style="background:#fff;border:1px solid #E5E5E0;border-radius:14px;padding:30px;box-shadow:0 18px 50px rgba(26,39,68,0.12)">
        <p style="font-family:var(--font-sans);font-size:13px;font-weight:700;color:var(--gold);margin:0 0 4px" data-i18n="heroForm.preTitle"></p>
        <p style="font-family:var(--font-serif);font-size:26px;color:var(--navy);margin:0 0 4px" data-i18n="heroForm.title"></p>
        <form onsubmit="avsonSubmitLead(event,{source:'iso27001_hero',event:'iso27001_lead'})" style="display:flex;flex-direction:column;gap:11px;margin-top:14px">
          <input type="text" name="nombre" placeholder="" required style="padding:13px 16px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:15px;color:#1f2023;outline:none" data-i18n-placeholder="heroForm.placeholderName">
          <input type="email" name="email" placeholder="" required style="padding:13px 16px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:15px;color:#1f2023;outline:none" data-i18n-placeholder="heroForm.placeholderEmail">
          <div style="display:flex;gap:8px;align-items:flex-start">
            <input type="checkbox" required style="width:15px;height:15px;flex-shrink:0;margin-top:3px;accent-color:#1f2023">
            <label style="font-family:var(--font-sans);font-size:11px;color:#7A8499;line-height:1.4" data-i18n="heroForm.checkbox"></label>
          </div>
          <button type="submit" class="v3-btn v3-btn--gold v3-btn--full v3-btn--xl v3-btn--pulse" data-i18n="heroForm.submit"></button>
          <p style="font-family:var(--font-sans);font-size:11px;color:#B0B8C4;text-align:center;margin:0" data-i18n="heroForm.note"></p>
        </form>
        <p style="font-family:var(--font-sans);font-size:13px;color:var(--text-muted);text-align:center;margin:14px 0 0" data-i18n="heroForm.phoneText"></p>
      </div>

    </div>
  </div>
</section>

<!-- SCRIPTS -->
<script>
// Wait for i18n.js to inject content before initializing interactions
document.addEventListener('i18n:ready', function () {
  var obs = new IntersectionObserver(function (e) { e.forEach(function (el) { if (el.isIntersecting) el.target.classList.add('visible'); }); }, { threshold: 0.08 });
  document.querySelectorAll('.anim-fade-up').forEach(function (el) { obs.observe(el); });
  document.querySelectorAll('.faq-item__question').forEach(function (q) {
    q.addEventListener('click', function () { q.parentElement.classList.toggle('open'); });
  });
});

// Exit intent
var _exitShown = false;
document.addEventListener('mouseleave', function (e) {
  if (e.clientY < 0 && !_exitShown && !sessionStorage.getItem('_exitShown')) {
    document.getElementById('exitModal').style.display = 'flex';
    _exitShown = true;
    sessionStorage.setItem('_exitShown', '1');
  }
});
// Sticky bar on mobile
if (window.innerWidth <= 768) { document.getElementById('stickyBar').style.display = 'flex'; }
</script>

<script>
(function(){
  var nav = document.getElementById('mainNav');
  var burger = document.getElementById('navBurger');
  var overlay = document.getElementById('navOverlay');
  var close = document.getElementById('navClose');
  if(nav) window.addEventListener('scroll', function(){ nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40); }, {passive:true});
  function toggleNav(open){ if(overlay){ overlay.classList.toggle('open',open); document.body.classList.toggle('no-scroll',open); } }
  if(burger) burger.addEventListener('click', function(){ toggleNav(!overlay.classList.contains('open')); });
  if(close) close.addEventListener('click', function(){ toggleNav(false); });
})();
</script>
