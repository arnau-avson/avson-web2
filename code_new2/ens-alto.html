    "mainEntity": [
      {"@type": "Question","name": "¿Cómo se determina si mis sistemas son categoría Alta?","acceptedAnswer": {"@type": "Answer","text": "La categoría Alta se determina cuando el impacto potencial de un incidente de seguridad en alguna de las cinco dimensiones —confidencialidad, integridad, disponibilidad, autenticidad o trazabilidad— alcanza el nivel Alto: consecuencias muy graves, irreversibles o que afectan a la seguridad nacional, infraestructuras críticas o grandes volúmenes de ciudadanos. El análisis debe realizarse formalmente mediante metodología MAGERIT."}},
      {"@type": "Question","name": "¿El ENS Alto es más caro que el Medio?","acceptedAnswer": {"@type": "Answer","text": "Sí. El ENS Alto requiere la implementación de los 73 controles del Anexo II en su nivel máximo, lo que supone una inversión mayor en consultoría, controles técnicos (SIEM, criptografía avanzada, redundancia física) y una auditoría externa más extensa y costosa. El plazo también es mayor: entre 5 y 7 meses según la complejidad."}},
      {"@type": "Question","name": "¿Qué entidades pueden auditar el ENS Alto?","acceptedAnswer": {"@type": "Answer","text": "La auditoría del ENS Alto debe realizarla una entidad de certificación acreditada por ENAC para el esquema ENS, como Bureau Veritas, SGS, AENOR, Applus+ o BSI. Para sistemas con información clasificada o relacionados con defensa, pueden intervenir también auditores habilitados por el CCN (Centro Criptológico Nacional)."}},
      {"@type": "Question","name": "¿El ENS Alto equivale a ISO 27001?","acceptedAnswer": {"@type": "Answer","text": "No son equivalentes, pero comparten una base significativa de controles (aproximadamente el 65%). El ENS Alto tiene requisitos específicos del contexto de la Administración Pública española y controles más estrictos en áreas como continuidad de servicio, criptografía y seguridad física. La ISO 27001 tiene alcance internacional y es más flexible. Ambas certificaciones se complementan y Avson las trabaja habitualmente en paralelo."}},
      {"@type": "Question","name": "¿Mis sistemas de categoría Alta necesitan también ENS Básico o Medio en otros sistemas?","acceptedAnswer": {"@type": "Answer","text": "Es posible que una misma organización tenga sistemas de distintas categorías ENS. La categorización se hace sistema por sistema, en función del impacto de cada uno. Los sistemas de apoyo o secundarios pueden ser Básico o Medio aunque los sistemas principales sean Alto. Avson ayuda a definir el alcance correcto para cada sistema y organización."}}
    ]
  }
  </script>

<script>
document.addEventListener('i18n:ready', function() {
  var obs = new IntersectionObserver(function(entries) { entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }}); }, { threshold: 0.12 });
  document.querySelectorAll('.anim-fade-up, .anim-fade').forEach(function(el) { obs.observe(el); });
  document.querySelectorAll('.faq-item__question').forEach(function(q) { q.addEventListener('click', function() { var item = q.closest('.faq-item'); var isOpen = item.classList.contains('open'); document.querySelectorAll('.faq-item').forEach(function(i) { i.classList.remove('open'); }); if (!isOpen) item.classList.add('open'); }); });
});

window.addEventListener('scroll', function() { var n = document.getElementById('mainNav'); if (n) n.classList.toggle('v3-nav--scrolled', window.scrollY > 40); });
function toggleNav() { document.getElementById('navOverlay').classList.toggle('open'); document.body.classList.toggle('no-overflow'); }
window.addEventListener('load', function() { if (!localStorage.getItem('cookieAccepted')) { setTimeout(function() { document.getElementById('cookieBanner').classList.add('visible'); }, 1200); } });
function closeCookie() { localStorage.setItem('cookieAccepted', 'true'); document.getElementById('cookieBanner').classList.remove('visible'); }

var exitShown = false;
document.addEventListener('mouseleave', function(e) {
  if (e.clientY < 0 && !exitShown && !sessionStorage.getItem('exitShown')) {
    document.getElementById('exitModal').classList.add('visible');
    exitShown = true;
    sessionStorage.setItem('exitShown', '1');
  }
});
function closeExitModal() { document.getElementById('exitModal').classList.remove('visible'); }

function toggleLang() { document.getElementById('langSwitcher').classList.toggle('open'); }
document.addEventListener('click', function(e) { var ls = document.getElementById('langSwitcher'); if (ls && !ls.contains(e.target)) ls.classList.remove('open'); });

function heroSubmit(e) {
  e.preventDefault();
  var emailField = document.getElementById('heroEmail') || document.getElementById('heroEmail2');
  var email = emailField ? emailField.value.trim() : '';
  if (!email) return;
  if (window.dataLayer) dataLayer.push({event: 'lead_generated', form_type: 'hero_ens_alto'});
  window.location.href = 'contacto.html?email=' + encodeURIComponent(email) + '&servicio=ENS+Alto';
}
</script>

<script>
(function(){
  var nav = document.getElementById('mainNav');
  var burger = document.getElementById('navBurger');
  var overlay = document.getElementById('navOverlay');
  var close = document.getElementById('navClose');
  if(nav) window.addEventListener('scroll', function(){ nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40); }, {passive:true});
  function toggleNav(open){ if(overlay){ overlay.classList.toggle('open',open); document.body.classList.toggle('no-scroll',open); } }
  if(burger) burger.addEventListener('click', function(){ toggleNav(!overlay.classList.contains('open')); });
  if(close) close.addEventListener('click', function(){ toggleNav(false); });
})();
</script>
