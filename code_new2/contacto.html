<head>

  <script type="text/javascript">(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y)})(window,document,"clarity","script","CLARITY_ID");</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy:#1f2023; --gold:#e85838; --gold-hover:#d04428; --pearl:#eef3f8; --white:#FFFFFF; --border:#d9e2ec; --muted:#7A8499; }
    html { font-size:16px; -webkit-font-smoothing:antialiased; }
    body { font-family:'DM Sans',system-ui,sans-serif; background:var(--pearl); color:var(--navy); }

    /* NAV */
    .cnav { position:sticky; top:0; z-index:200; background:rgba(255,255,255,0.97); border-bottom:1px solid var(--border); backdrop-filter:blur(8px); }
    .cnav__inner { max-width:1320px; margin:0 auto; padding:0 28px; height:64px; display:flex; align-items:center; justify-content:space-between; gap:24px; }
    .cnav__logo { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; color:var(--navy); text-decoration:none; letter-spacing:-0.02em; white-space:nowrap; }
    .logo-o { position:relative; display:inline-block; }
    .logo-o::after { content:"\02C6"; position:absolute; top:-0.46em; left:50%; transform:translateX(-50%); font-size:0.62em; line-height:1; color:var(--gold); }
    .cnav__links { display:flex; gap:24px; align-items:center; }
    .cnav__links a { font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; color:var(--navy); text-decoration:none; transition:color .15s; }
    .cnav__links a:hover { color:var(--gold); }
    .cnav__phone { font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; color:var(--navy); text-decoration:none; white-space:nowrap; }
    .cnav__phone:hover { color:var(--gold); }
    .cnav__cta { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; color:#fff; background:var(--gold); border-radius:10px; padding:10px 16px; text-decoration:none; white-space:nowrap; transition:background .15s; }
    .cnav__cta:hover { background:var(--gold-hover); }
    .lang-switch { position:relative; font-size:13px; font-family:'DM Sans',sans-serif; }
    .lang-switch > button { background:none; border:1px solid var(--border); border-radius:8px; padding:6px 10px; cursor:pointer; color:inherit; font-family:inherit; }
    .lang-switch__menu { display:none; position:absolute; top:110%; right:0; background:var(--white); border:1px solid var(--border); border-radius:10px; padding:6px; min-width:90px; box-shadow:0 8px 24px rgba(17,19,24,.10); z-index:60; }
    .lang-switch:hover .lang-switch__menu, .lang-switch:focus-within .lang-switch__menu { display:block; }
    .lang-switch__menu a { display:block; padding:6px 10px; border-radius:6px; color:var(--navy); text-decoration:none; }
    .lang-switch__menu a:hover { background:var(--pearl); }
    @media (max-width:980px){ .cnav__links { display:none; } }
    @media (max-width:640px){ .cnav__phone, .lang-switch { display:none; } }

    /* MAIN (centra la tarjeta) */
    .cmain { min-height:calc(100vh - 64px); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 20px 64px; }

    .logo { display:none; }
    .fomo-bar { background:rgba(232,88,56,0.10); border:1px solid rgba(232,88,56,0.45); border-radius:8px; padding:10px 20px; font-size:12px; font-weight:600; color:#b8431f; text-align:center; margin-bottom:20px; max-width:420px; width:100%; }
    .card { background:var(--white); border-radius:16px; border:1px solid var(--border); padding:40px 36px 32px; width:100%; max-width:420px; box-shadow:0 8px 40px rgba(17,19,24,0.10); }
    .badge { display:inline-flex; align-items:center; gap:6px; background:var(--pearl); color:var(--navy); font-size:11px; font-weight:700; padding:5px 12px; border-radius:20px; margin-bottom:14px; }
    .card-title { font-family:'Syne',serif; font-size:30px; font-weight:400; color:var(--navy); line-height:1.15; margin-bottom:4px; }
    .card-sub { font-size:13px; color:var(--muted); margin-bottom:24px; line-height:1.5; }
    .qual-label { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .qual-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:20px; }
    .qual-btn { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; padding:9px 6px; border:1.5px solid var(--border); background:var(--pearl); color:var(--navy); border-radius:6px; cursor:pointer; transition:all 0.15s; text-align:center; }
    .qual-btn:hover { border-color:var(--navy); }
    .qual-btn--urgent { border-color:rgba(232,88,56,0.5); background:rgba(232,88,56,0.08); color:#b8431f; }
    .qual-btn--active { background:var(--navy); border-color:var(--navy); color:var(--white); }
    .form-group { margin-bottom:12px; }
    .form-group input { width:100%; padding:13px 16px; border:1.5px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--navy); background:var(--white); outline:none; transition:border-color 0.15s; }
    .form-group input:focus { border-color:var(--navy); }
    .form-group input::placeholder { color:#B0B8C4; }
    .rgpd { display:flex; align-items:flex-start; gap:10px; font-size:11px; color:var(--muted); line-height:1.5; margin:12px 0 18px; }
    .rgpd input { width:15px; height:15px; flex-shrink:0; margin-top:1px; accent-color:var(--navy); cursor:pointer; }
    .rgpd a { color:var(--navy); }
    .btn-cta { width:100%; background:var(--gold); color:#fff; border:none; padding:17px; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:16px; font-weight:700; cursor:pointer; transition:background 0.15s,transform 0.1s; animation:pulse-gold 2.5s infinite; }
    .btn-cta:hover { background:var(--gold-hover); transform:translateY(-1px); }
    @keyframes pulse-gold { 0%,100% { box-shadow:0 6px 20px rgba(232,88,56,0.40),0 0 0 0 rgba(232,88,56,0.25); } 50% { box-shadow:0 6px 20px rgba(232,88,56,0.40),0 0 0 8px rgba(232,88,56,0); } }
    .lock-text { text-align:center; font-size:11px; color:var(--muted); margin-top:10px; }
    .alt-phone { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:20px; padding-top:20px; border-top:1px solid var(--border); font-size:13px; color:var(--muted); }
    .alt-phone a { font-weight:700; color:var(--navy); text-decoration:none; }
    .alt-phone a:hover { color:var(--gold); }
    .trust-strip { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; margin-top:24px; font-size:12px; color:var(--muted); max-width:420px; width:100%; }
    .trust-strip span::before { content:'✓ '; color:var(--gold); font-weight:700; }

    /* FOOTER */
    .cfooter { background:var(--navy); color:rgba(255,255,255,0.75); padding:48px 28px 28px; }
    .cfooter__grid { max-width:1100px; margin:0 auto; display:grid; grid-template-columns:1.4fr 1fr 1fr; gap:40px; }
    @media (max-width:760px){ .cfooter__grid { grid-template-columns:1fr; gap:28px; } }
    .cfooter__logo { font-family:'DM Sans',sans-serif; font-size:16px; font-weight:700; letter-spacing:0.04em; color:#fff; }
    .cfooter__logo span { color:var(--gold); }
    .cfooter p { font-size:13px; line-height:1.7; color:rgba(255,255,255,0.55); margin-top:12px; }
    .cfooter h4 { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#fff; margin-bottom:14px; }
    .cfooter ul { list-style:none; }
    .cfooter ul li { margin-bottom:9px; }
    .cfooter ul a { color:rgba(255,255,255,0.6); text-decoration:none; font-size:14px; }
    .cfooter ul a:hover { color:var(--gold); }
    .cfooter__bottom { max-width:1100px; margin:32px auto 0; padding-top:20px; border-top:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; font-size:12px; color:rgba(255,255,255,0.4); }
    .cfooter__bottom a { color:rgba(255,255,255,0.5); text-decoration:none; }

    @media (max-width:480px) { .card { padding:28px 20px 24px; } }
  </style>
</head>
<body>

  <main class="cmain">
    <div class="fomo-bar" data-i18n="fomo"></div>

    <div class="card">
      <span class="badge" data-i18n="badge"></span>
      <h1 class="card-title" data-i18n="card.title"></h1>
      <p class="card-sub" data-i18n="card.sub"></p>

      <p class="qual-label" data-i18n="qualLabel"></p>
      <div class="qual-grid">
        <button type="button" class="qual-btn qual-btn--urgent" onclick="pickQ(this,'ENS Express urgente')" data-i18n="qualBtn1"></button>
        <button type="button" class="qual-btn" onclick="pickQ(this,'ENS estándar')" data-i18n="qualBtn2"></button>
        <button type="button" class="qual-btn" onclick="pickQ(this,'ISO 27001')" data-i18n="qualBtn3"></button>
        <button type="button" class="qual-btn" onclick="pickQ(this,'ISO 22301')" data-i18n="qualBtn4"></button>
        <button type="button" class="qual-btn" onclick="pickQ(this,'DORA')" data-i18n="qualBtn5"></button>
        <button type="button" class="qual-btn" onclick="pickQ(this,'No lo sé aún')" data-i18n="qualBtn6"></button>
        <button type="button" class="qual-btn" onclick="pickQ(this,'Otras')" data-i18n="qualBtn7"></button>
      </div>
      <form id="contactForm" onsubmit="avsonSubmitLead(event,{source:'contacto',event:'contact_form_submit'})" novalidate>
        <input type="hidden" id="cNecesidad" name="necesidad" value="">
        <div class="form-group">
          <input type="text"  id="cNombre" name="nombre" placeholder="" data-i18n-placeholder="form.placeholderName" autocomplete="given-name" required>
        </div>
        <div class="form-group">
          <input type="email" id="cEmail"  name="email"  placeholder="" data-i18n-placeholder="form.placeholderEmail" autocomplete="email" required>
        </div>
        <div class="rgpd">
          <input type="checkbox" id="cRgpd" required>
          <label for="cRgpd" data-i18n="form.rgpd"></label>
        </div>
        <div class="rgpd">
          <input type="checkbox" id="cComercial" name="comercial">
          <label for="cComercial" data-i18n="form.comercial"></label>
        </div>
        <button type="submit" class="btn-cta" data-i18n="form.submit"></button>
        <p class="lock-text" data-i18n="form.lockText"></p>
      </form>

      <div class="alt-phone">
        <span data-i18n="altPhone.label"></span>
        <a href="tel:+34648414863">+34 648 414 863</a>
      </div>
    </div>

    <div class="trust-strip">
      <span data-i18n="trust1"></span>
      <span data-i18n="trust2"></span>
      <span data-i18n="trust3"></span>
    </div>

  <script src="avson-leads.js"></script>
  <script src="avson-consent.js"></script>
  <script>
    function pickQ(btn, val) {
      document.getElementById('cNecesidad').value = val;
      document.querySelectorAll('.qual-btn').forEach(b => b.classList.remove('qual-btn--active'));
      btn.classList.add('qual-btn--active');
    }
  </script>
