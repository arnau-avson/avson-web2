server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Página de error 404
    error_page 404 /404.html;

    # JS nunca cacheado (cambios deben reflejarse inmediatamente)
    location ~* \.(js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Resto de estáticos con caché larga
    location ~* \.(css|json|svg|png|jpg|jpeg|gif|ico|woff2?|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Inyectar gate de contraseña en todos los HTML
    sub_filter '<body>' '<body><script src="/gate.js"></script>';
    sub_filter_once on;

    # Servir ficheros HTML sin extensión
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Seguridad básica
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
