server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Página de error 404
    error_page 404 /404.html;

    # JS nunca cacheado (cambios deben reflejarse inmediatamente)
    location ~* \.(js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Resto de estáticos con caché larga
    location ~* \.(css|json|svg|png|jpg|jpeg|gif|ico|woff2?|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy API requests to the mail server
    location /api/ {
        proxy_pass http://avson-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Servir ficheros HTML sin extensión
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.clarity.ms https://*.clarity.ms https://www.googletagmanager.com https://snap.licdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://www.clarity.ms https://*.clarity.ms https://www.google-analytics.com https://www.googletagmanager.com; frame-ancestors 'self'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
