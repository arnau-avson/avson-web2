services:
  avson-web:
    build: .
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - avson-api

  avson-api:
    build: ./code_new2/server
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - MAIL_SENDER=${MAIL_SENDER}
      - MAIL_RECIPIENT=${MAIL_RECIPIENT}
