<style>

<section class="section section--pearl" style="padding-top:120px;padding-bottom:64px">
  <div class="container">
    <div class="hero-conv">

      <div>
        <span class="label-tag" data-i18n="hero.label"></span>
        <h1 style="font-family:var(--font-serif);font-size:clamp(40px,5.2vw,68px);font-weight:300;color:var(--navy);line-height:1.08;margin:14px 0 18px" data-i18n="hero.title"></h1>

          <span style="font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#1f2023" data-i18n="hero.guarantee"></span>

      </div>

        <p style="font-family:var(--font-serif);font-size:26px;color:var(--navy);margin:0 0 4px" data-i18n="heroForm.title"></p>
        <form onsubmit="avsonSubmitLead(event,{source:'otras_hero',event:'otras_lead'})" style="display:flex;flex-direction:column;gap:11px;margin-top:14px">
          <input type="text" name="nombre" placeholder="" required style="padding:13px 16px;border:1.5px solid #E5E5E0;border-radius:8px;font-family:var(--font-sans);font-size:15px;color:#1f2023;outline:none" data-i18n-placeholder="heroForm.placeholderName">

          <p style="font-family:var(--font-sans);font-size:11px;color:#B0B8C4;text-align:center;margin:0" data-i18n="heroForm.note"></p>
        </form>
        <p style="font-family:var(--font-sans);font-size:13px;color:var(--text-muted);text-align:center;margin:14px 0 0" data-i18n="heroForm.phoneText"></p>
      </div>

    </div>
  </div>
</section>

<script>
document.addEventListener('i18n:ready', function() {
  var obs=new IntersectionObserver(function(e){e.forEach(function(el){if(el.isIntersecting)el.target.classList.add('visible');});},{threshold:0.08});
  document.querySelectorAll('.anim-fade-up').forEach(function(el){obs.observe(el);});
  document.querySelectorAll('.faq-item__question').forEach(function(q){q.addEventListener('click',function(){var item=q.parentElement;item.classList.toggle('open');});});
});
var _exitShown = false;
document.addEventListener('mouseleave', function(e) {
  if (e.clientY < 0 && !_exitShown && !sessionStorage.getItem('_exitShown')) {
    document.getElementById('exitModal').style.display = 'flex';
    _exitShown = true;
    sessionStorage.setItem('_exitShown', '1');
  }
});
if (window.innerWidth <= 768) { document.getElementById('stickyBar').style.display = 'flex'; }
</script>

<script>
(function(){
  var nav = document.getElementById('mainNav');
  var burger = document.getElementById('navBurger');
  var overlay = document.getElementById('navOverlay');
  var close = document.getElementById('navClose');
  if(nav) window.addEventListener('scroll', function(){ nav.classList.toggle('v3-nav--scrolled', window.scrollY > 40); }, {passive:true});
  function toggleNav(open){ if(overlay){ overlay.classList.toggle('open',open); document.body.classList.toggle('no-scroll',open); } }
  if(burger) burger.addEventListener('click', function(){ toggleNav(!overlay.classList.contains('open')); });
  if(close) close.addEventListener('click', function(){ toggleNav(false); });
})();
</script>
