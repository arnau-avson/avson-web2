  <div class="cookie-banner__actions">
    <button class="cookie-accept" onclick="closeCookie()" data-i18n="cookieBanner.accept"></button>
    <button class="cookie-decline" onclick="closeCookie()" data-i18n="cookieBanner.reject"></button>
  </div>
</div>

<script>
window.addEventListener('scroll', () => {
  var n=document.getElementById('mainNav'); if(n) n.classList.toggle('scrolled', window.scrollY > 40);
});
function toggleNav() {
  document.getElementById('navOverlay').classList.toggle('open');
  document.body.classList.toggle('no-overflow');
}
window.addEventListener('load', () => {
  if (!localStorage.getItem('cookieAccepted')) {
    setTimeout(() => document.getElementById('cookieBanner').classList.add('visible'), 1200);
  }
});
function closeCookie() {
  localStorage.setItem('cookieAccepted', 'true');
  document.getElementById('cookieBanner').classList.remove('visible');
}
document.addEventListener('i18n:ready', function () {
  const animEls = document.querySelectorAll('.anim-fade-up, .anim-fade');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }});
  }, { threshold: 0.12 });
  animEls.forEach(el => observer.observe(el));
});

// Language switcher
function toggleLang_unused() {
  document.getElementById('langSwitcher').classList.toggle('open');
}
document.addEventListener('click', (e) => {
  const ls = document.getElementById('langSwitcher');
  if (ls && !ls.contains(e.target)) ls.classList.remove('open');
});
</script>
